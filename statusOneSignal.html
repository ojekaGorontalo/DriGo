<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Debug Notifikasi</title>
</head>
<body>

<h2>Debug Notifikasi</h2>

<button onclick="aktifkan()">Aktifkan Notifikasi</button>

<h3>Player ID:</h3>
<div id="playerId">-</div>

<h3>Log:</h3>
<pre id="log"></pre>

<script>
function log(text){
  const waktu = new Date().toLocaleTimeString();
  document.getElementById("log").innerHTML += `[${waktu}] ${text}\n`;
}

// Tunggu Median Ready
document.addEventListener("deviceready", function(){
  log("✅ median ready");
});

// 🔥 FUNCTION UTAMA (UPDATED)
async function aktifkan(){
  log("START");

  try {
    log("CEK median: " + typeof median);

    if(!median || !median.onesignal){
      log("❌ onesignal tidak ada");
      return;
    }

    log("✅ onesignal ADA");

    // 🔐 1. PAKSA CONSENT
    if(median.onesignal.setConsentGiven){
      log("🔐 set consent TRUE...");
      await median.onesignal.setConsentGiven(true);
      log("✅ consent diberikan");
    }

    // 📲 2. REGISTER
    log("📲 CALL register...");
    await median.onesignal.register();
    log("✅ register SELESAI");

    // 🔔 3. REQUEST IZIN NOTIF
    if(median.onesignal.promptForPushNotificationsWithUserResponse){
      log("🔔 meminta izin notifikasi...");
      await median.onesignal.promptForPushNotificationsWithUserResponse();
      log("✅ izin notifikasi diminta");
    }

    // ⏳ 4. TUNGGU
    log("⏳ menunggu sinkronisasi...");
    await new Promise(r => setTimeout(r, 8000));

    // 🔍 5. AMBIL DATA (RETRY)
    let info = null;
    let id = null;

    for(let i=0; i<3; i++){
      log("🔍 cek data ke-" + (i+1));

      info = await median.onesignal.onesignalInfo();
      log("DATA: " + JSON.stringify(info));

      if(info?.userId) id = info.userId;
      else if(info?.oneSignalUserId) id = info.oneSignalUserId;
      else if(info?.subscription?.id) id = info.subscription.id;

      if(id) break;

      log("⏳ Player ID belum ada, tunggu lagi...");
      await new Promise(r => setTimeout(r, 5000));
    }

    // 🎯 6. HASIL
    if(id){
      log("🎉 SUCCESS Player ID: " + id);
      document.getElementById("playerId").innerText = id;
    }else{
      log("❌ Player ID tidak ditemukan");
    }

  } catch(e){
    log("❌ ERROR: " + e.message);
  }
}
</script>

</body>
</html>
