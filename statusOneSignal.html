<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Debug Notifikasi - Jego</title>
  <style>
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #f1f5f9;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 32px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h2 {
      color: #f97316;
      margin-top: 0;
    }
    button {
      background: #f97316;
      color: white;
      border: none;
      border-radius: 60px;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin: 8px 0;
      transition: 0.2s;
    }
    button:hover {
      background: #ea580c;
    }
    button.secondary {
      background: #3b82f6;
    }
    button.secondary:hover {
      background: #2563eb;
    }
    .card {
      background: #f8fafc;
      border-radius: 24px;
      padding: 16px;
      margin: 16px 0;
    }
    .player-id {
      font-family: monospace;
      background: #1e293b;
      color: #e2e8f0;
      padding: 12px;
      border-radius: 16px;
      word-break: break-all;
      font-size: 0.8rem;
    }
    pre {
      background: #0f172a;
      color: #e2e8f0;
      padding: 12px;
      border-radius: 16px;
      overflow-x: auto;
      font-size: 0.7rem;
      max-height: 300px;
    }
    .note {
      font-size: 0.7rem;
      color: #64748b;
      margin-top: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>📱 Debug Notifikasi Jego</h2>
  <p>Gunakan tombol di bawah untuk mengaktifkan notifikasi dan mendapatkan Player ID.</p>

  <button id="activateBtn">🔔 Aktifkan Notifikasi</button>

  <div class="card">
    <strong>🎯 Player ID:</strong>
    <div id="playerId" class="player-id">-</div>
  </div>

  <button id="testSendBtn" class="secondary" style="display:none;">📨 Kirim Notifikasi Uji ke Player ID ini</button>

  <div class="card">
    <strong>📝 Log Proses:</strong>
    <pre id="log">Menunggu perintah...</pre>
  </div>

  <div class="note">
    ⚡ Pastikan aplikasi sudah dibangun dengan App ID: <strong>746077d8-aa74-47c1-8b26-050658cc612b</strong><br>
    Mode Legacy harus <strong>DISABLED</strong> (menggunakan SDK v5+)
  </div>
</div>

<script>
  // Konfigurasi OneSignal (sama dengan dashboard)
  const ONESIGNAL_APP_ID = "746077d8-aa74-47c1-8b26-050658cc612b";
  // API Key untuk mengirim notifikasi (REST API Key dari aplikasi yang sama)
  const ONESIGNAL_API_KEY = "os_v2_app_orqhpwfkord4dczgaudfrtdbfnxm542knioeix5a23nurfhrpb5xruzytv3inrnhsnmbyhp5s67c32krbd75qudm3e5cq5gg64affli";

  let currentPlayerId = null;

  // Helper log
  function log(msg) {
    const time = new Date().toLocaleTimeString();
    const logDiv = document.getElementById('log');
    logDiv.innerHTML += `[${time}] ${msg}\n`;
    logDiv.scrollTop = logDiv.scrollHeight;
    console.log(msg);
  }

  function showToast(msg, isError = false) {
    // tampilkan alert sederhana (bisa diganti toast)
    alert(msg);
  }

  // Fungsi aktivasi (sama seperti contoh, dengan penambahan pengiriman consent)
  async function activateNotifications() {
    log("🚀 Memulai proses aktivasi...");
    document.getElementById('activateBtn').disabled = true;
    document.getElementById('activateBtn').innerText = "⏳ Memproses...";

    try {
      // Cek median dan onesignal
      if (typeof median === 'undefined') {
        log("❌ median global tidak tersedia. Plugin OneSignal Median tidak terdeteksi.");
        alert("Plugin OneSignal Median tidak aktif. Hubungi tim teknis.");
        return;
      }
      if (!median.onesignal) {
        log("❌ median.onesignal tidak tersedia.");
        alert("OneSignal SDK tidak terinisialisasi. Cek konfigurasi Median.");
        return;
      }
      log("✅ median.onesignal tersedia");

      // 1. Berikan consent (wajib untuk GDPR)
      if (median.onesignal.setConsentGiven) {
        log("🔐 Memberikan consent...");
        await median.onesignal.setConsentGiven(true);
        log("✅ Consent diberikan");
      } else {
        log("⚠️ setConsentGiven tidak tersedia, lanjutkan...");
      }

      // 2. Register
      log("📲 Mendaftarkan perangkat...");
      await median.onesignal.register();
      log("✅ Register selesai");

      // 3. Minta izin notifikasi (jika belum pernah)
      if (median.onesignal.promptForPushNotificationsWithUserResponse) {
        log("🔔 Meminta izin notifikasi ke pengguna...");
        const granted = await median.onesignal.promptForPushNotificationsWithUserResponse();
        log(granted ? "✅ Izin diberikan" : "⚠️ Izin ditolak");
      } else {
        log("⚠️ promptForPushNotificationsWithUserResponse tidak tersedia");
      }

      // 4. Tunggu beberapa detik agar OneSignal mendapatkan Player ID
      log("⏳ Menunggu sinkronisasi (8 detik)...");
      await new Promise(r => setTimeout(r, 8000));

      // 5. Ambil Player ID dengan retry
      let playerId = null;
      for (let i = 0; i < 5; i++) {
        log(`🔍 Coba ambil info (${i+1}/5)...`);
        try {
          const info = await median.onesignal.onesignalInfo();
          log(`📦 Info: ${JSON.stringify(info)}`);
          // Cek berbagai kemungkinan properti
          if (info.userId) playerId = info.userId;
          else if (info.oneSignalUserId) playerId = info.oneSignalUserId;
          else if (info.subscription && info.subscription.id) playerId = info.subscription.id;
          else if (info.externalId) playerId = info.externalId;

          if (playerId) {
            log(`🎉 Player ID ditemukan: ${playerId}`);
            break;
          }
        } catch (err) {
          log(`⚠️ Error onesignalInfo: ${err.message}`);
        }
        await new Promise(r => setTimeout(r, 3000));
      }

      if (playerId) {
        currentPlayerId = playerId;
        document.getElementById('playerId').innerText = playerId;
        document.getElementById('testSendBtn').style.display = 'block';
        log("✅ Aktivasi berhasil. Player ID siap.");
        // Opsional: simpan ke Firebase jika diperlukan
      } else {
        log("❌ Gagal mendapatkan Player ID setelah beberapa kali percobaan.");
        alert("Tidak bisa mendapatkan Player ID. Coba periksa izin notifikasi atau restart aplikasi.");
      }
    } catch (err) {
      log(`❌ Error: ${err.message}`);
      alert(`Terjadi kesalahan: ${err.message}`);
    } finally {
      document.getElementById('activateBtn').disabled = false;
      document.getElementById('activateBtn').innerText = "🔔 Aktifkan Notifikasi";
    }
  }

  // Fungsi mengirim notifikasi uji ke Player ID yang didapat
  async function sendTestNotification() {
    if (!currentPlayerId) {
      alert("Player ID belum tersedia. Aktifkan notifikasi dulu.");
      return;
    }
    log("📤 Mengirim notifikasi uji ke Player ID: " + currentPlayerId);
    const payload = {
      app_id: ONESIGNAL_APP_ID,
      include_player_ids: [currentPlayerId],
      headings: { en: "Notifikasi Uji Jego" },
      contents: { en: "Selamat! Notifikasi berhasil dikirim. Anda siap menerima order." },
      priority: 10
    };
    try {
      const response = await fetch("https://onesignal.com/api/v1/notifications", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Basic ${ONESIGNAL_API_KEY}`
        },
        body: JSON.stringify(payload)
      });
      const data = await response.json();
      if (data.errors) {
        log(`❌ Gagal kirim: ${JSON.stringify(data.errors)}`);
        alert("Gagal mengirim notifikasi: " + JSON.stringify(data.errors));
      } else {
        log(`✅ Notifikasi terkirim! ID: ${data.id}`);
        alert("Notifikasi uji berhasil dikirim! Cek ponsel Anda.");
      }
    } catch (err) {
      log(`❌ Error kirim notif: ${err.message}`);
      alert("Error: " + err.message);
    }
  }

  // Event listener
  document.getElementById('activateBtn').addEventListener('click', activateNotifications);
  document.getElementById('testSendBtn').addEventListener('click', sendTestNotification);

  // Cek apakah median sudah siap (deviceready)
  document.addEventListener("deviceready", function() {
    log("✅ Event deviceready terdeteksi. Median siap.");
  });

  // Jika median sudah ada sebelum event (tunggu sebentar)
  setTimeout(() => {
    if (typeof median !== 'undefined' && median.onesignal) {
      log("✅ Median sudah tersedia sejak awal.");
    } else {
      log("⚠️ Median belum tersedia. Pastikan plugin OneSignal terpasang.");
    }
  }, 2000);
</script>
</body>
</html>
