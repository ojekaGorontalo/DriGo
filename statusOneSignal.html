<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Status Notifikasi - JeGo Driver</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #f3f4f6; padding: 24px 16px; color: #1f2937; }
        .container { max-width: 560px; margin: 0 auto; }
        .card { background: white; border-radius: 32px; padding: 28px 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .header { text-align: center; margin-bottom: 24px; }
        .status-icon { font-size: 64px; margin-bottom: 12px; }
        h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
        .subtitle { color: #6b7280; font-size: 0.9rem; }
        .status-badge { display: inline-block; padding: 8px 20px; border-radius: 100px; font-weight: 600; font-size: 0.85rem; margin: 16px 0 8px; }
        .badge-success { background: #e6f7e6; color: #0e7c32; border: 1px solid #b2e0b2; }
        .badge-warning { background: #fff3e0; color: #c47d00; border: 1px solid #ffdeae; }
        .badge-danger { background: #fee9e7; color: #b91c1c; border: 1px solid #fbc5c5; }
        .info-grid { background: #f9fafb; border-radius: 24px; padding: 16px; margin: 20px 0; }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #e5e7eb; }
        .info-row:last-child { border-bottom: none; }
        .info-label { font-weight: 500; color: #4b5563; }
        .info-value { font-family: monospace; font-size: 0.7rem; background: white; padding: 4px 10px; border-radius: 40px; color: #1e40af; max-width: 60%; word-break: break-all; text-align: right; }
        .match-badge { font-weight: 600; font-size: 0.75rem; padding: 2px 10px; border-radius: 30px; }
        .match-success { background: #d1fae5; color: #065f46; }
        .match-failed { background: #fee2e2; color: #991b1b; }
        .btn { display: block; width: 100%; padding: 14px 20px; border: none; border-radius: 60px; font-weight: 700; font-size: 1rem; cursor: pointer; text-align: center; margin-top: 16px; transition: 0.2s; }
        .btn-primary { background: #f97316; color: white; }
        .btn-primary:hover { background: #ea580c; }
        .btn-secondary { background: #e5e7eb; color: #1f2937; }
        .btn-outline { background: transparent; border: 1px solid #d1d5db; color: #4b5563; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .alert { background: #fef9e3; border-left: 4px solid #f59e0b; padding: 14px 16px; border-radius: 20px; font-size: 0.85rem; color: #7c5c00; margin: 16px 0; }
        .toast-message { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 10px 20px; border-radius: 40px; font-size: 0.85rem; z-index: 1000; white-space: nowrap; }
        .footer-note { text-align: center; font-size: 0.7rem; color: #9ca3af; margin-top: 24px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <div class="status-icon" id="statusIcon">🔍</div>
            <h1>Status Notifikasi</h1>
            <div class="subtitle">Pastikan kamu menerima order</div>
            <div id="mainBadge" class="status-badge badge-neutral">Memeriksa...</div>
        </div>
        <div class="info-grid">
            <div class="info-row"><span class="info-label">👤 Nama Driver</span><span class="info-value" id="driverName">-</span></div>
            <div class="info-row"><span class="info-label">📱 Player ID (Firebase)</span><span class="info-value" id="firebasePlayerId">-</span></div>
            <div class="info-row"><span class="info-label">🆔 Player ID (OneSignal SDK)</span><span class="info-value" id="sdkPlayerId">-</span></div>
            <div class="info-row"><span class="info-label">✅ Kecocokan</span><span class="info-value" id="matchStatus">-</span></div>
            <div class="info-row"><span class="info-label">🔔 Status OneSignal</span><span class="info-value" id="onesignalStatus">-</span></div>
        </div>
        <button id="activateBtn" class="btn btn-primary">🔔 Aktifkan Notifikasi</button>
        <button id="syncBtn" class="btn btn-outline" style="display:none;">🔄 Sinkronkan Player ID</button>
        <button id="refreshBtn" class="btn btn-secondary">🔄 Refresh Status</button>
        <button id="resetBtn" class="btn btn-outline">🗑️ Reset & Daftarkan Ulang</button>
        <div id="infoMessage" class="alert" style="display:none;"></div>
    </div>
    <div class="footer-note">⚡ Player ID yang benar adalah UUID (contoh: cef1edc8-f630-4fff-ae6a-f41a7d9aecb0)</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCD0pgeZio-LdKqYDtWxcdXcZwyL4ngYQI",
        authDomain: "jego-35a2b.firebaseapp.com",
        databaseURL: "https://jego-35a2b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "jego-35a2b",
        storageBucket: "jego-35a2b.firebasestorage.app",
        messagingSenderId: "600037007040",
        appId: "1:600037007040:web:ac3243ad9b472647ffd725"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let currentUid = null;
    let isProcessing = false;

    function showToast(msg, isErr = false) {
        let t = document.querySelector('.toast-message');
        if (t) t.remove();
        t = document.createElement('div');
        t.className = 'toast-message';
        t.textContent = msg;
        t.style.background = isErr ? '#b91c1c' : '#0e7c32';
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    // Ambil Player ID dari Firebase (seharusnya UUID)
    async function getFirebasePlayerId() {
        if (!currentUid) return null;
        let snap = await database.ref(`driver_locations/${currentUid}`).once('value');
        let data = snap.val();
        let pid = data?.playerId || data?.subscriptionId || null;
        if (!pid) {
            snap = await database.ref(`drivers/${currentUid}`).once('value');
            data = snap.val();
            pid = data?.playerId || data?.subscriptionId || null;
        }
        return pid;
    }

    // Ambil Player ID dari OneSignal SDK (oneSignalUserId = UUID yang benar)
    async function getSdkPlayerId() {
        if (typeof median === 'undefined' || !median.onesignal) {
            return { hasSdk: false, playerId: null, isSubscribed: false };
        }
        try {
            const info = await median.onesignal.onesignalInfo();
            // Gunakan oneSignalUserId (UUID) sebagai playerId yang benar
            const playerId = info?.oneSignalUserId || null;
            const isSubscribed = info?.oneSignalSubscribed === true;
            return { hasSdk: true, playerId, isSubscribed };
        } catch (err) {
            console.error(err);
            return { hasSdk: true, playerId: null, isSubscribed: false };
        }
    }

    async function savePlayerIdToFirebase(playerId) {
        if (!currentUid || !playerId) return;
        await database.ref(`drivers/${currentUid}`).update({ playerId: playerId, subscriptionId: playerId, last_update: new Date().toISOString() });
        await database.ref(`driver_locations/${currentUid}`).update({ playerId: playerId, subscriptionId: playerId, last_update: new Date().toISOString() });
    }

    async function clearFirebasePlayerId() {
        if (!currentUid) return;
        await database.ref(`drivers/${currentUid}`).update({ playerId: null, subscriptionId: null });
        await database.ref(`driver_locations/${currentUid}`).update({ playerId: null, subscriptionId: null });
    }

    async function activateNotifications() {
        if (isProcessing) return showToast("Proses sedang berjalan");
        if (!currentUid) return showToast("Driver belum login", true);
        if (typeof median === 'undefined' || !median.onesignal) return showToast("OneSignal SDK tidak tersedia", true);
        isProcessing = true;
        const btn = document.getElementById('activateBtn');
        const orig = btn.innerText;
        btn.innerText = "⏳ Memproses...";
        btn.disabled = true;
        try {
            await clearFirebasePlayerId();
            if (median.onesignal.setConsentGiven) await median.onesignal.setConsentGiven(true);
            await median.onesignal.register();
            if (median.onesignal.promptForPushNotificationsWithUserResponse) {
                const granted = await median.onesignal.promptForPushNotificationsWithUserResponse();
                if (!granted) showToast("Izin ditolak. Cek pengaturan.", true);
            }
            await new Promise(r => setTimeout(r, 4000));
            const sdk = await getSdkPlayerId();
            if (sdk.playerId && sdk.isSubscribed) {
                await savePlayerIdToFirebase(sdk.playerId);
                showToast("Notifikasi berhasil diaktifkan!", false);
            } else {
                showToast("Gagal mendapat Player ID (UUID)", true);
            }
            await refreshStatus();
        } catch (err) {
            showToast("Error: " + err.message, true);
        } finally {
            isProcessing = false;
            btn.innerText = orig;
            btn.disabled = false;
        }
    }

    async function syncPlayerId() {
        if (!currentUid) return;
        const sdk = await getSdkPlayerId();
        if (sdk.playerId && sdk.isSubscribed) {
            await savePlayerIdToFirebase(sdk.playerId);
            showToast("Player ID (UUID) disinkronkan!", false);
            await refreshStatus();
        } else {
            showToast("Tidak ada Player ID UUID dari SDK", true);
        }
    }

    async function resetAndReRegister() {
        if (!confirm("Reset akan menghapus Player ID. Anda harus aktifkan ulang notifikasi. Lanjutkan?")) return;
        await clearFirebasePlayerId();
        showToast("Data direset. Silakan klik 'Aktifkan Notifikasi'", false);
        await refreshStatus();
    }

    async function refreshStatus() {
        if (!currentUid) {
            document.getElementById('driverName').innerText = "(Belum login)";
            document.getElementById('mainBadge').innerHTML = "⚠️ Driver tidak login";
            document.getElementById('mainBadge').className = "status-badge badge-danger";
            return;
        }
        const driverSnap = await database.ref(`drivers/${currentUid}`).once('value');
        const driverData = driverSnap.val();
        document.getElementById('driverName').innerText = driverData?.name || driverData?.fullName || "Driver";

        const firebaseId = await getFirebasePlayerId();
        document.getElementById('firebasePlayerId').innerHTML = firebaseId ? truncate(firebaseId) : '❌ Tidak ada';

        const sdk = await getSdkPlayerId();
        document.getElementById('sdkPlayerId').innerHTML = sdk.playerId ? truncate(sdk.playerId) : '❌ Tidak ada';
        document.getElementById('onesignalStatus').innerHTML = sdk.isSubscribed ? '✅ SUBSCRIBED' : '❌ NOT SUBSCRIBED';

        const isMatch = (firebaseId && sdk.playerId && firebaseId === sdk.playerId);
        const matchSpan = document.getElementById('matchStatus');
        if (isMatch) {
            matchSpan.innerHTML = '<span class="match-badge match-success">✅ Cocok (Sinkron)</span>';
        } else {
            matchSpan.innerHTML = '<span class="match-badge match-failed">❌ Tidak Cocok / Kosong</span>';
        }

        const mainBadge = document.getElementById('mainBadge');
        const statusIcon = document.getElementById('statusIcon');
        const syncBtn = document.getElementById('syncBtn');
        const activateBtn = document.getElementById('activateBtn');

        if (isMatch && sdk.isSubscribed) {
            mainBadge.innerHTML = "🔔 Notifikasi Aktif & Tersinkron";
            mainBadge.className = "status-badge badge-success";
            statusIcon.innerHTML = "✅🔔";
            activateBtn.style.display = "none";
            syncBtn.style.display = "none";
        } else if (sdk.playerId && sdk.isSubscribed && !isMatch) {
            mainBadge.innerHTML = "⚠️ Perlu Sinkronisasi";
            mainBadge.className = "status-badge badge-warning";
            statusIcon.innerHTML = "🔄";
            activateBtn.style.display = "none";
            syncBtn.style.display = "block";
            syncBtn.innerText = "🔄 Sinkronkan Player ID (UUID)";
        } else {
            mainBadge.innerHTML = "🔕 Notifikasi Tidak Aktif";
            mainBadge.className = "status-badge badge-danger";
            statusIcon.innerHTML = "🔕";
            activateBtn.style.display = "block";
            syncBtn.style.display = "none";
        }
    }

    function truncate(str) { if (!str) return '-'; return str.length > 35 ? str.substring(0, 32) + '...' : str; }

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUid = user.uid;
            await refreshStatus();
        } else {
            currentUid = null;
            document.getElementById('driverName').innerText = "(Belum login)";
        }
    });

    document.getElementById('activateBtn').addEventListener('click', activateNotifications);
    document.getElementById('syncBtn').addEventListener('click', syncPlayerId);
    document.getElementById('refreshBtn').addEventListener('click', refreshStatus);
    document.getElementById('resetBtn').addEventListener('click', resetAndReRegister);
</script>
</body>
</html>
