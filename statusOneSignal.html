<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status Notifikasi Driver</title>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<style>
body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
}
.card{
    background:white;
    padding:20px;
    border-radius:15px;
    max-width:500px;
    margin:auto;
}
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#2196F3;
    color:white;
    font-weight:bold;
}
#logBox{
    background:black;
    color:lime;
    padding:10px;
    margin-top:20px;
    height:200px;
    overflow:auto;
    font-size:12px;
}
</style>
</head>
<body>

<div class="card">
    <h2>Status Notifikasi Driver</h2>

    <p><b>Nama Driver:</b> <span id="driverName">-</span></p>
    <p><b>Player ID:</b> <span id="playerId">-</span></p>
    <p><b>Status:</b> <span id="statusText">Checking...</span></p>

    <button id="activateBtn">Aktifkan Notifikasi</button>
    <button id="refreshBtn">Refresh Status</button>

    <div id="logBox"></div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCD0pgeZio-LdKqYDtWxcdXcZwyL4ngYQI",
    authDomain: "jego-35a2b.firebaseapp.com",
    databaseURL: "https://jego-35a2b-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "jego-35a2b"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let uid = null;

function log(msg){
    const box = document.getElementById("logBox");
    box.innerHTML += `<div>${new Date().toLocaleTimeString()} - ${msg}</div>`;
    box.scrollTop = box.scrollHeight;
}

async function savePlayerId(playerId){
    if(!uid) return;

    await db.ref("drivers/"+uid).update({
        playerId: playerId
    });

    await db.ref("driver_locations/"+uid).update({
        playerId: playerId
    });

    document.getElementById("playerId").innerText = playerId;

    log("Player ID tersimpan ke Firebase");
}

async function checkStatus(){
    try{
        if(typeof median === "undefined" || !median.onesignal){
            document.getElementById("statusText").innerText = "SDK tidak tersedia";
            log("Median SDK tidak tersedia");
            return;
        }

        const info = await median.onesignal.onesignalInfo();
        console.log(info);

        const playerId =
            info?.subscription?.id ||
            info?.userId ||
            null;

        const subscribed =
            info?.isSubscribed ||
            info?.subscription?.enabled;

        if(playerId){
            await savePlayerId(playerId);
        }

        document.getElementById("statusText").innerText = subscribed
            ? "✅ SUBSCRIBED"
            : "❌ NOT SUBSCRIBED";

        log(subscribed ? "Notifikasi aktif" : "Notifikasi belum aktif");

    }catch(e){
        log("Error: " + e.message);
    }
}

async function activateNotif(){
    try{
        log("Memulai aktivasi...");

        if(typeof Notification !== "undefined"){
            if(Notification.permission !== "granted"){
                const permission = await Notification.requestPermission();
                log("Permission: " + permission);
            }
        }

        async function activateNotif(){
    try{
        log("Memulai aktivasi...");

        if(typeof Notification !== "undefined"){
            if(Notification.permission !== "granted"){
                const permission = await Notification.requestPermission();
                log("Permission: " + permission);

                if(permission !== "granted"){
                    log("Permission ditolak");
                    return;
                }
            }
        }

        // cek apakah register tersedia
        if(median.onesignal.register){
            await median.onesignal.register();
            log("Register OneSignal berhasil");
        } else {
            log("Method register tidak tersedia");
        }

        // fallback prompt jika tersedia
        if(median.onesignal.promptForPushNotificationsWithUserResponse){
            await median.onesignal.promptForPushNotificationsWithUserResponse();
            log("Prompt notifikasi dijalankan");
        }

        setTimeout(async ()=>{
            await checkStatus();
        },5000);

    }catch(e){
        log("Aktivasi gagal: " + e.message);
    }
}

auth.onAuthStateChanged(async(user)=>{
    if(user){
        uid = user.uid;
        log("Driver login: " + uid);

        const snap = await db.ref("drivers/"+uid).once("value");
        const data = snap.val();

        if(data?.name){
            document.getElementById("driverName").innerText = data.name;
        }

        checkStatus();

    }else{
        log("Driver belum login");
    }
});

document.getElementById("activateBtn").onclick = activateNotif;
document.getElementById("refreshBtn").onclick = checkStatus;
</script>

</body>
</html>
