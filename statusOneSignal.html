<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Status Notifikasi - JeGo Driver</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
            padding: 24px 16px;
            color: #1f2937;
        }
        .container { max-width: 560px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .header { text-align: center; margin-bottom: 24px; }
        .status-icon { font-size: 64px; margin-bottom: 12px; }
        h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; color: #111827; }
        .subtitle { color: #6b7280; font-size: 0.9rem; margin-bottom: 16px; }
        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .badge-success { background: #e6f7e6; color: #0e7c32; border: 1px solid #b2e0b2; }
        .badge-warning { background: #fff3e0; color: #c47d00; border: 1px solid #ffdeae; }
        .badge-danger { background: #fee9e7; color: #b91c1c; border: 1px solid #fbc5c5; }
        .badge-neutral { background: #f0f2f5; color: #4b5563; border: 1px solid #e2e4e8; }
        .info-grid {
            background: #f9fafb;
            border-radius: 24px;
            padding: 16px;
            margin: 20px 0;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e5e7eb;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { font-weight: 500; color: #4b5563; font-size: 0.9rem; }
        .info-value {
            font-family: monospace;
            font-size: 0.75rem;
            background: white;
            padding: 4px 10px;
            border-radius: 40px;
            color: #1e40af;
            max-width: 60%;
            word-break: break-all;
            text-align: right;
        }
        .match-badge {
            font-weight: 600;
            font-size: 0.75rem;
            padding: 2px 10px;
            border-radius: 30px;
        }
        .match-success { background: #d1fae5; color: #065f46; }
        .match-failed { background: #fee2e2; color: #991b1b; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            margin-top: 16px;
        }
        .btn-primary { background: #f97316; color: white; box-shadow: 0 2px 6px rgba(249,115,22,0.3); }
        .btn-primary:hover { background: #ea580c; transform: translateY(-1px); }
        .btn-secondary { background: #e5e7eb; color: #1f2937; }
        .btn-outline { background: transparent; border: 1px solid #d1d5db; color: #4b5563; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .alert {
            background: #fef9e3;
            border-left: 4px solid #f59e0b;
            padding: 14px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #7c5c00;
            margin: 16px 0;
        }
        .alert-success { background: #e6f9ed; border-left-color: #10b981; color: #065f46; }
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 1000;
            white-space: nowrap;
        }
        .footer-note { text-align: center; font-size: 0.7rem; color: #9ca3af; margin-top: 24px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <div class="status-icon" id="statusIcon">🔍</div>
            <h1>Status Notifikasi</h1>
            <div class="subtitle">Pastikan kamu menerima order dengan lancar</div>
            <div id="mainBadge" class="status-badge badge-neutral">Memeriksa data...</div>
        </div>

        <div class="info-grid">
            <div class="info-row">
                <span class="info-label">👤 Nama Driver</span>
                <span class="info-value" id="driverName">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">📱 Subscription ID (Firebase)</span>
                <span class="info-value" id="firebaseSubId">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">🆔 Subscription ID (OneSignal SDK)</span>
                <span class="info-value" id="sdkSubId">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">✅ Kecocokan ID</span>
                <span class="info-value" id="matchStatus">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">🔔 Status OneSignal</span>
                <span class="info-value" id="onesignalStatus">-</span>
            </div>
        </div>

        <button id="activateBtn" class="btn btn-primary">🔔 Aktifkan Notifikasi</button>
        <button id="syncBtn" class="btn btn-outline" style="display:none;">🔄 Sinkronkan Subscription ID</button>
        <button id="refreshBtn" class="btn btn-secondary">🔄 Refresh Status</button>
        <button id="resetBtn" class="btn btn-outline" style="margin-top: 8px;">🗑️ Reset & Daftarkan Ulang</button>
        <div id="infoMessage" class="alert" style="display: none;"></div>
    </div>
    <div class="footer-note">
        ⚡ Notifikasi akan aktif setelah Subscription ID tersimpan dan cocok.
    </div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCD0pgeZio-LdKqYDtWxcdXcZwyL4ngYQI",
        authDomain: "jego-35a2b.firebaseapp.com",
        databaseURL: "https://jego-35a2b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "jego-35a2b",
        storageBucket: "jego-35a2b.firebasestorage.app",
        messagingSenderId: "600037007040",
        appId: "1:600037007040:web:ac3243ad9b472647ffd725"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let currentUid = null;
    let isProcessing = false;

    function showToast(message, isError = false) {
        let toast = document.querySelector('.toast-message');
        if (toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.textContent = message;
        toast.style.background = isError ? '#b91c1c' : '#0e7c32';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function showMessage(text, type = 'warning') {
        const div = document.getElementById('infoMessage');
        div.style.display = 'block';
        div.className = 'alert';
        if (type === 'success') div.className = 'alert alert-success';
        div.innerHTML = text;
        setTimeout(() => div.style.display = 'none', 5000);
    }

    // Ambil Subscription ID dari Firebase (field subscriptionId / playerId)
    async function getFirebaseSubscriptionId() {
        if (!currentUid) return null;
        try {
            // Cek di driver_locations dulu
            let snap = await database.ref(`driver_locations/${currentUid}`).once('value');
            let data = snap.val();
            let subId = data?.subscriptionId || data?.playerId || null;
            if (!subId) {
                // Cek di drivers
                snap = await database.ref(`drivers/${currentUid}`).once('value');
                data = snap.val();
                subId = data?.subscriptionId || data?.playerId || null;
            }
            return subId;
        } catch (e) {
            console.warn(e);
            return null;
        }
    }

    // Ambil data dari OneSignal SDK (median.onesignal)
    async function getOnesignalData() {
        if (typeof median === 'undefined' || !median.onesignal) {
            return { hasSdk: false, subscriptionId: null, isSubscribed: false };
        }
        try {
            const info = await median.onesignal.onesignalInfo();
            const subscriptionId = info?.oneSignalRegistrationId || info?.subscription?.id || null;
            const isSubscribed = info?.oneSignalSubscribed === true || info?.isSubscribed === true;
            return { hasSdk: true, subscriptionId, isSubscribed };
        } catch (err) {
            console.error(err);
            return { hasSdk: true, subscriptionId: null, isSubscribed: false };
        }
    }

    // Simpan Subscription ID ke Firebase (di dua tempat)
    async function saveSubscriptionIdToFirebase(subscriptionId) {
        if (!currentUid || !subscriptionId) return;
        await database.ref(`drivers/${currentUid}`).update({
            subscriptionId: subscriptionId,
            playerId: subscriptionId,
            last_onesignal_update: new Date().toISOString()
        });
        await database.ref(`driver_locations/${currentUid}`).update({
            subscriptionId: subscriptionId,
            playerId: subscriptionId,
            last_update: new Date().toISOString()
        });
    }

    async function clearFirebaseSubscriptionId() {
        if (!currentUid) return;
        await database.ref(`drivers/${currentUid}`).update({ subscriptionId: null, playerId: null });
        await database.ref(`driver_locations/${currentUid}`).update({ subscriptionId: null, playerId: null });
    }

    // Aktivasi notifikasi: request izin, register, lalu simpan subscriptionId
    async function activateNotifications() {
        if (isProcessing) {
            showToast("Proses sedang berjalan...", false);
            return;
        }
        if (!currentUid) {
            showToast("Driver belum login.", true);
            return;
        }
        if (typeof median === 'undefined' || !median.onesignal) {
            showToast("OneSignal SDK tidak tersedia. Pastikan di aplikasi JeGo.", true);
            return;
        }
        isProcessing = true;
        const btn = document.getElementById('activateBtn');
        const originalText = btn.innerText;
        btn.innerText = "⏳ Memproses...";
        btn.disabled = true;

        try {
            // Bersihkan dulu subscription ID yang lama (biar fresh)
            await clearFirebaseSubscriptionId();

            // Set consent & register
            if (median.onesignal.setConsentGiven) await median.onesignal.setConsentGiven(true);
            await median.onesignal.register();

            // Minta izin notifikasi
            if (median.onesignal.promptForPushNotificationsWithUserResponse) {
                const granted = await median.onesignal.promptForPushNotificationsWithUserResponse();
                if (!granted) showMessage("Izin notifikasi ditolak. Coba aktifkan manual di pengaturan HP.", "warning");
            }

            // Tunggu SDK memproses (3 detik)
            await new Promise(r => setTimeout(r, 3500));

            // Ambil subscription ID dari SDK
            const { subscriptionId, isSubscribed } = await getOnesignalData();
            if (subscriptionId && isSubscribed) {
                await saveSubscriptionIdToFirebase(subscriptionId);
                showToast("Notifikasi berhasil diaktifkan!", false);
            } else if (subscriptionId && !isSubscribed) {
                await saveSubscriptionIdToFirebase(subscriptionId);
                showToast("Subscription ID tersimpan, tapi izin belum diberikan. Cek pengaturan.", true);
            } else {
                showToast("Gagal mendapatkan Subscription ID. Coba ulangi.", true);
            }
            await refreshStatus();
        } catch (err) {
            showToast("Error: " + err.message, true);
        } finally {
            isProcessing = false;
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    // Sinkronisasi manual: ambil subscription ID dari SDK dan simpan ke Firebase
    async function syncSubscriptionId() {
        if (!currentUid) return;
        const { subscriptionId, isSubscribed } = await getOnesignalData();
        if (subscriptionId) {
            await saveSubscriptionIdToFirebase(subscriptionId);
            showToast("Subscription ID disinkronkan!", false);
            await refreshStatus();
        } else {
            showToast("Tidak ada Subscription ID dari SDK. Coba aktifkan notifikasi.", true);
        }
    }

    // Reset: hapus subscription ID dari Firebase
    async function resetAndReRegister() {
        if (!confirm("Reset akan menghapus Subscription ID yang tersimpan. Anda harus mengaktifkan ulang notifikasi. Lanjutkan?")) return;
        await clearFirebaseSubscriptionId();
        showToast("Data Firebase telah direset. Silakan klik 'Aktifkan Notifikasi'", false);
        await refreshStatus();
    }

    // Main refresh: bandingkan subscription ID Firebase vs SDK
    async function refreshStatus() {
        if (!currentUid) {
            document.getElementById('driverName').innerText = "(Belum login)";
            document.getElementById('mainBadge').innerHTML = "⚠️ Driver tidak login";
            document.getElementById('mainBadge').className = "status-badge badge-danger";
            return;
        }

        // Nama driver
        const driverSnap = await database.ref(`drivers/${currentUid}`).once('value');
        const driverData = driverSnap.val();
        document.getElementById('driverName').innerText = driverData?.name || driverData?.fullName || "Driver";

        // Subscription ID dari Firebase
        const firebaseSubId = await getFirebaseSubscriptionId();
        document.getElementById('firebaseSubId').innerHTML = firebaseSubId ? truncate(firebaseSubId) : '❌ Tidak ada';

        // Data dari SDK
        const sdkData = await getOnesignalData();
        const sdkSubId = sdkData.subscriptionId;
        document.getElementById('sdkSubId').innerHTML = sdkSubId ? truncate(sdkSubId) : '❌ Tidak ada';
        document.getElementById('onesignalStatus').innerHTML = sdkData.isSubscribed ? '✅ SUBSCRIBED' : '❌ NOT SUBSCRIBED';

        // Kecocokan
        const isMatch = (firebaseSubId && sdkSubId && firebaseSubId === sdkSubId);
        const matchSpan = document.getElementById('matchStatus');
        if (isMatch) {
            matchSpan.innerHTML = '<span class="match-badge match-success">✅ Cocok (Sinkron)</span>';
        } else {
            matchSpan.innerHTML = '<span class="match-badge match-failed">❌ Tidak Cocok / Kosong</span>';
        }

        // Update tampilan berdasarkan status
        const mainBadge = document.getElementById('mainBadge');
        const statusIcon = document.getElementById('statusIcon');
        const syncBtn = document.getElementById('syncBtn');
        const activateBtn = document.getElementById('activateBtn');

        if (isMatch && sdkData.isSubscribed) {
            mainBadge.innerHTML = "🔔 Notifikasi Aktif & Tersinkron";
            mainBadge.className = "status-badge badge-success";
            statusIcon.innerHTML = "✅🔔";
            activateBtn.style.display = "none";
            syncBtn.style.display = "none";
            activateBtn.disabled = true;
        } else if (sdkSubId && sdkData.isSubscribed && !isMatch) {
            mainBadge.innerHTML = "⚠️ Perlu Sinkronisasi";
            mainBadge.className = "status-badge badge-warning";
            statusIcon.innerHTML = "🔄";
            activateBtn.style.display = "none";
            syncBtn.style.display = "block";
            syncBtn.innerText = "🔄 Sinkronkan Subscription ID";
            activateBtn.disabled = false;
        } else if (!sdkSubId || !sdkData.isSubscribed) {
            mainBadge.innerHTML = "🔕 Notifikasi Tidak Aktif";
            mainBadge.className = "status-badge badge-danger";
            statusIcon.innerHTML = "🔕";
            activateBtn.style.display = "block";
            syncBtn.style.display = "none";
            activateBtn.disabled = false;
        } else {
            mainBadge.innerHTML = "🔕 Perlu Aktivasi";
            mainBadge.className = "status-badge badge-danger";
            statusIcon.innerHTML = "🔕";
            activateBtn.style.display = "block";
            syncBtn.style.display = "none";
        }
    }

    function truncate(str) {
        if (!str) return '-';
        return str.length > 30 ? str.substring(0, 25) + '...' : str;
    }

    // Auth
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUid = user.uid;
            await refreshStatus();
        } else {
            currentUid = null;
            document.getElementById('driverName').innerText = "(Belum login)";
        }
    });

    // Event listeners
    document.getElementById('activateBtn').addEventListener('click', activateNotifications);
    document.getElementById('syncBtn').addEventListener('click', syncSubscriptionId);
    document.getElementById('refreshBtn').addEventListener('click', refreshStatus);
    document.getElementById('resetBtn').addEventListener('click', resetAndReRegister);
</script>
</body>
</html>
