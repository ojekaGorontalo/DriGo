<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Lisensi & Hak Cipta - JeGo Driver</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --border: #dee2e6;
            --card-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            --primary: #FF9800;
            --primary-hover: #e68900;
        }

        body.dark {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --text-primary: #e9ecef;
            --text-secondary: #adb5bd;
            --border: #343a40;
            --card-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.2s ease;
            padding-bottom: 30px;
        }

        .header {
            background: linear-gradient(135deg, var(--primary), #FFB74D);
            padding: 15px 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            flex: 1;
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 16px;
        }
        .license-card {
            background: var(--bg-primary);
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .license-header {
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .license-header i {
            font-size: 1.5rem;
            color: var(--primary);
        }
        .license-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .license-body {
            padding: 20px;
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text-primary);
        }
        .license-body p {
            margin-bottom: 12px;
        }
        .license-body h3 {
            font-size: 0.95rem;
            font-weight: 600;
            margin: 16px 0 8px 0;
            color: var(--primary);
        }
        .license-body ul, .license-body ol {
            margin-left: 20px;
            margin-bottom: 12px;
        }
        .license-body li {
            margin-bottom: 6px;
        }
        .library-list {
            list-style: none;
            margin-left: 0;
        }
        .library-list li {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .library-name {
            font-weight: 600;
        }
        .library-license {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }
        .footer-note {
            text-align: center;
            margin-top: 25px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        hr {
            margin: 16px 0;
            border-color: var(--border);
        }
        pre {
            background: var(--bg-secondary);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.7rem;
            font-family: monospace;
            margin: 12px 0;
        }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
    <h1 id="headerTitle">Lisensi & Hak Cipta</h1>
    <div style="width: 36px;"></div>
</div>

<div class="container">

            <i class="fas fa-mobile-alt"></i>

        </div>

    // ======================= DARK MODE =======================
    function applyTheme() {
        const savedTheme = localStorage.getItem('jego_driver_theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
        } else {
            document.body.classList.remove('dark');
        }
    }

    // ======================= BAHASA =======================
    let currentLanguage = localStorage.getItem('jego_driver_lang') || 'id';

    function applyLanguage() {
        const t = content[currentLanguage] || content.id;
        document.getElementById('headerTitle').innerText = t.headerTitle;
        document.getElementById('appLicenseTitle').innerText = t.appLicenseTitle;
        document.getElementById('thirdPartyTitle').innerText = t.thirdPartyTitle;
        document.getElementById('ipTitle').innerText = t.ipTitle;
        document.getElementById('footerText').innerHTML = t.footerText;
        document.getElementById('appLicenseBody').innerHTML = t.appLicenseHTML;
        document.getElementById('thirdPartyBody').innerHTML = t.thirdPartyHTML;
        document.getElementById('ipBody').innerHTML = t.ipHTML;
    }

    function saveLanguage(lang) {
        currentLanguage = lang;
        localStorage.setItem('jego_driver_lang', lang);
        applyLanguage();
        window.dispatchEvent(new StorageEvent('storage', { key: 'jego_driver_lang', newValue: lang }));
    }

    // ======================= INIT =======================
    function init() {
        applyTheme();
        applyLanguage();
        document.getElementById('backBtn').addEventListener('click', () => window.history.back());
        
        // Sinkronisasi perubahan dari halaman lain
        window.addEventListener('storage', (e) => {
            if (e.key === 'jego_driver_theme') applyTheme();
            if (e.key === 'jego_driver_lang') {
                currentLanguage = localStorage.getItem('jego_driver_lang') || 'id';
                applyLanguage();
            }
        });
    }

    init();
