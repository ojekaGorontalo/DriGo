<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Riwayat Perjalanan - JeGo</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        /* ========== LIGHT MODE (DEFAULT) ========== */
        :root {
            --primary: #FF9800;
            --primary-dark: #E65100;
            --primary-light: #FFB74D;
            --secondary: #F57C00;
            --accent: #FFC107;
            --surface: #FFFFFF;
            --background: #F5F5F5;
            --text-primary: #212121;
            --text-secondary: #5f6368;
            --border-light: #E0E0E0;
            --card-shadow: 0 2px 6px rgba(0,0,0,0.05);
            --status-completed-bg: #d4edda;
            --status-completed-text: #155724;
            --status-cancelled-bg: #f8d7da;
            --status-cancelled-text: #721c24;
            --status-onway-bg: #d1ecf1;
            --status-onway-text: #0c5460;
            --status-accepted-bg: #fff3cd;
            --status-accepted-text: #856404;
        }

        /* ========== DARK MODE OVERRIDES ========== */
        body.dark-mode {
            --primary: #FFB74D;
            --primary-dark: #FF9800;
            --primary-light: #FFA726;
            --secondary: #FF7043;
            --accent: #FFD54F;
            --surface: #1E1E1E;
            --background: #121212;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --border-light: #333333;
            --card-shadow: 0 2px 6px rgba(0,0,0,0.3);
            --status-completed-bg: #1e3a1e;
            --status-completed-text: #8bc34a;
            --status-cancelled-bg: #3e1a1a;
            --status-cancelled-text: #ef9a9a;
            --status-onway-bg: #1a2c3a;
            --status-onway-text: #81d4fa;
            --status-accepted-bg: #3a2a1a;
            --status-accepted-text: #ffcc80;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s;
        }

        body {
            background: var(--background);
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            min-height: 100vh;
            color: var(--text-primary);
        }

        .native-container {
            width: 100%;
            max-width: 100%;
            background: var(--background);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 20px;
            text-align: center;
            color: white;
        }
        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .filter-container {
            background: var(--surface);
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-light);
        }
        .filter-option {
            background: var(--background);
            border-radius: 30px;
            padding: 6px 16px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
            color: var(--text-primary);
        }
        .filter-option.active {
            background: var(--primary);
            color: white;
        }

        .orders-list {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .date-section {
            margin-bottom: 8px;
        }
        .date-header {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border-light);
        }
        .order-item {
            background: var(--surface);
            border-radius: 16px;
            padding: 14px;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid var(--border-light);
        }
        .order-item:active { transform: scale(0.98); }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .customer-name {
            font-weight: 700;
            color: var(--primary);
            font-size: 0.9rem;
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }
        .status-badge {
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-completed { background: var(--status-completed-bg); color: var(--status-completed-text); }
        .status-cancelled { background: var(--status-cancelled-bg); color: var(--status-cancelled-text); }
        .status-on_the_way { background: var(--status-onway-bg); color: var(--status-onway-text); }
        .status-accepted { background: var(--status-accepted-bg); color: var(--status-accepted-text); }

        .route-info {
            font-size: 0.8rem;
            margin: 8px 0;
            color: var(--text-primary);
        }
        .route-point {
            display: flex;
            gap: 8px;
            margin-bottom: 4px;
        }
        .point-marker {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }
        .point-marker-a { background: #4CAF50; }
        .point-marker-b { background: var(--primary); }

        .order-details {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border-light);
            font-size: 0.75rem;
        }
        .detail-item {
            text-align: center;
            flex: 1;
        }
        .detail-value {
            font-weight: 700;
            color: var(--primary);
        }
        .order-meta {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            background: var(--surface);
            border-radius: 20px;
            border: 1px solid var(--border-light);
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--surface);
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border-light);
        }
        .modal-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title { color: var(--primary); font-weight: 700; }
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .modal-body { padding: 16px; }
        .modal-detail-item { margin-bottom: 12px; }
        .support-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            margin-top: 16px;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #1E293B;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            opacity: 0;
            transition: 0.2s;
            z-index: 1100;
        }
        body.dark-mode .toast {
            background: #2c2c2c;
            color: #eee;
        }
    </style>
</head>
<body>
<div class="native-container">
    <div class="header">
        <h1>Riwayat Perjalanan</h1>
    </div>

    <div class="filter-container">
        <div class="filter-option active" data-filter="all">Semua</div>
        <div class="filter-option" data-filter="completed">Selesai</div>
        <div class="filter-option" data-filter="cancelled">Dibatalkan</div>
        <div class="filter-option" data-filter="this_week">Minggu Ini</div>
        <div class="filter-option" data-filter="this_month">Bulan Ini</div>
    </div>

    <div class="orders-list" id="ordersList">
        <div class="loading"><div class="spinner"></div><p>Memuat riwayat...</p></div>
    </div>
</div>

<!-- Modal Detail -->
<div class="modal" id="orderModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title">Detail Perjalanan</h3>
            <button class="close-btn" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
            <div id="modalDetailContent"></div>
            <button class="support-btn" id="hubungiDukunganBtn">📧 Hubungi Dukungan</button>
        </div>
    </div>
</div>

<!-- Modal CS -->
<div class="modal" id="csModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title">Hubungi Customer Service</h3>
            <button class="close-btn" id="closeCsModalBtn">&times;</button>
        </div>
        <div class="modal-body">
            <p>Email: cs.jego.app@gmail.com</p>
            <p>Sertakan Order ID: <span id="csOrderId">-</span></p>
            <button class="support-btn" id="tutupCsModalBtn">Tutup</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // ========== KONFIGURASI FIREBASE ==========
    const FIREBASE_CONFIG = {
        apiKey: "AIzaSyCD0pgeZio-LdKqYDtWxcdXcZwyL4ngYQI",
        authDomain: "jego-35a2b.firebaseapp.com",
        databaseURL: "https://jego-35a2b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "jego-35a2b",
        storageBucket: "jego-35a2b.firebasestorage.app",
        appId: "1:600037007040:web:ac3243ad9b472647ffd725"
    };
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    const auth = firebase.auth();
    const database = firebase.database();

    let currentUser = null;
    let currentFilter = 'all';
    let allOrders = [];

    // ========== DARK MODE - MENGIKUTI LOCALSTORAGE (TANPA TOMBOL) ==========
    function applyDarkModeFromLocalStorage() {
        const isDarkMode = localStorage.getItem('jego_dark_mode') === 'true';
        if (isDarkMode) {
            document.body.classList.add('dark-mode');
        } else {
            document.body.classList.remove('dark-mode');
        }
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2500);
    }

    function formatRupiah(num) { return 'Rp ' + (num || 0).toLocaleString('id-ID'); }

    function getStatusClass(status) {
        const map = { 'completed':'status-completed', 'cancelled':'status-cancelled', 'accepted':'status-accepted', 'on_the_way':'status-on_the_way' };
        return map[status] || 'status-completed';
    }
    function getStatusText(status) {
        const map = { 'completed':'Selesai', 'cancelled':'Dibatalkan', 'accepted':'Diterima', 'on_the_way':'Dalam Perjalanan' };
        return map[status] || status;
    }

    function isThisWeek(date) {
        const today = new Date();
        const start = new Date(today);
        start.setDate(today.getDate() - today.getDay());
        start.setHours(0,0,0,0);
        const end = new Date(today);
        end.setDate(today.getDate() + (6 - today.getDay()));
        end.setHours(23,59,59,999);
        return date >= start && date <= end;
    }
    function isThisMonth(date) {
        const today = new Date();
        return date.getMonth() === today.getMonth() && date.getFullYear() === today.getFullYear();
    }

    function formatDisplayDate(dateStr) {
        const date = new Date(dateStr);
        const today = new Date();
        const yesterday = new Date(today);
        yesterday.setDate(today.getDate()-1);
        if (date.toDateString() === today.toDateString()) return 'Hari Ini';
        if (date.toDateString() === yesterday.toDateString()) return 'Kemarin';
        return date.toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    }

    function groupOrdersByDate(orders) {
        const groups = {};
        orders.forEach(order => {
            const date = new Date(order.completed_at || order.created_at);
            const key = date.toISOString().split('T')[0];
            if (!groups[key]) groups[key] = [];
            groups[key].push(order);
        });
        return groups;
    }

    function renderOrders() {
        const container = document.getElementById('ordersList');
        if (!allOrders.length) {
            container.innerHTML = '<div class="empty-state">📭 Tidak ada riwayat perjalanan</div>';
            return;
        }

        let filtered = [...allOrders];
        if (currentFilter === 'completed') filtered = filtered.filter(o => o.status === 'completed');
        else if (currentFilter === 'cancelled') filtered = filtered.filter(o => o.status === 'cancelled');
        else if (currentFilter === 'this_week') filtered = filtered.filter(o => isThisWeek(new Date(o.completed_at || o.created_at)));
        else if (currentFilter === 'this_month') filtered = filtered.filter(o => isThisMonth(new Date(o.completed_at || o.created_at)));

        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state">🔍 Tidak ada perjalanan sesuai filter</div>';
            return;
        }

        const grouped = groupOrdersByDate(filtered);
        const sortedDates = Object.keys(grouped).sort((a,b) => new Date(b) - new Date(a));
        container.innerHTML = '';
        sortedDates.forEach(date => {
            const section = document.createElement('div');
            section.className = 'date-section';
            section.innerHTML = `<div class="date-header">${formatDisplayDate(date)} • ${grouped[date].length} perjalanan</div>`;
            container.appendChild(section);
            grouped[date].forEach(order => {
                const orderEl = createOrderElement(order);
                container.appendChild(orderEl);
            });
        });
    }

    function createOrderElement(order) {
        const div = document.createElement('div');
        div.className = 'order-item';
        const durasi = order.duration_seconds ? Math.round(order.duration_seconds/60)+' menit' : '-';
        const jarak = order.distance_meters ? (order.distance_meters/1000).toFixed(1)+' km' : '-';
        const harga = order.price_after_bonus || order.price || 0;
        const hasPromo = order.bonus_used > 0;
        let hargaDisplay = hasPromo ? `<span style="text-decoration:line-through; margin-right:4px;">${formatRupiah(order.price)}</span> ${formatRupiah(harga)}` : formatRupiah(harga);
        div.innerHTML = `
            <div class="order-header">
                <div class="customer-name">${escapeHtml(order.customer_name || 'Pelanggan')} ${order.transport_type?.includes('kurir') ? '📦 KURIR' : ''}</div>
                <span class="status-badge ${getStatusClass(order.status)}">${getStatusText(order.status)}</span>
            </div>
            <div class="route-info">
                <div class="route-point"><span class="point-marker point-marker-a">A</span><span>${escapeHtml(order.pickup_address || '-')}</span></div>
                <div class="route-point"><span class="point-marker point-marker-b">B</span><span>${escapeHtml(order.destination_address || '-')}</span></div>
            </div>
            <div class="order-details">
                <div class="detail-item"><span class="detail-value">${durasi}</span><div>Durasi</div></div>
                <div class="detail-item"><span class="detail-value">${jarak}</span><div>Jarak</div></div>
                <div class="detail-item"><span class="detail-value">${hargaDisplay}</span><div>Harga</div></div>
            </div>
            <div class="order-meta">
                <span>${new Date(order.created_at).toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'})}</span>
                <span>${order.transport_type || 'Motor'}</span>
            </div>
        `;
        div.addEventListener('click', () => showOrderDetail(order));
        return div;
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    function showOrderDetail(order) {
        const modalContent = document.getElementById('modalDetailContent');
        modalContent.innerHTML = `
            <div style="margin-bottom:12px"><strong>📍 Penjemputan:</strong><br>${escapeHtml(order.pickup_address || '-')}</div>
            <div style="margin-bottom:12px"><strong>🏁 Tujuan:</strong><br>${escapeHtml(order.destination_address || '-')}</div>
            <div style="display:flex; justify-content:space-between; margin-bottom:12px">
                <div><strong>Jarak</strong><br>${order.distance_meters ? (order.distance_meters/1000).toFixed(1)+' km' : '-'}</div>
                <div><strong>Durasi</strong><br>${order.duration_seconds ? Math.round(order.duration_seconds/60)+' menit' : '-'}</div>
                <div><strong>Harga</strong><br>${order.price_after_bonus ? formatRupiah(order.price_after_bonus) : formatRupiah(order.price)}</div>
            </div>
            ${order.bonus_used ? `<div><strong>Bonus digunakan:</strong> ${formatRupiah(order.bonus_used)}</div>` : ''}
            <div style="margin-top:12px"><strong>Status:</strong> ${getStatusText(order.status)}</div>
            <div style="margin-top:12px"><strong>Order ID:</strong> ${order.id}</div>
        `;
        document.getElementById('orderModal').style.display = 'flex';
        window.currentOrderId = order.id;
    }

    function closeModal() { document.getElementById('orderModal').style.display = 'none'; }
    function showCsModal() {
        if (window.currentOrderId) document.getElementById('csOrderId').innerText = window.currentOrderId;
        closeModal();
        document.getElementById('csModal').style.display = 'flex';
    }
    function closeCsModal() { document.getElementById('csModal').style.display = 'none'; }

    // =====================================================================
    // ========== LOAD USER ORDERS (HEMAT BANDWIDTH) ==========
    // =====================================================================
    // Perbaikan: Hanya ambil order milik user ini dengan query terbatas.
    // Gunakan indeks 'user_id' di Firebase Rules untuk efisiensi maksimal.
    // Tidak perlu mengunduh seluruh node 'orders' lagi.
    // =====================================================================
    async function loadUserOrders() {
        if (!currentUser) return;
        const ordersListDiv = document.getElementById('ordersList');
        ordersListDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Memuat data...</p></div>';

        try {
            // Query hanya 100 order terakhir milik user ini
            // Pastikan di Firebase Rules ada: "orders": { ".indexOn": ["user_id"] }
            const snapshot = await database.ref('orders')
                .orderByChild('user_id')
                .equalTo(currentUser.uid)
                .limitToLast(100)
                .once('value');

            const ordersData = snapshot.val();
            const userOrdersArray = [];

            if (ordersData) {
                Object.entries(ordersData).forEach(([orderId, order]) => {
                    userOrdersArray.push({ id: orderId, ...order });
                });
            }

            // Jika tidak ada order dengan user_id (misal data lama pakai customer_id), 
            // coba query fallback untuk customer_id (tetap terbatas)
            if (userOrdersArray.length === 0) {
                const fallbackSnap = await database.ref('orders')
                    .orderByChild('customer_id')
                    .equalTo(currentUser.uid)
                    .limitToLast(100)
                    .once('value');
                const fallbackData = fallbackSnap.val();
                if (fallbackData) {
                    Object.entries(fallbackData).forEach(([orderId, order]) => {
                        userOrdersArray.push({ id: orderId, ...order });
                    });
                }
            }

            // Urutkan dari yang terbaru
            allOrders = userOrdersArray.sort((a,b) => new Date(b.created_at||0) - new Date(a.created_at||0));
            renderOrders();

        } catch (err) {
            console.error("Gagal memuat riwayat:", err);
            ordersListDiv.innerHTML = '<div class="empty-state">⚠️ Gagal memuat data. Coba lagi nanti.</div>';
        }
    }

    // ========== INISIALISASI ==========
    document.addEventListener('DOMContentLoaded', () => {
        applyDarkModeFromLocalStorage();  // Terapkan dark mode dari localStorage

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'loginUser.html';
                return;
            }
            currentUser = user;
            await loadUserOrders();
        });

        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('hubungiDukunganBtn').addEventListener('click', showCsModal);
        document.getElementById('closeCsModalBtn').addEventListener('click', closeCsModal);
        document.getElementById('tutupCsModalBtn').addEventListener('click', closeCsModal);
        document.getElementById('orderModal').addEventListener('click', (e) => { if(e.target === document.getElementById('orderModal')) closeModal(); });
        document.getElementById('csModal').addEventListener('click', (e) => { if(e.target === document.getElementById('csModal')) closeCsModal(); });
        document.querySelectorAll('.filter-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.filter-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                currentFilter = opt.dataset.filter;
                renderOrders();
            });
        });
    });
</script>
</body>
</html>
