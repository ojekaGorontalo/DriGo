<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pilih Kendaraan - JeGo</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF9800;
            --primary-dark: #E65100;
            --secondary: #FF5722;
            --accent: #FFC107;
            --dark: #2C3E50;
            --light: #F8F9FA;
            --gray: #6C757D;
            --white: #FFFFFF;
            --success: #2ECC71;
            --danger: #E74C3C;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FFF3E0, #FFE0B2);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--white);
            padding: 16px 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .logo-container h1 {
            font-size: 1.5rem;
            color: var(--dark);
        }

        .user-info {
            color: var(--dark);
            font-size: 0.9rem;
            background: var(--light);
            padding: 6px 14px;
            border-radius: 40px;
        }

        .user-info strong {
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .header-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.85rem;
            transition: transform 0.2s;
        }

        .header-btn:hover {
            transform: translateY(-2px);
        }

        /* Container Utama */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            flex: 1;
        }

        /* Content Card */
        .content-card {
            background: var(--white);
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .content-card h2 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 12px;
            font-size: 1.8rem;
        }

        .welcome-message {
            text-align: center;
            color: var(--gray);
            margin-bottom: 32px;
            font-size: 1rem;
        }

        /* Grid Transportasi */
        .transport-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }

        .transport-card {
            background: var(--white);
            border: 2px solid #EDF2F7;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .transport-card:hover {
            transform: translateY(-6px);
            border-color: var(--primary);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        }

        .transport-card.selected {
            border-color: var(--primary);
            background: linear-gradient(135deg, rgba(255,152,0,0.05), rgba(255,87,34,0.05));
        }

        .transport-icon {
            width: 90px;
            height: 90px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, rgba(255,152,0,0.1), rgba(255,87,34,0.1));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .transport-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .transport-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .transport-capacity {
            font-size: 0.85rem;
            color: var(--secondary);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .transport-description {
            font-size: 0.85rem;
            color: var(--gray);
            line-height: 1.5;
        }

        /* Loading */
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,152,0,0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Login Required */
        .login-required {
            background: var(--white);
            border-radius: 32px;
            padding: 48px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .login-required h2 {
            color: var(--primary);
            margin-bottom: 16px;
        }

        .login-required p {
            color: var(--gray);
            margin-bottom: 24px;
        }

        .login-required .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 12px 32px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        /* Alert */
        .alert {
            padding: 12px 20px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: none;
            font-size: 0.9rem;
        }

        .alert-success {
            background: #D1FAE5;
            color: #065F46;
            border-left: 4px solid var(--success);
        }

        .alert-danger {
            background: #FEE2E2;
            color: #991B1B;
            border-left: 4px solid var(--danger);
        }

        /* Global Loading Overlay */
        .global-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
        }

        .global-loading .spinner {
            width: 60px;
            height: 60px;
            border-width: 5px;
        }

        .global-loading p {
            color: white;
            margin-top: 20px;
            font-size: 1rem;
        }

        /* Modal Kurir */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--white);
            border-radius: 32px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalAppear 0.2s ease;
        }

        @keyframes modalAppear {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 32px 32px 0 0;
        }

        .modal-header h2 {
            margin: 0;
        }

        .modal-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--dark);
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon input {
            width: 100%;
            padding: 14px 50px 14px 16px;
            border: 2px solid #EDF2F7;
            border-radius: 40px;
            font-size: 1rem;
            background: var(--light);
        }

        .input-with-icon input:focus {
            border-color: var(--primary);
            outline: none;
            background: white;
        }

        .contact-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary);
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
        }

        .category-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .category-btn {
            padding: 8px 18px;
            background: var(--light);
            border: 2px solid #EDF2F7;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .category-btn.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #EDF2F7;
            border-radius: 20px;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
            background: var(--light);
        }

        textarea:focus {
            border-color: var(--primary);
            outline: none;
            background: white;
        }

        .modal-footer {
            padding: 20px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #EDF2F7;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-secondary {
            background: var(--light);
            color: var(--dark);
            border: 2px solid #EDF2F7;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: var(--white);
            margin-top: 40px;
        }

        .local-badge {
            display: inline-block;
            background: var(--accent);
            color: var(--dark);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .transport-grid {
                grid-template-columns: 1fr;
            }
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            .content-card {
                padding: 24px;
            }
            .content-card h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="global-loading" id="globalLoading">
    <div class="spinner"></div>
    <p>Memproses...</p>
</div>

<header class="header">
    <div class="header-content">
        <div class="logo-container">
            <div class="logo">🚗</div>
            <h1>JeGo</h1>
        </div>
        <div class="user-info" id="userInfo"></div>
        <div class="header-actions">
            <a href="registrasi_jego.html" class="header-btn" id="headerRegisterBtn">Daftar</a>

</header>

<div class="container">

    <div id="mainContent" style="display: none;">
        <div class="content-card">

</div>

<!-- Modal Kurir -->
<div id="kurirModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">

        <div class="modal-body">

</div>

<footer>
    <p>&copy; 2025 JeGo - Jasa Ekspedisi Gorontalo</p>
    <div class="local-badge">🇮🇩 BUATAN ANAK GORONTALO</div>
</footer>

<script>
    // ==================== KONFIGURASI FIREBASE ====================
    const FIREBASE_CONFIG = {
        apiKey: "AIzaSyCD0pgeZio-LdKqYDtWxcdXcZwyL4ngYQI",
        authDomain: "jego-35a2b.firebaseapp.com",
        databaseURL: "https://jego-35a2b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "jego-35a2b",
        storageBucket: "jego-35a2b.firebasestorage.app",
        messagingSenderId: "600037007040",
        appId: "1:600037007040:web:ac3243ad9b472647ffd725"
    };

    let firebaseDatabase = null;
    let firebaseAuth = null;
    let currentUser = null;
    let transportData = {};
    let tariffRates = {};
    let selectedTransport = null;
    let selectedCategory = null;
    let isProcessing = false;

    const transportNameMapping = {
        'Motor': 'motor',
        'Bentor': 'bentor',
        'Mobil': 'mobil',
        'Kurir Motor': 'kurir_motor',
        'Kurir Bentor': 'kurir_bentor'
    };

    // ==================== FUNGSI CEK ORDER AKTIF ====================
    async function cekOrderAktifDanRedirect() {
    const orderId = localStorage.getItem('current_order_id');
    if (!orderId) return false;
    try {
        const snap = await firebaseDatabase.ref(`orders/${orderId}`).once('value');
        const order = snap.val();
        if (!order) {
            localStorage.removeItem('current_order_id');
            return false;
        }
        // Status waiting -> redirect ke rute.html (lanjutkan pesanan)
        if (order.status === 'waiting') {
            window.location.href = 'rute.html';
            return true;
        }
        // Status lainnya yang masih aktif -> redirect ke tracking
        const statusAktifLain = ['accepted', 'on_the_way', 'arrived', 'on_trip'];
        if (statusAktifLain.includes(order.status)) {
            window.location.href = 'tracking_customer.html';
            return true;
        } else {
            localStorage.removeItem('current_order_id');
            return false;
        }
    } catch (err) {
        console.error('Gagal cek order aktif:', err);
        return false;
    }
}

    // ==================== INISIALISASI FIREBASE ====================
    async function initializeFirebase() {
        try {
            if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
            firebaseDatabase = firebase.database();
            firebaseAuth = firebase.auth();
            return true;
        } catch (error) {
            console.error('Init Firebase error:', error);
            return false;
        }
    }

    function waitForFirebaseAuth(maxWait = 5000) {
        return new Promise((resolve) => {
            if (!firebaseAuth) {
                resolve(null);
                return;
            }
            let resolved = false;
            const unsubscribe = firebaseAuth.onAuthStateChanged((user) => {
                if (!resolved) {
                    resolved = true;
                    unsubscribe();
                    resolve(user);
                }
            });
            setTimeout(() => {
                if (!resolved) {
                    resolved = true;
                    unsubscribe();
                    resolve(null);
                }
            }, maxWait);
        });
    }

    // ==================== CEK LOGIN ====================
    async function checkLogin() {
        const loggedInUser = localStorage.getItem('jego_logged_in_user');
        if (loggedInUser) {
            try {
                currentUser = JSON.parse(loggedInUser);
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('loginRequiredContent').style.display = 'none';
                document.getElementById('headerRegisterBtn').style.display = 'none';
                document.getElementById('headerLoginBtn').style.display = 'none';
                document.getElementById('userInfo').innerHTML = `👋 Halo, <strong>${escapeHtml(currentUser.name)}</strong>`;
                document.getElementById('welcomeMessage').innerHTML = `Selamat datang kembali, ${escapeHtml(currentUser.name)}! Pilih kendaraan untuk melanjutkan perjalanan.`;

                const firebaseReady = await initializeFirebase();
                if (!firebaseReady) {
                    showAlert('❌ Gagal koneksi Firebase', 'error');
                    return false;
                }

                // Tunggu Firebase Auth untuk restore session (penting untuk persistence)
                let firebaseUser = await waitForFirebaseAuth(5000);
                if (!firebaseUser) {
                    // Coba sekali lagi dengan timeout lebih lama
                    firebaseUser = await waitForFirebaseAuth(3000);
                }
                if (!firebaseUser) {
                    console.warn('Firebase Auth tidak mendeteksi user, padahal localStorage ada');
                    showAlert('⚠️ Sesi tidak valid, silakan login ulang', 'error');
                    setTimeout(() => window.location.href = 'loginUser.html', 2000);
                    return false;
                }

                if (firebaseUser.uid !== currentUser.uid) {
                    console.warn('UID mismatch, logout');
                    await firebaseAuth.signOut();
                    localStorage.removeItem('jego_logged_in_user');
                    showLoginRequired();
                    return false;
                }

                // 🔥 CEK ORDER AKTIF SEBELUM MELANJUTKAN
                const orderAktif = await cekOrderAktifDanRedirect();
                if (orderAktif) return true;

                await fetchTransportData();
                return true;
            } catch (error) {
                console.error('Error checkLogin:', error);
                showLoginRequired();
                return false;
            }
        } else {
            showLoginRequired();
            return false;
        }
    }

    function showLoginRequired() {
        document.getElementById('mainContent').style.display = 'none';
        document.getElementById('loginRequiredContent').style.display = 'block';
        document.getElementById('userInfo').innerHTML = '';
        document.getElementById('headerRegisterBtn').style.display = 'inline-block';
        document.getElementById('headerLoginBtn').style.display = 'inline-block';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    // ==================== AMBIL DATA TRANSPORTASI ====================
    async function fetchTransportData() {
        try {
            if (!firebaseDatabase) throw new Error('FirebaseDatabase null');
            showLoading(true);
            const snapshot = await firebaseDatabase.ref('data-jego/tarif').once('value');
            const firebaseData = snapshot.val();
            if (!firebaseData) throw new Error('Data tarif kosong');

            transportData = {};
            tariffRates = {};

            snapshot.forEach((child) => {
                const data = child.val();
                const transportName = data.nama;
                const internalName = transportNameMapping[transportName];
                if (internalName && data) {
                    transportData[internalName] = {
                        name: data.nama,
                        capacity: data.capacity || "N/A",
                        description: data.deskripsi || "Tidak ada deskripsi",
                        icon: data.icon_url || "https://cdn-icons-png.flaticon.com/128/7890/7890227.png",
                        minimalDistance: data.minimal_distance || 4,
                        minimalPrice: data.minimal_price || 10000
                    };
                    tariffRates[internalName] = data.price_per_km || 2000;
                }
            });

            renderTransportCards();
            showLoading(false);
        } catch (error) {
            console.error('Error fetch:', error);
            showLoading(false);
            loadFallbackData();
            showAlert('Gagal ambil data, menggunakan data lokal', 'error');
        }
    }

    function loadFallbackData() {
        transportData = {
            motor: { name: "Motor", capacity: "1 Penumpang", description: "Cepat dan ekonomis", icon: "https://cdn-icons-png.flaticon.com/128/5811/5811823.png", minimalDistance: 4, minimalPrice: 10000 },
            bentor: { name: "Bentor", capacity: "2 Penumpang", description: "Nyaman dalam kota", icon: "https://cdn-icons-png.flaticon.com/128/7890/7890227.png", minimalDistance: 4, minimalPrice: 11000 },
            mobil: { name: "Mobil", capacity: "4 Penumpang", description: "Nyaman untuk grup", icon: "https://cdn-icons-png.flaticon.com/128/12689/12689302.png", minimalDistance: 4, minimalPrice: 15000 },
            kurir_motor: { name: "Kurir Motor", capacity: "Paket Kecil", description: "Pengiriman cepat", icon: "https://cdn-icons-png.flaticon.com/128/9561/9561688.png", minimalDistance: 4, minimalPrice: 10000 },
            kurir_bentor: { name: "Kurir Bentor", capacity: "Paket Sedang", description: "Kapasitas lebih besar", icon: "https://cdn-icons-png.flaticon.com/128/7890/7890227.png", minimalDistance: 4, minimalPrice: 10000 }
        };
        tariffRates = { motor: 2200, bentor: 3000, mobil: 4000, kurir_motor: 2100, kurir_bentor: 2100 };
        renderTransportCards();
    }

    function renderTransportCards() {
        const grid = document.getElementById('transportGrid');
        grid.innerHTML = '';
        const order = ['motor', 'bentor', 'mobil', 'kurir_motor', 'kurir_bentor'];

        order.forEach(type => {
            const t = transportData[type];
            if (t) {
                const card = document.createElement('div');
                card.className = 'transport-card';
                card.innerHTML = `
                    <div class="transport-icon"><img src="${t.icon}" alt="${t.name}"></div>
                    <div class="transport-name">${t.name}</div>
                    <div class="transport-capacity">${t.capacity}</div>
                    <div class="transport-description">${t.description}</div>
                `;
                card.addEventListener('click', () => selectTransport(type, t, card));
                grid.appendChild(card);
            }
        });
    }

    function selectTransport(type, t, card) {
        if (isProcessing) return;
        showGlobalLoading(true);
        isProcessing = true;

        document.querySelectorAll('.transport-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');

        selectedTransport = {
            type: type,
            name: t.name,
            capacity: t.capacity,
            icon: t.icon,
            description: t.description,
            tariff: tariffRates[type],
            minimalDistance: t.minimalDistance,
            minimalPrice: t.minimalPrice
        };

        if (type.includes('kurir')) {
            showGlobalLoading(false);
            isProcessing = false;
            showKurirModal();
        } else {
            setTimeout(() => processTransportSelection(selectedTransport), 800);
        }
    }

    function showKurirModal() {
        document.getElementById('kurirModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('kurirModal').style.display = 'none';
        document.getElementById('senderPhone').value = '';
        document.getElementById('receiverPhone').value = '';
        document.getElementById('description').value = '';
        document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('selected'));
        selectedCategory = null;
        isProcessing = false;
    }

    function pickContact(field) {
        alert('Fitur kontak tersedia di aplikasi JeGo.');
    }

    function saveDeliveryData() {
        const senderPhone = document.getElementById('senderPhone').value.trim();
        const receiverPhone = document.getElementById('receiverPhone').value.trim();
        const description = document.getElementById('description').value.trim();
        if (!senderPhone || !receiverPhone || !selectedCategory) {
            showAlert('Harap isi semua data pengiriman', 'error');
            return;
        }
        showGlobalLoading(true);
        selectedTransport.deliveryData = {
            senderPhone, receiverPhone, itemCategory: selectedCategory, description,
            timestamp: new Date().toISOString()
        };
        closeModal();
        setTimeout(() => processTransportSelection(selectedTransport), 800);
    }

    function processTransportSelection(transport) {
    localStorage.setItem('jego_last_transport', JSON.stringify(transport));
    window.location.href = "rute.html";
}

    function showLoading(show) {
        document.getElementById('loadingSpinner').style.display = show ? 'flex' : 'none';
        document.getElementById('transportGrid').style.display = show ? 'none' : 'grid';
    }

    function showGlobalLoading(show) {
        document.getElementById('globalLoading').style.display = show ? 'flex' : 'none';
    }

    function showAlert(message, type) {
        const alertDiv = type === 'error' ? document.getElementById('errorAlert') : document.getElementById('successAlert');
        alertDiv.textContent = message;
        alertDiv.style.display = 'block';
        setTimeout(() => alertDiv.style.display = 'none', 3000);
    }

    // Event listener kategori
    document.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('selected'));
            this.classList.add('selected');
            selectedCategory = this.getAttribute('data-category');
        });
    });

    window.onload = () => {
        checkLogin();
    };
</script>
</body>
</html>
