<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Lacak Perjalanan - JeGo Customer</title>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #FF9800;
      --secondary: #FF5722;
      --accent: #FFC107;
      --success: #4CAF50;
      --danger: #f44336;
      --dark: #343a40;
      --gray: #9E9E9E;
      --light: #f8f9fa;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .container {
      background: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .header {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 15px;
      text-align: center;
      flex-shrink: 0;
      position: relative;
    }
    .back-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 20px;
      padding: 6px 12px;
      color: white;
      position: absolute;
      left: 15px;
      top: 12px;
      cursor: pointer;
      font-size: 14px;
    }
    .map-section {
      height: 45vh;
      min-height: 250px;
      width: 100%;
      position: relative;
      background: #e2e8f0;
      flex-shrink: 0;
    }
    #orderMap { height: 100%; width: 100%; }
    .content-wrapper {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .status-card {
      background: var(--light);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      border-left: 4px solid var(--primary);
    }
    .status-badge {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 6px 16px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 0.85rem;
    }
    .driver-card, .route-card, .info-card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid #edf2f7;
    }
    .driver-profile {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .driver-photo {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--primary);
    }
    .driver-info h3 { color: var(--dark); margin-bottom: 4px; }
    .driver-plate { background: var(--accent); padding: 2px 8px; border-radius: 12px; display: inline-block; font-size: 0.7rem; font-weight: bold; margin-top: 4px; }
    .rating { color: var(--accent); margin: 4px 0; }
    .route-point { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-start; }
    .route-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; flex-shrink: 0; }
    .pickup-icon { background: var(--success); }
    .dest-icon { background: var(--primary); }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
    .info-item { text-align: center; }
    .info-label { font-size: 0.7rem; color: var(--gray); }
    .info-value { font-weight: bold; font-size: 0.9rem; }
    .price { color: var(--success); font-size: 1.1rem; }
    .actions-section {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      background: white;
      border-top: 1px solid #eee;
      display: flex;
      gap: 12px;
      z-index: 100;
    }
    .action-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .chat-btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
    .cancel-btn { background: var(--danger); color: white; }
    .loading, .error-state {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      text-align: center;
      padding: 20px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(0,0,0,0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .chat-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s ease;
    }
    .chat-overlay.open { transform: translateX(0); }
    .chat-header {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      background: #ECE5DD;
    }
    .message {
      margin-bottom: 12px;
      max-width: 80%;
      padding: 8px 12px;
      border-radius: 18px;
      font-size: 14px;
    }
    .message.customer {
      background: #DCF8C6;
      align-self: flex-end;
      margin-left: auto;
    }
    .message.driver {
      background: white;
      align-self: flex-start;
    }
    .chat-input-area {
      display: flex;
      padding: 10px;
      background: white;
      border-top: 1px solid #ddd;
    }
    .chat-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 25px; }
    .chat-send { margin-left: 10px; padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 25px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <button class="back-btn" id="backBtn">← Kembali</button>
    <h2 style="font-size: 1.2rem;">Lacak Perjalanan</h2>
  </div>
  <div id="loadingScreen" class="loading">
    <div class="spinner"></div>
    <p>Memuat data perjalanan...</p>
  </div>
  <div id="errorScreen" class="error-state" style="display: none;">
    <p>⚠️ Gagal memuat data.</p>
    <button id="retryBtn" style="margin-top: 16px; background: var(--primary); border: none; padding: 8px 20px; border-radius: 20px; color: white;">Coba Lagi</button>
  </div>
  <div id="mainContent" style="display: none;">
    <div class="map-section"><div id="orderMap"></div></div>
    <div class="content-wrapper">
      <div class="status-card">
        <div class="status-badge" id="statusBadge">Menunggu Driver</div>
        <p id="statusMessage" style="margin-top: 8px;">Driver sedang menuju lokasi Anda</p>
      </div>
      <div class="driver-card">
        <div class="driver-profile" id="driverProfile">
          <img id="driverPhoto" class="driver-photo" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
          <div class="driver-info">
            <h3 id="driverName">-</h3>
            <div class="rating" id="driverRating">⭐ 0.0</div>
            <div><span id="driverPlate" class="driver-plate">-</span></div>
            <div><small id="driverVehicle">-</small></div>
          </div>
        </div>
      </div>
      <div class="route-card">
        <div class="route-point"><div class="route-icon pickup-icon">A</div><div><small>Penjemputan</small><br><strong id="pickupAddr">-</strong></div></div>
        <div class="route-point"><div class="route-icon dest-icon">B</div><div><small>Tujuan</small><br><strong id="destAddr">-</strong></div></div>
      </div>
      <div class="info-card">
        <div class="info-grid">
          <div class="info-item"><div class="info-label">Jarak</div><div class="info-value" id="distance">-</div></div>
          <div class="info-item"><div class="info-label">Durasi</div><div class="info-value" id="duration">-</div></div>
          <div class="info-item"><div class="info-label">Biaya</div><div class="info-value price" id="price">-</div></div>
          <div class="info-item"><div class="info-label">Status</div><div class="info-value" id="orderStatus">-</div></div>
        </div>
      </div>
    </div>
    <div class="actions-section">
      <button class="action-btn chat-btn" id="chatBtn">💬 Chat Driver</button>
      <button class="action-btn cancel-btn" id="cancelBtn">✖ Batalkan</button>
    </div>
  </div>
</div>

<!-- Chat Overlay -->
<div id="chatOverlay" class="chat-overlay">
  <div class="chat-header">
    <span>💬 Chat dengan Driver</span>
    <button id="closeChatBtn" style="background: none; border: none; color: white; font-size: 20px;">✕</button>
  </div>
  <div id="chatMessages" class="chat-messages"></div>
  <div class="chat-input-area">
    <input type="text" id="chatInput" class="chat-input" placeholder="Ketik pesan...">
    <button id="sendChatBtn" class="chat-send">Kirim</button>
  </div>
</div>

<script>
  // ==================== FIREBASE CONFIG ====================
  const firebaseConfig = {
    apiKey: "AIzaSyCD0pgeZio-LdKqYDtWxcdXcZwyL4ngYQI",
    authDomain: "jego-35a2b.firebaseapp.com",
    databaseURL: "https://jego-35a2b-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "jego-35a2b",
    storageBucket: "jego-35a2b.firebasestorage.app",
    messagingSenderId: "600037007040",
    appId: "1:600037007040:web:ac3243ad9b472647ffd725"
  };
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  const auth = firebase.auth();

  // ========== GLOBAL VARIABLES ==========
  let orderId = null;
  let orderRef = null;
  let driverLocationRef = null;
  let chatRef = null;
  let orderData = null;
  let driverData = null;
  let map = null;
  let driverMarker = null;
  let pickupMarker = null;
  let destMarker = null;
  let routeLine = null;
  let currentStatus = '';

  // ========== UTILITIES ==========
  function formatRupiah(num) {
    return 'Rp ' + (num || 0).toLocaleString('id-ID');
  }

  function getOrderIdFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('order_id');
  }

  // ========== LOAD DATA FROM FIREBASE ==========
  async function loadOrderData() {
    orderId = getOrderIdFromURL();
    if (!orderId) {
      // fallback: cek localStorage (jika ada data aktif)
      const saved = localStorage.getItem('jego_active_order');
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          orderId = parsed.order_id;
        } catch(e) {}
      }
    }
    if (!orderId) {
      showError('Tidak ada ID order. Silakan pesan kembali.');
      return;
    }

    // Ambil data order dari Firebase
    const orderSnap = await database.ref('orders/' + orderId).once('value');
    const order = orderSnap.val();
    if (!order) {
      showError('Data order tidak ditemukan.');
      return;
    }
    orderData = order;

    // Ambil data driver (dari driver_id di order)
    const driverId = order.driver_id;
    if (driverId) {
      const driverSnap = await database.ref('drivers/' + driverId).once('value');
      driverData = driverSnap.val();
      if (driverData) driverData.id = driverId;
    } else if (order.driver_offers) {
      // fallback: ambil driver pertama yang statusnya accepted
      const offers = order.driver_offers;
      for (let did in offers) {
        if (offers[did].status === 'accepted') {
          const ds = await database.ref('drivers/' + did).once('value');
          driverData = ds.val();
          if (driverData) driverData.id = did;
          break;
        }
      }
    }

    // Tampilkan UI
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    renderOrderDetails(order);
    if (driverData) renderDriverDetails(driverData);
    initMap(order);
    startRealtimeUpdates(orderId);
    initChat(orderId);
  }

  function renderOrderDetails(order) {
    document.getElementById('pickupAddr').innerText = order.pickup_address || '-';
    document.getElementById('destAddr').innerText = order.destination_address || '-';
    const distance = order.distance_meters ? (order.distance_meters / 1000).toFixed(1) + ' km' : '-';
    const duration = order.duration_seconds ? Math.round(order.duration_seconds / 60) + ' menit' : '-';
    document.getElementById('distance').innerText = distance;
    document.getElementById('duration').innerText = duration;
    document.getElementById('price').innerHTML = formatRupiah(order.price);
    updateStatusUI(order.status);
  }

  function renderDriverDetails(driver) {
    document.getElementById('driverName').innerText = driver.name || driver.fullName || 'Driver';
    const rating = driver.avgRating || driver.rating || 5.0;
    document.getElementById('driverRating').innerHTML = `⭐ ${rating.toFixed(1)}`;
    document.getElementById('driverPlate').innerText = driver.plate_number || driver.plateNumber || '-';
    document.getElementById('driverVehicle').innerText = driver.vehicle_type || driver.vehicleType || '-';
    const photo = driver.profilePhotoUrl || driver.photoURL || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png';
    document.getElementById('driverPhoto').src = photo;
  }

  function updateStatusUI(status) {
    currentStatus = status;
    const badge = document.getElementById('statusBadge');
    const msgDiv = document.getElementById('statusMessage');
    const statusMap = {
      'accepted': { text: 'Driver Diterima', msg: 'Driver sedang menuju lokasi Anda' },
      'on_the_way': { text: 'Menuju Lokasi', msg: 'Driver dalam perjalanan ke titik jemput' },
      'arrived': { text: 'Driver Tiba', msg: 'Driver telah sampai di lokasi penjemputan' },
      'on_trip': { text: 'Perjalanan Dimulai', msg: 'Anda sedang dalam perjalanan ke tujuan' },
      'completed': { text: 'Selesai', msg: 'Perjalanan telah selesai. Terima kasih!' },
      'cancelled': { text: 'Dibatalkan', msg: 'Perjalanan dibatalkan' }
    };
    const info = statusMap[status] || { text: 'Menunggu', msg: 'Menunggu konfirmasi driver' };
    badge.innerText = info.text;
    msgDiv.innerText = info.msg;
    if (status === 'completed') {
      document.getElementById('cancelBtn').style.display = 'none';
    } else {
      document.getElementById('cancelBtn').style.display = 'block';
    }
  }

  // ========== PETA ==========
  function initMap(order) {
    if (!order.pickup_lat || !order.dest_lat) return;
    const centerLat = (order.pickup_lat + order.dest_lat) / 2;
    const centerLng = (order.pickup_lng + order.dest_lng) / 2;
    map = L.map('orderMap').setView([centerLat, centerLng], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    // Marker pickup
    pickupMarker = L.marker([order.pickup_lat, order.pickup_lng], {
      icon: L.divIcon({ html: '<div style="background:#28a745; width:30px; height:30px; border-radius:50%; text-align:center; line-height:30px; color:white; font-weight:bold;">A</div>' })
    }).addTo(map).bindPopup('Penjemputan');
    // Marker destination
    destMarker = L.marker([order.dest_lat, order.dest_lng], {
      icon: L.divIcon({ html: '<div style="background:#dc3545; width:30px; height:30px; border-radius:50%; text-align:center; line-height:30px; color:white; font-weight:bold;">B</div>' })
    }).addTo(map).bindPopup('Tujuan');
    // Draw route
    drawRoute(order.pickup_lat, order.pickup_lng, order.dest_lat, order.dest_lng);
  }

  async function drawRoute(slat, slng, elat, elng) {
    try {
      const url = `https://router.project-osrm.org/route/v1/driving/${slng},${slat};${elng},${elat}?overview=full&geometries=geojson`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.routes && data.routes.length) {
        const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
        if (routeLine) map.removeLayer(routeLine);
        routeLine = L.polyline(coords, { color: '#FF9800', weight: 5 }).addTo(map);
        map.fitBounds(routeLine.getBounds(), { padding: [40,40] });
      }
    } catch(e) { console.warn(e); }
  }

  function updateDriverLocation(lat, lng, vehicleType) {
    if (!map) return;
    const iconUrl = 'https://cdn-icons-png.flaticon.com/128/5811/5811823.png'; // default motor
    const icon = L.icon({ iconUrl, iconSize: [35,35], iconAnchor: [17,35] });
    if (driverMarker) driverMarker.setLatLng([lat, lng]);
    else driverMarker = L.marker([lat, lng], { icon }).addTo(map);
    if (driverMarker) driverMarker.bindPopup('🚗 Posisi Driver').openPopup();
  }

  // ========== REALTIME UPDATES ==========
  function startRealtimeUpdates(orderId) {
    // Update order status
    orderRef = database.ref('orders/' + orderId);
    orderRef.on('value', (snap) => {
      const newOrder = snap.val();
      if (newOrder) {
        orderData = newOrder;
        updateStatusUI(newOrder.status);
        // Jika status completed, matikan listener lokasi
        if (newOrder.status === 'completed') {
          if (driverLocationRef) driverLocationRef.off();
        }
      }
    });

    // Update driver location (jika ada di node driver_locations atau drivers)
    const driverId = orderData?.driver_id;
    if (driverId) {
      driverLocationRef = database.ref('driver_locations/' + driverId);
      driverLocationRef.on('value', (snap) => {
        const loc = snap.val();
        if (loc && loc.latitude && loc.longitude) {
          updateDriverLocation(loc.latitude, loc.longitude, driverData?.vehicle_type);
        }
      });
    }
  }

  // ========== CHAT ==========
  function initChat(orderId) {
    chatRef = database.ref('chat/' + orderId);
    const messagesDiv = document.getElementById('chatMessages');
    // Load existing messages
    chatRef.once('value').then(snap => {
      const msgs = snap.val();
      if (msgs) {
        Object.values(msgs).forEach(msg => displayChatMessage(msg));
      }
    });
    // Listen for new messages
    chatRef.on('child_added', (snap) => {
      const msg = snap.val();
      displayChatMessage(msg);
    });
  }

  function displayChatMessage(msg) {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = `message ${msg.sender === 'customer' ? 'customer' : 'driver'}`;
    div.innerHTML = `${msg.message}<div style="font-size:10px; color:#888; text-align:right;">${new Date(msg.timestamp).toLocaleTimeString()}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function sendChatMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    auth.onAuthStateChanged(user => {
      if (!user) return;
      chatRef.push({
        sender: 'customer',
        sender_id: user.uid,
        message: text,
        timestamp: Date.now()
      });
      input.value = '';
    });
  }

  // ========== CANCEL ORDER ==========
  async function cancelOrder() {
    if (!confirm('Batalkan perjalanan ini?')) return;
    await database.ref('orders/' + orderId).update({
      status: 'cancelled',
      cancelled_by: 'customer',
      cancelled_at: new Date().toISOString()
    });
    alert('Perjalanan dibatalkan.');
    window.location.href = 'index.html'; // redirect ke halaman utama customer
  }

  // ========== CHAT UI ==========
  function openChat() {
    document.getElementById('chatOverlay').classList.add('open');
  }
  function closeChat() {
    document.getElementById('chatOverlay').classList.remove('open');
  }

  // ========== ERROR HANDLING ==========
  function showError(msg) {
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('errorScreen').style.display = 'flex';
    document.getElementById('errorScreen').innerHTML = `<p>⚠️ ${msg}</p><button id="retryBtn" style="margin-top:16px; background:var(--primary); border:none; padding:8px 20px; border-radius:20px; color:white;">Kembali</button>`;
    document.getElementById('retryBtn').onclick = () => window.history.back();
  }

  // ========== INIT ==========
  document.addEventListener('DOMContentLoaded', () => {
    loadOrderData();
    document.getElementById('backBtn').onclick = () => window.history.back();
    document.getElementById('chatBtn').onclick = openChat;
    document.getElementById('closeChatBtn').onclick = closeChat;
    document.getElementById('sendChatBtn').onclick = sendChatMessage;
    document.getElementById('cancelBtn').onclick = cancelOrder;
  });
</script>
</body>
</html>
