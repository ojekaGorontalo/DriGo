<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JeGo Admin - Manajemen Driver & Customer</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #FF9800, #FFB74D);
            padding: 20px 24px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 {
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .logout-btn:hover {
            background: rgba(255,255,255,0.35);
        }
        .tabs {
            display: flex;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            padding: 0 24px;
            gap: 8px;
        }
        .tab-btn {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            background: none;
            border: none;
            cursor: pointer;
            color: #475569;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
        }
        .tab-btn i {
            margin-right: 8px;
        }
        .tab-btn.active {
            color: #FF9800;
            border-bottom-color: #FF9800;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .toolbar {
            padding: 16px 24px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .search-box {
            padding: 8px 14px;
            border: 1px solid #ddd;
            border-radius: 30px;
            width: 260px;
            outline: none;
            font-size: 0.85rem;
        }
        .filter-select {
            padding: 8px 14px;
            border: 1px solid #ddd;
            border-radius: 30px;
            background: white;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .refresh-btn {
            background: #FF9800;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stats-badge {
            background: #e9ecef;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1e293b;
        }
        .table-wrapper {
            overflow-x: auto;
            padding: 0 0 20px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #edf2f7;
            vertical-align: middle;
        }
        th {
            background: #f8fafc;
            font-weight: 600;
            color: #1e293b;
            position: sticky;
            top: 0;
        }
        tr:hover {
            background: #fef9e6;
        }
        .user-photo, .driver-photo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            text-align: center;
            min-width: 80px;
        }
        .status-accepted { background: #dcfce7; color: #15803d; }
        .status-pending { background: #fff3cd; color: #b45309; }
        .status-rejected { background: #fee2e2; color: #b91c1c; }
        .status-blocked { background: #f1f5f9; color: #334155; }
        .status-select {
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .reason-input {
            width: 160px;
            padding: 6px 8px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 0.75rem;
            margin-top: 4px;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .update-status-btn, .edit-btn {
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
            transition: 0.2s;
        }
        .update-status-btn {
            background: #FF9800;
            color: white;
        }
        .edit-btn {
            background: #3b82f6;
            color: white;
        }
        .update-status-btn:disabled, .edit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
        .loading-overlay {
            display: flex;
            justify-content: center;
            padding: 50px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top-color: #FF9800;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .empty-row td {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        .footer-note {
            padding: 12px 24px;
            background: #f8fafc;
            text-align: center;
            font-size: 0.7rem;
            color: #475569;
            border-top: 1px solid #e2e8f0;
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        .modal-header {
            background: linear-gradient(135deg, #FF9800, #FFB74D);
            color: white;
            padding: 20px;
            border-radius: 24px 24px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h2 {
            font-size: 1.3rem;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            color: white;
        }
        .modal-body {
            padding: 20px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #1e293b;
            font-size: 0.85rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 0.9rem;
        }
        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .modal-btn {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .modal-btn-cancel {
            background: #e2e8f0;
            color: #1e293b;
        }
        .modal-btn-save {
            background: #FF9800;
            color: white;
        }
        @media (max-width: 700px) {
            body { padding: 10px; }
            th, td { padding: 8px; font-size: 0.7rem; }
            .action-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-users"></i> Manajemen Driver & Customer</h1>
        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout Admin</button>
    </div>
    <div class="tabs">
        <button class="tab-btn active" data-tab="drivers"><i class="fas fa-taxi"></i> Data Driver</button>
        <button class="tab-btn" data-tab="customers"><i class="fas fa-user-friends"></i> Data Customer</button>
    </div>

    <!-- TAB DRIVER -->
    <div id="driversTab" class="tab-content active">
        <div class="toolbar">
            <div style="display: flex; gap: 10px; flex-wrap: wrap; width: 100%;">
                <input type="text" id="driverSearch" class="search-box" placeholder="Cari nama, telepon, plat...">
                <select id="vehicleFilter" class="filter-select">
                    <option value="all">🚗 Semua kendaraan</option>
                </select>
                <div style="flex:1; display: flex; justify-content: flex-end; gap: 12px;">
                    <div class="stats-badge" id="driverStats">Menampilkan <span id="driverDisplayCount">0</span> dari <span id="driverTotalCount">0</span></div>
                    <button class="refresh-btn" id="refreshDriversBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
                </div>
            </div>
        </div>
        <div class="table-wrapper">
            <table id="driverTable">
                <thead>
                    <tr><th>Foto</th><th>Nama</th><th>Telepon</th><th>Kendaraan</th><th>Plat</th><th>Rating</th><th>Perjalanan</th><th>Saldo</th><th>Status</th><th>Alasan</th><th>Aksi</th></tr>
                </thead>
                <tbody id="driverTableBody"><tr class="empty-row"><td colspan="11"><div class="loading-overlay"><div class="spinner"></div></div></tr></tbody>
            </table>
        </div>
    </div>

    <!-- TAB CUSTOMER -->
    <div id="customersTab" class="tab-content">
        <div class="toolbar">
            <div style="display: flex; gap: 10px; flex-wrap: wrap; width: 100%;">
                <input type="text" id="customerSearch" class="search-box" placeholder="Cari nama, telepon, email...">
                <div style="flex:1; display: flex; justify-content: flex-end; gap: 12px;">
                    <div class="stats-badge" id="customerStats">Menampilkan <span id="customerDisplayCount">0</span> dari <span id="customerTotalCount">0</span></div>
                    <button class="refresh-btn" id="refreshCustomersBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
                </div>
            </div>
        </div>
        <div class="table-wrapper">
            <table id="customerTable">
                <thead>
                    <tr><th>Foto</th><th>Nama</th><th>Telepon</th><th>Email</th><th>Rating</th><th>Jumlah Rating</th><th>Aksi</th></tr>
                </thead>
                <tbody id="customerTableBody"><tr class="empty-row"><td colspan="7"><div class="loading-overlay"><div class="spinner"></div></div></tr></tbody>
            </table>
        </div>
    </div>
    <div class="footer-note">
        <i class="fas fa-info-circle"></i> Klik <strong>Edit Data</strong> untuk mengubah informasi driver atau customer.
    </div>
</div>

<!-- Modal Edit Driver -->
<div id="editDriverModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h2><i class="fas fa-edit"></i> Edit Driver</h2><button class="modal-close close-driver-modal">&times;</button></div>
        <div class="modal-body">
            <input type="hidden" id="editDriverUid">
            <div class="form-group"><label>Nama Lengkap</label><input type="text" id="editDriverName"></div>
            <div class="form-group"><label>Telepon</label><input type="tel" id="editDriverPhone"></div>
            <div class="form-group"><label>Jenis Kendaraan</label><input type="text" id="editDriverVehicleType" placeholder="motor, mobil, bentor..."></div>
            <div class="form-group"><label>Plat Nomor</label><input type="text" id="editDriverPlate"></div>
            <div class="form-group"><label>Rating (0-5)</label><input type="number" id="editDriverRating" step="0.1" min="0" max="5"></div>
            <div class="form-group"><label>Perjalanan</label><input type="number" id="editDriverTrips" step="1" min="0"></div>
            <div class="form-group"><label>Saldo (Rp)</label><input type="number" id="editDriverBalance" step="1000" min="0"></div>
        </div>
        <div class="modal-footer"><button class="modal-btn modal-btn-cancel close-driver-modal">Batal</button><button class="modal-btn modal-btn-save" id="saveDriverBtn">Simpan</button></div>
    </div>
</div>

<!-- Modal Edit Customer -->
<div id="editCustomerModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h2><i class="fas fa-edit"></i> Edit Customer</h2><button class="modal-close close-customer-modal">&times;</button></div>
        <div class="modal-body">
            <input type="hidden" id="editCustomerUid">
            <div class="form-group"><label>Nama Lengkap</label><input type="text" id="editCustomerName"></div>
            <div class="form-group"><label>Telepon</label><input type="tel" id="editCustomerPhone"></div>
            <div class="form-group"><label>Email</label><input type="email" id="editCustomerEmail"></div>
            <div class="form-group"><label>Rating (baca saja)</label><input type="text" id="editCustomerRating" readonly style="background:#e9ecef;"></div>
        </div>
        <div class="modal-footer"><button class="modal-btn modal-btn-cancel close-customer-modal">Batal</button><button class="modal-btn modal-btn-save" id="saveCustomerBtn">Simpan</button></div>
    </div>
</div>

<div id="toastMsg" class="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCD0pgeZio-LdKqYDtWxcdXcZwyL4ngYQI",
        authDomain: "jego-35a2b.firebaseapp.com",
        databaseURL: "https://jego-35a2b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "jego-35a2b",
        storageBucket: "jego-35a2b.firebasestorage.app",
        messagingSenderId: "600037007040",
        appId: "1:600037007040:web:ac3243ad9b472647ffd725"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    let allDrivers = [];
    let allCustomers = [];

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.background = isError ? '#b91c1c' : '#1e293b';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // =============== DRIVER SECTION ===============
    async function loadDrivers() {
        const tbody = document.getElementById('driverTableBody');
        tbody.innerHTML = '<tr class="empty-row"><td colspan="11"><div class="loading-overlay"><div class="spinner"></div></div></tr>';
        try {
            const snapshot = await database.ref('drivers').once('value');
            const driversObj = snapshot.val() || {};
            const driversArray = [];
            for (const [uid, data] of Object.entries(driversObj)) {
                driversArray.push({
                    uid, name: data.name || '-', phone: data.phone || data.phoneNumber || '-',
                    vehicle_type: data.vehicle_type || data.vehicleType || '-',
                    plate_number: data.plate_number || data.plateNumber || '-',
                    rating: data.rating || 0, perjalanan: data.perjalanan || 0,
                    balance: data.balance || 0, status: data.status || 'pending',
                    ketGagal: data.ketGagal || '', photoURL: data.photoURL || ''
                });
            }
            allDrivers = driversArray;
            populateVehicleFilter();
            applyDriverFilter();
        } catch (err) {
            console.error(err);
            tbody.innerHTML = `<tr class="empty-row"><td colspan="11">⚠️ Gagal load driver: ${err.message}</td></tr>`;
            showToast('Gagal load driver', true);
        }
    }

    function populateVehicleFilter() {
        const vehicles = [...new Set(allDrivers.map(d => d.vehicle_type).filter(v => v && v !== '-'))];
        const select = document.getElementById('vehicleFilter');
        select.innerHTML = '<option value="all">🚗 Semua kendaraan</option>';
        vehicles.forEach(v => { const opt = document.createElement('option'); opt.value = v; opt.textContent = v; select.appendChild(opt); });
    }

    function applyDriverFilter() {
        const keyword = document.getElementById('driverSearch').value.toLowerCase();
        const selectedVehicle = document.getElementById('vehicleFilter').value;
        let filtered = allDrivers.filter(d => 
            (keyword === '' || (d.name && d.name.toLowerCase().includes(keyword)) || (d.phone && d.phone.toLowerCase().includes(keyword)) || (d.plate_number && d.plate_number.toLowerCase().includes(keyword))) &&
            (selectedVehicle === 'all' || d.vehicle_type === selectedVehicle)
        );
        renderDriverTable(filtered);
        document.getElementById('driverTotalCount').innerText = allDrivers.length;
        document.getElementById('driverDisplayCount').innerText = filtered.length;
    }

    function renderDriverTable(drivers) {
        const tbody = document.getElementById('driverTableBody');
        if (!drivers.length) { tbody.innerHTML = '<tr class="empty-row"><td colspan="11">Tidak ada driver</td></tr>'; return; }
        tbody.innerHTML = '';
        drivers.forEach(d => {
            const row = tbody.insertRow();
            // Foto
            const img = document.createElement('img');
            img.src = d.photoURL || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png';
            img.className = 'driver-photo';
            img.onerror = () => img.src = 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png';
            row.insertCell(0).appendChild(img);
            row.insertCell(1).textContent = d.name;
            row.insertCell(2).textContent = d.phone;
            row.insertCell(3).textContent = d.vehicle_type;
            row.insertCell(4).textContent = d.plate_number;
            row.insertCell(5).textContent = d.rating.toFixed(1);
            row.insertCell(6).textContent = d.perjalanan;
            row.insertCell(7).textContent = `Rp ${d.balance.toLocaleString('id-ID')}`;
            // Status badge
            const statusSpan = document.createElement('span');
            statusSpan.className = `status-badge status-${d.status}`;
            statusSpan.textContent = d.status.toUpperCase();
            row.insertCell(8).appendChild(statusSpan);
            // Alasan input
            const reasonInput = document.createElement('input');
            reasonInput.type = 'text'; reasonInput.className = 'reason-input'; reasonInput.placeholder = 'Alasan';
            reasonInput.value = d.ketGagal || '';
            row.insertCell(9).appendChild(reasonInput);
            // Aksi
            const actionDiv = document.createElement('div'); actionDiv.className = 'action-buttons';
            const statusSelect = document.createElement('select'); statusSelect.className = 'status-select';
            ['accepted','pending','rejected','blocked'].forEach(s => {
                const opt = document.createElement('option'); opt.value = s; opt.textContent = s.toUpperCase();
                if (s === d.status) opt.selected = true;
                statusSelect.appendChild(opt);
            });
            const updateBtn = document.createElement('button'); updateBtn.textContent = 'Update Status'; updateBtn.className = 'update-status-btn';
            const editBtn = document.createElement('button'); editBtn.textContent = 'Edit Data'; editBtn.className = 'edit-btn';
            actionDiv.append(statusSelect, updateBtn, editBtn);
            row.insertCell(10).appendChild(actionDiv);

            updateBtn.onclick = async () => {
                const newStatus = statusSelect.value;
                const newReason = reasonInput.value.trim();
                updateBtn.disabled = true; updateBtn.textContent = '...';
                try {
                    const updates = {};
                    updates[`drivers/${d.uid}/status`] = newStatus;
                    if (newStatus === 'rejected' || newStatus === 'blocked')
                        updates[`drivers/${d.uid}/ketGagal`] = newReason || (newStatus === 'rejected' ? 'Ditolak admin' : 'Diblokir admin');
                    else updates[`drivers/${d.uid}/ketGagal`] = null;
                    await database.ref().update(updates);
                    d.status = newStatus; d.ketGagal = updates[`drivers/${d.uid}/ketGagal`] || null;
                    applyDriverFilter();
                    showToast(`Status driver ${d.name} diubah menjadi ${newStatus}`);
                } catch(err) { showToast(err.message, true); } finally { updateBtn.disabled = false; updateBtn.textContent = 'Update Status'; }
            };
            editBtn.onclick = () => openDriverEditModal(d);
        });
    }

    function openDriverEditModal(driver) {
        document.getElementById('editDriverUid').value = driver.uid;
        document.getElementById('editDriverName').value = driver.name;
        document.getElementById('editDriverPhone').value = driver.phone;
        document.getElementById('editDriverVehicleType').value = driver.vehicle_type === '-' ? '' : driver.vehicle_type;
        document.getElementById('editDriverPlate').value = driver.plate_number === '-' ? '' : driver.plate_number;
        document.getElementById('editDriverRating').value = driver.rating;
        document.getElementById('editDriverTrips').value = driver.perjalanan;
        document.getElementById('editDriverBalance').value = driver.balance;
        document.getElementById('editDriverModal').style.display = 'flex';
    }

    async function saveDriverEdit() {
        const uid = document.getElementById('editDriverUid').value;
        if (!uid) return;
        const data = {
            name: document.getElementById('editDriverName').value.trim(),
            phone: document.getElementById('editDriverPhone').value.trim(),
            vehicle_type: document.getElementById('editDriverVehicleType').value.trim().toLowerCase() || 'motor',
            plate_number: document.getElementById('editDriverPlate').value.trim().toUpperCase(),
            rating: parseFloat(document.getElementById('editDriverRating').value) || 0,
            perjalanan: parseInt(document.getElementById('editDriverTrips').value) || 0,
            balance: parseInt(document.getElementById('editDriverBalance').value) || 0
        };
        if (!data.name || !data.phone || !data.plate_number) { showToast('Nama, telepon, dan plat harus diisi', true); return; }
        const btn = document.getElementById('saveDriverBtn'); btn.disabled = true; btn.textContent = 'Menyimpan...';
        try {
            await database.ref(`drivers/${uid}`).update(data);
            const idx = allDrivers.findIndex(d => d.uid === uid);
            if (idx !== -1) Object.assign(allDrivers[idx], data);
            applyDriverFilter();
            showToast('Data driver disimpan');
            document.getElementById('editDriverModal').style.display = 'none';
        } catch(err) { showToast(err.message, true); } finally { btn.disabled = false; btn.textContent = 'Simpan'; }
    }

    // =============== CUSTOMER SECTION ===============
    async function loadCustomers() {
        const tbody = document.getElementById('customerTableBody');
        tbody.innerHTML = '<tr class="empty-row"><td colspan="7"><div class="loading-overlay"><div class="spinner"></div></div></tr>';
        try {
            const snapshot = await database.ref('users').once('value');
            const usersObj = snapshot.val() || {};
            const customers = [];
            for (const [uid, data] of Object.entries(usersObj)) {
                customers.push({
                    uid, name: data.name || data.fullName || '-', phone: data.phone || data.phoneNumber || '-',
                    email: data.email || '-', rating: data.rating || 0, ratingCount: data.ratingCount || 0,
                    photoURL: data.photoURL || ''
                });
            }
            allCustomers = customers;
            applyCustomerFilter();
        } catch(err) {
            console.error(err);
            tbody.innerHTML = `<tr class="empty-row"><td colspan="7">⚠️ Gagal load customer: ${err.message}</td></tr>`;
            showToast('Gagal load data customer', true);
        }
    }

    function applyCustomerFilter() {
        const keyword = document.getElementById('customerSearch').value.toLowerCase();
        const filtered = allCustomers.filter(c => 
            keyword === '' || (c.name && c.name.toLowerCase().includes(keyword)) || (c.phone && c.phone.toLowerCase().includes(keyword)) || (c.email && c.email.toLowerCase().includes(keyword))
        );
        renderCustomerTable(filtered);
        document.getElementById('customerTotalCount').innerText = allCustomers.length;
        document.getElementById('customerDisplayCount').innerText = filtered.length;
    }

    function renderCustomerTable(customers) {
        const tbody = document.getElementById('customerTableBody');
        if (!customers.length) { tbody.innerHTML = '<tr class="empty-row"><td colspan="7">Tidak ada customer</td></tr>'; return; }
        tbody.innerHTML = '';
        customers.forEach(c => {
            const row = tbody.insertRow();
            const img = document.createElement('img');
            img.src = c.photoURL || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png';
            img.className = 'user-photo'; img.onerror = () => img.src = 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png';
            row.insertCell(0).appendChild(img);
            row.insertCell(1).textContent = c.name;
            row.insertCell(2).textContent = c.phone;
            row.insertCell(3).textContent = c.email;
            row.insertCell(4).textContent = c.rating.toFixed(1);
            row.insertCell(5).textContent = c.ratingCount;
            const editBtn = document.createElement('button'); editBtn.textContent = 'Edit Data'; editBtn.className = 'edit-btn';
            const actionCell = row.insertCell(6); actionCell.appendChild(editBtn);
            editBtn.onclick = () => openCustomerEditModal(c);
        });
    }

    function openCustomerEditModal(customer) {
        document.getElementById('editCustomerUid').value = customer.uid;
        document.getElementById('editCustomerName').value = customer.name === '-' ? '' : customer.name;
        document.getElementById('editCustomerPhone').value = customer.phone === '-' ? '' : customer.phone;
        document.getElementById('editCustomerEmail').value = customer.email === '-' ? '' : customer.email;
        document.getElementById('editCustomerRating').value = customer.rating.toFixed(1);
        document.getElementById('editCustomerModal').style.display = 'flex';
    }

    async function saveCustomerEdit() {
        const uid = document.getElementById('editCustomerUid').value;
        if (!uid) return;
        const name = document.getElementById('editCustomerName').value.trim();
        const phone = document.getElementById('editCustomerPhone').value.trim();
        const email = document.getElementById('editCustomerEmail').value.trim();
        if (!name || !phone) { showToast('Nama dan telepon wajib diisi', true); return; }
        const btn = document.getElementById('saveCustomerBtn'); btn.disabled = true; btn.textContent = 'Menyimpan...';
        try {
            await database.ref(`users/${uid}`).update({ name, phone, email });
            const idx = allCustomers.findIndex(c => c.uid === uid);
            if (idx !== -1) { allCustomers[idx].name = name; allCustomers[idx].phone = phone; allCustomers[idx].email = email; }
            applyCustomerFilter();
            showToast('Data customer disimpan');
            document.getElementById('editCustomerModal').style.display = 'none';
        } catch(err) { showToast(err.message, true); } finally { btn.disabled = false; btn.textContent = 'Simpan'; }
    }

    // =============== TAB & INIT ===============
    function setupTabs() {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                const tabId = btn.getAttribute('data-tab') + 'Tab';
                document.getElementById(tabId).classList.add('active');
                if (btn.getAttribute('data-tab') === 'drivers') applyDriverFilter();
                else applyCustomerFilter();
            });
        });
    }

    function closeModals() {
        document.querySelectorAll('.close-driver-modal, .modal-close').forEach(el => el.addEventListener('click', () => document.getElementById('editDriverModal').style.display = 'none'));
        document.querySelectorAll('.close-customer-modal').forEach(el => el.addEventListener('click', () => document.getElementById('editCustomerModal').style.display = 'none'));
        window.addEventListener('click', (e) => { if (e.target === document.getElementById('editDriverModal')) document.getElementById('editDriverModal').style.display = 'none'; if (e.target === document.getElementById('editCustomerModal')) document.getElementById('editCustomerModal').style.display = 'none'; });
    }

    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = 'login_admin.html'; return; }
        const adminSnap = await database.ref(`admins/${user.uid}`).once('value');
        if (!adminSnap.exists()) { showToast('Bukan admin', true); await auth.signOut(); setTimeout(() => window.location.href = 'login_admin.html', 1500); return; }
        await Promise.all([loadDrivers(), loadCustomers()]);
        setupTabs();
        closeModals();
        document.getElementById('refreshDriversBtn').onclick = loadDrivers;
        document.getElementById('refreshCustomersBtn').onclick = loadCustomers;
        document.getElementById('driverSearch').addEventListener('input', applyDriverFilter);
        document.getElementById('customerSearch').addEventListener('input', applyCustomerFilter);
        document.getElementById('vehicleFilter').addEventListener('change', applyDriverFilter);
        document.getElementById('saveDriverBtn').onclick = saveDriverEdit;
        document.getElementById('saveCustomerBtn').onclick = saveCustomerEdit;
        document.getElementById('logoutBtn').onclick = async () => { await auth.signOut(); window.location.href = 'login_admin.html'; };
    });
</script>
</body>
</html>
