<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daftar Driver - JeGo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        :root {
            --primary: #FF9800;
            --secondary: #FF5722;
            --light: #f5f5f5;
            --dark: #343a40;
            --success: #4CAF50;
        }
        body {
            background-color: var(--light);
            color: var(--dark);
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 20px 0;
            text-align: center;
            border-radius: 0 0 20px 20px;
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
        }
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 30px 25px;
            margin-top: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 24px;
            color: var(--primary);
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.2s;
            font-family: 'Poppins', sans-serif;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255,152,0,0.1);
        }
        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            margin-top: 10px;
        }
        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }
        .info-box {
            background: #fff3e0;
            border-left: 4px solid var(--primary);
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 14px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        footer {
            text-align: center;
            padding: 30px 20px;
            font-size: 12px;
            color: #999;
        }
        .upload-area {
            margin-top: 10px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .photo-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
            background: #f0f0f0;
        }
        .upload-btn {
            background: var(--primary);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            border: none;
        }
        .upload-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .upload-status {
            font-size: 12px;
            color: #666;
        }
        .privacy-checkbox {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin: 20px 0;
            font-size: 14px;
        }
        .privacy-checkbox input {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            flex-shrink: 0;
            accent-color: var(--primary);
        }
        .privacy-checkbox label {
            display: inline;
            font-weight: 400;
            margin: 0;
            line-height: 1.4;
        }
        .privacy-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }
        .privacy-link:hover {
            text-decoration: underline;
        }
        .required-star {
            color: #f44336;
            margin-left: 4px;
        }

        /* Password toggle */
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 50px;
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            color: #888;
            transition: 0.2s;
        }
        .toggle-password:hover {
            color: var(--primary);
        }

        @media (max-width: 480px) {
            .container { padding: 15px; }
            .form-card { padding: 20px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">🚗 JeGo Driver</div>
            <div style="font-size: 14px; opacity: 0.9;">Gabung jadi mitra – mudah & cepat</div>
        </div>
    </header>

    <div class="container">
        <div class="form-card">
            <h1>Pendaftaran Driver</h1>
            <div class="subtitle">Isi semua data berikut untuk menjadi driver JeGo</div>

            <!-- ERROR & SUCCESS BOX SUDAH DIHAPUS, PAKAI POPUP ALERT -->

            <form id="driverForm">
                <div class="form-group">
                    <label>Nama Lengkap <span class="required-star">*</span></label>
                    <input type="text" id="fullName" placeholder="Contoh: Ahmad Wijaya" required>
                </div>
                <div class="form-group">
                    <label>Email (akan jadi username login) <span class="required-star">*</span></label>
                    <input type="email" id="email" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password <span class="required-star">*</span></label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Minimal 6 karakter" minlength="6" required>
                        <button type="button" class="toggle-password" data-target="password">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Konfirmasi Password <span class="required-star">*</span></label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" placeholder="Ulangi password" minlength="6" required>
                        <button type="button" class="toggle-password" data-target="confirmPassword">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Nomor WhatsApp / HP <span class="required-star">*</span></label>
                    <input type="tel" id="phone" placeholder="08123456789" required>
                </div>
                <div class="form-group">
                    <label>Tanggal Lahir <span class="required-star">*</span></label>
                    <input type="date" id="dob" required>
                </div>
                <div class="form-group">
                    <label>Jenis Kendaraan (wajib) <span class="required-star">*</span></label>
                    <select id="vehicleType" required>
                        <option value="">Pilih Jenis Kendaraan</option>
                        <option value="motor">Motor</option>
                        <option value="mobil">Mobil</option>
                        <option value="bentor">Bentor</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Merk Kendaraan <span class="required-star">*</span></label>
                    <input type="text" id="vehicleBrand" placeholder="Contoh: Honda, Toyota, Yamaha" required>
                </div>
                <div class="form-group">
                    <label>Tahun Kendaraan <span class="required-star">*</span></label>
                    <input type="number" id="vehicleYear" placeholder="Contoh: 2020" min="1980" max="2026" required>
                </div>
                <div class="form-group">
                    <label>Nomor Plat Kendaraan <span class="required-star">*</span></label>
                    <input type="text" id="plateNumber" placeholder="Contoh: DM 1234 AB" required>
                </div>
                <div class="form-group">
                    <label>Alamat Lengkap <span class="required-star">*</span></label>
                    <textarea id="address" rows="3" placeholder="Contoh: Jl. HB Jassin, Dulalowo Timur, Kota Tengah, Kota Gorontalo." required></textarea>
                </div>
                <div class="form-group">
                    <label>Foto Profil <span class="required-star">*</span></label>
                    <div class="upload-area">
                        <img id="photoPreview" class="photo-preview" src="https://www.gravatar.com/avatar/?d=mp" alt="Preview">
                        <input type="file" id="photoFile" accept="image/*" style="display: none;">
                        <button type="button" class="upload-btn" id="uploadPhotoBtn">📷 Upload Foto</button>
                        <div id="uploadStatus" class="upload-status"></div>
                    </div>
                </div>

                <!-- CHECKBOX PRIVASI -->
                <div class="privacy-checkbox">
                    <input type="checkbox" id="privacyConsent" required>
                    <label for="privacyConsent">
                        Saya telah membaca dan menyetujui 
                        <span class="privacy-link" id="privacyLink">kebijakan privasi</span> 
                        serta memahami penggunaan data pribadi pada aplikasi JeGo.
                    </label>
                </div>

                <div class="info-box">
                    ⚠️ Dengan mendaftar, Anda setuju untuk mengikuti aturan JeGo. Data akan diverifikasi oleh admin. Pendaftaran GRATIS!
                </div>
                <button type="submit" id="submitBtn" class="btn">Daftar Sekarang</button>
                <!-- Tombol kembali ke beranda sudah dihapus sesuai permintaan -->
            </form>
        </div>
        <footer>© 2026 JeGo - Solusi Transportasi & Kurir</footer>
    </div>

    <script>
        // Konfigurasi Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCD0pgeZio-LdKqYDtWxcdXcZwyL4ngYQI",
            authDomain: "jego-35a2b.firebaseapp.com",
            databaseURL: "https://jego-35a2b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "jego-35a2b",
            storageBucket: "jego-35a2b.firebasestorage.app",
            messagingSenderId: "600037007040",
            appId: "1:600037007040:web:ac3243ad9b472647ffd725"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // DOM elements
        const form = document.getElementById('driverForm');
        const submitBtn = document.getElementById('submitBtn');
        const fullName = document.getElementById('fullName');
        const email = document.getElementById('email');
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirmPassword');
        const phone = document.getElementById('phone');
        const dob = document.getElementById('dob');
        const vehicleTypeSelect = document.getElementById('vehicleType');
        const vehicleBrand = document.getElementById('vehicleBrand');
        const vehicleYear = document.getElementById('vehicleYear');
        const plateNumberInput = document.getElementById('plateNumber');
        const addressInput = document.getElementById('address');
        const photoFile = document.getElementById('photoFile');
        const uploadPhotoBtn = document.getElementById('uploadPhotoBtn');
        const photoPreview = document.getElementById('photoPreview');
        const uploadStatus = document.getElementById('uploadStatus');
        const privacyCheckbox = document.getElementById('privacyConsent');

        let uploadedPhotoBase64 = null;
        let isUploading = false;

        // Helper: format nomor telepon ke +62
        function formatPhoneNumber(phone) {
            let cleaned = phone.replace(/\D/g, '');
            if (cleaned.startsWith('0')) cleaned = '+62' + cleaned.substring(1);
            else if (cleaned.startsWith('62')) cleaned = '+' + cleaned;
            else if (!cleaned.startsWith('+')) cleaned = '+62' + cleaned;
            return cleaned;
        }

        // Cek apakah nomor sudah terdaftar sebagai driver
        async function isPhoneRegistered(phoneFormatted) {
            const phoneKey = phoneFormatted.replace(/\+/g, '_');
            const snapshot = await database.ref(`phone_check_drivers/${phoneKey}`).once('value');
            return snapshot.exists();
        }

        // KOMPRESI GAMBAR dan hasilkan Base64 (tanpa upload ke ImgBB)
        function compressImageToBase64(file, maxSizeKB = 512) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const maxDim = 800;
                        if (width > height && width > maxDim) {
                            height = (height * maxDim) / width;
                            width = maxDim;
                        } else if (height > maxDim) {
                            width = (width * maxDim) / height;
                            height = maxDim;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        let quality = 0.85;
                        let dataUrl = canvas.toDataURL('image/jpeg', quality);
                        let fileSize = Math.round((dataUrl.length * 3) / 4);
                        while (fileSize > maxSizeKB * 1024 && quality > 0.3) {
                            quality -= 0.05;
                            dataUrl = canvas.toDataURL('image/jpeg', quality);
                            fileSize = Math.round((dataUrl.length * 3) / 4);
                        }
                        resolve(dataUrl);
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

        // Event upload foto (simpan Base64)
        uploadPhotoBtn.addEventListener('click', () => {
            if (isUploading) return;
            photoFile.click();
        });
        photoFile.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                uploadStatus.innerHTML = '❌ Hanya file gambar yang diperbolehkan!';
                return;
            }
            const reader = new FileReader();
            reader.onload = (ev) => { photoPreview.src = ev.target.result; };
            reader.readAsDataURL(file);
            isUploading = true;
            uploadPhotoBtn.disabled = true;
            uploadPhotoBtn.innerHTML = 'Memproses...';
            uploadStatus.innerHTML = 'Sedang kompresi gambar...';
            try {
                const base64String = await compressImageToBase64(file, 512);
                uploadedPhotoBase64 = base64String;
                photoPreview.src = base64String;
                uploadStatus.innerHTML = '✅ Foto siap';
            } catch (err) {
                console.error(err);
                uploadStatus.innerHTML = '❌ Gagal memproses foto.';
                uploadedPhotoBase64 = null;
                photoPreview.src = 'https://via.placeholder.com/100?text=Foto';
            } finally {
                isUploading = false;
                uploadPhotoBtn.disabled = false;
                uploadPhotoBtn.innerHTML = '📷 Upload Foto';
                setTimeout(() => {
                    if (uploadStatus.innerHTML !== '❌ Gagal memproses foto.') {
                        uploadStatus.innerHTML = '';
                    }
                }, 5000);
            }
        });

        // Toggle Password (mata)
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const targetId = this.dataset.target;
                const input = document.getElementById(targetId);
                if (!input) return;
                if (input.type === 'password') {
                    input.type = 'text';
                    this.textContent = '🙈';
                } else {
                    input.type = 'password';
                    this.textContent = '👁️';
                }
            });
        });

        // Fungsi registrasi driver
        async function registerDriver(data) {
            const userCredential = await auth.createUserWithEmailAndPassword(data.email, data.password);
            const uid = userCredential.user.uid;

            const driverRecord = {
                uid: uid,
                name: data.fullName,
                email: data.email,
                phone: data.phoneFormatted,
                address: data.address,
                vehicle_type: data.vehicleType.toLowerCase(),
                vehicle_brand: data.vehicleBrand,
                vehicle_year: data.vehicleYear,
                plate_number: data.plateNumber,
                date_of_birth: data.dob,
                photoURL: data.photoBase64 || '',
                status: 'pending',
                role: 'driver',
                balance: 0,
                rating: 5,
                perjalanan: 0,
                registered_at: new Date().toISOString(),
                updated_at: new Date().toISOString()
            };

            await database.ref(`drivers/${uid}`).set(driverRecord);
            const phoneKey = data.phoneFormatted.replace(/\+/g, '_');
            await database.ref(`phone_check_drivers/${phoneKey}`).set(uid);

            const driverLocal = {
                uid: uid,
                name: data.fullName,
                phone: data.phoneFormatted,
                email: data.email,
                address: data.address,
                vehicleType: data.vehicleType.toLowerCase(),
                vehicleBrand: data.vehicleBrand,
                vehicleYear: data.vehicleYear,
                plateNumber: data.plateNumber,
                dateOfBirth: data.dob,
                photoURL: data.photoBase64 || '',
                status: 'pending',
                balance: 0,
                rating: 5
            };
            localStorage.setItem('jego_logged_in_driver', JSON.stringify(driverLocal));
            return true;
        }

        // Submit form dengan popup alert
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (submitBtn.disabled) return;

            // Validasi checkbox privasi
            if (!privacyCheckbox.checked) {
                alert('⚠️ Anda harus menyetujui kebijakan privasi untuk melanjutkan pendaftaran.');
                return;
            }

            const nameVal = fullName.value.trim();
            const emailVal = email.value.trim();
            const passVal = password.value;
            const confirmPassVal = confirmPassword.value;
            const phoneVal = phone.value.trim();
            const dobVal = dob.value;
            const vehicleVal = vehicleTypeSelect.value;
            const brandVal = vehicleBrand.value.trim();
            const yearVal = parseInt(vehicleYear.value);
            const plateVal = plateNumberInput.value.trim().toUpperCase();
            const addressVal = addressInput.value.trim();

            // Validasi semua field wajib
            if (!nameVal || !emailVal || !passVal || !confirmPassVal || !phoneVal || !dobVal || !vehicleVal || !brandVal || !yearVal || !plateVal || !addressVal) {
                alert('⚠️ Semua field wajib diisi!');
                return;
            }
            if (passVal.length < 6) {
                alert('⚠️ Password minimal 6 karakter.');
                return;
            }
            if (passVal !== confirmPassVal) {
                alert('⚠️ Password dan konfirmasi password tidak cocok!');
                return;
            }
            if (!emailVal.includes('@')) {
                alert('⚠️ Email tidak valid.');
                return;
            }
            const phoneDigits = phoneVal.replace(/\D/g, '');
            if (phoneDigits.length < 9 || phoneDigits.length > 15) {
                alert('⚠️ Nomor HP tidak valid (minimal 9 digit).');
                return;
            }
            if (!vehicleVal) {
                alert('⚠️ Pilih jenis kendaraan terlebih dahulu.');
                return;
            }
            if (yearVal < 1980 || yearVal > new Date().getFullYear()) {
                alert('⚠️ Tahun kendaraan tidak valid (1980 - sekarang).');
                return;
            }
            if (!uploadedPhotoBase64) {
                alert('⚠️ Silakan upload foto profil terlebih dahulu.');
                return;
            }

            const formattedPhone = formatPhoneNumber(phoneVal);

            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Memproses... <span class="loading"></span>';

            try {
                const phoneExists = await isPhoneRegistered(formattedPhone);
                if (phoneExists) {
                    throw new Error('Nomor HP sudah terdaftar sebagai driver. Gunakan nomor lain.');
                }

                await registerDriver({
                    fullName: nameVal,
                    email: emailVal,
                    password: passVal,
                    phoneFormatted: formattedPhone,
                    dob: dobVal,
                    vehicleType: vehicleVal,
                    vehicleBrand: brandVal,
                    vehicleYear: yearVal,
                    plateNumber: plateVal,
                    address: addressVal,
                    photoBase64: uploadedPhotoBase64
                });

                alert('✅ Pendaftaran berhasil! Silakan login menggunakan email dan password Anda.');
                window.location.href = 'loginDriver.html';
            } catch (err) {
                console.error(err);
                let pesan = err.message;
                if (err.code === 'auth/email-already-in-use') pesan = 'Email sudah terdaftar. Gunakan email lain.';
                else if (err.code === 'auth/weak-password') pesan = 'Password terlalu lemah. Gunakan minimal 6 karakter.';
                alert('❌ ' + pesan);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Daftar Sekarang';
            }
        });

        // Event listener untuk link kebijakan privasi
        document.getElementById('privacyLink').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'privasi.html';
        });
    </script>
</body>
</html>
