<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin JeGo - Notifikasi & Kirim Penawaran Driver</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e2f;
            color: #eee;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #FF9800; margin-bottom: 10px; }
        h3 { margin-top: 20px; margin-bottom: 10px; color: #FFB74D; }
        .card {
            background: #2a2a3b;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #FF9800;
        }
        .flex { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .badge {
            background: #FF9800;
            color: #1e1e2f;
            border-radius: 20px;
            padding: 4px 12px;
            font-weight: bold;
        }
        input, select, button {
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
        }
        input, select {
            background: #0f0f1a;
            color: white;
            border: 1px solid #FF9800;
        }
        button {
            background: #FF9800;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #ffb74d; }
        .log-box {
            background: #0f0f1a;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .log-entry { border-bottom: 1px solid #2a2a3b; padding: 5px 0; }
        .log-info { color: #66aaff; }
        .log-success { color: #66ff66; }
        .log-error { color: #ff6666; }
        .log-warning { color: #ffaa66; }
        .logout-btn {
            background: #f44336;
            margin-left: 10px;
        }
        .logout-btn:hover { background: #d32f2f; }
        .offer-result { font-size: 13px; margin-top: 10px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>
<body>
<div class="container">
    <div class="flex" style="justify-content: space-between; align-items: center;">
        <h1>📡 JeGo Admin Panel</h1>
        <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
    </div>
    <div class="card">
        <div class="flex" style="justify-content: space-between;">
            <div>🔔 Status: <span id="statusText" class="badge">Memulai...</span></div>
            <div>📡 Firebase: <span id="firebaseStatus" class="badge">Menghubungkan</span></div>
        </div>
        <div class="flex" style="margin-top: 10px;">
            <button id="clearLogBtn">🗑 Bersihkan Log</button>
            <button id="testNotifBtn">🔔 Test Notifikasi (driver pertama)</button>
            <button id="cleanupOrdersBtn" style="background:#f44336;">🗑 Hapus Order Kadaluarsa (>30 menit)</button>
        </div>
    </div>

    <!-- KIRIM PENAWARAN ATAS NAMA DRIVER VIA ADMIN -->
    <div class="card">
        <h3>📨 Kirim Penawaran Atas Nama Driver (Admin)</h3>
        <div class="flex" style="flex-wrap:wrap; gap:10px;">
            <select id="adminDriverSelect" style="flex:2; background:#0f0f1a; color:white;">
                <option value="">-- Pilih Driver --</option>
            </select>
            <select id="adminOrderSelect" style="flex:2; background:#0f0f1a; color:white;">
                <option value="">-- Pilih Order (waiting) --</option>
            </select>
            <button id="adminSendOfferBtn" style="background:#4caf50;">📤 Kirim Penawaran</button>
        </div>
        <div id="adminOfferResult" class="offer-result"></div>
        <div class="flex" style="margin-top: 10px;">
            <button id="refreshDriversOrdersBtn" style="background:#2196f3;">🔄 Refresh Daftar Driver & Order</button>
        </div>
    </div>

    <h3>📋 Log Aktivitas</h3>
    <div id="logContainer" class="log-box">
        <div class="log-entry log-info">▶️ Menunggu autentikasi admin...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCD0pgeZio-LdKqYDtWxcdXcZwyL4ngYQI",
        authDomain: "jego-35a2b.firebaseapp.com",
        databaseURL: "https://jego-35a2b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "jego-35a2b",
        storageBucket: "jego-35a2b.firebasestorage.app",
        messagingSenderId: "600037007040",
        appId: "1:600037007040:web:ac3243ad9b472647ffd725"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    // Konfigurasi OneSignal
    const ONESIGNAL_APP_ID = "3357d683-8f6b-4558-9d42-2eeceed6204a";
    let ONESIGNAL_API_KEY = "";

    let allDrivers = {};
    let allWaitingOrders = {};
    let ordersListener = false;
    const processedOrderIds = new Set();

    // ================= UTILS =================
    function addLog(msg, type = "info") {
        const logDiv = document.getElementById("logContainer");
        const entry = document.createElement("div");
        entry.className = `log-entry log-${type}`;
        const time = new Date().toLocaleTimeString();
        entry.textContent = `[${time}] ${msg}`;
        logDiv.appendChild(entry);
        entry.scrollIntoView({ behavior: "smooth", block: "nearest" });
        while (logDiv.children.length > 500) logDiv.removeChild(logDiv.firstChild);
    }

    function formatRupiah(amount) {
        return 'Rp ' + (amount || 0).toLocaleString('id-ID');
    }

    // ================= API KEY ONESIGNAL =================
    async function fetchOneSignalApiKey() {
        try {
            const snapshot = await database.ref('data-jego/PushKey').once('value');
            const apiKey = snapshot.val();
            if (apiKey && typeof apiKey === 'string') {
                ONESIGNAL_API_KEY = apiKey;
                addLog("🔑 OneSignal API Key berhasil dimuat dari database.", "success");
                return true;
            } else {
                addLog("⚠️ PushKey tidak ditemukan di data-jego. Notifikasi tidak akan berfungsi.", "error");
                return false;
            }
        } catch (error) {
            addLog(`❌ Gagal memuat PushKey: ${error.message}`, "error");
            return false;
        }
    }

    // ========== NOTIFIKASI PUSH (HANYA DRIVER DENGAN autobid_enabled = true) ==========
    async function loadDriversForNotification() {
        try {
            const snapshot = await database.ref("driver_locations").once("value");
            const allDrivers = snapshot.val();
            if (!allDrivers) return {};
            const filtered = {};
            for (const uid in allDrivers) {
                const d = allDrivers[uid];
                if (d.tracking_enabled === true && d.autobid_enabled === true && d.playerId && d.latitude && d.longitude) {
                    filtered[uid] = {
                        playerId: d.playerId,
                        latitude: d.latitude,
                        longitude: d.longitude,
                        name: d.fullName || `Driver ${uid.substring(0,6)}`
                    };
                }
            }
            addLog(`Driver online (tracking+autobid ON): ${Object.keys(filtered).length}`, "info");
            return filtered;
        } catch(e) {
            addLog(`Gagal load driver_locations: ${e.message}`, "error");
            return {};
        }
    }

    async function sendPushNotification(playerId, title, message, orderId = null, extraData = {}) {
        if (!playerId) return false;
        if (!ONESIGNAL_API_KEY) {
            addLog("❌ OneSignal API Key belum tersedia. Notifikasi tidak dapat dikirim.", "error");
            return false;
        }
        try {
            const response = await fetch("https://onesignal.com/api/v1/notifications", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Basic ${ONESIGNAL_API_KEY}`
                },
                body: JSON.stringify({
                    app_id: ONESIGNAL_APP_ID,
                    include_player_ids: [playerId],
                    headings: { en: title },
                    contents: { en: message },
                    data: { orderId: orderId, type: "new_order", ...extraData }
                })
            });
            const result = await response.json();
            if (result.errors) {
                addLog(`Gagal notif: ${JSON.stringify(result.errors)}`, "error");
                return false;
            } else {
                addLog(`✅ Notifikasi terkirim ke driver (${playerId.substring(0,8)}...)`, "success");
                return true;
            }
        } catch(err) {
            addLog(`Error API: ${err.message}`, "error");
            return false;
        }
    }

    async function testNotification() {
        if (!ONESIGNAL_API_KEY) {
            addLog("❌ API Key tidak tersedia. Notifikasi tidak dapat dikirim.", "error");
            return;
        }
        const drivers = await loadDriversForNotification();
        const driverIds = Object.keys(drivers);
        if (driverIds.length === 0) {
            addLog("Tidak ada driver dengan tracking+autobid ON untuk test.", "error");
            return;
        }
        const first = drivers[driverIds[0]];
        await sendPushNotification(first.playerId, "🧪 Test Notifikasi JeGo", "Ini notifikasi uji coba dari admin panel (hanya driver autobid ON).");
    }

    // ========== NOTIFIKASI MANUAL KE DRIVER (UNTUK PENAWARAN ADMIN) ==========
    async function sendManualPushToDriver(driverId, title, message, orderId = null) {
        if (!ONESIGNAL_API_KEY) {
            addLog("❌ OneSignal API Key belum tersedia, tidak bisa kirim notifikasi.", "error");
            return false;
        }
        const locSnap = await database.ref(`driver_locations/${driverId}/playerId`).once('value');
        const playerId = locSnap.val();
        if (!playerId) {
            addLog(`⚠️ Driver ${driverId} tidak memiliki playerId, tidak bisa kirim notifikasi.`, "warning");
            return false;
        }
        try {
            const response = await fetch("https://onesignal.com/api/v1/notifications", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Basic ${ONESIGNAL_API_KEY}`
                },
                body: JSON.stringify({
                    app_id: ONESIGNAL_APP_ID,
                    include_player_ids: [playerId],
                    headings: { en: title },
                    contents: { en: message },
                    data: { orderId: orderId, type: "offer_from_admin" }
                })
            });
            const result = await response.json();
            if (result.errors) {
                addLog(`Gagal notif manual ke driver ${driverId}: ${JSON.stringify(result.errors)}`, "error");
                return false;
            } else {
                addLog(`✅ Notifikasi manual terkirim ke driver ${driverId} (${playerId.substring(0,8)}...)`, "success");
                return true;
            }
        } catch(err) {
            addLog(`Error API OneSignal: ${err.message}`, "error");
            return false;
        }
    }

    // ========== LISTENER ORDER OTOMATIS (NOTIF KE DRIVER DEKAT DENGAN AUTOBID ON) ==========
    function getDistance(lat1, lon1, lat2, lon2) {
        if (!lat1 || !lon1 || !lat2 || !lon2) return Infinity;
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    async function processNewOrder(orderId, orderData) {
        if (processedOrderIds.has(orderId)) return;
        if (orderData.status !== "waiting" && orderData.status !== "searching") return;
        const lat = orderData.pickup_lat || orderData.from_lat;
        const lng = orderData.pickup_lng || orderData.from_lng;
        if (!lat || !lng) return;
        addLog(`📦 Order baru: ${orderId} | pickup (${lat}, ${lng})`, "info");
        
        const drivers = await loadDriversForNotification();
        let count = 0;
        for (const driverId in drivers) {
            const d = drivers[driverId];
            const dist = getDistance(lat, lng, d.latitude, d.longitude);
            if (dist < 3) {
                const customerName = orderData.customer_name || "Customer";
                const vehicle = (orderData.transport_type || "transportasi").includes("kurir") ? "Kurir" : "Transportasi";
                const harga = orderData.price || 0;
                const title = "🚖 Order Baru Dekat Anda!";
                const message = `${customerName} memesan ${vehicle}\nJarak: ${dist.toFixed(1)} km\nHarga: Rp ${harga.toLocaleString()}`;
                await sendPushNotification(d.playerId, title, message, orderId);
                count++;
            }
        }
        if (count > 0) addLog(`✅ Order ${orderId}: notif ke ${count} driver (radius <3 km, autobid ON)`, "success");
        else addLog(`⚠️ Order ${orderId}: tidak ada driver autobid ON dalam radius 3 km`, "warning");
        processedOrderIds.add(orderId);
    }

    function startListeningOrders() {
        if (ordersListener) return;
        const ordersRef = database.ref("orders");
        ordersRef.on("child_added", async (snapshot) => {
            await processNewOrder(snapshot.key, snapshot.val());
        });
        ordersListener = true;
        addLog("👂 Listener order aktif (child_added) - hanya untuk driver dengan autobid ON.", "success");
        document.getElementById("statusText").innerText = "Listening order (autobid ON) & siap kirim penawaran manual";
    }

    // ========== DENGARKAN PERUBAHAN ORDER (untuk pemberitahuan jika penawaran diterima) ==========
    function startListeningToOrderChanges() {
        const ordersRef = database.ref('orders');
        ordersRef.on('child_changed', async (snapshot) => {
            const order = snapshot.val();
            const orderId = snapshot.key;
            if (!order) return;
            if (order.status === 'accepted' && order.driver_id) {
                const notifKey = `notif_admin_accepted_${orderId}`;
                if (sessionStorage.getItem(notifKey)) return;
                sessionStorage.setItem(notifKey, 'true');

                addLog(`🎉 Order ${orderId} telah diterima oleh customer. Driver terpilih: ${order.driver_id}`, "success");
                const title = "🎉 Penawaran Anda Diterima!";
                const message = `Selamat! Penawaran Anda untuk order ${orderId.substring(0,8)} telah diterima. Segera proses order.`;
                await sendManualPushToDriver(order.driver_id, title, message, orderId);
            }
        });
        addLog("👂 Listener perubahan order (child_changed) aktif untuk pemberitahuan otomatis.", "success");
    }

    // ================= HAPUS ORDER KADALUARSA (>30 MENIT) =================
    async function deleteExpiredOrders() {
        addLog("🕒 Memeriksa order yang sudah lebih dari 30 menit (status waiting)...", "info");
        const now = new Date();
        const thirtyMinutesAgo = new Date(now.getTime() - 30 * 60 * 1000);
        const ordersRef = database.ref('orders');
        const snapshot = await ordersRef.once('value');
        const orders = snapshot.val();
        if (!orders) {
            addLog("Tidak ada order untuk diperiksa.", "info");
            return;
        }
        let deletedCount = 0;
        for (const [orderId, order] of Object.entries(orders)) {
            if (order.status === 'waiting' && order.created_at) {
                const orderCreated = new Date(order.created_at);
                if (orderCreated <= thirtyMinutesAgo) {
                    await ordersRef.child(orderId).remove();
                    addLog(`🗑 Order ${orderId.substring(0,8)} dihapus karena kadaluarsa (dibuat ${orderCreated.toLocaleTimeString()})`, "warning");
                    deletedCount++;
                }
            }
        }
        if (deletedCount > 0) {
            addLog(`✅ Berhasil menghapus ${deletedCount} order kadaluarsa.`, "success");
            await refreshDriversAndOrders();
        } else {
            addLog("Tidak ada order kadaluarsa yang ditemukan.", "info");
        }
    }

    // ================= KIRIM PENAWARAN SEBAGAI ADMIN (ke driver_offers) =================
    async function loadDriversForSelect() {
        const snapshot = await database.ref('drivers').once('value');
        allDrivers = snapshot.val() || {};
        const select = document.getElementById('adminDriverSelect');
        select.innerHTML = '<option value="">-- Pilih Driver --</option>';
        for (const [uid, data] of Object.entries(allDrivers)) {
            if (data.name && data.vehicleType) {
                const option = document.createElement('option');
                option.value = uid;
                option.textContent = `${data.name} (${data.vehicleType}) - ${data.plateNumber || 'no plat'}`;
                select.appendChild(option);
            }
        }
        addLog(`Daftar driver dimuat: ${select.options.length-1} driver.`, "info");
    }

    async function loadWaitingOrdersForSelect() {
        const snapshot = await database.ref('orders').once('value');
        const orders = snapshot.val() || {};
        allWaitingOrders = {};
        const select = document.getElementById('adminOrderSelect');
        select.innerHTML = '<option value="">-- Pilih Order (waiting) --</option>';
        let count = 0;
        for (const [orderId, order] of Object.entries(orders)) {
            if (order.status === 'waiting') {
                allWaitingOrders[orderId] = order;
                const option = document.createElement('option');
                option.value = orderId;
                const shortId = orderId.substring(0,8);
                const pickup = (order.pickup_address || 'Alamat').substring(0,30);
                option.textContent = `${shortId}... | ${pickup}`;
                select.appendChild(option);
                count++;
            }
        }
        addLog(`Daftar order waiting dimuat: ${count} order.`, "info");
    }

    async function sendAdminOffer() {
        const driverId = document.getElementById('adminDriverSelect').value;
        const orderId = document.getElementById('adminOrderSelect').value;
        const resultDiv = document.getElementById('adminOfferResult');

        if (!driverId || !orderId) {
            resultDiv.innerHTML = '<span style="color:#ffaa66;">⚠️ Pilih driver dan order terlebih dahulu.</span>';
            return;
        }

        const driver = allDrivers[driverId];
        if (!driver) {
            resultDiv.innerHTML = '<span style="color:#ff6666;">❌ Data driver tidak ditemukan (coba refresh daftar driver).</span>';
            return;
        }

        const order = allWaitingOrders[orderId];
        if (!order || order.status !== 'waiting') {
            resultDiv.innerHTML = '<span style="color:#ff6666;">❌ Order tidak ditemukan atau sudah tidak dalam status waiting. Silakan refresh daftar order.</span>';
            return;
        }

        // Ambil lokasi driver dari driver_locations untuk validasi jarak
        const locSnap = await database.ref(`driver_locations/${driverId}`).once('value');
        const driverLoc = locSnap.val();
        const driverLat = driverLoc?.latitude;
        const driverLng = driverLoc?.longitude;
        const pickupLat = order.pickup_lat;
        const pickupLng = order.pickup_lng;

        let dist = null;
        if (driverLat && driverLng && pickupLat && pickupLng) {
            dist = getDistance(driverLat, driverLng, pickupLat, pickupLng);
            if (dist > 3) {
                resultDiv.innerHTML = `<span style="color:#ffaa66;">⚠️ Jarak driver ke pickup (${dist.toFixed(1)} km) melebihi 3 km. Offer tidak dikirim.</span>`;
                return;
            }
        } else {
            resultDiv.innerHTML = '<span style="color:#ffaa66;">⚠️ Data lokasi driver atau order tidak lengkap. Offer dibatalkan.</span>';
            return;
        }

        // Cek apakah driver sudah pernah menawarkan order ini (mencegah duplikasi)
        const existingOfferSnap = await database.ref(`orders/${orderId}/driver_offers/${driverId}`).once('value');
        if (existingOfferSnap.exists()) {
            resultDiv.innerHTML = '<span style="color:#ffaa66;">⚠️ Driver ini sudah pernah mengirim penawaran untuk order ini. Tidak perlu mengirim ulang.</span>';
            return;
        }

        const offerData = {
            driver_id: driverId,
            driver_name: driver.name,
            driver_plate: driver.plateNumber || '',
            driver_type: driver.vehicleType,
            driver_rating: driver.rating || 5,
            driver_trips: driver.perjalanan || 0,
            driver_photo: driver.profilePhotoUrl || '',
            offered_at: new Date().toISOString(),
            status: 'offered'
        };

        try {
            await database.ref(`orders/${orderId}/driver_offers/${driverId}`).set(offerData);
            resultDiv.innerHTML = `<span style="color:#66ff66;">✅ Penawaran berhasil dikirim untuk driver ${driver.name} ke order ${orderId.substring(0,8)}. (Jarak: ${dist.toFixed(1)} km)</span>`;
            addLog(`Admin mengirim offer untuk driver ${driver.name} (${driverId}) ke orders/${orderId}/driver_offers/${driverId}, jarak ${dist.toFixed(1)} km`, "success");

            // Kirim notifikasi push ke driver
            const title = "📢 Penawaran Dikirim oleh Admin";
            const message = `Halo ${driver.name}, admin telah mengirimkan penawaran Anda untuk order dari ${order.customer_name || 'customer'}. Segera cek aplikasi driver.`;
            await sendManualPushToDriver(driverId, title, message, orderId);
        } catch (err) {
            resultDiv.innerHTML = `<span style="color:#ff6666;">❌ Gagal: ${err.message}</span>`;
            addLog(`Gagal kirim offer admin: ${err.message}`, "error");
        }
    }

    // ================= REFRESH DATA =================
    async function refreshDriversAndOrders() {
        await loadDriversForSelect();
        await loadWaitingOrdersForSelect();
        document.getElementById('adminOfferResult').innerHTML = '';
        addLog("Data driver & order berhasil direfresh.", "success");
    }

    // ================= AUTENTIKASI & INIT =================
    async function initAdminPanel() {
        document.getElementById("clearLogBtn").onclick = () => {
            document.getElementById("logContainer").innerHTML = '<div class="log-entry log-info">▶️ Log dibersihkan</div>';
            addLog("Log dihapus manual", "info");
        };
        document.getElementById("testNotifBtn").onclick = testNotification;
        document.getElementById("cleanupOrdersBtn").onclick = deleteExpiredOrders;
        document.getElementById("logoutBtn").onclick = async () => {
            await auth.signOut();
            window.location.href = 'login_admin.html';
        };
        document.getElementById("adminSendOfferBtn").onclick = sendAdminOffer;
        document.getElementById("refreshDriversOrdersBtn").onclick = refreshDriversAndOrders;

        await loadDriversForSelect();
        await loadWaitingOrdersForSelect();

        // Mulai listener order otomatis
        startListeningOrders();
        // Listener perubahan status order
        startListeningToOrderChanges();

        document.getElementById("firebaseStatus").innerText = "✅ Terhubung";
        addLog("Firebase terhubung, admin panel siap (notifikasi otomatis + kirim penawaran manual).", "success");

        // Ambil API Key
        await fetchOneSignalApiKey();

        // Jalankan sekali saat startup untuk membersihkan order kadaluarsa
        await deleteExpiredOrders();
        // Jadwalkan pembersihan setiap 10 menit (600.000 ms)
        setInterval(deleteExpiredOrders, 10 * 60 * 1000);
    }

    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            window.location.href = 'login_admin.html';
            return;
        }
        try {
            const adminSnap = await database.ref(`admins/${user.uid}`).once('value');
            if (!adminSnap.exists()) {
                addLog("Akun Anda tidak terdaftar sebagai admin. Logout.", "error");
                await auth.signOut();
                window.location.href = 'login_admin.html';
                return;
            }
            addLog(`Admin ${user.email} berhasil login.`, "success");
            initAdminPanel();
        } catch (err) {
            addLog(`Error verifikasi admin: ${err.message}`, "error");
            await auth.signOut();
            window.location.href = 'login_admin.html';
        }
    });
</script>
</body>
</html>
