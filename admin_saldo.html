<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin JeGo - Notifikasi & Saldo Driver</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e2f;
            color: #eee;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #FF9800; margin-bottom: 10px; }
        .status-card, .saldo-card {
            background: #2a2a3b;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #FF9800;
        }
        .saldo-card { border-left-color: #4caf50; }
        .flex { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .badge {
            background: #FF9800;
            color: #1e1e2f;
            border-radius: 20px;
            padding: 4px 12px;
            font-weight: bold;
        }
        input, button {
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
        }
        input {
            background: #0f0f1a;
            color: white;
            border: 1px solid #FF9800;
        }
        button {
            background: #FF9800;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #ffb74d; }
        .driver-info {
            background: #0f0f1a;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .log-box {
            background: #0f0f1a;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .log-entry { border-bottom: 1px solid #2a2a3b; padding: 5px 0; }
        .log-info { color: #66aaff; }
        .log-success { color: #66ff66; }
        .log-error { color: #ff6666; }
        .log-warning { color: #ffaa66; }
        .logout-btn {
            background: #f44336;
            margin-left: 10px;
        }
        .logout-btn:hover { background: #d32f2f; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>
<body>
<div class="container">
    <div class="flex" style="justify-content: space-between; align-items: center;">
        <h1>📡 JeGo Admin Panel</h1>
        <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
    </div>
    <div class="status-card">
        <div class="flex" style="justify-content: space-between;">
            <div>🔔 Status: <span id="statusText" class="badge">Memulai...</span></div>
            <div>📡 Firebase: <span id="firebaseStatus" class="badge">Menghubungkan</span></div>
        </div>
        <div class="flex" style="margin-top: 10px;">
            <button id="clearLogBtn">🗑 Bersihkan Log</button>
            <button id="testNotifBtn">🔔 Test Notifikasi (driver pertama)</button>
        </div>
    </div>

    <div class="saldo-card">
        <h3>💰 Kurangi Saldo Driver</h3>
        <div class="flex">
            <input type="text" id="searchDriver" placeholder="Cari Nama atau UID driver" style="flex:2;">
            <button id="cariDriverBtn">🔍 Cari Driver</button>
        </div>
        <div id="driverInfo" class="driver-info" style="display:none;">
            <div><strong>UID:</strong> <span id="driverUid"></span></div>
            <div><strong>Nama:</strong> <span id="driverName"></span></div>
            <div><strong>Saldo saat ini:</strong> <span id="driverBalance">Rp 0</span></div>
            <div class="flex" style="margin-top: 10px;">
                <input type="number" id="kurangiNominal" placeholder="Nominal pengurangan (Rp)" step="1000" value="5000">
                <button id="kurangiSaldoBtn" style="background:#f44336;">➖ Kurangi Saldo</button>
            </div>
        </div>
        <div id="driverNotFound" style="color:#ffaa66; display:none;">⚠️ Driver tidak ditemukan.</div>
    </div>

    <h3>📋 Log Aktivitas</h3>
    <div id="logContainer" class="log-box">
        <div class="log-entry log-info">▶️ Menunggu autentikasi admin...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCD0pgeZio-LdKqYDtWxcdXcZwyL4ngYQI",
        authDomain: "jego-35a2b.firebaseapp.com",
        databaseURL: "https://jego-35a2b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "jego-35a2b",
        storageBucket: "jego-35a2b.firebasestorage.app",
        messagingSenderId: "600037007040",
        appId: "1:600037007040:web:ac3243ad9b472647ffd725"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    // OneSignal hardcoded
    const ONESIGNAL_APP_ID = "3357d683-8f6b-4558-9d42-2eeceed6204a";
    const ONESIGNAL_API_KEY = "os_v2_app_gnl5na4pnncvrhkcf3wo5vrajlyzbbkbd2ouib4e7qya7iffkeyllqumonqwxcmhrfzxm6pvcc5cbuk72rohuo6o7e6mk7x3mj6j4gy";

    let currentSelectedDriver = null;
    let ordersListener = null;
    const processedOrderIds = new Set();

    function addLog(msg, type = "info") {
        const logDiv = document.getElementById("logContainer");
        const entry = document.createElement("div");
        entry.className = `log-entry log-${type}`;
        const time = new Date().toLocaleTimeString();
        entry.textContent = `[${time}] ${msg}`;
        logDiv.appendChild(entry);
        entry.scrollIntoView({ behavior: "smooth", block: "nearest" });
        while (logDiv.children.length > 500) logDiv.removeChild(logDiv.firstChild);
    }

    function formatRupiah(amount) {
        return 'Rp ' + (amount || 0).toLocaleString('id-ID');
    }

    // ================= MANAJEMEN SALDO =================
    async function cariDriver() {
        const keyword = document.getElementById("searchDriver").value.trim();
        if (!keyword) {
            addLog("Masukkan nama atau UID driver.", "warning");
            return;
        }
        addLog(`Mencari driver dengan kata kunci: ${keyword}`, "info");
        try {
            const snapshot = await database.ref("drivers").once("value");
            const drivers = snapshot.val();
            if (!drivers) {
                document.getElementById("driverNotFound").style.display = "block";
                document.getElementById("driverInfo").style.display = "none";
                addLog("Tidak ada data driver.", "warning");
                return;
            }
            let found = null;
            for (const uid in drivers) {
                const d = drivers[uid];
                if (uid === keyword || (d.name && d.name.toLowerCase().includes(keyword.toLowerCase()))) {
                    found = { uid, name: d.name || "Tanpa nama", balance: d.balance || 0 };
                    break;
                }
            }
            if (found) {
                currentSelectedDriver = found;
                document.getElementById("driverUid").innerText = found.uid;
                document.getElementById("driverName").innerText = found.name;
                document.getElementById("driverBalance").innerHTML = formatRupiah(found.balance);
                document.getElementById("driverInfo").style.display = "block";
                document.getElementById("driverNotFound").style.display = "none";
                addLog(`Driver ditemukan: ${found.name} (${found.uid})`, "success");
            } else {
                document.getElementById("driverNotFound").style.display = "block";
                document.getElementById("driverInfo").style.display = "none";
                addLog(`Driver dengan keyword "${keyword}" tidak ditemukan.`, "warning");
            }
        } catch(e) {
            addLog(`Error mencari driver: ${e.message}`, "error");
        }
    }

    async function kurangiSaldo() {
        if (!currentSelectedDriver) {
            addLog("Pilih driver terlebih dahulu.", "error");
            return;
        }
        const nominal = parseInt(document.getElementById("kurangiNominal").value);
        if (isNaN(nominal) || nominal <= 0) {
            addLog("Nominal tidak valid.", "error");
            return;
        }
        const uid = currentSelectedDriver.uid;
        const balanceRef = database.ref(`drivers/${uid}/balance`);
        try {
            const snapshot = await balanceRef.once("value");
            let currentBalance = snapshot.val() || 0;
            if (currentBalance < nominal) {
                addLog(`Saldo tidak cukup: ${formatRupiah(currentBalance)}`, "error");
                return;
            }
            const newBalance = currentBalance - nominal;
            await balanceRef.set(newBalance);
            addLog(`✅ Saldo ${currentSelectedDriver.name} (${uid}) berkurang ${formatRupiah(nominal)}. Sisa: ${formatRupiah(newBalance)}`, "success");
            currentSelectedDriver.balance = newBalance;
            document.getElementById("driverBalance").innerHTML = formatRupiah(newBalance);
            document.getElementById("kurangiNominal").value = "5000";
        } catch(e) {
            addLog(`Gagal mengurangi saldo: ${e.message}`, "error");
        }
    }

    // ========== NOTIFIKASI PUSH ==========
    async function loadDrivers() {
        try {
            const snapshot = await database.ref("driver_locations").once("value");
            const allDrivers = snapshot.val();
            if (!allDrivers) return {};
            const filtered = {};
            for (const uid in allDrivers) {
                const d = allDrivers[uid];
                if (d.tracking_enabled === true && d.playerId && d.latitude && d.longitude) {
                    filtered[uid] = {
                        playerId: d.playerId,
                        latitude: d.latitude,
                        longitude: d.longitude,
                        name: d.fullName || `Driver ${uid.substring(0,6)}`
                    };
                }
            }
            addLog(`Driver online (dengan data lengkap): ${Object.keys(filtered).length}`, "info");
            return filtered;
        } catch(e) {
            addLog(`Gagal load driver_locations: ${e.message}`, "error");
            return {};
        }
    }

    async function sendPushNotification(playerId, title, message, orderId = null) {
        if (!playerId) return false;
        try {
            const response = await fetch("https://onesignal.com/api/v1/notifications", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Basic ${ONESIGNAL_API_KEY}`
                },
                body: JSON.stringify({
                    app_id: ONESIGNAL_APP_ID,
                    include_player_ids: [playerId],
                    headings: { en: title },
                    contents: { en: message },
                    data: { orderId: orderId, type: "new_order" }
                })
            });
            const result = await response.json();
            if (result.errors) {
                addLog(`Gagal notif: ${JSON.stringify(result.errors)}`, "error");
                return false;
            } else {
                addLog(`✅ Notifikasi terkirim ke ${playerId.substring(0,8)}...`, "success");
                return true;
            }
        } catch(err) {
            addLog(`Error API: ${err.message}`, "error");
            return false;
        }
    }

    async function testNotification() {
        const drivers = await loadDrivers();
        const driverIds = Object.keys(drivers);
        if (driverIds.length === 0) {
            addLog("Tidak ada driver online untuk test.", "error");
            return;
        }
        const first = drivers[driverIds[0]];
        await sendPushNotification(first.playerId, "🧪 Test Notifikasi JeGo", "Ini notifikasi uji coba dari admin panel.");
    }

    // ========== LISTENER ORDER OTOMATIS ==========
    function getDistance(lat1, lon1, lat2, lon2) {
        if (!lat1 || !lon1 || !lat2 || !lon2) return Infinity;
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    async function processNewOrder(orderId, orderData) {
        if (processedOrderIds.has(orderId)) return;
        if (orderData.status !== "waiting" && orderData.status !== "searching") return;
        const lat = orderData.pickup_lat || orderData.from_lat;
        const lng = orderData.pickup_lng || orderData.from_lng;
        if (!lat || !lng) return;
        addLog(`📦 Order baru: ${orderId} | pickup (${lat}, ${lng})`, "info");
        const drivers = await loadDrivers();
        let count = 0;
        for (const driverId in drivers) {
            const d = drivers[driverId];
            const dist = getDistance(lat, lng, d.latitude, d.longitude);
            if (dist < 3) {
                const customerName = orderData.customer_name || "Customer";
                const vehicle = (orderData.transport_type || "transportasi").includes("kurir") ? "Kurir" : "Transportasi";
                const harga = orderData.price || 0;
                const title = "🚖 Order Baru Dekat Anda!";
                const message = `${customerName} memesan ${vehicle}\nJarak: ${dist.toFixed(1)} km\nHarga: Rp ${harga.toLocaleString()}`;
                await sendPushNotification(d.playerId, title, message, orderId);
                count++;
            }
        }
        if (count > 0) addLog(`✅ Order ${orderId}: notif ke ${count} driver (radius <3 km)`, "success");
        else addLog(`⚠️ Order ${orderId}: tidak ada driver dalam radius 3 km`, "warning");
        processedOrderIds.add(orderId);
    }

    function startListeningOrders() {
        if (ordersListener) return;
        const ordersRef = database.ref("orders");
        ordersRef.on("child_added", async (snapshot) => {
            await processNewOrder(snapshot.key, snapshot.val());
        });
        ordersListener = true;
        addLog("👂 Listener order aktif (child_added).", "success");
        document.getElementById("statusText").innerText = "Listening order & siap kurangi saldo";
    }

    // ================= AUTH STATE =================
    function initAdminPanel() {
        document.getElementById("cariDriverBtn").onclick = cariDriver;
        document.getElementById("kurangiSaldoBtn").onclick = kurangiSaldo;
        document.getElementById("clearLogBtn").onclick = () => {
            document.getElementById("logContainer").innerHTML = '<div class="log-entry log-info">▶️ Log dibersihkan</div>';
            addLog("Log dihapus manual", "info");
        };
        document.getElementById("testNotifBtn").onclick = testNotification;
        document.getElementById("logoutBtn").onclick = async () => {
            await auth.signOut();
            window.location.href = 'login_admin.html';
        };
        startListeningOrders();
        document.getElementById("firebaseStatus").innerText = "✅ Terhubung";
        addLog("Firebase terhubung, admin panel siap.", "success");
    }

    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            window.location.href = 'login_admin.html';
            return;
        }
        try {
            const adminSnap = await database.ref(`admins/${user.uid}`).once('value');
            if (!adminSnap.exists()) {
                addLog("Akun Anda tidak terdaftar sebagai admin. Logout.", "error");
                await auth.signOut();
                window.location.href = 'login_admin.html';
                return;
            }
            addLog(`Admin ${user.email} berhasil login.`, "success");
            initAdminPanel();
        } catch (err) {
            addLog(`Error verifikasi admin: ${err.message}`, "error");
            await auth.signOut();
            window.location.href = 'login_admin.html';
        }
    });
</script>
</body>
</html>
