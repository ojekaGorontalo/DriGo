<script>
// ================================================================
// KONFIGURASI FIREBASE
// ================================================================
const firebaseConfig = {
    apiKey: "AIzaSyCD0pgeZio-LdKqYDtWxcdXcZwyL4ngYQI",
    authDomain: "jego-35a2b.firebaseapp.com",
    databaseURL: "https://jego-35a2b-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "jego-35a2b",
    storageBucket: "jego-35a2b.firebasestorage.app",
    messagingSenderId: "600037007040",
    appId: "1:600037007040:web:ac3243ad9b472647ffd725"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ================================================================
// VARIABEL GLOBAL
// ================================================================
let currentDriverUid = null;
let driverDataCache = null;           // untuk caching data driver
let feePersen = 0, pajakPersen = 0;
let feeCacheTime = 0;
const FEE_CACHE_TTL = 60000; // 1 menit

// Untuk notifikasi & auto-bid
let lastNotifiedOrderIds = new Set();
let isWaitingConfirmation = false;
let driverLocation = { lat: null, lng: null };
let autobidEnabled = false;
const STORAGE_AUTOBID = 'jego_autobid_enabled';
let countdownInterval = null;
let currentOrderId = null;
let ordersListenerRef = null;         // untuk melepas listener child_added
let driverBalanceListener = null;
let driverRatingListener = null;
let driverOrdersListener = null;

// Throttle GPS
let gpsWatchId = null;
let lastGpsUpdate = 0;
const GPS_THROTTLE_MS = 5000; // update setiap 5 detik

// ================================================================
// FUNGSI UTILITY
// ================================================================
function formatRupiah(amount) {
    return 'Rp ' + (parseInt(amount) || 0).toLocaleString('id-ID');
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
}

function calculateDistance(lat1, lon1, lat2, lon2) {
    if (!lat1 || !lon1 || !lat2 || !lon2) return null;
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

function isVehicleTypeMatch(driverType, orderType) {
    if (!driverType || !orderType) return false;
    driverType = driverType.toLowerCase();
    orderType = orderType.toLowerCase();
    if (driverType === orderType) return true;
    if (orderType.includes('kurir')) {
        if (driverType === 'motor' && orderType === 'kurir_motor') return true;
        if (driverType === 'bentor' && orderType === 'kurir_bentor') return true;
    }
    return false;
}

function showToast(msg, type = 'info') {
    const existing = document.querySelector('.toast-notification');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = `toast-notification ${type}`;
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
}

// ================================================================
// CACHE POTONGAN (FEE & PAJAK) - Hanya baca sekali setiap 1 menit
// ================================================================
async function getFeeSettings() {
    const now = Date.now();
    if (feeCacheTime && (now - feeCacheTime) < FEE_CACHE_TTL) {
        return { feePersen, pajakPersen };
    }
    try {
        const [potonganSnap, pajakSnap] = await Promise.all([
            db.ref('data-jego/potongan').once('value'),
            db.ref('data-jego/pajak').once('value')
        ]);
        feePersen = parseFloat(potonganSnap.val()) || 0;
        pajakPersen = parseFloat(pajakSnap.val()) || 0;
        feeCacheTime = now;
    } catch(e) { console.warn('Gagal ambil potongan:', e); }
    return { feePersen, pajakPersen };
}

async function hitungPotongan(harga) {
    await getFeeSettings();
    const potonganRupiah = harga * (feePersen / 100);
    const pajakRupiah = potonganRupiah * (pajakPersen / 100);
    return { total: potonganRupiah + pajakRupiah, feePersen, pajakPersen };
}

// ================================================================
// AMBIL DATA DRIVER DENGAN CACHE
// ================================================================
async function getDriverData(uid) {
    if (driverDataCache) return driverDataCache;
    const snap = await db.ref(`drivers/${uid}`).once('value');
    const data = snap.val();
    if (data) {
        driverDataCache = {
            uid,
            fullName: data.fullName || data.name || 'Driver',
            plateNumber: data.plateNumber || '',
            vehicleType: data.vehicleType || 'motor',
            rating: data.rating || 0,
            perjalanan: data.perjalanan || 0,
            profilePhotoUrl: data.profilePhotoUrl || data.fotoProfilURL || '',
            balance: data.balance || 0
        };
    }
    return driverDataCache;
}

// ================================================================
// RENDER UI UTAMA (HANYA SAAT PERUBAHAN PENTING)
// ================================================================
async function renderMainContent() {
    if (!currentDriverUid) return;
    const driver = await getDriverData(currentDriverUid);
    if (!driver) {
        document.getElementById('mainContent').innerHTML = '<div class="stats-card loading-container"><p>Gagal memuat data.</p></div>';
        return;
    }

    // ===== HEMAT BANDWIDTH: Ambil langsung dari daily_earnings (tidak query orders) =====
    const today = new Date().toISOString().split('T')[0];
    const dailySnap = await db.ref(`drivers/${currentDriverUid}/daily_earnings/${today}`).once('value');
    const totalGross = dailySnap.val() || 0;

    // Ambil jumlah order selesai hari ini dari driver_earnings_history (hanya hitung jumlah, tanpa ambil semua data)
    let completedCount = 0;
    try {
        const historySnap = await db.ref(`driver_earnings_history/${currentDriverUid}`).once('value');
        const history = historySnap.val() || {};
        for (let key in history) {
            const entry = history[key];
            if (entry.completed_at && entry.completed_at.split('T')[0] === today) {
                completedCount++;
            }
        }
    } catch(e) { console.warn('Gagal hitung jumlah order hari ini:', e); }

    const rating = driver.rating || 0;
    const balance = driver.balance || 0;
    let priority = 'Basic';
    if (rating >= 4.5) priority = 'Essential';
    else if (rating >= 4.0) priority = 'Regular';
    else if (rating >= 3.0) priority = 'Standard';

    const iconMap = {
        'Essential': '<i class="fas fa-crown" style="color:#FFD700;"></i>',
        'Regular': '<i class="fas fa-check-circle" style="color:#4CAF50;"></i>',
        'Standard': '<i class="fas fa-car" style="color:#2196F3;"></i>',
        'Basic': '<i class="fas fa-shield-alt" style="color:#9E9E9E;"></i>'
    };

    const html = `
        <div class="stats-card rating-card" id="ratingCard">
            <div class="priority-area">
                <div class="priority-label">
                    <div class="priority-icon">${iconMap[priority] || iconMap.Basic}</div>
                    <div class="priority-text">
                        <div class="priority-sub">Prioritas</div>
                        <div class="priority-name ${priority === 'Essential' ? 'essential' : ''}">${priority}</div>
                    </div>
                </div>
                <div class="priority-info-icon" id="priorityInfoIcon">
                    <i class="fas fa-question-circle"></i>
                </div>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <div class="stats-title">⭐ Rating Driver</div>
                    <div class="stats-value">${rating.toFixed(1)} / 5.0</div>
                    <div id="ratingStars" class="rating-stars"></div>
                </div>
                <div class="arrow-right"><i class="fas fa-chevron-right"></i></div>
            </div>
        </div>
        <div class="stats-card clickable-card" id="earningsCard">
            <div>
                <div class="stats-title">📅 Pendapatan Hari Ini</div>
                <div class="stats-value">${formatRupiah(totalGross)}</div>
                <div class="stats-sub">${completedCount} order selesai</div>
            </div>
            <div class="arrow-right"><i class="fas fa-chevron-right"></i></div>
        </div>
        <div class="stats-card">
            <div class="stats-title">💰 Saldo Dompet</div>
            <div class="balance-row">
                <div class="balance-left">
                    <div class="stats-value">${formatRupiah(balance)}</div>
                </div>
                <button class="btn-topup" id="topupBtn"><i class="fas fa-plus-circle"></i> Top Up</button>
            </div>
        </div>
    `;

    const container = document.getElementById('mainContent');
    container.innerHTML = html;

    // Render bintang
    const starsContainer = document.getElementById('ratingStars');
    if (starsContainer) {
        starsContainer.innerHTML = '';
        const fullStars = Math.floor(rating);
        const halfStar = (rating % 1) >= 0.5;
        for (let i=1; i<=5; i++) {
            const star = document.createElement('span');
            star.className = 'star';
            if (i <= fullStars) star.classList.add('active');
            else if (halfStar && i === fullStars+1) star.classList.add('active');
            star.innerHTML = '★';
            starsContainer.appendChild(star);
        }
    }

    // Event listeners
    document.getElementById('ratingCard')?.addEventListener('click', (e) => {
        if (e.target.closest('#priorityInfoIcon')) return;
        window.location.href = 'penilaianLayanan.html';
    });
    document.getElementById('priorityInfoIcon')?.addEventListener('click', (e) => {
        e.stopPropagation();
        window.location.href = 'penjelasan_prioritas.html';
    });
    document.getElementById('earningsCard')?.addEventListener('click', () => {
        window.location.href = 'pendapatan.html';
    });
    document.getElementById('topupBtn')?.addEventListener('click', () => {
        window.location.href = 'payment.html';
    });
}

// ================================================================
// LISTENER OPTIMASI: HANYA DENGARKAN PERUBAHAN RATING & BALANCE
// ================================================================
function setupOptimizedListeners(uid) {
    if (driverBalanceListener) { driverBalanceListener.off(); driverBalanceListener = null; }
    if (driverRatingListener) { driverRatingListener.off(); driverRatingListener = null; }

    driverBalanceListener = db.ref(`drivers/${uid}/balance`).on('value', (snap) => {
        if (driverDataCache) {
            driverDataCache.balance = snap.val() || 0;
            renderMainContent();
        }
    });

    driverRatingListener = db.ref(`drivers/${uid}/rating`).on('value', (snap) => {
        if (driverDataCache) {
            driverDataCache.rating = snap.val() || 0;
            renderMainContent();
        }
    });
}

// ================================================================
// LISTENER ORDER DRIVER (UNTUK UPDATE STATUS ORDER)
// ================================================================
function setupDriverOrdersListener(uid) {
    if (driverOrdersListener) { driverOrdersListener.off(); driverOrdersListener = null; }
    driverOrdersListener = db.ref('orders')
        .orderByChild('driver_id')
        .equalTo(uid)
        .limitToLast(20)
        .on('child_changed', (snap) => {
            renderMainContent();
        });
}

// ================================================================
// SISTEM NOTIFIKASI ORDER (OPTIMASI: child_added dengan filter)
// ================================================================
function startListeningOrders(uid) {
    if (ordersListenerRef) { ordersListenerRef.off(); ordersListenerRef = null; }
    ordersListenerRef = db.ref('orders').on('child_added', async (snap) => {
        const order = snap.val();
        const orderId = snap.key;
        if (!order || order.status !== 'waiting') return;
        if (lastNotifiedOrderIds.has(orderId)) return;
        if (isWaitingConfirmation) return;

        const driver = driverDataCache;
        if (!driver) return;
        if (!driverLocation.lat || !driverLocation.lng) return;

        const dist = calculateDistance(driverLocation.lat, driverLocation.lng, order.pickup_lat, order.pickup_lng);
        if (dist === null || dist > 3) return;

        if (!isVehicleTypeMatch(driver.vehicleType, order.transport_type || order.vehicle || 'motor')) return;

        const activeCheck = await checkDriverActiveOrder(uid);
        if (activeCheck) return;

        lastNotifiedOrderIds.add(orderId);
        currentOrderId = orderId;

        if (autobidEnabled && !(order.transport_type || '').toLowerCase().includes('kurir')) {
            const success = await sendOffer(orderId, order, true);
            if (success) {
                createNotifCard(order, dist, true);
            }
        } else {
            createNotifCard(order, dist, false);
        }
    });
}

async function checkDriverActiveOrder(uid) {
    const snap = await db.ref('orders')
        .orderByChild('driver_id')
        .equalTo(uid)
        .limitToLast(5)
        .once('value');
    const orders = snap.val() || {};
    const activeStatuses = ['accepted','on_the_way','arrived','on_trip'];
    for (let id in orders) {
        if (activeStatuses.includes(orders[id].status)) return true;
    }
    return false;
}

// ================================================================
// KIRIM PENAWARAN
// ================================================================
async function sendOffer(orderId, orderData, isAuto = false) {
    if (isWaitingConfirmation) {
        if (!isAuto) showToast('Sedang memproses order lain', 'warning');
        return false;
    }
    const driver = driverDataCache;
    if (!driver) return false;

    const snapBal = await db.ref(`drivers/${driver.uid}/balance`).once('value');
    const freshBalance = snapBal.val() || 0;
    const potongan = await hitungPotongan(orderData.price || 0);
    if (freshBalance < potongan.total) {
        showToast(`Saldo tidak cukup (Rp ${freshBalance.toLocaleString()}). Top up dulu.`, 'warning');
        return false;
    }

    const orderCheck = await db.ref(`orders/${orderId}`).once('value');
    if (!orderCheck.exists() || orderCheck.val().status !== 'waiting') {
        showToast('Order sudah tidak tersedia', 'warning');
        removeNotifCard();
        return false;
    }

    const offerData = {
        driver_id: driver.uid,
        driver_name: driver.fullName,
        driver_plate: driver.plateNumber,
        driver_type: driver.vehicleType,
        driver_rating: driver.rating || 5,
        driver_trips: driver.perjalanan || 0,
        driver_photo: driver.profilePhotoUrl || '',
        offered_at: new Date().toISOString(),
        status: 'offered',
        bid_price: orderData.price,
        bid_percent: 0,
        bid_requested: true,
        expired_at: Date.now() + 30000
    };

    try {
        await db.ref(`orders/${orderId}/driver_offers/${driver.uid}`).set(offerData);
        if (!isAuto) showToast('Penawaran terkirim, menunggu konfirmasi...', 'info');
        startCountdown(orderId, driver.uid, orderData);
        return true;
    } catch(err) {
        showToast('Gagal kirim penawaran: ' + err.message, 'error');
        return false;
    }
}

// ================================================================
// COUNTDOWN + LISTENER KONFIRMASI
// ================================================================
function startCountdown(orderId, driverId, orderData) {
    isWaitingConfirmation = true;
    let timeLeft = 30;
    const notifCard = document.querySelector('.order-notif-card');
    if (notifCard) {
        const progressFill = notifCard.querySelector('.progress-fill');
        const countdownSpan = notifCard.querySelector('.countdown-text span');
        const ambilBtn = notifCard.querySelector('.notif-ambil-btn');
        if (ambilBtn) ambilBtn.disabled = true;
        if (countdownInterval) clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            timeLeft--;
            if (progressFill) progressFill.style.width = (timeLeft/30)*100 + '%';
            if (countdownSpan) countdownSpan.innerText = timeLeft + ' detik';
            if (timeLeft <= 0) {
                clearInterval(countdownInterval);
                countdownInterval = null;
                db.ref(`orders/${orderId}/driver_offers/${driverId}`).remove().then(() => {
                    showToast('Waktu habis, penawaran dibatalkan', 'warning');
                    removeNotifCard();
                    isWaitingConfirmation = false;
                }).catch(() => removeNotifCard());
            }
        }, 1000);
    } else {
        if (countdownInterval) clearInterval(countdownInterval);
        countdownInterval = setInterval(async () => {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(countdownInterval);
                countdownInterval = null;
                await db.ref(`orders/${orderId}/driver_offers/${driverId}`).remove();
                isWaitingConfirmation = false;
                showToast('Waktu habis, penawaran dibatalkan', 'warning');
            }
        }, 1000);
    }

    const orderListener = db.ref(`orders/${orderId}`).on('value', (snap) => {
        const order = snap.val();
        if (!order) return;
        if (order.status === 'accepted' && order.driver_id === driverId) {
            clearInterval(countdownInterval);
            db.ref(`orders/${orderId}`).off('value', orderListener);
            showToast('✅ Customer menerima penawaran! Mengalihkan...', 'success');
            localStorage.setItem('jego_driver_active_order', orderId);
            setTimeout(() => {
                window.location.href = 'orderAccepted.html?id=' + orderId;
            }, 1000);
        } else if (order.status !== 'waiting') {
            clearInterval(countdownInterval);
            db.ref(`orders/${orderId}`).off('value', orderListener);
            removeNotifCard();
            isWaitingConfirmation = false;
            showToast('Order sudah tidak tersedia', 'warning');
        }
    });

    const rejectListener = db.ref(`orders/${orderId}/driver_offers/${driverId}/status`).on('value', (snap) => {
        if (snap.val() === 'rejected') {
            clearInterval(countdownInterval);
            db.ref(`orders/${orderId}`).off('value', orderListener);
            db.ref(`orders/${orderId}/driver_offers/${driverId}/status`).off('value', rejectListener);
            removeNotifCard();
            isWaitingConfirmation = false;
            showToast('Customer menolak penawaran Anda', 'warning');
        }
    });
}

function removeNotifCard() {
    const card = document.querySelector('.order-notif-card');
    if (card) card.remove();
    if (countdownInterval) clearInterval(countdownInterval);
    isWaitingConfirmation = false;
    currentOrderId = null;
}

// ================================================================
// NOTIFIKASI CARD
// ================================================================
function createNotifCard(order, dist, isAutoSent) {
    removeNotifCard();
    const card = document.createElement('div');
    card.className = 'order-notif-card';
    card.innerHTML = `
        <div class="notif-header">
            <span>🚖 Order Baru</span>
            <button class="notif-close">&times;</button>
        </div>
        <div class="notif-body">
            <div class="notif-customer">
                <img src="${order.photoURL || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'">
                <div class="notif-info">
                    <h4>${escapeHtml(order.customer_name || 'Customer')}</h4>
                    <small>⭐ ${(order.passenger_rating || 0).toFixed(1)}</small>
                </div>
            </div>
            <div class="notif-detail">
                <p><strong>📍 Jemput:</strong> ${escapeHtml(order.pickup_address || '-')}</p>
                <p><strong>🏁 Tujuan:</strong> ${escapeHtml(order.destination_address || '-')}</p>
                <p><strong>💰 Harga:</strong> Rp ${(order.price || 0).toLocaleString()}</p>
                <p><strong>📏 Jarak driver:</strong> ${dist.toFixed(1)} km</p>
            </div>
            <div class="notif-progress" style="display: ${isAutoSent ? 'block' : 'none'};">
                <div class="progress-bar-custom"><div class="progress-fill" style="width:100%"></div></div>
                <div class="countdown-text">⏳ <span>30 detik</span></div>
            </div>
            <div class="notif-actions" style="display: ${isAutoSent ? 'none' : 'flex'};">
                <button class="notif-ambil-btn">Ambil Order</button>
            </div>
        </div>
    `;
    document.body.appendChild(card);
    card.querySelector('.notif-close').onclick = () => removeNotifCard();
    if (!isAutoSent) {
        const ambilBtn = card.querySelector('.notif-ambil-btn');
        ambilBtn.onclick = async () => {
            if (isWaitingConfirmation) {
                showToast('Sedang memproses order lain', 'warning');
                return;
            }
            ambilBtn.disabled = true;
            ambilBtn.innerText = 'Mengirim...';
            const success = await sendOffer(order.id, order, false);
            if (!success) {
                ambilBtn.disabled = false;
                ambilBtn.innerText = 'Ambil Order';
            } else {
                card.querySelector('.notif-progress').style.display = 'block';
                ambilBtn.style.display = 'none';
            }
        };
    }
}

// ================================================================
// GEOLOKASI DENGAN THROTTLE
// ================================================================
function initGPS() {
    if (!navigator.geolocation) return;
    if (gpsWatchId) return;
    gpsWatchId = navigator.geolocation.watchPosition(
        (pos) => {
            const now = Date.now();
            if (now - lastGpsUpdate < GPS_THROTTLE_MS) return;
            lastGpsUpdate = now;
            driverLocation.lat = pos.coords.latitude;
            driverLocation.lng = pos.coords.longitude;
        },
        (err) => console.warn('GPS error:', err),
        { enableHighAccuracy: false, timeout: 15000, maximumAge: 30000 }
    );
}

// ================================================================
// SETTINGS MODAL
// ================================================================
function loadSettings() {
    document.getElementById('tripSoundToggle').checked = localStorage.getItem('jego_trip_sound') === 'true';
    document.getElementById('requestChainToggle').checked = localStorage.getItem('jego_request_chain') === 'true';
    document.getElementById('shortcutToggle').checked = localStorage.getItem('jego_shortcut') === 'true';
    const theme = localStorage.getItem('jego_driver_theme');
    if (theme === 'dark') document.querySelector('input[name="darkMode"][value="dark"]').checked = true;
    else document.querySelector('input[name="darkMode"][value="light"]').checked = true;
}

function initSettingsListeners() {
    document.getElementById('tripSoundToggle').addEventListener('change', (e) => localStorage.setItem('jego_trip_sound', e.target.checked));
    document.getElementById('requestChainToggle').addEventListener('change', (e) => localStorage.setItem('jego_request_chain', e.target.checked));
    document.getElementById('shortcutToggle').addEventListener('change', (e) => localStorage.setItem('jego_shortcut', e.target.checked));
    document.querySelectorAll('input[name="darkMode"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            if (e.target.checked) {
                const theme = e.target.value;
                localStorage.setItem('jego_driver_theme', theme);
                document.body.classList.toggle('dark-mode', theme === 'dark');
            }
        });
    });
}

const modalSettings = document.getElementById('settingsModal');
document.getElementById('settingsBtn').onclick = () => { loadSettings(); modalSettings.classList.add('active'); };
document.getElementById('closeModalBtn').onclick = () => modalSettings.classList.remove('active');
modalSettings.addEventListener('click', (e) => { if (e.target === modalSettings) modalSettings.classList.remove('active'); });

// ================================================================
// VISIBILITY API - HENTIKAN LISTENER SAAT HILANG
// ================================================================
document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
        if (driverBalanceListener) { driverBalanceListener.off(); driverBalanceListener = null; }
        if (driverRatingListener) { driverRatingListener.off(); driverRatingListener = null; }
        if (driverOrdersListener) { driverOrdersListener.off(); driverOrdersListener = null; }
        if (ordersListenerRef) { ordersListenerRef.off(); ordersListenerRef = null; }
        if (gpsWatchId) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
    } else {
        if (currentDriverUid) {
            setupOptimizedListeners(currentDriverUid);
            setupDriverOrdersListener(currentDriverUid);
            startListeningOrders(currentDriverUid);
            initGPS();
        }
    }
});

// ================================================================
// AUTH DAN INISIALISASI
// ================================================================
auth.onAuthStateChanged(async (user) => {
    if (!user) {
        window.location.href = 'loginDriver.html';
        return;
    }
    const snap = await db.ref(`drivers/${user.uid}`).once('value');
    if (!snap.exists()) {
        await auth.signOut();
        window.location.href = 'loginDriver.html';
        return;
    }
    currentDriverUid = user.uid;
    await getDriverData(currentDriverUid);

    const autobidSnap = await db.ref(`drivers/${currentDriverUid}/autobid_enabled`).once('value');
    autobidEnabled = autobidSnap.exists() ? autobidSnap.val() === true : false;
    localStorage.setItem(STORAGE_AUTOBID, autobidEnabled);

    await renderMainContent();

    setupOptimizedListeners(currentDriverUid);
    setupDriverOrdersListener(currentDriverUid);
    startListeningOrders(currentDriverUid);
    initGPS();

    initSettingsListeners();
    loadSettings();
});

// ================================================================
// CLEANUP
// ================================================================
window.addEventListener('beforeunload', () => {
    if (driverBalanceListener) driverBalanceListener.off();
    if (driverRatingListener) driverRatingListener.off();
    if (driverOrdersListener) driverOrdersListener.off();
    if (ordersListenerRef) ordersListenerRef.off();
    if (gpsWatchId) navigator.geolocation.clearWatch(gpsWatchId);
    if (countdownInterval) clearInterval(countdownInterval);
});
</script>
