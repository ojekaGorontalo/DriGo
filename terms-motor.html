<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketentuan JeGo Motor</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
            margin: 20px auto;
            max-width: 900px;
            padding: 0 20px;
        }
        hr { margin: 24px 0; }
    </style>
</head>
<body>
<div id="dynamic-content">
    <p>⏳ Memuat dokumen dari database...</p>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCD0pgeZio-LdKqYDtWxcdXcZwyL4ngYQI",
        authDomain: "jego-35a2b.firebaseapp.com",
        databaseURL: "https://jego-35a2b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "jego-35a2b",
        storageBucket: "jego-35a2b.firebasestorage.app",
        messagingSenderId: "600037007040",
        appId: "1:600037007040:web:ac3243ad9b472647ffd725"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const termsRef = database.ref('legal/terms_motor');

    const container = document.getElementById('dynamic-content');

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderContent(data) {
        if (!data) {
            container.innerHTML = '<p>Dokumen tidak tersedia.</p>';
            return;
        }
        const pageTitle = data.pageTitle || 'Ketentuan JeGo Motor';
        const mainTitle = data.mainTitle || 'Ketentuan Penggunaan JeGo Motor (Transportasi)';
        const lastUpdated = data.lastUpdated || 'Diperbarui terakhir: -';
        const copyright = data.copyright || '© JeGo Team. Hak cipta dilindungi undang-undang.';
        const htmlContent = data.htmlContent || '<p>Konten belum tersedia.</p>';

        const fullHtml = `
            <h1>${escapeHtml(pageTitle)}</h1>
            <p><strong>${escapeHtml(mainTitle)}</strong></p>
            <p><em>${escapeHtml(lastUpdated)}</em></p>
            <hr>
            <div>${htmlContent}</div>
            <hr>
            <p style="font-size:0.85em;">${escapeHtml(copyright)}</p>
        `;
        container.innerHTML = fullHtml;
    }

    termsRef.on('value', (snapshot) => {
        renderContent(snapshot.val());
    }, (error) => {
        console.error(error);
        container.innerHTML = '<p>❌ Gagal memuat dokumen. Periksa konfigurasi Firebase.</p>';
    });
</script>
</body>
</html>
