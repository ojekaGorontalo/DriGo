<script>
    // ==================== KONFIGURASI ====================
    const firebaseConfig = {
        apiKey: "AIzaSyCD0pgeZio-LdKqYDtWxcdXcZwyL4ngYQI",
        authDomain: "jego-35a2b.firebaseapp.com",
        databaseURL: "https://jego-35a2b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "jego-35a2b",
        storageBucket: "jego-35a2b.firebasestorage.app",
        messagingSenderId: "600037007040",
        appId: "1:600037007040:web:ac3243ad9b472647ffd725"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    // OneSignal
    const ONESIGNAL_APP_ID = "3357d683-8f6b-4558-9d42-2eeceed6204a";
    let ONESIGNAL_API_KEY = "";

    let allDrivers = {};
    let allWaitingOrders = {};
    let ordersListener = false;
    const processedOrderIds = new Set();
    const fallbackTimers = new Map();
    const fallbackProcessed = new Set();
    const processedDeductionOrders = new Set();
    const FALLBACK_DELAY_SECONDS = 20;
    let currentView = 'dashboard';

    function addLog(msg, type = "info") {
        const logDiv = document.getElementById("logMessages");
        if (!logDiv) return;
        const entry = document.createElement("div");
        entry.className = "log-entry";
        const time = new Date().toLocaleTimeString();
        let color = "#66aaff";
        if (type === "success") color = "#66ff66";
        if (type === "error") color = "#ff6666";
        if (type === "warning") color = "#ffaa66";
        entry.style.color = color;
        entry.textContent = `[${time}] ${msg}`;
        logDiv.appendChild(entry);
        entry.scrollIntoView({ behavior: "smooth", block: "nearest" });
        while (logDiv.children.length > 200) logDiv.removeChild(logDiv.firstChild);
    }

    // ========== API Key & Notifikasi ==========
    async function fetchOneSignalApiKey() {
        try {
            const snap = await database.ref('data-jego/PushKey').once('value');
            const key = snap.val();
            if (key) {
                ONESIGNAL_API_KEY = key;
                addLog("🔑 OneSignal API Key loaded", "success");
                return true;
            } else {
                addLog("⚠️ PushKey tidak ditemukan", "error");
                return false;
            }
        } catch(e) {
            addLog(`❌ Gagal memuat PushKey: ${e.message}`, "error");
            return false;
        }
    }

    async function sendPushNotification(playerId, title, message, extraData = {}) {
        if (!playerId || !ONESIGNAL_API_KEY) return false;
        try {
            const res = await fetch("https://onesignal.com/api/v1/notifications", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Basic ${ONESIGNAL_API_KEY}`
                },
                body: JSON.stringify({
                    app_id: ONESIGNAL_APP_ID,
                    include_player_ids: [playerId],
                    headings: { en: title },
                    contents: { en: message },
                    data: { type: "admin_broadcast", ...extraData },
                    priority: 10,
                    android_priority: "high",
                    android_channel_id: "14488f7c-4003-4699-b220-dee4451568df",
                    small_icon: "ic_stat_onesignal_default",
                    large_icon: "https://ojekaGorontalo.github.io/Logo/logo.png",
                    android_sound: "default",
                    android_vibration_pattern: [300, 500]
                })
            });
            const result = await res.json();
            if (result.errors) {
                addLog(`Gagal notif: ${JSON.stringify(result.errors)}`, "error");
                return false;
            } else {
                addLog(`✅ Notif terkirim ke ${playerId.substring(0,8)}...`, "success");
                return true;
            }
        } catch(err) {
            addLog(`Error API: ${err.message}`, "error");
            return false;
        }
    }

    // ========== FUNGSI JARAK ==========
    function getDistance(lat1, lon1, lat2, lon2) {
        if (!lat1 || !lon1 || !lat2 || !lon2) return Infinity;
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    // ========== CEK KESESUAIAN TIPE KENDARAAN ==========
    function isVehicleTypeMatch(driverType, orderType) {
        if (!driverType || !orderType) return false;
        driverType = driverType.toLowerCase();
        orderType = orderType.toLowerCase();
        if (driverType === orderType) return true;
        if (orderType.includes('kurir')) {
            if (driverType === 'motor' && orderType === 'kurir_motor') return true;
            if (driverType === 'bentor' && orderType === 'kurir_bentor') return true;
        }
        return false;
    }

    // ========== FUNGSI HITUNG TOTAL POTONGAN ==========
    async function hitungTotalPotongan(hargaOrder) {
        try {
            const potonganSnap = await database.ref('data-jego/potongan').once('value');
            const pajakSnap = await database.ref('data-jego/pajak').once('value');
            let feePersen = parseFloat(potonganSnap.val()) || 0;
            let pajakPersen = parseFloat(pajakSnap.val()) || 0;
            const potonganRupiah = hargaOrder * (feePersen / 100);
            const pajakRupiah = potonganRupiah * (pajakPersen / 100);
            return { total: potonganRupiah + pajakRupiah, feePersen, pajakPersen };
        } catch(e) {
            console.warn("Gagal ambil fee/pajak:", e);
            return { total: 0, feePersen: 0, pajakPersen: 0 };
        }
    }

    // ========== FUNGSI CEK ORDER KURIR ==========
    function isKurirOrder(orderData) {
        const tipe = orderData.transport_type || orderData.vehicle || '';
        return tipe.includes('kurir');
    }

    // ========== CEK JIKA DRIVER SEDANG MENUNGGU KONFIRMASI ==========
    async function isDriverWaitingForConfirmation(driverId) {
        const ordersSnap = await database.ref('orders').orderByChild('status').equalTo('waiting').once('value');
        const waitingOrders = ordersSnap.val() || {};
        for (let orderId in waitingOrders) {
            const order = waitingOrders[orderId];
            const offers = order.driver_offers || {};
            if (offers[driverId] && offers[driverId].status === 'offered') {
                return true;
            }
        }
        return false;
    }

    // ========== CEK JIKA DRIVER SEDANG MEMILIKI ORDER AKTIF ==========
    async function isDriverOnActiveOrder(driverId) {
        const activeStatuses = ['accepted', 'on_the_way', 'arrived', 'on_trip'];
        const ordersSnap = await database.ref('orders').once('value');
        const orders = ordersSnap.val() || {};
        for (let orderId in orders) {
            const order = orders[orderId];
            if (order.driver_id === driverId && activeStatuses.includes(order.status)) {
                return true;
            }
        }
        return false;
    }

    // ========== FUNGSI AMBIL DRIVER AKTIF ==========
    async function loadActiveDrivers() {
        const snap = await database.ref("driver_locations").once("value");
        const all = snap.val() || {};
        const activeDrivers = [];
        for (const uid in all) {
            const d = all[uid];
            if (d.tracking_enabled === true && d.playerId && d.latitude && d.longitude) {
                activeDrivers.push({
                    uid: uid,
                    playerId: d.playerId,
                    latitude: d.latitude,
                    longitude: d.longitude,
                    name: d.fullName || uid,
                    autobid_enabled: d.autobid_enabled === true
                });
            }
        }
        addLog(`Driver aktif (tracking ON): ${activeDrivers.length}`, "info");
        return activeDrivers;
    }

    // ========== FUNGSI AUTO FALLBACK ==========
    async function sendFallbackOffer(orderId, orderData) {
        if (isKurirOrder(orderData)) {
            addLog(`🚫 Fallback dibatalkan untuk order Kurir ${orderId.substring(0,8)}`, "warning");
            return false;
        }
        const orderSnap = await database.ref(`orders/${orderId}`).once('value');
        const order = orderSnap.val();
        if (!order || order.status !== 'waiting') return false;
        const offersSnap = await database.ref(`orders/${orderId}/driver_offers`).once('value');
        if (offersSnap.exists() && Object.keys(offersSnap.val()).length > 0) return false;
        const pickupLat = order.pickup_lat, pickupLng = order.pickup_lng;
        if (!pickupLat || !pickupLng) return false;

        const driversLoc = await database.ref("driver_locations").once('value');
        const allDrivers = driversLoc.val() || {};
        let eligibleDrivers = [];
        for (const [uid, data] of Object.entries(allDrivers)) {
            if (data.tracking_enabled !== true) continue;
            if (!data.latitude || !data.longitude) continue;
            const dist = getDistance(pickupLat, pickupLng, data.latitude, data.longitude);
            if (dist < 3) {
                eligibleDrivers.push({ uid, ...data, distance: dist });
            }
        }
        if (eligibleDrivers.length === 0) {
            addLog(`⚠️ Order ${orderId.substring(0,8)}: Tidak ada driver dalam radius 3 km.`, "warning");
            return false;
        }
        eligibleDrivers.sort((a,b) => a.distance - b.distance);

        let selectedDriver = null;
        for (const driver of eligibleDrivers) {
            const driverSnap = await database.ref(`drivers/${driver.uid}`).once('value');
            const driverData = driverSnap.val();
            if (!driverData) continue;
            const driverType = driverData.vehicle_type || '';
            const orderType = order.transport_type || order.vehicle || 'motor';
            if (!isVehicleTypeMatch(driverType, orderType)) {
                addLog(`⚠️ Fallback skipped: tipe kendaraan ${driverData.name || driver.uid} (${driverType}) tidak cocok dengan order ${orderType}`, "warning");
                continue;
            }
            const potonganInfo = await hitungTotalPotongan(order.price || 0);
            const saldoDriver = driverData.balance || 0;
            if (saldoDriver >= potonganInfo.total) {
                selectedDriver = { uid: driver.uid, data: driverData, distance: driver.distance, playerId: driver.playerId };
                break;
            } else {
                addLog(`⚠️ Driver ${driverData.name || driver.uid} saldo tidak cukup (${saldoDriver} < ${potonganInfo.total}), dilewati.`, "warning");
            }
        }

        if (!selectedDriver) {
            addLog(`🚨 Auto fallback gagal: Tidak ada driver dengan saldo cukup dalam radius 3 km untuk order ${orderId.substring(0,8)}.`, "error");
            return false;
        }

        const offerData = {
            driver_id: selectedDriver.uid,
            driver_name: selectedDriver.data.name || "Driver",
            driver_plate: selectedDriver.data.plate_number || '',
            driver_type: selectedDriver.data.vehicle_type || '',
            driver_rating: selectedDriver.data.rating || 5,
            driver_trips: selectedDriver.data.perjalanan || 0,
            driver_photo: selectedDriver.data.photoURL || '',
            offered_at: new Date().toISOString(),
            status: 'offered',
            auto_fallback_by_admin: true,
            bid_price: order.price,
            bid_percent: 0,
            bid_requested: true,
            expired_at: Date.now() + 30000
        };

        try {
            await database.ref(`orders/${orderId}/driver_offers/${selectedDriver.uid}`).set(offerData);
            addLog(`🤖 AUTO FALLBACK: offer ke ${offerData.driver_name} (${selectedDriver.uid}) jarak ${selectedDriver.distance.toFixed(2)}km, saldo cukup ✅`, "success");
            if (selectedDriver.playerId) {
                const title = "🚖 Order Baru (Auto Offer dari Admin)";
                const message = `Halo ${selectedDriver.data.name}, admin mengirim penawaran order dari ${order.customer_name || 'Customer'} (Rp ${order.price?.toLocaleString()}) karena tidak ada driver merespon.`;
                await sendPushNotification(selectedDriver.playerId, title, message, { auto_fallback: true, orderId });
            }
            return true;
        } catch(err) {
            addLog(`❌ Gagal fallback: ${err.message}`, "error");
            return false;
        }
    }

    // ========== PROSES ORDER BARU ==========
    async function processNewOrder(orderId, orderData) {
        if (processedOrderIds.has(orderId)) return;
        if (orderData.status !== "waiting" && orderData.status !== "searching") return;
        const lat = orderData.pickup_lat || orderData.from_lat;
        const lng = orderData.pickup_lng || orderData.from_lng;
        if (!lat || !lng) return;

        const isKurir = isKurirOrder(orderData);
        addLog(`📦 Order baru: ${orderId.substring(0,8)}${isKurir ? ' (KURIR)' : ''}`, "info");

        const activeStatuses = ['accepted', 'on_the_way', 'arrived', 'on_trip'];
        const ordersSnap = await database.ref('orders').once('value');
        const allOrders = ordersSnap.val() || {};
        const activeDriverIds = new Set();
        const waitingDriverIds = new Set();
        for (let orderIdLoop in allOrders) {
            const order = allOrders[orderIdLoop];
            if (order.driver_id && activeStatuses.includes(order.status)) {
                activeDriverIds.add(order.driver_id);
            }
            if (order.status === 'waiting' && order.driver_offers) {
                for (let driverId in order.driver_offers) {
                    if (order.driver_offers[driverId].status === 'offered') {
                        waitingDriverIds.add(driverId);
                    }
                }
            }
        }

        const drivers = await loadActiveDrivers();
        let notifiedCount = 0;
        let autoOfferCount = 0;

        for (const driver of drivers) {
            const dist = getDistance(lat, lng, driver.latitude, driver.longitude);
            if (dist < 3) {
                const cust = orderData.customer_name || "Customer";
                const harga = orderData.price || 0;
                await sendPushNotification(driver.playerId, "🚖 Order Baru Dekat Anda!", `${cust} Rp ${harga.toLocaleString()} jarak ${dist.toFixed(1)}km`, { orderId });
                notifiedCount++;

                if (driver.autobid_enabled && !isKurir) {
                    if (waitingDriverIds.has(driver.uid)) {
                        addLog(`⏸️ Auto offer skipped: driver ${driver.name} sedang menunggu konfirmasi order lain, lewat.`, "warning");
                        continue;
                    }
                    if (activeDriverIds.has(driver.uid)) {
                        addLog(`⏸️ Auto offer skipped: driver ${driver.name} sedang dalam perjalanan (order aktif), lewat.`, "warning");
                        continue;
                    }

                    const driverSnap = await database.ref(`drivers/${driver.uid}`).once('value');
                    const driverData = driverSnap.val();
                    if (!driverData) continue;
                    const driverType = driverData.vehicle_type || '';
                    const orderType = orderData.transport_type || orderData.vehicle || 'motor';
                    if (!isVehicleTypeMatch(driverType, orderType)) {
                        addLog(`⚠️ Auto offer skipped: tipe kendaraan ${driver.name} (${driverType}) tidak cocok dengan order ${orderType}`, "warning");
                        continue;
                    }
                    const potonganInfo = await hitungTotalPotongan(orderData.price || 0);
                    const saldoDriver = driverData.balance || 0;
                    if (saldoDriver >= potonganInfo.total) {
                        const existingOffer = await database.ref(`orders/${orderId}/driver_offers/${driver.uid}`).once('value');
                        if (!existingOffer.exists()) {
                            const offerData = {
                                driver_id: driver.uid,
                                driver_name: driverData.name || "Driver",
                                driver_plate: driverData.plate_number || '',
                                driver_type: driverData.vehicle_type || '',
                                driver_rating: driverData.rating || 5,
                                driver_trips: driverData.perjalanan || 0,
                                driver_photo: driverData.photoURL || '',
                                offered_at: new Date().toISOString(),
                                status: 'offered',
                                auto_offer_by_admin: true,
                                bid_price: orderData.price,
                                bid_percent: 0,
                                bid_requested: true,
                                expired_at: Date.now() + 30000
                            };
                            await database.ref(`orders/${orderId}/driver_offers/${driver.uid}`).set(offerData);
                            addLog(`🤖 AUTO OFFER (autobid ON): ke ${driver.name} jarak ${dist.toFixed(2)}km`, "success");
                            autoOfferCount++;
                        }
                    } else {
                        addLog(`⚠️ Autobid skipped: saldo driver ${driver.name} tidak cukup (${saldoDriver} < ${potonganInfo.total})`, "warning");
                    }
                }
            }
        }
        addLog(`✅ Order ${orderId.substring(0,8)}: notif ke ${notifiedCount} driver, auto offer ke ${autoOfferCount} driver`, "success");

        if (!isKurir && !fallbackProcessed.has(orderId)) {
            if (fallbackTimers.has(orderId)) clearTimeout(fallbackTimers.get(orderId));
            const timer = setTimeout(async () => {
                const cur = await database.ref(`orders/${orderId}`).once('value');
                const curOrder = cur.val();
                if (!curOrder || curOrder.status !== 'waiting') {
                    fallbackTimers.delete(orderId);
                    return;
                }
                const offers = await database.ref(`orders/${orderId}/driver_offers`).once('value');
                if (offers.exists() && Object.keys(offers.val()).length > 0) {
                    addLog(`✅ Order ${orderId.substring(0,8)} sudah ada penawaran`, "success");
                } else {
                    addLog(`🚨 Tidak ada penawaran (termasuk autobid), kirim fallback`, "warning");
                    await sendFallbackOffer(orderId, curOrder);
                    fallbackProcessed.add(orderId);
                }
                fallbackTimers.delete(orderId);
            }, FALLBACK_DELAY_SECONDS * 1000);
            fallbackTimers.set(orderId, timer);
            addLog(`⏲️ Timer fallback ${FALLBACK_DELAY_SECONDS}s untuk order ${orderId.substring(0,8)}`, "info");
        } else if (isKurir) {
            addLog(`🚫 Order Kurir: auto fallback dinonaktifkan (harus manual)`, "info");
        }
        processedOrderIds.add(orderId);
    }

    // ========== AUTO DEDUCT ==========
    async function autoDeductOnTrip(orderId, orderData) {
        if (processedDeductionOrders.has(orderId)) return;
        if (orderData.status !== 'on_trip') return;
        if (orderData.balance_deducted === true) return;
        const driverId = orderData.driver_id;
        const hargaOrder = orderData.price;
        if (!driverId || !hargaOrder) return;
        try {
            const potonganSnap = await database.ref('data-jego/potongan').once('value');
            const pajakSnap = await database.ref('data-jego/pajak').once('value');
            let feePersen = parseFloat(potonganSnap.val()) || 0;
            let pajakPersen = parseFloat(pajakSnap.val()) || 0;
            const potonganRupiah = hargaOrder * (feePersen / 100);
            const pajakRupiah = potonganRupiah * (pajakPersen / 100);
            let totalPotongan = potonganRupiah + pajakRupiah;
            const totalPotonganInt10 = Math.round(totalPotongan * 10);
            const balanceSnap = await database.ref(`drivers/${driverId}/balance`).once('value');
            let currentBalance = balanceSnap.val() || 0;
            let currentBalanceInt10 = Math.round(currentBalance * 10);
            if (currentBalanceInt10 < totalPotonganInt10) {
                addLog(`⚠️ Auto deduct: Saldo driver ${driverId} tidak cukup`, "warning");
                return;
            }
            await database.ref(`drivers/${driverId}/balance`).transaction(cur => {
                let curInt10 = Math.round((cur || 0) * 10);
                return (curInt10 - totalPotonganInt10) / 10;
            });
            await database.ref(`orders/${orderId}`).update({ balance_deducted: true, deducted_at: new Date().toISOString() });
            await database.ref(`driver_deductions/${driverId}/${orderId}`).set({
                amount: totalPotongan,
                order_price: hargaOrder,
                fee_percentage: feePersen,
                tax_percentage: pajakPersen,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            addLog(`💰 OTOMATIS: Potong saldo driver ${driverId} sebesar Rp ${totalPotongan.toFixed(1)}`, "success");
            processedDeductionOrders.add(orderId);
        } catch(err) {
            addLog(`❌ Auto deduct error: ${err.message}`, "error");
        }
    }

    // ========== UPDATE STATISTIK DRIVER ==========
    async function updateDriverStats(driverId) {
        if (!driverId) return;
        try {
            const ordersSnap = await database.ref('orders').orderByChild('driver_id').equalTo(driverId).once('value');
            const orders = ordersSnap.val();
            let completed = 0;
            if (orders) {
                for (let o of Object.values(orders)) {
                    if (o.status === 'completed') completed++;
                }
            }
            const ratingsSnap = await database.ref('ratings').once('value');
            let totalRating = 0, ratingCount = 0;
            for (let [rid, r] of Object.entries(ratingsSnap.val() || {})) {
                let dr = r.driver_rating;
                if (dr && dr.driver_id === driverId && dr.rating) {
                    totalRating += dr.rating;
                    ratingCount++;
                }
            }
            let avg = ratingCount ? totalRating / ratingCount : 0;
            const currentData = (await database.ref(`drivers/${driverId}`).once('value')).val();
            if (currentData && currentData.rating === avg && currentData.ratingCount === ratingCount) {
                return;
            }
            await database.ref(`drivers/${driverId}`).update({
                perjalanan: completed,
                rating: avg,
                ratingCount: ratingCount,
                last_stats_update: new Date().toISOString()
            });
            addLog(`📊 Update statistik driver ${driverId}: perjalanan=${completed}, rating=${avg.toFixed(1)} (${ratingCount} ulasan)`, "success");
        } catch(e) {
            addLog(`❌ Gagal update statistik: ${e.message}`, "error");
        }
    }

    // ========== UPDATE RATING CUSTOMER ==========
    async function updateCustomerStats(customerId) {
        if (!customerId) return;
        try {
            const ratingsSnap = await database.ref('ratings').once('value');
            let totalRating = 0;
            let ratingCount = 0;
            for (let [orderId, ratingObj] of Object.entries(ratingsSnap.val() || {})) {
                const customerRating = ratingObj.customer_rating;
                if (customerRating && customerRating.customer_id === customerId && customerRating.rating) {
                    totalRating += customerRating.rating;
                    ratingCount++;
                }
            }
            const avgRating = ratingCount ? totalRating / ratingCount : 0;
            await database.ref(`users/${customerId}`).update({
                rating: avgRating,
                ratingCount: ratingCount,
                last_rating_update: new Date().toISOString()
            });
            addLog(`⭐ Customer ${customerId.substring(0,8)} -> rating rata-rata: ${avgRating.toFixed(1)} (dari ${ratingCount} ulasan)`, "success");
        } catch(err) {
            addLog(`❌ Gagal update rating customer ${customerId}: ${err.message}`, "error");
        }
    }

    function startListeners() {
        database.ref('orders').on('child_changed', async (snap) => {
            const order = snap.val(); const id = snap.key;
            if (!order) return;
            if (order.status === 'on_trip') await autoDeductOnTrip(id, order);
            if (order.status === 'accepted' && order.driver_id) {
                addLog(`🎉 Order ${id} diterima driver ${order.driver_id}`, "success");
            }
            if (order.status === 'completed' && order.driver_id) await updateDriverStats(order.driver_id);
            if (currentView === 'dashboard') refreshDashboardOrders();
        });

        database.ref('ratings').on('child_added', async (snap) => {
            const ratingData = snap.val();
            if (ratingData?.driver_rating?.driver_id) {
                addLog(`⭐ Rating baru untuk driver ${ratingData.driver_rating.driver_id}`, "info");
                await updateDriverStats(ratingData.driver_rating.driver_id);
            }
            if (ratingData?.customer_rating?.customer_id) {
                addLog(`⭐ Rating baru untuk customer ${ratingData.customer_rating.customer_id}`, "info");
                await updateCustomerStats(ratingData.customer_rating.customer_id);
            }
        });
        database.ref('ratings').on('child_changed', async (snap) => {
            const ratingData = snap.val();
            if (ratingData?.driver_rating?.driver_id) {
                addLog(`🔄 Rating berubah untuk driver ${ratingData.driver_rating.driver_id}`, "info");
                await updateDriverStats(ratingData.driver_rating.driver_id);
            }
            if (ratingData?.customer_rating?.customer_id) {
                addLog(`🔄 Rating customer ${ratingData.customer_rating.customer_id} berubah`, "info");
                await updateCustomerStats(ratingData.customer_rating.customer_id);
            }
        });
    }

    function renderTable(columns, data, searchable = true, exportable = true) {
        let html = `<div class="table-container">
            <div class="table-toolbar">
                ${searchable ? '<input type="text" class="search-box" placeholder="Cari...">' : ''}
                ${exportable ? '<button class="export-btn"><i class="fas fa-download"></i> Export CSV</button>' : ''}
            </div>
            <div class="table-wrapper">
                <table id="dynamicTable">
                    <thead><tr>${columns.map(col => `<th data-col="${col.key}">${col.label} ${col.sortable !== false ? '🔼' : ''}</th>`).join('')}</tr></thead>
                    <tbody>${data.map(row => `<tr>${columns.map(col => `<td>${row[col.key] ?? ''}</td>`).join('')}</tr>`).join('')}</tbody>
                </table>
            </div>
        </div>`;
        return html;
    }

    function attachTableEvents(container, columns, data) {
        const searchBox = container.querySelector('.search-box');
        const exportBtn = container.querySelector('.export-btn');
        const table = container.querySelector('#dynamicTable');
        let currentData = [...data];
        function renderBody(filteredData) { const tbody = table.querySelector('tbody'); tbody.innerHTML = filteredData.map(row => `<tr>${columns.map(col => `<td>${row[col.key] ?? ''}</td>`).join('')}</tr>`).join(''); }
        if (searchBox) {
            searchBox.addEventListener('input', (e) => {
                const keyword = e.target.value.toLowerCase();
                const filtered = currentData.filter(row => Object.values(row).some(v => String(v).toLowerCase().includes(keyword)));
                renderBody(filtered);
            });
        }
        if (exportBtn) {
            exportBtn.addEventListener('click', () => {
                const csvRows = [columns.map(c=>c.label).join(',')];
                for (let row of currentData) {
                    const values = columns.map(c => `"${String(row[c.key] ?? '').replace(/"/g, '""')}"`);
                    csvRows.push(values.join(','));
                }
                const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = 'export.csv'; a.click(); URL.revokeObjectURL(url);
            });
        }
        const headers = table.querySelectorAll('th');
        headers.forEach((th, idx) => {
            th.style.cursor = 'pointer';
            th.addEventListener('click', () => {
                const key = columns[idx].key;
                const sortAsc = th.getAttribute('data-sort') !== 'desc';
                currentData.sort((a,b) => {
                    let valA = a[key], valB = b[key];
                    if (typeof valA === 'number') return sortAsc ? valA - valB : valB - valA;
                    return sortAsc ? String(valA).localeCompare(String(valB)) : String(valB).localeCompare(String(valA));
                });
                th.setAttribute('data-sort', sortAsc ? 'asc' : 'desc');
                renderBody(currentData);
            });
        });
    }

                    <input type="text" id="searchCustomer" class="search-box" placeholder="Cari customer...">
                </div>
                <div class="table-wrapper">
                    <table id="customerTable">
                        <thead><tr><th>Nama</th><th>Telepon</th><th>Player ID</th><th>Status</th></tr></thead>
                        <tbody>
                            ${customers.map(c => `<tr>
                                <td>${escapeHtml(c.name)}</td>
                                <td>${c.phone}</td>
                                <td>${c.playerId ? c.playerId.substring(0,15)+'...' : '-'}</td>
                                <td>${c.playerId ? '<span style="color:green;">✅ Siap notif</span>' : '<span style="color:red;">❌ Tidak ada</span>'}</td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
        container.innerHTML = html;
        document.getElementById('sendNotifBtn').onclick = async () => {
            const target = document.getElementById('notifCustomerSelect').value;
            const title = document.getElementById('notifTitle').value.trim();
            const message = document.getElementById('notifMessage').value.trim();
            const extraDataRaw = document.getElementById('notifData').value.trim();
            let extraData = {};
            if (extraDataRaw) {
                try { extraData = JSON.parse(extraDataRaw); } catch(e) { addLog("Data tambahan tidak valid JSON", "error"); }
            }
            if (!title || !message) {
                alert("Judul dan pesan harus diisi");
                return;
            }
            const resultDiv = document.getElementById('notifResult');
            resultDiv.innerHTML = '<span>Mengirim...</span>';
            if (target === 'all') {
                const customersWithId = customers.filter(c => c.playerId);
                if (customersWithId.length === 0) {
                    resultDiv.innerHTML = '<span style="color:red;">Tidak ada customer dengan playerId</span>';
                    return;
                }
                let successCount = 0;
                for (const cust of customersWithId) {
                    const sent = await sendPushNotification(cust.playerId, title, message, { ...extraData, broadcast: true });
                    if (sent) successCount++;
                    await new Promise(r => setTimeout(r, 200));
                }
                resultDiv.innerHTML = `<span style="color:green;">✅ Broadcast terkirim ke ${successCount} dari ${customersWithId.length} customer.</span>`;
                addLog(`Broadcast notifikasi ke ${successCount} customer`, "success");
            } else {
                const customer = customers.find(c => c.uid === target);
                if (!customer || !customer.playerId) {
                    resultDiv.innerHTML = '<span style="color:red;">Customer tidak memiliki playerId</span>';
                    return;
                }
                const sent = await sendPushNotification(customer.playerId, title, message, { ...extraData, customer_id: target });
                if (sent) {
                    resultDiv.innerHTML = `<span style="color:green;">✅ Notifikasi terkirim ke ${customer.name}</span>`;
                    addLog(`Notifikasi manual ke customer ${customer.name}`, "success");
                } else {
                    resultDiv.innerHTML = `<span style="color:red;">❌ Gagal mengirim notifikasi</span>`;
                }
            }
        };
        const searchInput = document.getElementById('searchCustomer');
        if (searchInput) {
            searchInput.addEventListener('input', (e) => {
                const keyword = e.target.value.toLowerCase();
                const rows = document.querySelectorAll('#customerTable tbody tr');
                rows.forEach(row => {
                    const text = row.innerText.toLowerCase();
                    row.style.display = text.includes(keyword) ? '' : 'none';
                });
            });
        }
    }

    async function loadAllCustomersForBonus() {
        const snap = await database.ref('users').once('value');

        for (const [uid, data] of Object.entries(users)) {

                    uid,
                    name: data.name || 'Tanpa Nama',
                    phone: data.phone || '-',

    async function loadDriversForSelectGlobal() { const snap = await database.ref('drivers').once('value'); allDrivers = snap.val() || {}; }
    async function loadWaitingOrdersForSelectGlobal() { const snap = await database.ref('orders').once('value'); const orders = snap.val() || {}; allWaitingOrders = {}; for (let [id, o] of Object.entries(orders)) if (o.status === 'waiting') allWaitingOrders[id] = o; }

    async function deleteExpiredOrders() {
        addLog("🕒 Mengecek order kadaluarsa (>30 menit)", "info");
        const now = new Date();
        const thirtyMinAgo = new Date(now.getTime() - 30*60*1000);
        const ordersRef = database.ref('orders');
        const snap = await ordersRef.once('value');
        const orders = snap.val() || {};
        let del = 0;
        for (let [id, o] of Object.entries(orders)) {
            if (o.status === 'waiting' && o.created_at && new Date(o.created_at) <= thirtyMinAgo) {
                await ordersRef.child(id).remove();
                del++;
            }
        }
        addLog(`✅ Hapus ${del} order kadaluarsa`, "success");
    }

    function formatRupiah(amount) {
        return 'Rp ' + (parseInt(amount) || 0).toLocaleString('id-ID');
    }

                const view = item.getAttribute('data-view');
                showView(view);
            });

        document.getElementById('sidebarLogout').onclick = () => { auth.signOut(); window.location.href='login_admin.html'; };
        document.getElementById('topLogoutBtn').onclick = () => { auth.signOut(); window.location.href='login_admin.html'; };
        showView('dashboard');
    }

    // ========== CLEANUP EXPIRED OFFERS ==========
    async function cleanupExpiredOffers() {
        try {
            const ordersSnap = await database.ref('orders').orderByChild('status').equalTo('waiting').once('value');
            const waitingOrders = ordersSnap.val() || {};
            const now = Date.now();
            let removedCount = 0;
            for (const [orderId, order] of Object.entries(waitingOrders)) {
                const offers = order.driver_offers || {};
                for (const [driverId, offer] of Object.entries(offers)) {
                    if (offer.status === 'offered' && offer.expired_at && offer.expired_at < now) {
                        await database.ref(`orders/${orderId}/driver_offers/${driverId}`).remove();
                        removedCount++;
                        addLog(`🗑️ Hapus offer expired dari driver ${driverId.substring(0,8)} untuk order ${orderId.substring(0,8)}`, "info");
                    }
                }
            }
            if (removedCount > 0) {
                addLog(`✅ Bersihkan ${removedCount} offer expired`, "success");
            }
        } catch (err) {
            addLog(`❌ Gagal cleanup expired offers: ${err.message}`, "error");
        }
    }

        const adminSnap = await database.ref(`admins/${user.uid}`).once('value');
        if (!adminSnap.exists()) { await auth.signOut(); window.location.href = 'login_admin.html'; return; }
        addLog(`Admin ${user.email} berhasil login.`, "success");
        await fetchOneSignalApiKey();
        await loadDriversForSelectGlobal();
        await loadWaitingOrdersForSelectGlobal();
        startListeningOrders();
        startListeners();
        initUI();
        setInterval(deleteExpiredOrders, 10*60*1000);
        setInterval(cleanupExpiredOffers, 10000);
    });
</script>
</body>
</html>
