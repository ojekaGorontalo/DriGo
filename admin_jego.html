<script>
    // ==================== KONFIGURASI ====================
    const firebaseConfig = {
        apiKey: "AIzaSyCD0pgeZio-LdKqYDtWxcdXcZwyL4ngYQI",
        authDomain: "jego-35a2b.firebaseapp.com",
        databaseURL: "https://jego-35a2b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "jego-35a2b",
        storageBucket: "jego-35a2b.firebasestorage.app",
        messagingSenderId: "600037007040",
        appId: "1:600037007040:web:ac3243ad9b472647ffd725"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    // OneSignal
    const ONESIGNAL_APP_ID = "3357d683-8f6b-4558-9d42-2eeceed6204a";
    let ONESIGNAL_API_KEY = "";

    let allDrivers = {};
    let allWaitingOrders = {};
    let ordersListener = false;
    const processedOrderIds = new Set();
    const fallbackTimers = new Map();
    const fallbackProcessed = new Set();
    const processedDeductionOrders = new Set();
    const FALLBACK_DELAY_SECONDS = 20;
    let realtimeDashboardListener = null;  // untuk update tabel dashboard realtime

    function addLog(msg, type = "info") {
        const logDiv = document.getElementById("logMessages");
        if (!logDiv) return;
        const entry = document.createElement("div");
        entry.className = "log-entry";
        const time = new Date().toLocaleTimeString();
        let color = "#66aaff";
        if (type === "success") color = "#66ff66";
        if (type === "error") color = "#ff6666";
        if (type === "warning") color = "#ffaa66";
        entry.style.color = color;
        entry.textContent = `[${time}] ${msg}`;
        logDiv.appendChild(entry);
        entry.scrollIntoView({ behavior: "smooth", block: "nearest" });
        while (logDiv.children.length > 200) logDiv.removeChild(logDiv.firstChild);
    }

    // ========== API Key & Notifikasi (sama seperti sebelumnya) ==========
    async function fetchOneSignalApiKey() { /* sama */ try { const snap = await database.ref('data-jego/PushKey').once('value'); const key = snap.val(); if (key) { ONESIGNAL_API_KEY = key; addLog("🔑 OneSignal API Key loaded", "success"); return true; } else { addLog("⚠️ PushKey tidak ditemukan", "error"); return false; } } catch(e) { addLog(`❌ Gagal memuat PushKey: ${e.message}`, "error"); return false; } }
    async function sendPushNotification(playerId, title, message, orderId = null, extraData = {}) { if (!playerId || !ONESIGNAL_API_KEY) return false; try { const res = await fetch("https://onesignal.com/api/v1/notifications", { method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Basic ${ONESIGNAL_API_KEY}` }, body: JSON.stringify({ app_id: ONESIGNAL_APP_ID, include_player_ids: [playerId], headings: { en: title }, contents: { en: message }, data: { orderId, type: "offer_from_admin", ...extraData } }) }); const result = await res.json(); if (result.errors) { addLog(`Gagal notif: ${JSON.stringify(result.errors)}`, "error"); return false; } else { addLog(`✅ Notif ke driver (${playerId.substring(0,8)}...)`, "success"); return true; } } catch(err) { addLog(`Error API: ${err.message}`, "error"); return false; } }
    async function sendManualPushToDriver(driverId, title, message, orderId = null) { if (!ONESIGNAL_API_KEY) { addLog("❌ OneSignal API Key belum tersedia", "error"); return false; } const locSnap = await database.ref(`driver_locations/${driverId}/playerId`).once('value'); const playerId = locSnap.val(); if (!playerId) { addLog(`⚠️ Driver ${driverId} tidak punya playerId`, "warning"); return false; } return sendPushNotification(playerId, title, message, orderId); }

    // ========== FUNGSI JARAK ==========
    function getDistance(lat1, lon1, lat2, lon2) { if (!lat1 || !lon1 || !lat2 || !lon2) return Infinity; const R = 6371; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180; const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2; const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); return R * c; }
    
    // ========== FUNGSI HITUNG TOTAL POTONGAN FEE + PAJAK ==========
async function hitungTotalPotongan(hargaOrder) {
    try {
        const potonganSnap = await database.ref('data-jego/potongan').once('value');
        const pajakSnap = await database.ref('data-jego/pajak').once('value');
        let feePersen = parseFloat(potonganSnap.val()) || 0;
        let pajakPersen = parseFloat(pajakSnap.val()) || 0;
        const potonganRupiah = hargaOrder * (feePersen / 100);
        const pajakRupiah = potonganRupiah * (pajakPersen / 100);
        return { total: potonganRupiah + pajakRupiah, feePersen, pajakPersen };
    } catch(e) {
        console.warn("Gagal ambil fee/pajak:", e);
        return { total: 0, feePersen: 0, pajakPersen: 0 };
    }
}

    async function getNearestDriver(pickupLat, pickupLng) { /* sama */ const snap = await database.ref("driver_locations").once("value"); const drivers = snap.val(); if (!drivers) return null; let nearest = null, minDist = Infinity; for (const [uid, data] of Object.entries(drivers)) { if (data.tracking_enabled !== true) continue; if (!data.latitude || !data.longitude) continue; const dist = getDistance(pickupLat, pickupLng, data.latitude, data.longitude); if (dist < 3 && dist < minDist) { minDist = dist; nearest = { uid, ...data, distance: dist }; } } return nearest; }

    async function sendFallbackOffer(orderId, orderData) {
    const orderSnap = await database.ref(`orders/${orderId}`).once('value');
    const order = orderSnap.val();
    if (!order || order.status !== 'waiting') return false;
    const offersSnap = await database.ref(`orders/${orderId}/driver_offers`).once('value');
    if (offersSnap.exists() && Object.keys(offersSnap.val()).length > 0) return false;
    const pickupLat = order.pickup_lat, pickupLng = order.pickup_lng;
    if (!pickupLat || !pickupLng) return false;

    // Cari semua driver dalam radius 3 km
    const driversLoc = await database.ref("driver_locations").once('value');
    const allDrivers = driversLoc.val() || {};
    let eligibleDrivers = [];
    for (const [uid, data] of Object.entries(allDrivers)) {
        if (data.tracking_enabled !== true) continue;
        if (!data.latitude || !data.longitude) continue;
        const dist = getDistance(pickupLat, pickupLng, data.latitude, data.longitude);
        if (dist < 3) {
            eligibleDrivers.push({ uid, ...data, distance: dist });
        }
    }
    if (eligibleDrivers.length === 0) {
        addLog(`⚠️ Order ${orderId.substring(0,8)}: Tidak ada driver dalam radius 3 km.`, "warning");
        return false;
    }

    // Urutkan berdasarkan jarak terdekat
    eligibleDrivers.sort((a,b) => a.distance - b.distance);

    // Loop cari driver dengan saldo cukup
    let selectedDriver = null;
    for (const driver of eligibleDrivers) {
        const driverSnap = await database.ref(`drivers/${driver.uid}`).once('value');
        const driverData = driverSnap.val();
        if (!driverData) continue;
        
        const potonganInfo = await hitungTotalPotongan(order.price || 0);
        const saldoDriver = driverData.balance || 0;
        
        if (saldoDriver >= potonganInfo.total) {
            selectedDriver = { uid: driver.uid, data: driverData, distance: driver.distance, playerId: driver.playerId };
            break;
        } else {
            addLog(`⚠️ Driver ${driverData.name || driver.uid} saldo tidak cukup (${saldoDriver} < ${potonganInfo.total}), dilewati.`, "warning");
        }
    }

    if (!selectedDriver) {
        addLog(`🚨 Auto fallback gagal: Tidak ada driver dengan saldo cukup dalam radius 3 km untuk order ${orderId.substring(0,8)}.`, "error");
        return false;
    }

    const offerData = {
        driver_id: selectedDriver.uid,
        driver_name: selectedDriver.data.name || "Driver",
        driver_plate: selectedDriver.data.plate_number || '',
        driver_type: selectedDriver.data.vehicle_type || '',
        driver_rating: selectedDriver.data.rating || 5,
        driver_trips: selectedDriver.data.perjalanan || 0,
        driver_photo: selectedDriver.data.photoURL || '',
        offered_at: new Date().toISOString(),
        status: 'offered',
        auto_fallback_by_admin: true
    };
    try {
        await database.ref(`orders/${orderId}/driver_offers/${selectedDriver.uid}`).set(offerData);
        addLog(`🤖 AUTO FALLBACK: offer ke ${offerData.driver_name} (${selectedDriver.uid}) jarak ${selectedDriver.distance.toFixed(2)}km, saldo cukup ✅`, "success");
        if (selectedDriver.playerId) {
            const title = "🚖 Order Baru (Auto Offer dari Admin)";
            const message = `Halo ${selectedDriver.data.name}, admin mengirim penawaran order dari ${order.customer_name || 'Customer'} (Rp ${order.price?.toLocaleString()}) karena tidak ada driver merespon.`;
            await sendPushNotification(selectedDriver.playerId, title, message, orderId, { auto_fallback: true });
        }
        return true;
    } catch(err) {
        addLog(`❌ Gagal fallback: ${err.message}`, "error");
        return false;
    }
}

    async function loadDriversForNotification() { const snap = await database.ref("driver_locations").once("value"); const all = snap.val() || {}; const filtered = {}; for (const uid in all) { const d = all[uid]; if (d.tracking_enabled === true && d.autobid_enabled === true && d.playerId && d.latitude && d.longitude) { filtered[uid] = { playerId: d.playerId, latitude: d.latitude, longitude: d.longitude, name: d.fullName || uid }; } } addLog(`Driver online (tracking+autobid): ${Object.keys(filtered).length}`, "info"); return filtered; }

    async function processNewOrder(orderId, orderData) { /* sama */ if (processedOrderIds.has(orderId)) return; if (orderData.status !== "waiting" && orderData.status !== "searching") return; const lat = orderData.pickup_lat || orderData.from_lat; const lng = orderData.pickup_lng || orderData.from_lng; if (!lat || !lng) return; addLog(`📦 Order baru: ${orderId.substring(0,8)}`, "info"); const drivers = await loadDriversForNotification(); let count = 0; for (const [did, d] of Object.entries(drivers)) { const dist = getDistance(lat, lng, d.latitude, d.longitude); if (dist < 3) { const cust = orderData.customer_name || "Customer"; const harga = orderData.price || 0; await sendPushNotification(d.playerId, "🚖 Order Baru Dekat Anda!", `${cust} Rp ${harga.toLocaleString()} jarak ${dist.toFixed(1)}km`, orderId); count++; } } if (count > 0) addLog(`✅ Order ${orderId.substring(0,8)}: notif ke ${count} driver`, "success"); if (!fallbackProcessed.has(orderId)) { if (fallbackTimers.has(orderId)) clearTimeout(fallbackTimers.get(orderId)); const timer = setTimeout(async () => { const cur = await database.ref(`orders/${orderId}`).once('value'); const curOrder = cur.val(); if (!curOrder || curOrder.status !== 'waiting') { fallbackTimers.delete(orderId); return; } const offers = await database.ref(`orders/${orderId}/driver_offers`).once('value'); if (offers.exists() && Object.keys(offers.val()).length > 0) { addLog(`✅ Order ${orderId.substring(0,8)} sudah ada penawaran`, "success"); } else { addLog(`🚨 Order ${orderId.substring(0,8)} tidak ada penawaran, kirim fallback`, "warning"); await sendFallbackOffer(orderId, curOrder); fallbackProcessed.add(orderId); } fallbackTimers.delete(orderId); }, FALLBACK_DELAY_SECONDS * 1000); fallbackTimers.set(orderId, timer); addLog(`⏲️ Timer fallback ${FALLBACK_DELAY_SECONDS}s untuk order ${orderId.substring(0,8)}`, "info"); } processedOrderIds.add(orderId); }

    async function autoDeductOnTrip(orderId, orderData) { /* sama */ if (processedDeductionOrders.has(orderId)) return; if (orderData.status !== 'on_trip') return; if (orderData.balance_deducted === true) return; const driverId = orderData.driver_id; const hargaOrder = orderData.price; if (!driverId || !hargaOrder) return; try { const potonganSnap = await database.ref('data-jego/potongan').once('value'); const pajakSnap = await database.ref('data-jego/pajak').once('value'); let feePersen = parseFloat(potonganSnap.val()) || 0; let pajakPersen = parseFloat(pajakSnap.val()) || 0; const potonganRupiah = hargaOrder * (feePersen / 100); const pajakRupiah = potonganRupiah * (pajakPersen / 100); let totalPotongan = potonganRupiah + pajakRupiah; const totalPotonganInt10 = Math.round(totalPotongan * 10); const balanceSnap = await database.ref(`drivers/${driverId}/balance`).once('value'); let currentBalance = balanceSnap.val() || 0; let currentBalanceInt10 = Math.round(currentBalance * 10); if (currentBalanceInt10 < totalPotonganInt10) { addLog(`⚠️ Auto deduct: Saldo driver ${driverId} tidak cukup`, "warning"); return; } await database.ref(`drivers/${driverId}/balance`).transaction(cur => { let curInt10 = Math.round((cur || 0) * 10); return (curInt10 - totalPotonganInt10) / 10; }); await database.ref(`orders/${orderId}`).update({ balance_deducted: true, deducted_at: new Date().toISOString() }); await database.ref(`driver_deductions/${driverId}/${orderId}`).set({ amount: totalPotongan, order_price: hargaOrder, fee_percentage: feePersen, tax_percentage: pajakPersen, timestamp: firebase.database.ServerValue.TIMESTAMP }); addLog(`💰 OTOMATIS: Potong saldo driver ${driverId} sebesar Rp ${totalPotongan.toFixed(1)}`, "success"); processedDeductionOrders.add(orderId); } catch(err) { addLog(`❌ Auto deduct error: ${err.message}`, "error"); } }

    async function updateDriverStats(driverId) {
    if (!driverId) return;
    try {
        // Hitung jumlah perjalanan selesai
        const ordersSnap = await database.ref('orders').orderByChild('driver_id').equalTo(driverId).once('value');
        const orders = ordersSnap.val();
        let completed = 0;
        if (orders) {
            for (let o of Object.values(orders)) {
                if (o.status === 'completed') completed++;
            }
        }

        // Hitung rating dari customer (field driver_rating)
        const ratingsSnap = await database.ref('ratings').once('value');
        let totalRating = 0, ratingCount = 0;
        for (let [rid, r] of Object.entries(ratingsSnap.val() || {})) {
            let dr = r.driver_rating; // perbaikan: ambil driver_rating
            if (dr && dr.driver_id === driverId && dr.rating) {
                totalRating += dr.rating;
                ratingCount++;
            }
        }
        let avg = ratingCount ? totalRating / ratingCount : 0;

        // ========== OPTIMASI: Cek apakah nilai berubah ==========
        const currentData = (await database.ref(`drivers/${driverId}`).once('value')).val();
        if (currentData && currentData.rating === avg && currentData.ratingCount === ratingCount) {
            // Tidak ada perubahan, skip update
            return;
        }
        // =======================================================

        // Update data driver
        await database.ref(`drivers/${driverId}`).update({
            perjalanan: completed,
            rating: avg,
            ratingCount: ratingCount,
            last_stats_update: new Date().toISOString()
        });
        addLog(`📊 Update statistik driver ${driverId}: perjalanan=${completed}, rating=${avg.toFixed(1)} (${ratingCount} ulasan)`, "success");
    } catch(e) {
        addLog(`❌ Gagal update statistik: ${e.message}`, "error");
    }
}

    function startListeningOrders() { if (ordersListener) return; database.ref("orders").on("child_added", async (snap) => await processNewOrder(snap.key, snap.val())); ordersListener = true; addLog("👂 Listener order aktif (auto fallback, notifikasi awal)", "success"); }

    function startListeners() {
        database.ref('orders').on('child_changed', async (snap) => {
            const order = snap.val(); const id = snap.key; if (!order) return;
            if (order.status === 'on_trip') await autoDeductOnTrip(id, order);
            if (order.status === 'accepted' && order.driver_id) {
                addLog(`🎉 Order ${id} diterima driver ${order.driver_id}`, "success");
                await sendManualPushToDriver(order.driver_id, "🎉 Penawaran Diterima!", `Order ${id.substring(0,8)} diterima customer. Segera proses.`, id);
            }
            if (order.status === 'completed' && order.driver_id) await updateDriverStats(order.driver_id);
            // Jika dashboard sedang aktif, refresh tabel order
            if (currentView === 'dashboard') refreshDashboardOrders();
        });
        database.ref('ratings').on('child_added', async (snap) => {
    const ratingData = snap.val();
    // Cek rating dari customer ke driver
    if (ratingData?.driver_rating?.driver_id) {
        addLog(`⭐ Rating baru untuk driver ${ratingData.driver_rating.driver_id}`, "info");
        await updateDriverStats(ratingData.driver_rating.driver_id);
    }
});
database.ref('ratings').on('child_changed', async (snap) => {
    const ratingData = snap.val();
    if (ratingData?.driver_rating?.driver_id) {
        addLog(`🔄 Rating berubah untuk driver ${ratingData.driver_rating.driver_id}`, "info");
        await updateDriverStats(ratingData.driver_rating.driver_id);
    }
});

    // ========== FUNGSI KHUSUS DASHBOARD ==========
    async function loadAllOrders() {
        const snap = await database.ref('orders').once('value');
        const orders = snap.val() || {};
        const ordersArray = Object.entries(orders).map(([id, o]) => ({
            id,
            customer: o.customer_name || '-',
            pickup: o.pickup_address || '-',
            destination: o.destination_address || '-',
            price: o.price || 0,
            status: o.status || 'unknown',
            driver: o.driver_name || (o.driver_id ? o.driver_id.substring(0,8) : '-'),
            created_at: o.created_at ? new Date(o.created_at).toLocaleString() : '-'
        }));
        // Urutkan berdasarkan terbaru
        ordersArray.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
        return ordersArray;
    }

    async function refreshDashboardOrders() {
        const container = document.getElementById('viewContainer');
        if (!container || currentView !== 'dashboard') return;
        const orders = await loadAllOrders();
        let html = `
            <div class="table-container">
                <div class="table-toolbar">
                    <input type="text" class="search-box" placeholder="Cari order...">
                    <button class="export-btn"><i class="fas fa-download"></i> Export CSV</button>
                </div>
                <div class="table-wrapper">
                    <table id="dashboardOrdersTable">
                        <thead>
                            <tr>
                                <th data-col="id">Order ID</th>
                                <th data-col="customer">Customer</th>
                                <th data-col="pickup">Alamat Jemput</th>
                                <th data-col="destination">Tujuan</th>
                                <th data-col="price">Harga</th>
                                <th data-col="status">Status</th>
                                <th data-col="driver">Driver</th>
                                <th data-col="created_at">Dibuat</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${orders.map(order => {
                                let statusClass = '';
                                switch(order.status) {
                                    case 'waiting': statusClass = 'status-waiting'; break;
                                    case 'accepted': statusClass = 'status-accepted'; break;
                                    case 'on_the_way': statusClass = 'status-on_the_way'; break;
                                    case 'arrived': statusClass = 'status-arrived'; break;
                                    case 'on_trip': statusClass = 'status-on_trip'; break;
                                    case 'completed': statusClass = 'status-completed'; break;
                                    case 'cancelled': statusClass = 'status-cancelled'; break;
                                    default: statusClass = '';
                                }
                                return `<tr class="${statusClass}">
                                    <td>${order.id.substring(0,8)}...</td>
                                    <td>${escapeHtml(order.customer)}</td>
                                    <td>${escapeHtml(order.pickup)}</td>
                                    <td>${escapeHtml(order.destination)}</td>
                                    <td>Rp ${order.price.toLocaleString()}</td>
                                    <td><strong>${order.status}</strong></td>
                                    <td>${order.driver}</td>
                                    <td>${order.created_at}</td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
        container.innerHTML = html;
        // attach search & export untuk tabel dashboard
        const searchBox = container.querySelector('.search-box');
        const exportBtn = container.querySelector('.export-btn');
        const table = container.querySelector('#dashboardOrdersTable');
        if (searchBox) {
            searchBox.addEventListener('input', (e) => {
                const keyword = e.target.value.toLowerCase();
                const rows = table.querySelectorAll('tbody tr');
                rows.forEach(row => {
                    const text = row.innerText.toLowerCase();
                    row.style.display = text.includes(keyword) ? '' : 'none';
                });
            });
        }
        if (exportBtn) {
            exportBtn.addEventListener('click', () => {
                const rows = Array.from(table.querySelectorAll('tbody tr'));
                const csvRows = [['Order ID','Customer','Pickup','Destination','Harga','Status','Driver','Dibuat']];
                rows.forEach(row => {
                    if (row.style.display === 'none') return;
                    const cols = row.querySelectorAll('td');
                    const rowData = Array.from(cols).map(td => `"${td.innerText.replace(/"/g, '""')}"`);
                    csvRows.push(rowData.join(','));
                });
                const blob = new Blob([csvRows.map(r=>r.join(',')).join('\n')], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'dashboard_orders.csv'; a.click(); URL.revokeObjectURL(url);
            });
        }
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    // ========== DATA UNTUK VIEW LAIN (sama seperti sebelumnya) ==========
    async function loadDriversTable() { const snap = await database.ref('drivers').once('value'); const drivers = snap.val() || {}; const data = []; for (let [id, d] of Object.entries(drivers)) { data.push({ id, name: d.name || '-', phone: d.phone || '-', vehicle: d.vehicle_type || '-', plate: d.plate_number || '-', rating: d.rating || 0, perjalanan: d.perjalanan || 0, balance: d.balance || 0, status: d.status || 'active' }); } return data; }
    async function loadWaitingOrdersTable() { const snap = await database.ref('orders').once('value'); const orders = snap.val() || {}; const data = []; for (let [id, o] of Object.entries(orders)) { if (o.status === 'waiting') { data.push({ id, customer: o.customer_name || '-', pickup: o.pickup_address || '-', dest: o.destination_address || '-', price: o.price || 0, created: new Date(o.created_at).toLocaleString() }); } } return data; }
    async function loadAutoDeductLog() { const snap = await database.ref('driver_deductions').once('value'); const deductions = snap.val() || {}; let logs = []; for (let [driverId, orders] of Object.entries(deductions)) { for (let [orderId, d] of Object.entries(orders)) { logs.push({ driverId, orderId, amount: d.amount, timestamp: new Date(d.timestamp).toLocaleString() }); } } logs.sort((a,b)=>b.timestamp.localeCompare(a.timestamp)); return logs; }

    function renderTable(columns, data, searchable = true, exportable = true) {
        let html = `<div class="table-toolbar">${searchable ? '<input type="text" class="search-box" placeholder="Cari...">' : ''}${exportable ? '<button class="export-btn"><i class="fas fa-download"></i> Export CSV</button>' : ''}</div><div class="table-wrapper"><table id="dynamicTable"><thead><tr>${columns.map(col => `<th data-col="${col.key}">${col.label} ${col.sortable !== false ? '🔼' : ''}</th>`).join('')}</tr></thead><tbody>${data.map(row => `<tr>${columns.map(col => `<td>${row[col.key] ?? ''}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
        return html;
    }
    function attachTableEvents(container, columns, data) {
        const searchBox = container.querySelector('.search-box');
        const exportBtn = container.querySelector('.export-btn');
        const table = container.querySelector('#dynamicTable');
        let currentData = [...data];
        function renderBody(filteredData) { const tbody = table.querySelector('tbody'); tbody.innerHTML = filteredData.map(row => `<tr>${columns.map(col => `<td>${row[col.key] ?? ''}</td>`).join('')}</tr>`).join(''); }
        if (searchBox) { searchBox.addEventListener('input', (e) => { const keyword = e.target.value.toLowerCase(); const filtered = currentData.filter(row => Object.values(row).some(v => String(v).toLowerCase().includes(keyword))); renderBody(filtered); }); }
        if (exportBtn) { exportBtn.addEventListener('click', () => { const csvRows = [columns.map(c=>c.label).join(',')]; for (let row of currentData) { const values = columns.map(c => `"${String(row[c.key] ?? '').replace(/"/g, '""')}"`); csvRows.push(values.join(',')); } const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'export.csv'; a.click(); URL.revokeObjectURL(url); }); }
        const headers = table.querySelectorAll('th'); headers.forEach((th, idx) => { th.style.cursor = 'pointer'; th.addEventListener('click', () => { const key = columns[idx].key; const sortAsc = th.getAttribute('data-sort') !== 'desc'; currentData.sort((a,b) => { let valA = a[key], valB = b[key]; if (typeof valA === 'number') return sortAsc ? valA - valB : valB - valA; return sortAsc ? String(valA).localeCompare(String(valB)) : String(valB).localeCompare(String(valA)); }); th.setAttribute('data-sort', sortAsc ? 'asc' : 'desc'); renderBody(currentData); }); });
    }

    // ========== VIEW HANDLER ==========
    let currentView = 'dashboard';
    async function showView(view) {
        currentView = view;
        const container = document.getElementById('viewContainer');
        const titleMap = {
            dashboard: 'Dashboard - Semua Order',
            waiting_orders: 'Order Waiting',
            drivers_list: 'Data Driver',
            send_offer: 'Kirim Penawaran Manual',
            auto_deduct_log: 'Log Auto Deduct',
            statistik_driver: 'Statistik Rating & Perjalanan',
            fallback_log: 'Log Auto Fallback (Aktif di background)',
            tools: 'Tools & Utilitas'
        };
        document.getElementById('pageTitle').innerText = titleMap[view] || 'Admin';
        if (view === 'dashboard') {
            await refreshDashboardOrders(); // tampilkan tabel semua order
            return;
        }
        if (view === 'drivers_list') {
            const data = await loadDriversTable();
            const columns = [ { key: 'name', label: 'Nama' }, { key: 'phone', label: 'Telepon' }, { key: 'vehicle', label: 'Kendaraan' }, { key: 'plate', label: 'Plat' }, { key: 'rating', label: 'Rating' }, { key: 'perjalanan', label: 'Perjalanan' }, { key: 'balance', label: 'Saldo' }, { key: 'status', label: 'Status' } ];
            container.innerHTML = renderTable(columns, data, true, true);
            attachTableEvents(container, columns, data);
        } else if (view === 'waiting_orders') {
            const data = await loadWaitingOrdersTable();
            const columns = [ { key: 'id', label: 'Order ID' }, { key: 'customer', label: 'Customer' }, { key: 'pickup', label: 'Alamat Jemput' }, { key: 'dest', label: 'Tujuan' }, { key: 'price', label: 'Harga' }, { key: 'created', label: 'Dibuat' } ];
            container.innerHTML = renderTable(columns, data, true, true);
            attachTableEvents(container, columns, data);
        } else if (view === 'auto_deduct_log') {
            const data = await loadAutoDeductLog();
            const columns = [ { key: 'driverId', label: 'Driver ID' }, { key: 'orderId', label: 'Order ID' }, { key: 'amount', label: 'Potongan' }, { key: 'timestamp', label: 'Waktu' } ];
            container.innerHTML = renderTable(columns, data, true, true);
            attachTableEvents(container, columns, data);
        } else if (view === 'statistik_driver') {
            const data = await loadDriversTable();
            const columns = [ { key: 'name', label: 'Nama' }, { key: 'rating', label: 'Rating' }, { key: 'perjalanan', label: 'Total Perjalanan' }, { key: 'balance', label: 'Saldo' } ];
            container.innerHTML = renderTable(columns, data, true, true);
            attachTableEvents(container, columns, data);
        } else if (view === 'send_offer') {
            await loadDriversForSelect(); await loadWaitingOrdersForSelect();
            container.innerHTML = `<div class="inline-form"><select id="adminDriverSelect" style="flex:2"><option value="">-- Pilih Driver --</option></select><select id="adminOrderSelect" style="flex:2"><option value="">-- Pilih Order (waiting) --</option></select><button id="adminSendOfferBtn" class="action-btn"><i class="fas fa-paper-plane"></i> Kirim Penawaran</button></div><div id="adminOfferResult" style="padding:10px;"></div><div class="table-wrapper"><table><tr><td>Hasil pengiriman akan tampil di sini dan log.</td></tr></table></div>`;
            document.getElementById("adminSendOfferBtn").onclick = sendAdminOffer;
            async function loadDriversForSelect() { const snap = await database.ref('drivers').once('value'); const drvs = snap.val() || {}; const select = document.getElementById('adminDriverSelect'); select.innerHTML = '<option value="">-- Pilih Driver --</option>'; for (let [uid, d] of Object.entries(drvs)) { if (d.name && d.vehicle_type) select.innerHTML += `<option value="${uid}">${d.name} (${d.vehicle_type}) - ${d.plate_number || ''}</option>`; } }
            async function loadWaitingOrdersForSelect() { const snap = await database.ref('orders').once('value'); const ords = snap.val() || {}; const select = document.getElementById('adminOrderSelect'); select.innerHTML = '<option value="">-- Pilih Order (waiting) --</option>'; for (let [oid, o] of Object.entries(ords)) { if (o.status === 'waiting') select.innerHTML += `<option value="${oid}">${oid.substring(0,8)} - ${o.pickup_address?.substring(0,30)}</option>`; } }
            window.sendAdminOffer = async function() {
    const driverId = document.getElementById('adminDriverSelect').value;
    const orderId = document.getElementById('adminOrderSelect').value;
    const resultDiv = document.getElementById('adminOfferResult');
    if (!driverId || !orderId) {
        resultDiv.innerHTML = '<span style="color:#ffaa66;">⚠️ Pilih driver dan order</span>';
        return;
    }
    const driver = allDrivers[driverId];
    const order = allWaitingOrders[orderId];
    if (!driver || !order) {
        resultDiv.innerHTML = '<span style="color:#ff6666;">❌ Data tidak valid</span>';
        return;
    }
    
    // CEK SALDO DRIVER
    const potonganInfo = await hitungTotalPotongan(order.price || 0);
    const saldoDriver = driver.balance || 0;
    if (saldoDriver < potonganInfo.total) {
        resultDiv.innerHTML = `<span style="color:#ff6666;">❌ Saldo driver tidak cukup! Saldo: Rp ${saldoDriver.toLocaleString()}, Potongan: Rp ${potonganInfo.total.toLocaleString()} (fee ${potonganInfo.feePersen}% + pajak ${potonganInfo.pajakPersen}%)</span>`;
        addLog(`⚠️ Gagal kirim offer manual: saldo driver ${driver.name} tidak cukup`, "warning");
        return;
    }
    
    const locSnap = await database.ref(`driver_locations/${driverId}`).once('value');
    const loc = locSnap.val();
    const dist = getDistance(loc?.latitude, loc?.longitude, order.pickup_lat, order.pickup_lng);
    if (dist > 3) {
        resultDiv.innerHTML = `<span style="color:#ffaa66;">⚠️ Jarak ${dist.toFixed(1)} km >3 km, offer batal</span>`;
        return;
    }
    const existing = await database.ref(`orders/${orderId}/driver_offers/${driverId}`).once('value');
    if (existing.exists()) {
        resultDiv.innerHTML = '<span style="color:#ffaa66;">⚠️ Driver sudah pernah offer</span>';
        return;
    }
    const offerData = {
        driver_id: driverId,
        driver_name: driver.name || "Driver",
        driver_plate: driver.plate_number || '',
        driver_type: driver.vehicle_type || '',
        driver_rating: driver.rating || 5,
        driver_trips: driver.perjalanan || 0,
        driver_photo: driver.photoURL || '',
        offered_at: new Date().toISOString(),
        status: 'offered'
    };
    try {
        await database.ref(`orders/${orderId}/driver_offers/${driverId}`).set(offerData);
        resultDiv.innerHTML = `<span style="color:#66ff66;">✅ Penawaran dikirim ke ${driver.name} (saldo cukup)</span>`;
        addLog(`Admin MANUAL offer ke ${driver.name} untuk order ${orderId.substring(0,8)} (saldo cukup)`, "success");
        await sendManualPushToDriver(driverId, "📢 Penawaran Dikirim oleh Admin", `Halo ${driver.name}, admin mengirim penawaran untuk order dari ${order.customer_name || 'customer'}. Segera cek aplikasi.`, orderId);
    } catch(e) {
        resultDiv.innerHTML = `<span style="color:#ff6666;">❌ Gagal: ${e.message}</span>`;
        addLog(`Gagal kirim offer admin: ${e.message}`, "error");
    }
};
        } else if (view === 'tools') {
            container.innerHTML = `<div class="inline-form"><button id="testNotifBtn" class="action-btn"><i class="fas fa-bell"></i> Test Notifikasi (driver pertama)</button><button id="cleanupOrdersBtn" class="action-btn" style="background:#f44336;"><i class="fas fa-trash"></i> Hapus Order Kadaluarsa</button><button id="clearLogBtn" class="action-btn"><i class="fas fa-eraser"></i> Bersihkan Log</button><button id="refreshDataBtn" class="action-btn"><i class="fas fa-sync"></i> Refresh Data Driver & Order</button></div><div id="toolResult" style="padding:10px;"></div>`;
            document.getElementById('testNotifBtn').onclick = async () => { if (!ONESIGNAL_API_KEY) { addLog("API Key tidak tersedia", "error"); return; } const drivers = await loadDriversForNotification(); const first = Object.values(drivers)[0]; if (first) await sendPushNotification(first.playerId, "🧪 Test Notifikasi JeGo", "Test dari admin panel"); else addLog("Tidak ada driver online", "warning"); };
            document.getElementById('cleanupOrdersBtn').onclick = deleteExpiredOrders;
            document.getElementById('clearLogBtn').onclick = () => { document.getElementById('logMessages').innerHTML = ''; addLog("Log dibersihkan", "info"); };
            document.getElementById('refreshDataBtn').onclick = async () => { await loadDriversForSelectGlobal(); await loadWaitingOrdersForSelectGlobal(); addLog("Data driver & order direfresh", "success"); };
        } else if (view === 'fallback_log') {
            container.innerHTML = `<div style="padding:20px;">Log auto fallback tercatat di area log realtime di bawah. Setiap order baru yang tidak mendapat offer setelah ${FALLBACK_DELAY_SECONDS} detik akan diproses otomatis.</div>`;
        } else if (view === 'realtime_log') {
    // Tampilkan log yang tersimpan
    const logContainer = document.getElementById('viewContainer');
    const logMessages = document.getElementById('logMessages');
    let logHtml = `<div class="table-container">
        <div class="table-toolbar">
            <button id="clearLogViewBtn" class="action-btn"><i class="fas fa-eraser"></i> Bersihkan Log</button>
        </div>
        <div class="compact-log" style="background:#1e1e2f; color:#eee; padding:15px; font-family:monospace; font-size:12px; max-height:70vh; overflow-y:auto; margin:10px; border-radius:8px;">
            <div id="logMessagesView">${logMessages ? logMessages.innerHTML : '▶️ Log kosong...'}</div>
        </div>
    </div>`;
    container.innerHTML = logHtml;
    
    // Pindahkan konten log dari area tersembunyi ke view
    const sourceLog = document.getElementById('logMessages');
    const targetLog = document.getElementById('logMessagesView');
    if (sourceLog && targetLog) {
        targetLog.innerHTML = sourceLog.innerHTML;
    }
    
    document.getElementById('clearLogViewBtn')?.addEventListener('click', () => {
        const target = document.getElementById('logMessagesView');
        const source = document.getElementById('logMessages');
        if (target) target.innerHTML = '';
        if (source) source.innerHTML = '';
        addLog("Log dibersihkan", "info");
    });
}
    }

    async function loadDriversForSelectGlobal() { const snap = await database.ref('drivers').once('value'); allDrivers = snap.val() || {}; }
    async function loadWaitingOrdersForSelectGlobal() { const snap = await database.ref('orders').once('value'); const orders = snap.val() || {}; allWaitingOrders = {}; for (let [id, o] of Object.entries(orders)) if (o.status === 'waiting') allWaitingOrders[id] = o; }
    async function deleteExpiredOrders() { addLog("🕒 Mengecek order kadaluarsa (>30 menit)", "info"); const now = new Date(); const thirtyMinAgo = new Date(now.getTime() - 30*60*1000); const ordersRef = database.ref('orders'); const snap = await ordersRef.once('value'); const orders = snap.val() || {}; let del = 0; for (let [id, o] of Object.entries(orders)) { if (o.status === 'waiting' && o.created_at && new Date(o.created_at) <= thirtyMinAgo) { await ordersRef.child(id).remove(); del++; } } addLog(`✅ Hapus ${del} order kadaluarsa`, "success"); }

    function initUI() {
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
                item.classList.add('active');
                const view = item.getAttribute('data-view');
                showView(view);
            });
        });
        document.getElementById('sidebarLogout').onclick = () => { auth.signOut(); window.location.href='login_admin.html'; };
        document.getElementById('topLogoutBtn').onclick = () => { auth.signOut(); window.location.href='login_admin.html'; };
        showView('dashboard');
    }

    // ========== AUTENTIKASI ==========
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = 'login_admin.html'; return; }
        const adminSnap = await database.ref(`admins/${user.uid}`).once('value');
        if (!adminSnap.exists()) { await auth.signOut(); window.location.href = 'login_admin.html'; return; }
        addLog(`Admin ${user.email} berhasil login.`, "success");
        await fetchOneSignalApiKey();
        await loadDriversForSelectGlobal();
        await loadWaitingOrdersForSelectGlobal();
        startListeningOrders();
        startListeners();
        initUI();
        setInterval(deleteExpiredOrders, 10*60*1000);
    });
</script>
