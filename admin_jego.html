    // Variabel global
    let allDrivers = {};
    let allWaitingOrders = {};
    let ordersListener = false;
    const processedOrderIds = new Set();            // Untuk notifikasi push awal (child_added)

    const fallbackProcessed = new Set();            // orderId yang sudah diproses fallback (offer sudah dikirim oleh admin)

    const FALLBACK_DELAY_SECONDS = 20;              // Tunggu 20 detik sebelum auto fallback

    // ================= UTILS =================
    function addLog(msg, type = "info") {
        const logDiv = document.getElementById("logContainer");
        const entry = document.createElement("div");
        entry.className = `log-entry log-${type}`;
        const time = new Date().toLocaleTimeString();
        entry.textContent = `[${time}] ${msg}`;
        logDiv.appendChild(entry);
        entry.scrollIntoView({ behavior: "smooth", block: "nearest" });
        while (logDiv.children.length > 500) logDiv.removeChild(logDiv.firstChild);
    }

    function formatRupiah(amount) {
        return 'Rp ' + (amount || 0).toLocaleString('id-ID');
    }

    // ================= API KEY ONESIGNAL =================
    async function fetchOneSignalApiKey() {
        try {
            const snapshot = await database.ref('data-jego/PushKey').once('value');
            const apiKey = snapshot.val();
            if (apiKey && typeof apiKey === 'string') {
                ONESIGNAL_API_KEY = apiKey;
                addLog("🔑 OneSignal API Key berhasil dimuat dari database.", "success");
                return true;
            } else {
                addLog("⚠️ PushKey tidak ditemukan di data-jego. Notifikasi tidak akan berfungsi.", "error");
                return false;
            }
        } catch (error) {
            addLog(`❌ Gagal memuat PushKey: ${error.message}`, "error");
            return false;
        }
    }

    // ========== NOTIFIKASI PUSH (UNTUK FALLBACK & MANUAL) ==========
    async function sendPushNotification(playerId, title, message, orderId = null, extraData = {}) {
        if (!playerId) return false;
        if (!ONESIGNAL_API_KEY) {
            addLog("❌ OneSignal API Key belum tersedia. Notifikasi tidak dapat dikirim.", "error");
            return false;
        }
        try {
            const response = await fetch("https://onesignal.com/api/v1/notifications", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Basic ${ONESIGNAL_API_KEY}`
                },
                body: JSON.stringify({
                    app_id: ONESIGNAL_APP_ID,
                    include_player_ids: [playerId],
                    headings: { en: title },
                    contents: { en: message },
                    data: { orderId: orderId, type: "offer_from_admin", ...extraData }
                })
            });
            const result = await response.json();
            if (result.errors) {
                addLog(`Gagal notif: ${JSON.stringify(result.errors)}`, "error");
                return false;
            } else {
                addLog(`✅ Notifikasi terkirim ke driver (${playerId.substring(0,8)}...)`, "success");
                return true;
            }
        } catch(err) {
            addLog(`Error API: ${err.message}`, "error");
            return false;
        }
    }

    // ========== FUNGSI JARAK ==========
    function getDistance(lat1, lon1, lat2, lon2) {
        if (!lat1 || !lon1 || !lat2 || !lon2) return Infinity;
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    // ========== MENDAPATKAN DRIVER TERDEKAT (TRACKING ON, JARAK < 3 KM) ==========
    async function getNearestDriver(pickupLat, pickupLng) {
        const snapshot = await database.ref("driver_locations").once("value");
        const drivers = snapshot.val();
        if (!drivers) return null;
        let nearest = null;
        let minDist = Infinity;
        for (const [uid, data] of Object.entries(drivers)) {
            // Harus tracking ON dan punya koordinat
            if (data.tracking_enabled !== true) continue;
            if (!data.latitude || !data.longitude) continue;
            const dist = getDistance(pickupLat, pickupLng, data.latitude, data.longitude);
            if (dist < 3 && dist < minDist) {
                minDist = dist;
                nearest = { uid, ...data, distance: dist };
            }
        }
        return nearest;
    }

    // ========== MENGIRIM OFFER OTOMATIS OLEH ADMIN (FALLBACK) ==========
    async function sendFallbackOffer(orderId, orderData) {
        // Cek apakah order masih waiting dan belum punya driver_offers
        const orderSnap = await database.ref(`orders/${orderId}`).once('value');
        const order = orderSnap.val();
        if (!order || order.status !== 'waiting') {
            addLog(`⏭️ Order ${orderId.substring(0,8)} sudah tidak dalam status waiting, fallback dibatalkan.`, "warning");
            return false;
        }

        const offersSnap = await database.ref(`orders/${orderId}/driver_offers`).once('value');
        if (offersSnap.exists() && Object.keys(offersSnap.val()).length > 0) {
            addLog(`⏭️ Order ${orderId.substring(0,8)} sudah memiliki driver_offers (sudah ada yang menawarkan). Fallback tidak perlu.`, "info");
            return false;
        }

        // Ambil driver terdekat
        const pickupLat = order.pickup_lat;
        const pickupLng = order.pickup_lng;
        if (!pickupLat || !pickupLng) {
            addLog(`❌ Order ${orderId.substring(0,8)} tidak memiliki koordinat pickup. Fallback gagal.`, "error");
            return false;
        }

        const nearestDriver = await getNearestDriver(pickupLat, pickupLng);
        if (!nearestDriver) {
            addLog(`⚠️ Order ${orderId.substring(0,8)}: Tidak ada driver dengan tracking ON dalam radius 3 km. Fallback dibatalkan.`, "warning");
            return false;
        }

        // Ambil detail driver dari node drivers
        const driverSnap = await database.ref(`drivers/${nearestDriver.uid}`).once('value');
        const driverData = driverSnap.val();
        if (!driverData) {
            addLog(`❌ Data driver ${nearestDriver.uid} tidak ditemukan di node 'drivers'`, "error");
            return false;
        }

        const offerData = {
    driver_id: nearestDriver.uid,
    driver_name: driverData.name || "Driver",
    driver_plate: driverData.plate_number || '',
    driver_type: driverData.vehicle_type || '',
    driver_rating: driverData.rating || 5,
    driver_trips: driverData.perjalanan || 0,
    driver_photo: driverData.photoURL || '',
    offered_at: new Date().toISOString(),
    status: 'offered',
    auto_fallback_by_admin: true
};

        try {
            await database.ref(`orders/${orderId}/driver_offers/${nearestDriver.uid}`).set(offerData);
            addLog(`🤖 AUTO FALLBACK: Admin mengirim offer untuk driver ${offerData.driver_name} (${nearestDriver.uid}) ke order ${orderId.substring(0,8)}. Jarak: ${nearestDriver.distance.toFixed(2)} km`, "success");

            // Kirim notifikasi push ke driver tersebut
            if (nearestDriver.playerId) {
                const title = "🚖 Order Baru (Auto Offer dari Admin)";
                const customerName = order.customer_name || "Customer";
                const harga = order.price || 0;
                const message = `Halo ${driverData.name}, admin secara otomatis mengirimkan penawaran untuk order dari ${customerName} (Rp ${harga.toLocaleString()}) karena tidak ada driver yang merespon. Segera cek aplikasi.`;
                await sendPushNotification(nearestDriver.playerId, title, message, orderId, { auto_fallback: true });
            } else {
                addLog(`⚠️ Driver ${nearestDriver.uid} tidak memiliki playerId, notifikasi tidak terkirim.`, "warning");
            }
            return true;
        } catch (err) {
            addLog(`❌ Gagal mengirim offer fallback: ${err.message}`, "error");
            return false;
        }
    }

    // ========== MEMPROSES ORDER BARU (NOTIF AWAL + SET FALLBACK TIMER) ==========
    async function processNewOrder(orderId, orderData) {
        if (processedOrderIds.has(orderId)) return;
        if (orderData.status !== "waiting" && orderData.status !== "searching") return;
        const lat = orderData.pickup_lat || orderData.from_lat;
        const lng = orderData.pickup_lng || orderData.from_lng;
        if (!lat || !lng) return;
        addLog(`📦 Order baru: ${orderId} | pickup (${lat}, ${lng})`, "info");
        
        // 1. Kirim notifikasi push ke driver dengan autobid ON & tracking ON dalam radius 3 km (sesuai kode awal)
        const drivers = await loadDriversForNotification(); // fungsi ini sudah ada di bawah
        let count = 0;
        for (const driverId in drivers) {
            const d = drivers[driverId];
            const dist = getDistance(lat, lng, d.latitude, d.longitude);
            if (dist < 3) {
                const customerName = orderData.customer_name || "Customer";
                const vehicle = (orderData.transport_type || "transportasi").includes("kurir") ? "Kurir" : "Transportasi";
                const harga = orderData.price || 0;
                const title = "🚖 Order Baru Dekat Anda!";
                const message = `${customerName} memesan ${vehicle}\nJarak: ${dist.toFixed(1)} km\nHarga: Rp ${harga.toLocaleString()}`;
                await sendPushNotification(d.playerId, title, message, orderId);
                count++;
            }
        }
        if (count > 0) addLog(`✅ Order ${orderId}: notifikasi awal ke ${count} driver (autobid ON, radius <3 km)`, "success");
        else addLog(`⚠️ Order ${orderId}: tidak ada driver autobid ON dalam radius 3 km untuk notifikasi awal`, "warning");

        // 2. Pasang timer fallback (jika order ini belum pernah diproses fallback)
        if (!fallbackProcessed.has(orderId)) {
            if (fallbackTimers.has(orderId)) clearTimeout(fallbackTimers.get(orderId));
            const timer = setTimeout(async () => {
                addLog(`⏰ Timer fallback untuk order ${orderId.substring(0,8)}: mengecek driver_offers...`, "info");
                const currentOrderSnap = await database.ref(`orders/${orderId}`).once('value');
                const currentOrder = currentOrderSnap.val();
                if (!currentOrder || currentOrder.status !== 'waiting') {
                    addLog(`⏭️ Order ${orderId.substring(0,8)} sudah tidak waiting, fallback diabaikan.`, "warning");
                    fallbackTimers.delete(orderId);
                    return;
                }
                const offersSnap = await database.ref(`orders/${orderId}/driver_offers`).once('value');
                const hasOffers = offersSnap.exists() && Object.keys(offersSnap.val()).length > 0;
                if (hasOffers) {
                    addLog(`✅ Order ${orderId.substring(0,8)} sudah memiliki penawaran driver. Fallback tidak diperlukan.`, "success");
                } else {
                    addLog(`🚨 Order ${orderId.substring(0,8)} TIDAK memiliki penawaran driver setelah ${FALLBACK_DELAY_SECONDS} detik. Admin akan mengirim offer otomatis.`, "warning");
                    await sendFallbackOffer(orderId, currentOrder);
                    fallbackProcessed.add(orderId);
                }
                fallbackTimers.delete(orderId);
            }, FALLBACK_DELAY_SECONDS * 1000);
            fallbackTimers.set(orderId, timer);
            addLog(`⏲️ Timer fallback ${FALLBACK_DELAY_SECONDS} detik dipasang untuk order ${orderId.substring(0,8)}`, "info");
        }
        processedOrderIds.add(orderId);
    }

    // Fungsi loadDriversForNotification (sama seperti versi sebelumnya, untuk notifikasi autobid)
    async function loadDriversForNotification() {
        try {
            const snapshot = await database.ref("driver_locations").once("value");
            const allDrivers = snapshot.val();
            if (!allDrivers) return {};
            const filtered = {};
            for (const uid in allDrivers) {
                const d = allDrivers[uid];
                if (d.tracking_enabled === true && d.autobid_enabled === true && d.playerId && d.latitude && d.longitude) {
                    filtered[uid] = {
                        playerId: d.playerId,
                        latitude: d.latitude,
                        longitude: d.longitude,
                        name: d.fullName || `Driver ${uid.substring(0,6)}`
                    };
                }
            }
            addLog(`Driver online (tracking+autobid ON): ${Object.keys(filtered).length}`, "info");
            return filtered;
        } catch(e) {
            addLog(`Gagal load driver_locations: ${e.message}`, "error");
            return {};
        }
    }

    // ========== LISTENER ORDER OTOMATIS (child_added) ==========
    function startListeningOrders() {
        if (ordersListener) return;
        const ordersRef = database.ref("orders");
        ordersRef.on("child_added", async (snapshot) => {
            await processNewOrder(snapshot.key, snapshot.val());
        });
        ordersListener = true;
        addLog(`👂 Listener order aktif (child_added) - notifikasi awal + auto fallback offer setelah ${FALLBACK_DELAY_SECONDS} detik.`, "success");
        document.getElementById("statusText").innerText = `Listening order (auto fallback ${FALLBACK_DELAY_SECONDS}s)`;
    }

    // ========== DENGARKAN PERUBAHAN ORDER (untuk pemberitahuan jika penawaran diterima) ==========
    // ========== DENGARKAN PERUBAHAN ORDER (untuk pemberitahuan jika penawaran diterima) ==========
function startListeningToOrderChanges() {
    const ordersRef = database.ref('orders');
    ordersRef.on('child_changed', async (snapshot) => {
        const order = snapshot.val();
        const orderId = snapshot.key;
        if (!order) return;

        // --- AUTO DEDUCT JIKA STATUS ON_TRIP ---
        if (order.status === 'on_trip') {
            await autoDeductOnTrip(orderId, order);
        }

        // --- NOTIFIKASI JIKA ORDER DIACCEPT CUSTOMER ---
        if (order.status === 'accepted' && order.driver_id) {
            const notifKey = `notif_admin_accepted_${orderId}`;
            if (sessionStorage.getItem(notifKey)) return;
            sessionStorage.setItem(notifKey, 'true');
            addLog(`🎉 Order ${orderId} telah diterima oleh customer. Driver terpilih: ${order.driver_id}`, "success");
            const title = "🎉 Penawaran Anda Diterima!";
            const message = `Selamat! Penawaran Anda untuk order ${orderId.substring(0,8)} telah diterima. Segera proses order.`;
            await sendManualPushToDriver(order.driver_id, title, message, orderId);
        }
    });
    addLog("👂 Listener perubahan order (child_changed) aktif untuk auto deduct on_trip dan notifikasi.", "success");
}

// ========== FUNGSI MANUAL PUSH KE DRIVER ==========
async function sendManualPushToDriver(driverId, title, message, orderId = null) {
    if (!ONESIGNAL_API_KEY) {
        addLog("❌ OneSignal API Key belum tersedia, tidak bisa kirim notifikasi.", "error");
        return false;
    }
    const locSnap = await database.ref(`driver_locations/${driverId}/playerId`).once('value');
    const playerId = locSnap.val();
    if (!playerId) {
        addLog(`⚠️ Driver ${driverId} tidak memiliki playerId, tidak bisa kirim notifikasi.`, "warning");
        return false;
    }
    return sendPushNotification(playerId, title, message, orderId);
}

// ========== OTOMATIS PEMOTONGAN SAAT ORDER ON_TRIP ==========
async function autoDeductOnTrip(orderId, orderData) {
    // Cegah potong ganda
    if (processedDeductionOrders.has(orderId)) return;
    if (orderData.status !== 'on_trip') return;
    if (orderData.balance_deducted === true) return;

    const driverId = orderData.driver_id;
    const hargaOrder = orderData.price;
    if (!driverId || !hargaOrder) {
        addLog(`⚠️ Auto deduct gagal untuk order ${orderId}: driver_id atau price tidak valid.`, "warning");
        return;
    }

    try {
        // Ambil fee dan pajak dari data-jego
        const potonganSnap = await database.ref('data-jego/potongan').once('value');
        const pajakSnap = await database.ref('data-jego/pajak').once('value');
        let feePersen = parseFloat(potonganSnap.val()) || 0;
        let pajakPersen = parseFloat(pajakSnap.val()) || 0;

        const potonganRupiah = hargaOrder * (feePersen / 100);
        const pajakRupiah = potonganRupiah * (pajakPersen / 100);
        const totalPotongan = potonganRupiah + pajakRupiah;

        // Cek saldo driver cukup
        const balanceSnap = await database.ref(`drivers/${driverId}/balance`).once('value');
        const currentBalance = balanceSnap.val() || 0;
        if (currentBalance < totalPotongan) {
            addLog(`⚠️ Auto deduct: Saldo driver ${driverId} tidak cukup (${formatRupiah(currentBalance)} < ${formatRupiah(totalPotongan)}).`, "warning");
            return;
        }

        // Lakukan pemotongan (transaction)
        const driverRef = database.ref(`drivers/${driverId}/balance`);
        await driverRef.transaction(current => (current || 0) - totalPotongan);

        // Tandai order sudah dipotong
        await database.ref(`orders/${orderId}`).update({
            balance_deducted: true,
            deducted_at: new Date().toISOString(),
            deduction_fee_persen: feePersen,
            deduction_tax_persen: pajakPersen,
            deduction_amount: totalPotongan
        });

        // Catat riwayat (opsional)
        await database.ref(`driver_deductions/${driverId}/${orderId}`).set({
            amount: totalPotongan,
            order_price: hargaOrder,
            fee_percentage: feePersen,
            fee_amount: potonganRupiah,
            tax_percentage: pajakPersen,
            tax_amount: pajakRupiah,
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            status: 'auto_deducted_by_admin_panel',
            order_id: orderId
        });

        addLog(`💰 OTOMATIS: Potong saldo driver ${orderData.driver_name || driverId} sebesar ${formatRupiah(totalPotongan)} dari order ${orderId.substring(0,8)} (fee ${feePersen}%, pajak ${pajakPersen}%)`, "success");
        processedDeductionOrders.add(orderId);

    } catch (err) {
        addLog(`❌ Auto deduct error untuk order ${orderId}: ${err.message}`, "error");
    }
}

    // ================= HAPUS ORDER KADALUARSA (>30 MENIT) =================
    async function deleteExpiredOrders() {
        addLog("🕒 Memeriksa order yang sudah lebih dari 30 menit (status waiting)...", "info");
        const now = new Date();
        const thirtyMinutesAgo = new Date(now.getTime() - 30 * 60 * 1000);
        const ordersRef = database.ref('orders');
        const snapshot = await ordersRef.once('value');
        const orders = snapshot.val();
        if (!orders) {
            addLog("Tidak ada order untuk diperiksa.", "info");
            return;
        }
        let deletedCount = 0;
        for (const [orderId, order] of Object.entries(orders)) {
            if (order.status === 'waiting' && order.created_at) {
                const orderCreated = new Date(order.created_at);
                if (orderCreated <= thirtyMinutesAgo) {
                    // Hapus juga timer fallback jika ada
                    if (fallbackTimers.has(orderId)) {
                        clearTimeout(fallbackTimers.get(orderId));
                        fallbackTimers.delete(orderId);
                    }
                    await ordersRef.child(orderId).remove();
                    addLog(`🗑 Order ${orderId.substring(0,8)} dihapus karena kadaluarsa (dibuat ${orderCreated.toLocaleTimeString()})`, "warning");
                    deletedCount++;
                }
            }
        }
        if (deletedCount > 0) {
            addLog(`✅ Berhasil menghapus ${deletedCount} order kadaluarsa.`, "success");
            await refreshDriversAndOrders();
        } else {
            addLog("Tidak ada order kadaluarsa yang ditemukan.", "info");
        }
    }

    // ================= KIRIM PENAWARAN MANUAL (ADMIN) =================
    async function loadDriversForSelect() {
    const snapshot = await database.ref('drivers').once('value');
    allDrivers = snapshot.val() || {};
    const select = document.getElementById('adminDriverSelect');
    select.innerHTML = '<option value="">-- Pilih Driver --</option>';
    for (const [uid, data] of Object.entries(allDrivers)) {
        if (data.name && data.vehicle_type) {   // <- perbaiki jadi vehicle_type
            const option = document.createElement('option');
            option.value = uid;
            option.textContent = `${data.name} (${data.vehicle_type}) - ${data.plate_number || 'no plat'}`;
            select.appendChild(option);
        }
    }
    addLog(`Daftar driver dimuat: ${select.options.length-1} driver.`, "info");
}

    async function loadWaitingOrdersForSelect() {
        const snapshot = await database.ref('orders').once('value');
        const orders = snapshot.val() || {};
        allWaitingOrders = {};
        const select = document.getElementById('adminOrderSelect');
        select.innerHTML = '<option value="">-- Pilih Order (waiting) --</option>';
        let count = 0;
        for (const [orderId, order] of Object.entries(orders)) {
            if (order.status === 'waiting') {
                allWaitingOrders[orderId] = order;
                const option = document.createElement('option');
                option.value = orderId;
                const shortId = orderId.substring(0,8);
                const pickup = (order.pickup_address || 'Alamat').substring(0,30);
                option.textContent = `${shortId}... | ${pickup}`;
                select.appendChild(option);
                count++;
            }
        }
        addLog(`Daftar order waiting dimuat: ${count} order.`, "info");
    }

    async function sendAdminOffer() {
    const driverId = document.getElementById('adminDriverSelect').value;
    const orderId = document.getElementById('adminOrderSelect').value;
    const resultDiv = document.getElementById('adminOfferResult');

    if (!driverId || !orderId) {
        resultDiv.innerHTML = '<span style="color:#ffaa66;">⚠️ Pilih driver dan order terlebih dahulu.</span>';
        return;
    }

    const driver = allDrivers[driverId];
    if (!driver) {
        resultDiv.innerHTML = '<span style="color:#ff6666;">❌ Data driver tidak ditemukan (coba refresh daftar driver).</span>';
        return;
    }

    const order = allWaitingOrders[orderId];
    if (!order || order.status !== 'waiting') {
        resultDiv.innerHTML = '<span style="color:#ff6666;">❌ Order tidak ditemukan atau sudah tidak dalam status waiting. Silakan refresh daftar order.</span>';
        return;
    }

    // Ambil lokasi driver dari driver_locations untuk validasi jarak
    const locSnap = await database.ref(`driver_locations/${driverId}`).once('value');
    const driverLoc = locSnap.val();
    const driverLat = driverLoc?.latitude;
    const driverLng = driverLoc?.longitude;
    const pickupLat = order.pickup_lat;
    const pickupLng = order.pickup_lng;

    let dist = null;
    if (driverLat && driverLng && pickupLat && pickupLng) {
        dist = getDistance(driverLat, driverLng, pickupLat, pickupLng);
        if (dist > 3) {
            resultDiv.innerHTML = `<span style="color:#ffaa66;">⚠️ Jarak driver ke pickup (${dist.toFixed(1)} km) melebihi 3 km. Offer tidak dikirim.</span>`;
            return;
        }
    } else {
        resultDiv.innerHTML = '<span style="color:#ffaa66;">⚠️ Data lokasi driver atau order tidak lengkap. Offer dibatalkan.</span>';
        return;
    }

    // Cek apakah driver sudah pernah menawarkan order ini
    const existingOfferSnap = await database.ref(`orders/${orderId}/driver_offers/${driverId}`).once('value');
    if (existingOfferSnap.exists()) {
        resultDiv.innerHTML = '<span style="color:#ffaa66;">⚠️ Driver ini sudah pernah mengirim penawaran untuk order ini.</span>';
        return;
    }

    // Perbaiki offerData: gunakan driver (dari allDrivers) dan field yang benar
    const offerData = {
        driver_id: driverId,
        driver_name: driver.name || "Driver",
        driver_plate: driver.plate_number || '',
        driver_type: driver.vehicle_type || '',
        driver_rating: driver.rating || 5,
        driver_trips: driver.perjalanan || 0,
        driver_photo: driver.photoURL || '',
        offered_at: new Date().toISOString(),
        status: 'offered'
        // auto_fallback_by_admin tidak perlu untuk manual, tapi boleh ditambahkan jika ingin
    };

    try {
        await database.ref(`orders/${orderId}/driver_offers/${driverId}`).set(offerData);
        resultDiv.innerHTML = `<span style="color:#66ff66;">✅ Penawaran berhasil dikirim untuk driver ${driver.name} ke order ${orderId.substring(0,8)}. (Jarak: ${dist.toFixed(1)} km)</span>`;
        addLog(`Admin MANUAL mengirim offer untuk driver ${driver.name} (${driverId}) ke orders/${orderId}/driver_offers/${driverId}, jarak ${dist.toFixed(1)} km`, "success");

        // Kirim notifikasi push ke driver
        const title = "📢 Penawaran Dikirim oleh Admin";
        const message = `Halo ${driver.name}, admin telah mengirimkan penawaran Anda untuk order dari ${order.customer_name || 'customer'}. Segera cek aplikasi driver.`;
        await sendManualPushToDriver(driverId, title, message, orderId);
    } catch (err) {
        resultDiv.innerHTML = `<span style="color:#ff6666;">❌ Gagal: ${err.message}</span>`;
        addLog(`Gagal kirim offer admin: ${err.message}`, "error");
    }
}

    async function refreshDriversAndOrders() {
        await loadDriversForSelect();
        await loadWaitingOrdersForSelect();
        document.getElementById('adminOfferResult').innerHTML = '';
        addLog("Data driver & order berhasil direfresh.", "success");
    }

    async function testNotification() {
        if (!ONESIGNAL_API_KEY) {
            addLog("❌ API Key tidak tersedia. Notifikasi tidak dapat dikirim.", "error");
            return;
        }
        const drivers = await loadDriversForNotification();
        const driverIds = Object.keys(drivers);
        if (driverIds.length === 0) {
            addLog("Tidak ada driver dengan tracking+autobid ON untuk test.", "error");
            return;
        }
        const first = drivers[driverIds[0]];
        await sendPushNotification(first.playerId, "🧪 Test Notifikasi JeGo", "Ini notifikasi uji coba dari admin panel (hanya driver autobid ON).");
    }

    // ================= AUTENTIKASI & INIT =================
    async function initAdminPanel() {
        document.getElementById("clearLogBtn").onclick = () => {
            document.getElementById("logContainer").innerHTML = '<div class="log-entry log-info">▶️ Log dibersihkan</div>';
            addLog("Log dihapus manual", "info");
        };
        document.getElementById("testNotifBtn").onclick = testNotification;
        document.getElementById("cleanupOrdersBtn").onclick = deleteExpiredOrders;
        document.getElementById("logoutBtn").onclick = async () => {
            await auth.signOut();
            window.location.href = 'login_admin.html';
        };
        document.getElementById("adminSendOfferBtn").onclick = sendAdminOffer;
        document.getElementById("refreshDriversOrdersBtn").onclick = refreshDriversAndOrders;

        await loadDriversForSelect();
        await loadWaitingOrdersForSelect();

        // Mulai listener order otomatis (notifikasi awal + fallback timer)
        startListeningOrders();
        // Listener perubahan status order
        startListeningToOrderChanges();

        document.getElementById("firebaseStatus").innerText = "✅ Terhubung";
        addLog("Firebase terhubung, admin panel siap (auto fallback offer aktif).", "success");

        // Ambil API Key
        await fetchOneSignalApiKey();

        // Jalankan sekali saat startup untuk membersihkan order kadaluarsa
        await deleteExpiredOrders();
        // Jadwalkan pembersihan setiap 10 menit
        setInterval(deleteExpiredOrders, 10 * 60 * 1000);
    }

    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            window.location.href = 'login_admin.html';
            return;
        }
        try {
            const adminSnap = await database.ref(`admins/${user.uid}`).once('value');
            if (!adminSnap.exists()) {
                addLog("Akun Anda tidak terdaftar sebagai admin. Logout.", "error");
                await auth.signOut();
                window.location.href = 'login_admin.html';
                return;
            }
            addLog(`Admin ${user.email} berhasil login.`, "success");
            initAdminPanel();
        } catch (err) {
            addLog(`Error verifikasi admin: ${err.message}`, "error");
            await auth.signOut();
            window.location.href = 'login_admin.html';
        }
    });
</script>
