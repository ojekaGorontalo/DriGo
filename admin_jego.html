<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JeGo Core - 3 Fungsi + Notifikasi (Optimasi)</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: monospace; background: #0a0f1e; color: #e0e0e0; padding: 20px; }
        .log { background: #0f1724; padding: 10px; border-radius: 10px; max-height: 400px; overflow-y: auto; }
        .log-entry { border-bottom: 1px solid #1e2a3a; padding: 4px 0; }
        .success { color: #86efac; }
        .error { color: #fca5a5; }
        .warning { color: #fcd34d; }
        button { background: #FF9800; border: none; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <h2>JeGo Core - 3 Fungsi + Notifikasi</h2>
    <p>Auto Deduct, Rating, Cleanup, Chat & Push Notifikasi (Optimasi Cache 100%)</p>
    <button id="logoutBtn">Logout</button>
    <div class="log" id="logContainer">
        <div class="log-entry">🚀 Memulai sistem (3 fungsi + notifikasi)...</div>
    </div>

    <script>
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyCD0pgeZio-LdKqYDtWxcdXcZwyL4ngYQI",
            authDomain: "jego-35a2b.firebaseapp.com",
            databaseURL: "https://jego-35a2b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "jego-35a2b",
            storageBucket: "jego-35a2b.firebasestorage.app",
            messagingSenderId: "600037007040",
            appId: "1:600037007040:web:ac3243ad9b472647ffd725"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // ==================== GLOBAL VARIABLES ====================
        let processedDeductionOrders = new Set();
        let checkedCancelledOrders = new Set();
        let ONESIGNAL_API_KEY = "";
        const ONESIGNAL_APP_ID = "007d7eba-9cfc-40d1-a92e-f2299f770282";
        let potonganCache = null;
        let pajakCache = null;

        // ==================== CACHE LAYER (OPTIMASI) ====================
        let ordersCache = {};
        let driversCache = {};
        let usersCache = {};
        let cacheInitialized = false;

        // ===== CHAT NOTIF =====
        let chatOrderListeners = new Set();
        let processedChatMessages = new Set();

        // ==================== UI LOG ====================
        function addLog(msg, type = "info") {
            const logDiv = document.getElementById("logContainer");
            if (!logDiv) return;
            const entry = document.createElement("div");
            entry.className = "log-entry";
            if (type === "success") entry.classList.add("success");
            else if (type === "error") entry.classList.add("error");
            else if (type === "warning") entry.classList.add("warning");
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${msg}`;
            logDiv.prepend(entry);
            while (logDiv.children.length > 200) logDiv.removeChild(logDiv.lastChild);
        }

        // ==================== ONE SIGNAL ====================
        async function getOneSignalApiKey() {
            if (ONESIGNAL_API_KEY) return ONESIGNAL_API_KEY;
            try {
                const snap = await database.ref('data-jego/PushKey').once('value');
                ONESIGNAL_API_KEY = snap.val();
                if (ONESIGNAL_API_KEY) addLog("🔑 OneSignal API Key loaded", "success");
                else addLog("⚠️ PushKey tidak ditemukan", "error");
                return ONESIGNAL_API_KEY;
            } catch(e) {
                addLog(`❌ Gagal memuat PushKey: ${e.message}`, "error");
                return null;
            }
        }

        async function sendPushNotification(playerId, title, message, extraData = {}) {
            if (!playerId || !ONESIGNAL_API_KEY) return false;
            try {
                const res = await fetch("https://onesignal.com/api/v1/notifications", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Basic ${ONESIGNAL_API_KEY}` },
                    body: JSON.stringify({
                        app_id: ONESIGNAL_APP_ID,
                        include_player_ids: [playerId],
                        headings: { en: title },
                        contents: { en: message },
                        data: { type: "auto_system", ...extraData },
                        priority: 10,
                        android_priority: "high",
                        android_channel_id: "022cc65d-3fb9-4939-85df-07e7cf3df0b8"
                    })
                });
                const result = await res.json();
                if (result.errors) { addLog(`⚠️ Notif gagal: ${JSON.stringify(result.errors)}`, "warning"); return false; }
                return true;
            } catch(err) { addLog(`❌ Error notif: ${err.message}`, "error"); return false; }
        }

        // Fungsi untuk ambil playerId dari cache (tidak baca Firebase)
        function getDriverPlayerId(driverId) {
            if (driversCache[driverId] && driversCache[driverId].playerId) {
                return driversCache[driverId].playerId;
            }
            return null;
        }

        async function saveDriverNotification(driverId, title, message, type = 'system') {
            if (!driverId) return;
            try {
                await database.ref(`driver_notifications/${driverId}`).push({
                    title, message, timestamp: firebase.database.ServerValue.TIMESTAMP, read: false, type
                });
            } catch(e) { console.error(e); }
        }

        // ==================== UTILITY ====================
        async function hitungTotalPotongan(hargaOrder) {
            let fee = potonganCache;
            let pajak = pajakCache;
            if (fee === null || pajak === null) {
                try {
                    const [potSnap, pajakSnap] = await Promise.all([
                        database.ref('data-jego/potongan').once('value'),
                        database.ref('data-jego/pajak').once('value')
                    ]);
                    fee = parseFloat(potSnap.val()) || 0;
                    pajak = parseFloat(pajakSnap.val()) || 0;
                    potonganCache = fee;
                    pajakCache = pajak;
                } catch(e) {
                    return { total: 0, feePersen: 0, pajakPersen: 0 };
                }
            }
            const potonganRupiah = hargaOrder * (fee / 100);
            const pajakRupiah = potonganRupiah * (pajak / 100);
            return { total: potonganRupiah + pajakRupiah, feePersen: fee, pajakPersen: pajak };
        }

        // ==================== INISIALISASI CACHE ====================
        async function initCache() {
            if (cacheInitialized) return;
            addLog("📦 Inisialisasi cache (orders, drivers, users)...", "info");
            try {
                // Load orders
                const ordersSnap = await database.ref('orders').once('value');
                ordersCache = ordersSnap.val() || {};
                database.ref('orders').on('child_added', (snap) => { ordersCache[snap.key] = snap.val(); });
                database.ref('orders').on('child_changed', (snap) => { ordersCache[snap.key] = snap.val(); });
                database.ref('orders').on('child_removed', (snap) => { delete ordersCache[snap.key]; });

                // Load drivers (termasuk playerId)
                const driversSnap = await database.ref('drivers').once('value');
                driversCache = driversSnap.val() || {};
                database.ref('drivers').on('child_added', (snap) => { driversCache[snap.key] = snap.val(); });
                database.ref('drivers').on('child_changed', (snap) => { driversCache[snap.key] = snap.val(); });
                database.ref('drivers').on('child_removed', (snap) => { delete driversCache[snap.key]; });

                // Load users
                const usersSnap = await database.ref('users').once('value');
                usersCache = usersSnap.val() || {};
                database.ref('users').on('child_added', (snap) => { usersCache[snap.key] = snap.val(); });
                database.ref('users').on('child_changed', (snap) => { usersCache[snap.key] = snap.val(); });
                database.ref('users').on('child_removed', (snap) => { delete usersCache[snap.key]; });

                // Load potongan & pajak
                const [potSnap, pajakSnap] = await Promise.all([
                    database.ref('data-jego/potongan').once('value'),
                    database.ref('data-jego/pajak').once('value')
                ]);
                potonganCache = parseFloat(potSnap.val()) || 0;
                pajakCache = parseFloat(pajakSnap.val()) || 0;
                database.ref('data-jego/potongan').on('value', (snap) => { potonganCache = parseFloat(snap.val()) || 0; });
                database.ref('data-jego/pajak').on('value', (snap) => { pajakCache = parseFloat(snap.val()) || 0; });

                // Ambil OneSignal API Key
                await getOneSignalApiKey();

                cacheInitialized = true;
                addLog("✅ Cache berhasil diinisialisasi", "success");
            } catch(err) {
                addLog(`❌ Gagal inisialisasi cache: ${err.message}`, "error");
            }
        }

        // ==================== 1. AUTO DEDUCT (OPTIMASI TOTAL) ====================
        async function autoDeductOnTrip(orderId, orderData) {
            if (processedDeductionOrders.has(orderId)) return;
            if (orderData.status !== 'on_trip') return;
            if (orderData.balance_deducted === true) return;

            const driverId = orderData.driver_id;
            const hargaOrder = orderData.price;
            if (!driverId || !hargaOrder) return;

            try {
                const potonganInfo = await hitungTotalPotongan(hargaOrder);
                const totalPotongan = potonganInfo.total;
                if (totalPotongan === 0) return;

                let currentBalance = driversCache[driverId] ? driversCache[driverId].balance || 0 : 0;
                if (currentBalance < totalPotongan) {
                    addLog(`⚠️ Auto deduct: Saldo driver ${driverId.substring(0,8)} tidak cukup`, "warning");
                    return;
                }

                await database.ref(`drivers/${driverId}/balance`).set(currentBalance - totalPotongan);
                await database.ref(`orders/${orderId}`).update({ balance_deducted: true, deducted_at: new Date().toISOString() });
                await database.ref(`driver_deductions/${driverId}/${orderId}`).set({
                    amount: totalPotongan,
                    order_price: hargaOrder,
                    fee_percentage: potonganInfo.feePersen,
                    tax_percentage: potonganInfo.pajakPersen,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });

                addLog(`💰 OTOMATIS: Potong saldo driver ${driverId.substring(0,8)} sebesar Rp ${totalPotongan.toFixed(1)}`, "success");
                processedDeductionOrders.add(orderId);

                // === NOTIFIKASI KE DRIVER ===
                const playerId = getDriverPlayerId(driverId);
                if (playerId) {
                    const title = "💰 Potongan Saldo Otomatis";
                    const message = `Saldo Anda dipotong Rp ${totalPotongan.toFixed(0)} untuk order ${orderId.substring(0,8)} (biaya admin).`;
                    await sendPushNotification(playerId, title, message, { orderId, type: 'deduct' });
                    await saveDriverNotification(driverId, title, message);
                }

            } catch(err) {
                addLog(`❌ Auto deduct error: ${err.message}`, "error");
            }
        }

        // ==================== 2. RATING & AGREGAT (INCREMENTAL, PAKAI CACHE) ====================
        async function updateDriverRating(driverId, newRating) {
            if (!driverId || typeof newRating !== 'number') return;
            try {
                let driverData = driversCache[driverId] || {};
                let totalRating = driverData.totalRating || 0;
                let ratingCount = driverData.ratingCount || 0;
                totalRating += newRating;
                ratingCount += 1;
                const avg = totalRating / ratingCount;

                await database.ref(`drivers/${driverId}`).update({
                    totalRating,
                    ratingCount,
                    rating: avg,
                    last_rating_update: new Date().toISOString()
                });
                if (driversCache[driverId]) {
                    driversCache[driverId].totalRating = totalRating;
                    driversCache[driverId].ratingCount = ratingCount;
                    driversCache[driverId].rating = avg;
                    driversCache[driverId].last_rating_update = new Date().toISOString();
                }
                addLog(`⭐ Driver ${driverId.substring(0,8)} rating baru: ${avg.toFixed(1)} (total ${ratingCount} rating)`, "success");
            } catch(err) {
                addLog(`❌ Gagal update rating driver: ${err.message}`, "error");
            }
        }

        async function updateCustomerRating(customerId, newRating) {
            if (!customerId || typeof newRating !== 'number') return;
            try {
                let userData = usersCache[customerId] || {};
                let totalRating = userData.totalRating || 0;
                let ratingCount = userData.ratingCount || 0;
                totalRating += newRating;
                ratingCount += 1;
                const avg = totalRating / ratingCount;

                await database.ref(`users/${customerId}`).update({
                    totalRating,
                    ratingCount,
                    rating: avg,
                    last_rating_update: new Date().toISOString()
                });
                if (usersCache[customerId]) {
                    usersCache[customerId].totalRating = totalRating;
                    usersCache[customerId].ratingCount = ratingCount;
                    usersCache[customerId].rating = avg;
                    usersCache[customerId].last_rating_update = new Date().toISOString();
                }
                addLog(`⭐ Customer ${customerId.substring(0,8)} rating baru: ${avg.toFixed(1)} (total ${ratingCount} rating)`, "success");
            } catch(err) {
                addLog(`❌ Gagal update rating customer: ${err.message}`, "error");
            }
        }

        let ratingAggregatesInitialized = false;
        async function initializeRatingAggregates() {
            if (ratingAggregatesInitialized) return;
            if (localStorage.getItem('ratingAggregatesDone') === 'true') {
                ratingAggregatesInitialized = true;
                addLog("✅ Agregat rating sudah diinisialisasi (skip)", "info");
                return;
            }
            addLog("🔍 Inisialisasi agregat rating driver & customer...", "info");
            try {
                const ratingsSnap = await database.ref('ratings').once('value');
                const ratings = ratingsSnap.val() || {};
                const driverAgg = {};
                const customerAgg = {};
                for (let orderId in ratings) {
                    const rating = ratings[orderId];
                    if (rating.driver_rating) {
                        const did = rating.driver_rating.driver_id;
                        const r = rating.driver_rating.rating;
                        if (did && typeof r === 'number') {
                            if (!driverAgg[did]) driverAgg[did] = { total: 0, count: 0 };
                            driverAgg[did].total += r;
                            driverAgg[did].count++;
                        }
                    }
                    if (rating.customer_rating) {
                        const cid = rating.customer_rating.customer_id;
                        const r = rating.customer_rating.rating;
                        if (cid && typeof r === 'number') {
                            if (!customerAgg[cid]) customerAgg[cid] = { total: 0, count: 0 };
                            customerAgg[cid].total += r;
                            customerAgg[cid].count++;
                        }
                    }
                }
                for (let did in driverAgg) {
                    const d = driverAgg[did];
                    const avg = d.total / d.count;
                    await database.ref(`drivers/${did}`).update({
                        totalRating: d.total,
                        ratingCount: d.count,
                        rating: avg,
                        last_rating_update: new Date().toISOString()
                    });
                }
                for (let cid in customerAgg) {
                    const c = customerAgg[cid];
                    const avg = c.total / c.count;
                    await database.ref(`users/${cid}`).update({
                        totalRating: c.total,
                        ratingCount: c.count,
                        rating: avg,
                        last_rating_update: new Date().toISOString()
                    });
                }
                ratingAggregatesInitialized = true;
                localStorage.setItem('ratingAggregatesDone', 'true');
                addLog(`✅ Agregat rating diinisialisasi: ${Object.keys(driverAgg).length} driver, ${Object.keys(customerAgg).length} customer`, "success");
            } catch(err) {
                addLog(`⚠️ Gagal inisialisasi agregat: ${err.message}`, "warning");
            }
        }

        // ==================== 3. CLEANUP (EXPIRED OFFERS & ORDERS) PAKAI CACHE ====================
        async function cleanupExpiredOffers() {
            try {
                const now = Date.now();
                let removed = 0;
                for (const [orderId, order] of Object.entries(ordersCache)) {
                    if (order.status === 'waiting' && order.driver_offers) {
                        for (const [driverId, offer] of Object.entries(order.driver_offers)) {
                            if (offer.status === 'offered' && offer.expired_at && offer.expired_at < now) {
                                await database.ref(`orders/${orderId}/driver_offers/${driverId}`).remove();
                                removed++;
                            }
                        }
                    }
                }
                if (removed) addLog(`🗑️ Bersihkan ${removed} offer expired`, "success");
            } catch(err) {
                addLog(`❌ Gagal cleanup expired offers: ${err.message}`, "error");
            }
        }

        async function deleteExpiredOrders() {
            const now = new Date();
            const thirtyMinAgo = new Date(now.getTime() - 30*60*1000);
            let del = 0;
            for (const [id, o] of Object.entries(ordersCache)) {
                if (o.status === 'waiting' && o.created_at && new Date(o.created_at) <= thirtyMinAgo) {
                    await database.ref('orders/' + id).remove();
                    del++;
                }
            }
            if (del) addLog(`🗑️ Hapus ${del} order kadaluarsa (>30 menit)`, "success");
        }

        // ==================== 4. NOTIFIKASI CHAT (OPTIMASI CACHE) ====================
        async function listenToChatOrder(orderId) {
            const snapshot = await database.ref(`chat/${orderId}`).once('value');
            const messages = snapshot.val() || {};
            for (let key in messages) {
                processedChatMessages.add(key);
            }
            database.ref(`chat/${orderId}`).on('child_added', async (snap) => {
                const msgKey = snap.key;
                if (processedChatMessages.has(msgKey)) return;
                processedChatMessages.add(msgKey);

                const msgData = snap.val();
                if (!msgData || !msgData.sender) return;

                // Ambil order dari cache (tidak baca Firebase)
                const order = ordersCache[orderId];
                if (!order) return;

                let senderType = msgData.sender;
                let receiverId = null;
                let senderName = '';
                let title = '';
                let message = msgData.message || 'Pesan baru';

                if (senderType === 'driver') {
                    receiverId = order.user_id;
                    senderName = order.driver_name || 'Driver';
                    title = `💬 Pesan dari Driver ${senderName}`;
                } else if (senderType === 'customer') {
                    receiverId = order.driver_id;
                    senderName = order.customer_name || 'Customer';
                    title = `💬 Pesan dari Customer ${senderName}`;
                } else {
                    return;
                }

                if (!receiverId) {
                    addLog(`⚠️ Tidak ada penerima untuk order ${orderId}`, 'warning');
                    return;
                }

                let playerId = null;
                if (senderType === 'driver') {
                    // Cari playerId customer dari cache users
                    if (usersCache[receiverId] && usersCache[receiverId].playerId) {
                        playerId = usersCache[receiverId].playerId;
                    }
                } else {
                    // Cari playerId driver dari cache drivers
                    if (driversCache[receiverId] && driversCache[receiverId].playerId) {
                        playerId = driversCache[receiverId].playerId;
                    }
                }

                if (playerId) {
                    await sendPushNotification(playerId, title, message, { orderId, chat: true, sender: senderType });
                    addLog(`📨 Chat notifikasi: ${senderType} -> ${receiverId.substring(0,8)}`, 'success');
                } else {
                    addLog(`⚠️ Tidak ada playerId untuk penerima ${receiverId}`, 'warning');
                }
            });
        }

        function setupChatListener() {
            database.ref('chat').on('child_added', (snap) => {
                const orderId = snap.key;
                if (!chatOrderListeners.has(orderId)) {
                    chatOrderListeners.add(orderId);
                    listenToChatOrder(orderId);
                }
            });
            addLog('💬 Chat listener aktif (notifikasi otomatis ke driver/customer)', 'success');
        }

        // ==================== LISTENER UNTUK TRIGGER FUNGSI ====================
        function startListeners() {
            // Auto deduct
            database.ref('orders').on('child_changed', async (snap) => {
                const order = snap.val();
                const id = snap.key;
                if (order && order.status === 'on_trip') {
                    await autoDeductOnTrip(id, order);
                }
            });

            // Rating incremental
            database.ref('ratings').on('child_added', async (snap) => {
                const ratingData = snap.val();
                if (ratingData?.driver_rating?.driver_id && typeof ratingData.driver_rating.rating === 'number') {
                    await updateDriverRating(ratingData.driver_rating.driver_id, ratingData.driver_rating.rating);
                }
                if (ratingData?.customer_rating?.customer_id && typeof ratingData.customer_rating.rating === 'number') {
                    await updateCustomerRating(ratingData.customer_rating.customer_id, ratingData.customer_rating.rating);
                }
            });
            database.ref('ratings').on('child_changed', async (snap) => {
                const ratingData = snap.val();
                if (ratingData?.driver_rating?.driver_id && typeof ratingData.driver_rating.rating === 'number') {
                    await updateDriverRating(ratingData.driver_rating.driver_id, ratingData.driver_rating.rating);
                }
                if (ratingData?.customer_rating?.customer_id && typeof ratingData.customer_rating.rating === 'number') {
                    await updateCustomerRating(ratingData.customer_rating.customer_id, ratingData.customer_rating.rating);
                }
            });

            // Cleanup berkala
            setInterval(cleanupExpiredOffers, 10000);
            setInterval(deleteExpiredOrders, 10 * 60 * 1000);

            // Chat listener
            setupChatListener();
        }

        // ==================== INIT ====================
        async function initCore() {
            await initCache();
            await initializeRatingAggregates();
            startListeners();
            addLog('✅ 3 fungsi + notifikasi chat aktif: Auto Deduct, Rating, Cleanup, Chat Notif', 'success');
        }

        // ==================== AUTH ====================
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'login_admin.html'; return; }
            const adminSnap = await database.ref(`admins/${user.uid}`).once('value');
            if (!adminSnap.exists()) {
                addLog("❌ Bukan admin, logout...", "error");
                await auth.signOut();
                setTimeout(() => window.location.href = 'login_admin.html', 1500);
                return;
            }
            addLog(`✅ Admin ${user.email} login.`, "success");
            await initCore();
        });

        document.getElementById("logoutBtn").onclick = async () => {
            await auth.signOut();
            window.location.href = 'login_admin.html';
        };
    </script>
</body>
</html>
