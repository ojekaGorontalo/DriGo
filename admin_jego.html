    // ==================== UTILITY ====================

    function getDistance(lat1, lon1, lat2, lon2) {

        if (!lat1 || !lon1 || !lat2 || !lon2) return Infinity;

        const R = 6371;

        const dLat = (lat2 - lat1) * Math.PI / 180;

        const dLon = (lon2 - lon1) * Math.PI / 180;

        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;

        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

        return R * c;

    }



    function isVehicleTypeMatch(driverType, orderType) {

        if (!driverType || !orderType) return false;

        driverType = driverType.toLowerCase();

        orderType = orderType.toLowerCase();

        if (driverType === orderType) return true;

        if (orderType.includes('kurir')) {

            if (driverType === 'motor' && orderType === 'kurir_motor') return true;

            if (driverType === 'bentor' && orderType === 'kurir_bentor') return true;

        }

        return false;

    }



    function isKurirOrder(orderData) {

        const tipe = orderData.transport_type || orderData.vehicle || '';

        return tipe.includes('kurir');

    }



    async function hitungTotalPotongan(hargaOrder) {

        try {

            const potonganSnap = await database.ref('data-jego/potongan').once('value');

            const pajakSnap = await database.ref('data-jego/pajak').once('value');

            let feePersen = parseFloat(potonganSnap.val()) || 0;

            let pajakPersen = parseFloat(pajakSnap.val()) || 0;

            const potonganRupiah = hargaOrder * (feePersen / 100);

            const pajakRupiah = potonganRupiah * (pajakPersen / 100);

            return { total: potonganRupiah + pajakRupiah, feePersen, pajakPersen };

        } catch(e) { return { total: 0, feePersen: 0, pajakPersen: 0 }; }

    }



    // ==================== LOAD ACTIVE DRIVERS (FRESH <5 MENIT) ====================

    async function loadActiveDrivers() {

        const snap = await database.ref("driver_locations").once("value");

        const all = snap.val() || {};

        const activeDrivers = [];

        const now = Date.now();

        const MAX_AGE = 5 * 60 * 1000;

        for (const [uid, d] of Object.entries(all)) {

            if (d.tracking_enabled === true && d.latitude && d.longitude) {

                let lastUpdate = d.last_update ? new Date(d.last_update).getTime() : 0;

                if (now - lastUpdate < MAX_AGE) {

                    activeDrivers.push({

                        uid, playerId: d.playerId, latitude: d.latitude, longitude: d.longitude,

                        name: d.fullName || uid, autobid_enabled: d.autobid_enabled === true

                    });

                }

            }

        }

        return activeDrivers;

    }



    // ==================== LOAD STALE DRIVERS DALAM RADIUS ====================

    async function loadStaleDriversInRadius(lat, lng, radiusKm = 5) {

        const snap = await database.ref("driver_locations").once("value");

        const all = snap.val() || {};

        const staleDrivers = [];

        const now = Date.now();

        const MAX_AGE = 5 * 60 * 1000;

        for (const [uid, d] of Object.entries(all)) {

            if (d.tracking_enabled !== true) continue;

            if (!d.latitude || !d.longitude) continue;

            const lastUpdate = d.last_update ? new Date(d.last_update).getTime() : 0;

            const isStale = (now - lastUpdate) >= MAX_AGE;

            if (!isStale) continue;

            const dist = getDistance(lat, lng, d.latitude, d.longitude);

            if (dist <= radiusKm) {

                let driverName = d.fullName || uid;

                try {

                    const nameSnap = await database.ref(`drivers/${uid}/name`).once('value');

                    if (nameSnap.exists()) driverName = nameSnap.val();

                } catch(e) {}

                staleDrivers.push({

                    uid, playerId: d.playerId, name: driverName, distance: dist, last_update: d.last_update

                });

            }

        }

        return staleDrivers;

    }



    // ==================== AUTO FALLBACK (hanya untuk Autobid ON) ====================

    async function sendFallbackOffer(orderId, orderData) {

        if (isKurirOrder(orderData)) {

            addLog(`🚫 Fallback dibatalkan untuk order Kurir ${orderId.substring(0,8)}`, "warning");

            return false;

        }

        const orderSnap = await database.ref(`orders/${orderId}`).once('value');

        const order = orderSnap.val();

        if (!order || order.status !== 'waiting') return false;

        const offersSnap = await database.ref(`orders/${orderId}/driver_offers`).once('value');

        if (offersSnap.exists() && Object.keys(offersSnap.val()).length > 0) return false;

        const pickupLat = order.pickup_lat, pickupLng = order.pickup_lng;

        if (!pickupLat || !pickupLng) return false;



        const driversLoc = await database.ref("driver_locations").once('value');

        const allDrivers = driversLoc.val() || {};

        let eligibleDrivers = [];

        for (const [uid, data] of Object.entries(allDrivers)) {

            if (data.tracking_enabled !== true) continue;

            if (data.autobid_enabled !== true) continue;

            if (!data.latitude || !data.longitude) continue;

            const dist = getDistance(pickupLat, pickupLng, data.latitude, data.longitude);

            if (dist < 3) eligibleDrivers.push({ uid, ...data, distance: dist });

        }

        if (eligibleDrivers.length === 0) return false;

        eligibleDrivers.sort((a,b) => a.distance - b.distance);

        let selectedDriver = null;

        for (const driver of eligibleDrivers) {

            const driverSnap = await database.ref(`drivers/${driver.uid}`).once('value');

            const driverData = driverSnap.val();

            if (!driverData) continue;

            const driverType = driverData.vehicle_type || '';

            const orderType = order.transport_type || order.vehicle || 'motor';

            if (!isVehicleTypeMatch(driverType, orderType)) continue;

            const potonganInfo = await hitungTotalPotongan(order.price || 0);

            const saldoDriver = driverData.balance || 0;

            if (saldoDriver >= potonganInfo.total) {

                selectedDriver = { uid: driver.uid, data: driverData, distance: driver.distance, playerId: driver.playerId };

                break;

            }

        }

        if (!selectedDriver) return false;

        const offerData = {

            driver_id: selectedDriver.uid, driver_name: selectedDriver.data.name || "Driver",

            driver_plate: selectedDriver.data.plate_number || '', driver_type: selectedDriver.data.vehicle_type || '',

            driver_rating: selectedDriver.data.rating || 5, driver_trips: selectedDriver.data.perjalanan || 0,

            driver_photo: selectedDriver.data.photoURL || '', offered_at: new Date().toISOString(),

            status: 'offered', auto_fallback_by_admin: true, bid_price: order.price,

            bid_percent: 0, bid_requested: true, expired_at: Date.now() + 30000

        };

        try {

            await database.ref(`orders/${orderId}/driver_offers/${selectedDriver.uid}`).set(offerData);

            addLog(`🤖 AUTO FALLBACK: offer ke ${offerData.driver_name} (${selectedDriver.uid}) jarak ${selectedDriver.distance.toFixed(2)}km`, "success");

            if (selectedDriver.playerId) {

                await sendPushNotification(selectedDriver.playerId, "🚖 Order Baru (Auto Offer Admin)", `Halo ${offerData.driver_name}, admin mengirim penawaran order dari ${order.customer_name || 'Customer'} karena tidak ada driver merespon.`, { auto_fallback: true, orderId });

                await saveDriverNotification(selectedDriver.uid, "Order Baru (Fallback)", `Admin menawari Anda order dari ${order.customer_name || 'Customer'} (Rp ${order.price?.toLocaleString()})`);

            }

            return true;

        } catch(err) { addLog(`❌ Fallback gagal: ${err.message}`, "error"); return false; }

    }



    // ==================== PROSES ORDER BARU (OPTIMASI) ====================

    async function processNewOrder(orderId, orderData) {

        if (processedOrderIds.has(orderId)) return;

        if (orderData.status !== "waiting" && orderData.status !== "searching") return;

        const lat = orderData.pickup_lat || orderData.from_lat;

        const lng = orderData.pickup_lng || orderData.from_lng;

        if (!lat || !lng) return;

        const isKurir = isKurirOrder(orderData);

        addLog(`📦 Order baru: ${orderId.substring(0,8)}${isKurir ? ' (KURIR)' : ''}`, "info");



        // Ambil hanya order aktif (status accepted, on_the_way, arrived, on_trip)

        const activeStatuses = ['accepted', 'on_the_way', 'arrived', 'on_trip'];

        const activeOrdersSnap = await database.ref('orders')

            .orderByChild('status')

            .startAt('accepted')

            .endAt('on_trip')

            .once('value');

        const activeOrders = activeOrdersSnap.val() || {};

        const activeDriverIds = new Set();

        for (let orderIdLoop in activeOrders) {

            const order = activeOrders[orderIdLoop];

            if (order.driver_id) activeDriverIds.add(order.driver_id);

        }



        // Ambil hanya order waiting untuk cek driver yang sedang menawarkan

        const waitingOrdersSnap = await database.ref('orders')

            .orderByChild('status')

            .equalTo('waiting')

            .once('value');

        const waitingOrders = waitingOrdersSnap.val() || {};

        const waitingDriverIds = new Set();

        for (let orderIdLoop in waitingOrders) {

            const order = waitingOrders[orderIdLoop];

            if (order.driver_offers) {

                for (let driverId in order.driver_offers) {

                    if (order.driver_offers[driverId].status === 'offered') {

                        waitingDriverIds.add(driverId);

                    }

                }

            }

        }



        // Driver fresh (aktif)

        const drivers = await loadActiveDrivers();

        let notifiedCount = 0, autoOfferCount = 0;

        for (const driver of drivers) {

            const dist = getDistance(lat, lng, driver.latitude, driver.longitude);

            if (dist < 3) {

                const cust = orderData.customer_name || "Customer";

                const harga = orderData.price || 0;

                await sendPushNotification(driver.playerId, "🚖 Order Baru Dekat Anda!", `${cust} Rp ${harga.toLocaleString()} jarak ${dist.toFixed(1)}km`, { orderId });

                notifiedCount++;

                if (driver.autobid_enabled && !isKurir) {

                    if (waitingDriverIds.has(driver.uid) || activeDriverIds.has(driver.uid)) continue;

                    const driverSnap = await database.ref(`drivers/${driver.uid}`).once('value');

                    const driverData = driverSnap.val();

                    if (!driverData) continue;

                    const driverType = driverData.vehicle_type || '';

                    const orderType = orderData.transport_type || orderData.vehicle || 'motor';

                    if (!isVehicleTypeMatch(driverType, orderType)) continue;

                    const potonganInfo = await hitungTotalPotongan(orderData.price || 0);

                    const saldoDriver = driverData.balance || 0;

                    if (saldoDriver >= potonganInfo.total) {

                        const existingOffer = await database.ref(`orders/${orderId}/driver_offers/${driver.uid}`).once('value');

                        if (!existingOffer.exists()) {

                            const offerData = {

                                driver_id: driver.uid, driver_name: driverData.name || "Driver",

                                driver_plate: driverData.plate_number || '', driver_type: driverData.vehicle_type || '',

                                driver_rating: driverData.rating || 5, driver_trips: driverData.perjalanan || 0,

                                driver_photo: driverData.photoURL || '', offered_at: new Date().toISOString(),

                                status: 'offered', auto_offer_by_admin: true, bid_price: orderData.price,

                                bid_percent: 0, bid_requested: true, expired_at: Date.now() + 30000

                            };

                            await database.ref(`orders/${orderId}/driver_offers/${driver.uid}`).set(offerData);

                            addLog(`🤖 AUTO OFFER (autobid ON): ke ${driver.name} jarak ${dist.toFixed(2)}km`, "success");

                            if (driver.playerId) {

                                await sendPushNotification(driver.playerId, "🤖 Penawaran Otomatis Dikirim", `Anda telah ditawari order dari ${cust} sebesar Rp ${harga.toLocaleString()} (Autobid ON).`, { orderId, auto_offer: true });

                                await saveDriverNotification(driver.uid, "Penawaran Otomatis", `Anda ditawari order dari ${cust} (Rp ${harga.toLocaleString()})`);

                            }

                            autoOfferCount++;

                        }

                    } else {

                        addLog(`⚠️ Autobid skipped: saldo driver ${driver.name} tidak cukup`, "warning");

                    }

                }

            }

        }

        addLog(`✅ Notif ke ${notifiedCount} driver, auto offer ke ${autoOfferCount} driver`, "success");



        // Notifikasi untuk driver stale dalam radius 5 km (cooldown 30 menit)

        const staleDriversNearby = await loadStaleDriversInRadius(lat, lng, 5);

        const nowTime = Date.now();

        const COOLDOWN_MS = 30 * 60 * 1000;

        for (const stale of staleDriversNearby) {

            const lastNotif = lastStaleNotifTime.get(stale.uid);

            if (lastNotif && (nowTime - lastNotif) < COOLDOWN_MS) continue;

            if (stale.playerId) {

                const title = "🚖 Ada Order di Dekat Lokasi Terakhirmu";

                const message = `Halo ${stale.name}, ada order dari ${orderData.customer_name || 'Customer'} (Rp ${orderData.price?.toLocaleString()}) di sekitar lokasi terakhirmu. Buka aplikasi dan aktifkan lokasi agar bisa menerima order.`;

                await sendPushNotification(stale.playerId, title, message, { orderId, stale_location: true });

                addLog(`📢 Notifikasi stale driver: ${stale.name} (jarak ${stale.distance.toFixed(1)}km dari lokasi terakhir)`, "info");

                lastStaleNotifTime.set(stale.uid, nowTime);

            }

        }



        // Timer fallback

        if (!isKurir && !fallbackProcessed.has(orderId)) {

            if (fallbackTimers.has(orderId)) clearTimeout(fallbackTimers.get(orderId));

            const timer = setTimeout(async () => {

                const cur = await database.ref(`orders/${orderId}`).once('value');

                const curOrder = cur.val();

                if (!curOrder || curOrder.status !== 'waiting') { fallbackTimers.delete(orderId); return; }

                const offers = await database.ref(`orders/${orderId}/driver_offers`).once('value');

                if (offers.exists() && Object.keys(offers.val()).length > 0) {

                    addLog(`✅ Order ${orderId.substring(0,8)} sudah ada penawaran`, "success");

                } else {

                    addLog(`🚨 Tidak ada penawaran, kirim fallback`, "warning");

                    await sendFallbackOffer(orderId, curOrder);

                    fallbackProcessed.add(orderId);

                }

                fallbackTimers.delete(orderId);

            }, FALLBACK_DELAY_SECONDS * 1000);

            fallbackTimers.set(orderId, timer);

            addLog(`⏲️ Timer fallback ${FALLBACK_DELAY_SECONDS}s untuk order ${orderId.substring(0,8)}`, "info");

        } else if (isKurir) addLog(`🚫 Order Kurir: auto fallback dinonaktifkan`, "info");



        processedOrderIds.add(orderId);



        // === UPDATE DAILY STATS (dengan debounce) ===

        scheduleStatsUpdate();

    }



    // ==================== UPDATE DAILY STATS ====================


    async function updateDailyStats() {

        try {

            addLog("📊 Memperbarui statistik harian...", "info");

            // Recalculate stats from scratch

            const driversSnap = await database.ref('drivers').once('value');

            const drivers = driversSnap.val() || {};

            let totalDrivers = 0;

            for (let uid in drivers) if (drivers[uid].role === 'driver') totalDrivers++;



            const locSnap = await database.ref('driver_locations').once('value');

            const locs = locSnap.val() || {};

            const now = Date.now();

            let activeDrivers = 0;

            for (let uid in locs) {

                const d = locs[uid];

                if (d.tracking_enabled === true && d.latitude && d.longitude) {

                    let lastUpdate = d.last_update ? new Date(d.last_update).getTime() : 0;

                    if (now - lastUpdate < 5 * 60 * 1000) activeDrivers++;

                }

            }



            const usersSnap = await database.ref('users').once('value');

            const users = usersSnap.val() || {};

            let totalCustomers = 0;

            for (let uid in users) if (users[uid].role !== 'driver' && users[uid].role !== 'admin') totalCustomers++;



            const today = new Date(); today.setHours(0,0,0,0);

            const todayISO = today.toISOString();

            const ordersSnap = await database.ref('orders')

                .orderByChild('created_at')

                .startAt(todayISO)

                .once('value');

            const ordersToday = ordersSnap.val() || {};

            let ordersCount = 0, revenue = 0;

            for (let id in ordersToday) {

                const o = ordersToday[id];

                ordersCount++;

                if (o.status === 'completed' && o.price) revenue += o.price;

            }



            let pendingDeposits = 0;

            const logsSnap = await database.ref('driver_balance_logs').once('value');

            logsSnap.forEach(driverChild => {

                driverChild.forEach(logChild => {

                    const log = logChild.val();

                    if (log.type === 'deposit_request' && log.status === 'pending') pendingDeposits++;

                });

            });



            const stats = {

                totalDrivers, activeDrivers, totalCustomers,

                ordersToday: ordersCount, revenueToday: revenue,

                pendingDeposits,

                updatedAt: new Date().toISOString()

            };

            await database.ref('stats/daily').set(stats);

            addLog(`📊 Update daily stats: ordersToday=${ordersCount}, revenue=${revenue}`, 'success');

        } catch(err) {

            addLog(`❌ Gagal update daily stats: ${err.message}`, 'error');

        }

    }



    function scheduleStatsUpdate() {
    if (statsUpdateDebounceTimer) {
        clearTimeout(statsUpdateDebounceTimer);
    }
    statsUpdateDebounceTimer = setTimeout(() => {   // <-- tanpa 'let'
        updateDailyStats();
        statsUpdateDebounceTimer = null;
    }, 5000);
}



    // ==================== AUTO DEDUCT ON TRIP ====================

    async function autoDeductOnTrip(orderId, orderData) {

        if (processedDeductionOrders.has(orderId)) return;

        if (orderData.status !== 'on_trip') return;

        if (orderData.balance_deducted === true) return;

        const driverId = orderData.driver_id;

        const hargaOrder = orderData.price;

        if (!driverId || !hargaOrder) return;

        try {

            const potonganSnap = await database.ref('data-jego/potongan').once('value');

            const pajakSnap = await database.ref('data-jego/pajak').once('value');

            let feePersen = parseFloat(potonganSnap.val()) || 0;

            let pajakPersen = parseFloat(pajakSnap.val()) || 0;

            const potonganRupiah = hargaOrder * (feePersen / 100);

            const pajakRupiah = potonganRupiah * (pajakPersen / 100);

            let totalPotongan = potonganRupiah + pajakRupiah;

            const balanceSnap = await database.ref(`drivers/${driverId}/balance`).once('value');

            let currentBalance = balanceSnap.val() || 0;

            if (currentBalance < totalPotongan) { addLog(`⚠️ Auto deduct: Saldo driver ${driverId} tidak cukup`, "warning"); return; }

            await database.ref(`drivers/${driverId}/balance`).set(currentBalance - totalPotongan);

            await database.ref(`orders/${orderId}`).update({ balance_deducted: true, deducted_at: new Date().toISOString() });

            await database.ref(`driver_deductions/${driverId}/${orderId}`).set({

                amount: totalPotongan, order_price: hargaOrder, fee_percentage: feePersen, tax_percentage: pajakPersen,

                timestamp: firebase.database.ServerValue.TIMESTAMP

            });

            addLog(`💰 OTOMATIS: Potong saldo driver ${driverId} sebesar Rp ${totalPotongan.toFixed(1)}`, "success");

            processedDeductionOrders.add(orderId);

        } catch(err) { addLog(`❌ Auto deduct error: ${err.message}`, "error"); }

    }



    // ==================== OFF-APP TRIP DETECTION ====================

    async function checkOffAppSuspicion(orderId, orderData) {

        if (!orderData || orderData.status !== 'cancelled') return;

        if (checkedCancelledOrders.has(orderId)) return;

        const cancelledBy = orderData.cancelled_by;

        if (cancelledBy !== 'customer') return;



        const driverId = orderData.driver_id;

        const destLat = orderData.dest_lat;

        const destLng = orderData.dest_lng;

        if (!driverId || !destLat) return;



        const cancelledAt = orderData.cancelled_at ? new Date(orderData.cancelled_at).getTime() : Date.now();

        setTimeout(async () => {

            const locationsSnap = await database.ref(`driver_locations/${driverId}`).orderByChild('last_update').limitToLast(10).once('value');

            let nearDestination = false;

            let latestLoc = null;

            locationsSnap.forEach(child => {

                const loc = child.val();

                if (loc.latitude && loc.longitude) {

                    latestLoc = loc;

                    const dist = getDistance(loc.latitude, loc.longitude, destLat, destLng);

                    if (dist < 0.2) nearDestination = true;

                }

            });

            if (nearDestination) {

                const reportData = {

                    orderId, driverId, cancelledBy, cancelledAt,

                    destination: { lat: destLat, lng: destLng },

                    driverLocation: latestLoc ? { lat: latestLoc.latitude, lng: latestLoc.longitude, time: latestLoc.last_update } : null,

                    reason: 'Driver mendekati tujuan setelah pembatalan oleh customer',

                    detectedAt: Date.now(),

                    status: 'pending_review'

                };

                await database.ref(`reports/offapp_suspicion/${orderId}`).set(reportData);

                addLog(`⚠️ [OFF-APP] Indikasi off-app trip: order ${orderId.substring(0,8)} driver ${driverId.substring(0,8)} mendekati tujuan setelah dibatalkan customer.`, "warning");

            } else {

                addLog(`✅ [OFF-APP] Order ${orderId.substring(0,8)}: driver tidak mendekati tujuan.`, "success");

            }

            checkedCancelledOrders.add(orderId);

        }, 5 * 60 * 1000);

    }



    async function onOrderChangedForOffApp(snapshot) {

        const order = snapshot.val();

        const orderId = snapshot.key;

        if (order && order.status === 'cancelled' && order.cancelled_by === 'customer') {

            const reportSnap = await database.ref(`reports/offapp_suspicion/${orderId}`).once('value');

            if (!reportSnap.exists()) {

                await checkOffAppSuspicion(orderId, order);

            }

        }

    }



    // ==================== SCAN CANCELLED ORDERS (OPTIMASI) ====================

    async function scanRecentCancelledOrders() {

        const thirtyMinAgo = Date.now() - 30 * 60 * 1000;

        // OPTIMASI: Hanya ambil order dengan status cancelled

        const ordersSnap = await database.ref('orders')

            .orderByChild('status')

            .equalTo('cancelled')

            .once('value');

        const orders = ordersSnap.val() || {};

        let count = 0;

        for (const [id, order] of Object.entries(orders)) {

            if (order.cancelled_by === 'customer') {

                const cancelledAt = order.cancelled_at ? new Date(order.cancelled_at).getTime() : 0;

                if (cancelledAt > thirtyMinAgo) {

                    const reportSnap = await database.ref(`reports/offapp_suspicion/${id}`).once('value');

                    if (!reportSnap.exists()) {

                        await checkOffAppSuspicion(id, order);

                        count++;

                    }

                }

            }

        }

        if (count > 0) addLog(`🔍 [OFF-APP] Scan selesai, memeriksa ${count} order yang baru dibatalkan.`, "info");

    }



    // ==================== UPDATE RATING INCREMENTAL (OPTIMASI) ====================

    /**

     * Update rating driver secara incremental (tanpa membaca semua ratings)

     */

    async function updateDriverRating(driverId, newRating) {

        if (!driverId || typeof newRating !== 'number') return;

        try {

            const driverSnap = await database.ref(`drivers/${driverId}`).once('value');

            const driverData = driverSnap.val() || {};

            let totalRating = driverData.totalRating || 0;

            let ratingCount = driverData.ratingCount || 0;



            // Tambahkan rating baru

            totalRating += newRating;

            ratingCount += 1;

            const avg = totalRating / ratingCount;



            await database.ref(`drivers/${driverId}`).update({

                totalRating,

                ratingCount,

                rating: avg,

                last_rating_update: new Date().toISOString()

            });

            addLog(`⭐ Driver ${driverId.substring(0,8)} rating baru: ${avg.toFixed(1)} (total ${ratingCount} rating)`, "success");

        } catch(err) {

            addLog(`❌ Gagal update rating driver: ${err.message}`, "error");

        }

    }



    /**

     * Update rating customer secara incremental (tanpa membaca semua ratings)

     */

    async function updateCustomerRating(customerId, newRating) {

        if (!customerId || typeof newRating !== 'number') return;

        try {

            const userSnap = await database.ref(`users/${customerId}`).once('value');

            const userData = userSnap.val() || {};

            let totalRating = userData.totalRating || 0;

            let ratingCount = userData.ratingCount || 0;



            totalRating += newRating;

            ratingCount += 1;

            const avg = totalRating / ratingCount;



            await database.ref(`users/${customerId}`).update({

                totalRating,

                ratingCount,

                rating: avg,

                last_rating_update: new Date().toISOString()

            });

            addLog(`⭐ Customer ${customerId.substring(0,8)} rating baru: ${avg.toFixed(1)} (total ${ratingCount} rating)`, "success");

        } catch(err) {

            addLog(`❌ Gagal update rating customer: ${err.message}`, "error");

        }

    }



    // ==================== INISIALISASI AGREGAT RATING ====================

    async function initializeRatingAggregates() {

        addLog("🔍 Memeriksa agregat rating driver & customer...", "info");

        try {

            // Ambil semua rating sekali untuk mengisi agregat yang hilang

            const ratingsSnap = await database.ref('ratings').once('value');

            const ratings = ratingsSnap.val() || {};

            const driverAgg = {};

            const customerAgg = {};



            for (let orderId in ratings) {

                const rating = ratings[orderId];

                // Rating driver

                if (rating.driver_rating) {

                    const did = rating.driver_rating.driver_id;

                    const r = rating.driver_rating.rating;

                    if (did && typeof r === 'number') {

                        if (!driverAgg[did]) driverAgg[did] = { total: 0, count: 0 };

                        driverAgg[did].total += r;

                        driverAgg[did].count++;

                    }

                }

                // Rating customer

                if (rating.customer_rating) {

                    const cid = rating.customer_rating.customer_id;

                    const r = rating.customer_rating.rating;

                    if (cid && typeof r === 'number') {

                        if (!customerAgg[cid]) customerAgg[cid] = { total: 0, count: 0 };

                        customerAgg[cid].total += r;

                        customerAgg[cid].count++;

                    }

                }

            }



            // Update driver yang belum punya agregat

            for (let did in driverAgg) {

                const d = driverAgg[did];

                const avg = d.total / d.count;

                await database.ref(`drivers/${did}`).update({

                    totalRating: d.total,

                    ratingCount: d.count,

                    rating: avg,

                    last_rating_update: new Date().toISOString()

                });

            }

            // Update customer yang belum punya agregat

            for (let cid in customerAgg) {

                const c = customerAgg[cid];

                const avg = c.total / c.count;

                await database.ref(`users/${cid}`).update({

                    totalRating: c.total,

                    ratingCount: c.count,

                    rating: avg,

                    last_rating_update: new Date().toISOString()

                });

            }

            addLog(`✅ Agregat rating diinisialisasi: ${Object.keys(driverAgg).length} driver, ${Object.keys(customerAgg).length} customer`, "success");

        } catch(err) {

            addLog(`⚠️ Gagal inisialisasi agregat: ${err.message}`, "warning");

        }

    }



    // ==================== CLEANUP EXPIRED OFFERS ====================

    async function cleanupExpiredOffers() {

        try {

            const ordersSnap = await database.ref('orders').orderByChild('status').equalTo('waiting').once('value');

            const waitingOrders = ordersSnap.val() || {};

            const now = Date.now();

            let removed = 0;

            for (const [orderId, order] of Object.entries(waitingOrders)) {

                const offers = order.driver_offers || {};

                for (const [driverId, offer] of Object.entries(offers)) {

                    if (offer.status === 'offered' && offer.expired_at && offer.expired_at < now) {

                        await database.ref(`orders/${orderId}/driver_offers/${driverId}`).remove();

                        removed++;

                    }

                }

            }

            if (removed) addLog(`🗑️ Bersihkan ${removed} offer expired`, "success");

        } catch(err) { addLog(`❌ Gagal cleanup expired offers: ${err.message}`, "error"); }

    }



    // ==================== DELETE EXPIRED ORDERS (OPTIMASI) ====================

    async function deleteExpiredOrders() {

        const now = new Date();

        const thirtyMinAgo = new Date(now.getTime() - 30*60*1000);

        // OPTIMASI: Hanya ambil order waiting

        const snap = await database.ref('orders')

            .orderByChild('status')

            .equalTo('waiting')

            .once('value');

        const orders = snap.val() || {};

        let del = 0;

        for (let [id, o] of Object.entries(orders)) {

            if (o.created_at && new Date(o.created_at) <= thirtyMinAgo) {

                await database.ref('orders/' + id).remove();

                del++;

            }

        }

        if (del) addLog(`🗑️ Hapus ${del} order kadaluarsa (>30 menit)`, "success");

    }



    // ==================== CEK ORDER ON_TRIP YANG TERLEWAT POTONG ====================

    async function processMissedDeductions() {

        addLog("🔍 Memeriksa order on_trip yang belum dipotong...", "info");

        const ordersSnap = await database.ref('orders').once('value');

        const orders = ordersSnap.val() || {};

        let processed = 0;

        for (const [id, order] of Object.entries(orders)) {

            if (order.status === 'on_trip' && !order.balance_deducted && order.driver_id) {

                addLog(`🔄 Memproses order missed: ${id.substring(0,8)}`, "warning");

                await autoDeductOnTrip(id, order);

                processed++;

            }

        }

        if (processed > 0) addLog(`✅ Berhasil memotong ${processed} order missed`, "success");

        else addLog("✅ Tidak ada order missed", "success");

    }



    // ==================== CHAT NOTIFICATION FEATURE ====================

    async function listenToChatOrder(orderId) {

        const snapshot = await database.ref(`chat/${orderId}`).once('value');

        const messages = snapshot.val() || {};

        for (let key in messages) {

            processedChatMessages.add(key);

        }

        database.ref(`chat/${orderId}`).on('child_added', async (snap) => {

            const msgKey = snap.key;

            if (processedChatMessages.has(msgKey)) return;

            processedChatMessages.add(msgKey);



            const msgData = snap.val();

            if (!msgData || !msgData.sender) return;



            const orderSnap = await database.ref(`orders/${orderId}`).once('value');

            const order = orderSnap.val();

            if (!order) return;



            let senderType = msgData.sender;

            let receiverId = null;

            let senderName = '';

            let title = '';

            let message = msgData.message || 'Pesan baru';



            if (senderType === 'driver') {

                receiverId = order.user_id;

                senderName = order.driver_name || 'Driver';

                title = `💬 Pesan dari Driver ${senderName}`;

            } else if (senderType === 'customer') {

                receiverId = order.driver_id;

                senderName = order.customer_name || 'Customer';

                title = `💬 Pesan dari Customer ${senderName}`;

            } else {

                return;

            }



            if (!receiverId) {

                addLog(`⚠️ Tidak ada penerima untuk order ${orderId}`, 'warning');

                return;

            }



            let playerId = null;

            if (senderType === 'driver') {

                const userSnap = await database.ref(`users/${receiverId}/playerId`).once('value');

                playerId = userSnap.val();

            } else {

                const locSnap = await database.ref(`driver_locations/${receiverId}/playerId`).once('value');

                playerId = locSnap.val();

                if (!playerId) {

                    const driverSnap = await database.ref(`drivers/${receiverId}/playerId`).once('value');

                    playerId = driverSnap.val();

                }

            }



            if (playerId) {

                await sendPushNotification(playerId, title, message, { orderId, chat: true, sender: senderType });

                addLog(`📨 Chat notifikasi: ${senderType} -> ${receiverId.substring(0,8)}`, 'success');

            } else {

                addLog(`⚠️ Tidak ada playerId untuk penerima ${receiverId}`, 'warning');

            }

        });

    }



    function setupChatListener() {

        database.ref('chat').on('child_added', (snap) => {

            const orderId = snap.key;

            if (!chatOrderListeners.has(orderId)) {

                chatOrderListeners.add(orderId);

                listenToChatOrder(orderId);

            }

        });

        addLog('💬 Chat listener aktif (notifikasi otomatis ke driver/customer)', 'success');

    }



    // ==================== LISTENER UTAMA ====================

    function startListeningOrders() {

        if (ordersListener) return;

        database.ref("orders").on("child_added", async (snap) => await processNewOrder(snap.key, snap.val()));

        ordersListener = true;

        addLog("👂 Listener order aktif (auto offer, fallback, notifikasi stale)", "success");

    }



    function startListeners() {

        database.ref('orders').on('child_changed', async (snap) => {

            const order = snap.val(); const id = snap.key;

            if (!order) return;



            if (order.status === 'on_trip') await autoDeductOnTrip(id, order);



            // Update perjalanan driver saat order completed (rating diupdate terpisah via listener ratings)

            if (order.status === 'completed' && order.driver_id) {

                try {

                    await database.ref(`drivers/${order.driver_id}/perjalanan`).transaction(cur => (cur || 0) + 1);

                    addLog(`📊 Perjalanan driver ${order.driver_id.substring(0,8)} +1`, "success");

                } catch(err) {

                    addLog(`❌ Gagal update perjalanan: ${err.message}`, "error");

                }

                // === UPDATE DAILY STATS KETIKA ORDER COMPLETED ===

                scheduleStatsUpdate();

            }



            if (order.status === 'accepted' && order.driver_id) {

                const playerId = await getDriverPlayerId(order.driver_id);

                if (playerId) {

                    await sendPushNotification(playerId, "Penawaran Diterima ✅", "Customer menerima penawaran Anda, silakan buka aplikasi.");

                    addLog(`📨 Notifikasi diterima ke driver ${order.driver_id} untuk order ${id}`, "success");

                } else {

                    addLog(`⚠️ Gagal mengirim notifikasi ke driver ${order.driver_id}: playerId tidak ditemukan`, "warning");

                }

            }



            await onOrderChangedForOffApp(snap);

        });



        // Listener rating menggunakan incremental (tidak baca seluruh ratings)

        database.ref('ratings').on('child_added', async (snap) => {

            const ratingData = snap.val();

            // Rating driver

            if (ratingData?.driver_rating?.driver_id && typeof ratingData.driver_rating.rating === 'number') {

                await updateDriverRating(ratingData.driver_rating.driver_id, ratingData.driver_rating.rating);

            }

            // Rating customer

            if (ratingData?.customer_rating?.customer_id && typeof ratingData.customer_rating.rating === 'number') {

                await updateCustomerRating(ratingData.customer_rating.customer_id, ratingData.customer_rating.rating);

            }

        });

        database.ref('ratings').on('child_changed', async (snap) => {

            const ratingData = snap.val();

            if (ratingData?.driver_rating?.driver_id && typeof ratingData.driver_rating.rating === 'number') {

                await updateDriverRating(ratingData.driver_rating.driver_id, ratingData.driver_rating.rating);

            }

            if (ratingData?.customer_rating?.customer_id && typeof ratingData.customer_rating.rating === 'number') {

                await updateCustomerRating(ratingData.customer_rating.customer_id, ratingData.customer_rating.rating);

            }

        });

    }



    // ==================== INIT ====================

    async function initCore() {

        await getOneSignalApiKey();

        // Inisialisasi agregat rating (dipanggil sekali)

        await initializeRatingAggregates();

        startListeningOrders();

        startListeners();

        await processMissedDeductions();

        await scanRecentCancelledOrders();

        setupChatListener();

        setInterval(cleanupExpiredOffers, 10000);

        setInterval(deleteExpiredOrders, 10 * 60 * 1000);

        setInterval(scanRecentCancelledOrders, 10 * 60 * 1000);

        // Update daily stats di awal

        await updateDailyStats();

        addLog('✅ Semua sistem core berjalan (auto offer, fallback, deduct, cleanup, missed check, off-app detection, chat notif)', 'success');

        document.getElementById("statusBadge").innerHTML = "🟢 Aktif 24 Jam";

    }



    // ==================== AUTH ====================

    auth.onAuthStateChanged(async (user) => {

        if (!user) { window.location.href = 'login_admin.html'; return; }

        const adminSnap = await database.ref(`admins/${user.uid}`).once('value');

        if (!adminSnap.exists()) {

            addLog("❌ Bukan admin, logout...", "error");

            await auth.signOut();

            setTimeout(() => window.location.href = 'login_admin.html', 1500);

            return;

        }

        addLog(`✅ Admin ${user.email} berhasil login. Sistem core dimulai.`, "success");

        await initCore();

    });



    document.getElementById("logoutBtn").onclick = async () => {

        await auth.signOut();

        window.location.href = 'login_admin.html';

    };

</script>
