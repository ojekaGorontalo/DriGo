    #splashScreen.hide-splash {
      opacity: 0;
      visibility: hidden;
    }

    body.splash-active {
      overflow: hidden;
      height: 100vh;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #FFF3E0, #FFE0B2);
    }

</head>
<body class="splash-active">

  <div id="splashScreen"></div>

  <script>
    (function() {
      function isValidCustomerSession(session) {
        if (!session || typeof session !== 'object') return false;
        return !!(session.userId || session.uid) && !!session.email;
      }

      function isValidDriverSession(session) {
        if (!session || typeof session !== 'object') return false;
        return !!(session.uid) && session.status === 'active';
      }

      let driverSession = null;
      let customerSession = null;

      try {
        const rawDriver = localStorage.getItem('jego_logged_in_driver');
        if (rawDriver) {
          driverSession = JSON.parse(rawDriver);
          if (!isValidDriverSession(driverSession)) {
            localStorage.removeItem('jego_logged_in_driver');
            driverSession = null;
          }
        }

        const rawCustomer = localStorage.getItem('jego_logged_in_user');
        if (rawCustomer) {
          customerSession = JSON.parse(rawCustomer);
          if (!isValidCustomerSession(customerSession)) {
            localStorage.removeItem('jego_logged_in_user');
            customerSession = null;
          }
        }
      } catch (e) {
        localStorage.removeItem('jego_logged_in_driver');
        localStorage.removeItem('jego_logged_in_user');
        driverSession = null;
        customerSession = null;
      }

      // Tentukan status login dan data untuk dikirim ke Kodular
      let status = 'none';
      let sessionData = null;

      if (driverSession && isValidDriverSession(driverSession)) {
        status = 'driver';
        sessionData = driverSession;
      } else if (customerSession && isValidCustomerSession(customerSession)) {
        status = 'customer';
        sessionData = customerSession;
      } else {
        status = 'none';
        sessionData = null;
      }

      // Buat objek data yang akan dikirim
      const payload = {
        status: status,
        session: sessionData
      };

      const dataString = JSON.stringify(payload);

      // Fungsi untuk mengirim ke Kodular
      function sendToKodular() {
        if (window.AppInventor && typeof window.AppInventor.setWebViewString === 'function') {
          window.AppInventor.setWebViewString(dataString);
        } else {
          // Fallback jika tidak di Kodular (untuk testing di browser)
          console.log('Data yang akan dikirim ke Kodular:', dataString);
          // Opsional: tampilkan alert untuk testing
          // alert('Data siap: ' + dataString);
        }
      }

      const splashElement = document.getElementById('splashScreen');

      function hideSplashAndSend() {
        if (!splashElement) return;
        splashElement.classList.add('hide-splash');
        // Kirim data setelah splash menghilang
        setTimeout(() => {
          sendToKodular();
        }, 100);
      }

      // Tunggu 3 detik lalu kirim data
      setTimeout(() => {
        hideSplashAndSend();
      }, 3000);
    })();
  </script>
</body>
