<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Notifikasi - JeGo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e2f;
            color: #eee;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 { color: #FF9800; margin-bottom: 10px; }
        .status-card {
            background: #2a2a3b;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #FF9800;
        }
        .log-box {
            background: #0f0f1a;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .log-entry {
            border-bottom: 1px solid #2a2a3b;
            padding: 5px 0;
            margin: 0;
        }
        .log-info { color: #66aaff; }
        .log-success { color: #66ff66; }
        .log-error { color: #ff6666; }
        .log-warning { color: #ffaa66; }
        button {
            background: #FF9800;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 10px;
        }
        button:hover { background: #ffb74d; }
        input, textarea {
            background: #2a2a3b;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            border-radius: 6px;
            width: 100%;
            margin-bottom: 10px;
        }
        .flex { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .badge {
            background: #FF9800;
            color: #1e1e2f;
            border-radius: 20px;
            padding: 4px 12px;
            font-weight: bold;
        }
    </style>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>
<body>
<div class="container">
    <h1>📡 JeGo Admin - Notifikasi Push Otomatis</h1>
    <div class="status-card">
        <div class="flex" style="justify-content: space-between;">
            <div>🔔 Status: <span id="statusText" class="badge">Memulai...</span></div>
            <div>📡 Koneksi Firebase: <span id="firebaseStatus" class="badge">Menghubungkan</span></div>
        </div>
        <div class="flex" style="margin-top: 10px;">
            <button id="clearLogBtn">🗑 Bersihkan Log</button>
            <button id="testNotifBtn">🔔 Test Notifikasi (kirim ke driver pertama)</button>
        </div>
    </div>
    <h3>📋 Log Aktivitas</h3>
    <div id="logContainer" class="log-box">
        <div class="log-entry log-info">▶️ Halaman admin dimulai. Menunggu order baru...</div>
    </div>
</div>

<script>
    // ================= KONFIGURASI =================
    // Konfigurasi Firebase (sama dengan aplikasi driver)
    const firebaseConfig = {
        apiKey: "AIzaSyDpGc_CsbNi1igA29n6qDhcX0oDkHNVscc",
        authDomain: "game-balap-simpel.firebaseapp.com",
        databaseURL: "https://game-balap-simpel-default-rtdb.firebaseio.com",
        projectId: "game-balap-simpel",
        storageBucket: "game-balap-simpel.firebasestorage.app",
        messagingSenderId: "864576853495",
        appId: "1:864576853495:web:6f16eb757fd3d8affb0af2"
    };

    // OneSignal konfigurasi (harus diisi dengan API Key)
    // ⚠️ API Key disimpan di localStorage (aman? tidak, tapi untuk admin sendiri)
    let ONESIGNAL_APP_ID = "3357d683-8f6b-4558-9d42-2eeceed6204a";
    let ONESIGNAL_API_KEY = ""; // akan diminta pertama kali

    // Inisialisasi Firebase
    let database;
    try {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        database = firebase.database();
        document.getElementById("firebaseStatus").innerText = "✅ Terhubung";
        addLog("Firebase berhasil terhubung", "success");
    } catch(e) {
        document.getElementById("firebaseStatus").innerText = "❌ Gagal";
        addLog("Error Firebase: " + e.message, "error");
    }

    // ================= UTILITY =================
    function addLog(msg, type = "info") {
        const logDiv = document.getElementById("logContainer");
        const entry = document.createElement("div");
        entry.className = `log-entry log-${type}`;
        const time = new Date().toLocaleTimeString();
        entry.textContent = `[${time}] ${msg}`;
        logDiv.appendChild(entry);
        entry.scrollIntoView({ behavior: "smooth", block: "nearest" });
        console.log(`[${type.toUpperCase()}] ${msg}`);
        // batasi log
        while (logDiv.children.length > 500) logDiv.removeChild(logDiv.firstChild);
    }

    function updateStatus(text) {
        document.getElementById("statusText").innerText = text;
    }

    // Hitung jarak (Haversine)
    function getDistance(lat1, lon1, lat2, lon2) {
        if (!lat1 || !lon1 || !lat2 || !lon2) return Infinity;
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    // Kirim notifikasi via OneSignal API
    async function sendPushNotification(playerId, title, message, orderId = null) {
        if (!ONESIGNAL_API_KEY) {
            addLog("❌ API Key OneSignal belum diisi. Notifikasi tidak dikirim.", "error");
            return false;
        }
        if (!playerId) {
            addLog("⚠️ playerId kosong, tidak bisa kirim notifikasi", "warning");
            return false;
        }
        try {
            const response = await fetch("https://onesignal.com/api/v1/notifications", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Basic ${ONESIGNAL_API_KEY}`
                },
                body: JSON.stringify({
                    app_id: ONESIGNAL_APP_ID,
                    include_player_ids: [playerId],
                    headings: { en: title },
                    contents: { en: message },
                    data: { orderId: orderId, type: "new_order" }
                })
            });
            const result = await response.json();
            if (result.errors) {
                addLog(`Gagal kirim notifikasi ke ${playerId.substring(0,8)}... : ${JSON.stringify(result.errors)}`, "error");
                return false;
            } else {
                addLog(`✅ Notifikasi terkirim ke playerId ${playerId.substring(0,8)}... (ID: ${result.id})`, "success");
                return true;
            }
        } catch(err) {
            addLog(`Error API OneSignal: ${err.message}`, "error");
            return false;
        }
    }

    // ================= LOGIKA UTAMA =================
    let ordersListener = null;
    let driversCache = {}; // cache driver online
    let driversListener = null;

    // Ambil semua driver yang online (trackingEnabled = true) dan punya playerId
    async function loadDrivers() {
        try {
            const snapshot = await database.ref("drivers").orderByChild("trackingEnabled").equalTo(true).once("value");
            const drivers = snapshot.val();
            if (!drivers) return {};
            const filtered = {};
            for (const id in drivers) {
                const d = drivers[id];
                if (d.playerId && d.latitude && d.longitude) {
                    filtered[id] = {
                        playerId: d.playerId,
                        latitude: d.latitude,
                        longitude: d.longitude,
                        name: d.fullName || d.name || id
                    };
                }
            }
            addLog(`Memuat driver online: ${Object.keys(filtered).length} driver siap terima notifikasi`, "info");
            return filtered;
        } catch(e) {
            addLog(`Gagal load drivers: ${e.message}`, "error");
            return {};
        }
    }

    // Proses order baru (dipanggil setiap ada order dengan status searching)
    async function processNewOrder(orderId, orderData) {
        addLog(`📦 Order baru ID: ${orderId} | status: ${orderData.status} | vehicle: ${orderData.vehicle}`, "info");
        if (orderData.status !== "searching") {
            addLog(`Order ${orderId} status bukan searching, dilewat.`, "warning");
            return;
        }
        const { from_lat, from_lng, user_data, harga_total, alamat_a } = orderData;
        if (!from_lat || !from_lng) {
            addLog(`Order ${orderId} tidak memiliki koordinat penjemputan`, "warning");
            return;
        }

        // Ambil driver online terbaru (real-time)
        const drivers = await loadDrivers();
        if (Object.keys(drivers).length === 0) {
            addLog(`Tidak ada driver online dengan playerId`, "warning");
            return;
        }

        let notifSent = false;
        for (const driverId in drivers) {
            const driver = drivers[driverId];
            const distance = getDistance(from_lat, from_lng, driver.latitude, driver.longitude);
            if (distance < 3) {
                addLog(`🎯 Driver ${driver.name} (${driverId.substring(0,6)}...) berjarak ${distance.toFixed(2)} km - KIRIM NOTIFIKASI`, "success");
                const customerName = user_data?.name || "Customer";
                const vehicleLabel = orderData.vehicle === "kurir_motor" ? "Kurir" : "Transportasi";
                const title = "Order Baru Dekat Anda!";
                const message = `${customerName} memesan ${vehicleLabel} | Jarak ${distance.toFixed(1)} km | Rp ${(harga_total || 0).toLocaleString()}`;
                await sendPushNotification(driver.playerId, title, message, orderId);
                notifSent = true;
            } else {
                addLog(`ℹ️ Driver ${driver.name} jarak ${distance.toFixed(2)} km (≥3 km) - lewat`, "info");
            }
        }
        if (!notifSent) {
            addLog(`⚠️ Tidak ada driver dalam radius 3 km untuk order ${orderId}`, "warning");
        }
    }

    // Pasang listener ke node orders untuk order baru (onChildAdded)
    function startListeningOrders() {
        if (ordersListener) return;
        const ordersRef = database.ref("orders");
        // Dengarkan order baru (child_added)
        ordersRef.on("child_added", async (snapshot) => {
            const orderId = snapshot.key;
            const orderData = snapshot.val();
            await processNewOrder(orderId, orderData);
        });
        ordersListener = true;
        addLog("👂 Listener order aktif (child_added)", "success");
        updateStatus("Listening order baru...");
    }

    // ================= INISIALISASI API KEY =================
    function setupApiKey() {
        const savedKey = localStorage.getItem("onesignal_api_key");
        if (savedKey) {
            ONESIGNAL_API_KEY = savedKey;
            addLog("🔑 API Key OneSignal dimuat dari localStorage", "success");
        } else {
            const key = prompt("Masukkan OneSignal REST API Key (dari Settings -> Keys & IDs):");
            if (key && key.trim()) {
                ONESIGNAL_API_KEY = key.trim();
                localStorage.setItem("onesignal_api_key", ONESIGNAL_API_KEY);
                addLog("🔑 API Key OneSignal tersimpan di localStorage (hanya untuk admin ini)", "success");
            } else {
                addLog("⚠️ API Key tidak diisi. Notifikasi push tidak akan berfungsi.", "error");
            }
        }
    }

    // Test notifikasi ke driver pertama yang online
    async function testNotification() {
        const drivers = await loadDrivers();
        const driverIds = Object.keys(drivers);
        if (driverIds.length === 0) {
            addLog("Tidak ada driver online untuk test notifikasi", "error");
            return;
        }
        const firstDriver = drivers[driverIds[0]];
        addLog(`🔔 Test notifikasi ke driver: ${firstDriver.name} (${firstDriver.playerId.substring(0,8)}...)`, "info");
        await sendPushNotification(firstDriver.playerId, "🧪 Test Notifikasi", "Ini adalah notifikasi uji coba dari admin panel.");
    }

    // ================= START =================
    window.onload = () => {
        setupApiKey();
        if (database) {
            startListeningOrders();
        } else {
            addLog("❌ Firebase tidak terhubung, tidak dapat memulai listener", "error");
        }
        document.getElementById("clearLogBtn").onclick = () => {
            document.getElementById("logContainer").innerHTML = '<div class="log-entry log-info">▶️ Log dibersihkan</div>';
            addLog("Log dihapus manual", "info");
        };
        document.getElementById("testNotifBtn").onclick = () => testNotification();
    };
</script>
</body>
</html>
