<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JeGo Admin - Permintaan Deposit</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; }
        .header { background: linear-gradient(135deg, #FF9800, #FFB74D); padding: 20px 24px; color: white; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .header h1 { font-size: 1.6rem; display: flex; align-items: center; gap: 12px; }
        .logout-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 18px; border-radius: 30px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .logout-btn:hover { background: rgba(255,255,255,0.35); }
        .toolbar { padding: 16px 24px; background: #f8f9fa; border-bottom: 1px solid #e9ecef; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        .search-box { padding: 8px 14px; border: 1px solid #ddd; border-radius: 30px; outline: none; font-size: 0.85rem; flex: 1; min-width: 200px; }
        .refresh-btn { background: #FF9800; color: white; border: none; padding: 8px 18px; border-radius: 30px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
        .stats-badge { background: #e9ecef; padding: 5px 14px; border-radius: 30px; font-size: 0.8rem; font-weight: 500; color: #1e293b; }
        .table-wrapper { overflow-x: auto; padding: 0 0 20px 0; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 12px 6px; text-align: left; border-bottom: 1px solid #edf2f7; vertical-align: middle; }
        th { background: #f8fafc; font-weight: 600; color: #1e293b; }
        tr:hover { background: #fef9e6; }
        .confirm-deposit-btn { background: #10b981; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; font-weight: 600; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .status-pending { background: #fff3cd; color: #b45309; }
        .status-warning { background: #ffecb3; color: #b76e00; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 12px; padding: 16px; background: #f8fafc; border-top: 1px solid #e9ecef; }
        .pagination button { background: #FF9800; color: white; border: none; padding: 6px 16px; border-radius: 30px; cursor: pointer; font-weight: 600; }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination span { font-weight: 600; color: #1e293b; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 40px; font-size: 0.85rem; z-index: 1000; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
        .toast.show { opacity: 1; }
        .loading-overlay { display: flex; justify-content: center; padding: 50px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #FF9800; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-row td { text-align: center; padding: 40px; color: #64748b; }
        .footer-note { padding: 12px 24px; background: #f8fafc; text-align: center; font-size: 0.7rem; color: #475569; border-top: 1px solid #e2e8f0; }
        .search-uid-section { background: #f8fafc; padding: 12px 24px; border-bottom: 1px solid #e9ecef; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        .search-uid-section input { flex: 1; min-width: 200px; }
        .search-uid-section button { background: #3b82f6; color: white; border: none; padding: 8px 18px; border-radius: 30px; cursor: pointer; font-weight: 600; }
        .search-result { padding: 20px; overflow-x: auto; display: none; }
        .search-result table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .search-result th, .search-result td { padding: 8px; border: 1px solid #ddd; text-align: left; }
        .search-result th { background: #f1f5f9; }
        .close-search { float: right; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #ef4444; }
        @media (max-width: 700px) { body { padding: 10px; } th, td { padding: 6px; font-size: 0.7rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-money-bill-wave"></i> Permintaan Deposit (Pending)</h1>
        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout Admin</button>
    </div>
    <div class="toolbar">
        <div style="display: flex; gap: 10px; flex-wrap: wrap; width: 100%; align-items: center;">
            <input type="text" id="depositSearch" class="search-box" placeholder="Cari nama driver, telepon...">
            <div style="flex:1; display: flex; justify-content: flex-end; gap: 12px;">
                <div class="stats-badge" id="depositStats">Total: <span id="totalDepositCount">0</span></div>
                <button class="refresh-btn" id="refreshDepositsBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>
        </div>
    </div>

    <!-- Form pencarian UID -->
    <div class="search-uid-section">
        <i class="fas fa-search"></i>
        <input type="text" id="uidSearchInput" class="search-box" placeholder="Masukkan UID driver untuk cek riwayat deposit">
        <button id="uidSearchBtn"><i class="fas fa-user"></i> Cari</button>
        <button id="closeSearchBtn" style="background:#ef4444; color:white; border:none; padding:8px 16px; border-radius:30px; cursor:pointer; display:none;">Tutup</button>
    </div>
    <div id="searchResultContainer" class="search-result" style="display:none;">
        <button class="close-search" id="closeSearchResult">&times;</button>
        <h3>Riwayat Deposit Driver</h3>
        <div id="searchResultBody"><div class="loading-overlay"><div class="spinner"></div></div></div>
    </div>

    <!-- Tabel pending deposits -->
    <div class="table-wrapper">
        <table id="depositTable">
            <thead>
                <tr><th>Waktu</th><th>Driver</th><th>Telepon</th><th>Jumlah Deposit</th><th>Total Transfer</th><th>Kode Unik</th><th>Status</th><th>Aksi</th></tr>
            </thead>
            <tbody id="depositTableBody"><tr class="empty-row"><td colspan="8"><div class="loading-overlay"><div class="spinner"></div></div></td></tr></tbody>
        </table>
    </div>
    <div class="pagination">
        <button id="prevPageBtn" disabled><i class="fas fa-chevron-left"></i> Sebelumnya</button>
        <span id="pageInfo">Halaman 1 dari 1</span>
        <button id="nextPageBtn"><i class="fas fa-chevron-right"></i> Selanjutnya</button>
    </div>
    <div class="footer-note">
        <i class="fas fa-info-circle"></i> Deposit yang tidak dikonfirmasi dalam <strong>1x24 jam</strong> akan otomatis kadaluarsa (expired) dan tidak dapat dikonfirmasi lagi.
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCD0pgeZio-LdKqYDtWxcdXcZwyL4ngYQI",
        authDomain: "jego-35a2b.firebaseapp.com",
        databaseURL: "https://jego-35a2b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "jego-35a2b",
        storageBucket: "jego-35a2b.firebasestorage.app",
        messagingSenderId: "600037007040",
        appId: "1:600037007040:web:ac3243ad9b472647ffd725"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    let allDeposits = [];
    let filteredDeposits = [];
    let currentPage = 1;
    const PER_PAGE = 10;
    let onesignalApiKey = null;
    const ONESIGNAL_APP_ID = "007d7eba-9cfc-40d1-a92e-f2299f770282";
    let pendingListenerRef = null;
    let pendingListener = null;

    // ========== ONE SIGNAL ==========
    async function getOneSignalApiKey() {
        if (onesignalApiKey) return onesignalApiKey;
        try {
            const snap = await database.ref('data-jego/PushKey').once('value');
            onesignalApiKey = snap.val();
            return onesignalApiKey;
        } catch(e) { return null; }
    }

    async function sendPushNotification(playerId, title, message, extraData = {}) {
        if (!playerId) return false;
        const apiKey = await getOneSignalApiKey();
        if (!apiKey) return false;
        try {
            await fetch("https://onesignal.com/api/v1/notifications", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Basic ${apiKey}` },
                body: JSON.stringify({ app_id: ONESIGNAL_APP_ID, include_player_ids: [playerId], headings: { en: title }, contents: { en: message }, data: { type: "deposit", ...extraData }, priority: 10 })
            });
            return true;
        } catch(err) { return false; }
    }

    async function saveDriverNotification(driverId, title, message, type = 'deposit') {
        if (!driverId) return;
        try { await database.ref(`driver_notifications/${driverId}`).push({ title, message, timestamp: firebase.database.ServerValue.TIMESTAMP, read: false, type }); } catch(err) { console.error(err); }
    }

    async function getDriverPlayerId(driverId) {
        try {
            const locSnap = await database.ref(`driver_locations/${driverId}/playerId`).once('value');
            let playerId = locSnap.val();
            if (!playerId) { const driverSnap = await database.ref(`drivers/${driverId}/playerId`).once('value'); playerId = driverSnap.val(); }
            return playerId;
        } catch(e) { return null; }
    }

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.background = isError ? '#b91c1c' : '#1e293b';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
    function formatRupiah(amount) { return 'Rp ' + (amount || 0).toLocaleString('id-ID'); }

    // ========== CLEANUP EXPIRED DEPOSITS ==========
    async function cleanupExpiredDeposits() {
        const now = Date.now();
        const ONE_DAY = 24 * 60 * 60 * 1000;
        let expiredCount = 0;
        try {
            const snap = await database.ref('pending_deposits').once('value');
            const updates = {};
            snap.forEach(child => {
                const deposit = child.val();
                if (deposit.status === 'pending' && (deposit.expiresAt || 0) < now) {
                    updates[`pending_deposits/${child.key}/status`] = 'expired';
                    expiredCount++;
                    // Pindahkan ke driver_balance_logs
                    const logEntry = {
                        type: 'deposit_request',
                        amount: deposit.amount,
                        uniqueAmount: deposit.uniqueAmount,
                        uniqueDigits: deposit.uniqueDigits,
                        paymentId: deposit.paymentId,
                        status: 'expired',
                        old_balance: 0,
                        new_balance: 0,
                        note: `Deposit expired (otomatis)`,
                        driver_name: deposit.driverName || 'Driver',
                        driver_phone: deposit.driverPhone || '-',
                        timestamp: deposit.createdAt || now,
                        expires_at: deposit.expiresAt || now
                    };
                    // Simpan ke driver_balance_logs
                    if (deposit.driverId) {
                        const logRef = database.ref(`driver_balance_logs/${deposit.driverId}`).push();
                        updates[logRef.toString()] = logEntry;
                        // Hapus dari pending
                        updates[`pending_deposits/${child.key}`] = null;
                    }
                }
            });
            if (expiredCount > 0) {
                await database.ref().update(updates);
                console.log(`✅ ${expiredCount} deposit expired otomatis`);
                // Kirim notifikasi
                snap.forEach(child => {
                    const deposit = child.val();
                    if (deposit.status === 'pending' && (deposit.expiresAt || 0) < now) {
                        (async () => {
                            await saveDriverNotification(deposit.driverId, '⏰ Deposit Kadaluarsa', 
                                `Permintaan deposit Rp ${deposit.amount?.toLocaleString()} telah kadaluarsa. Silakan ajukan deposit baru.`, 'expired');
                            const playerId = await getDriverPlayerId(deposit.driverId);
                            if (playerId) {
                                await sendPushNotification(playerId, 'Deposit Kadaluarsa', 
                                    `Deposit Rp ${deposit.amount?.toLocaleString()} expired. Ajukan deposit ulang.`);
                            }
                        })();
                    }
                });
            }
        } catch(err) {
            console.error("Gagal cleanup expired deposits:", err);
        }
    }

    // ========== LOAD PENDING DEPOSITS ==========
    async function loadPendingDeposits() {
        const tbody = document.getElementById('depositTableBody');
        tbody.innerHTML = '<tr class="empty-row"><td colspan="8"><div class="loading-overlay"><div class="spinner"></div></div></td>';

        // Lepas listener lama
        if (pendingListener) {
            pendingListenerRef.off('value', pendingListener);
            pendingListener = null;
        }

        try {
            await cleanupExpiredDeposits(); // bersihkan yang expired

            const snap = await database.ref('pending_deposits').orderByChild('status').equalTo('pending').once('value');
            const requests = [];
            snap.forEach(child => {
                const deposit = child.val();
                if (deposit.status === 'pending') {
                    // Ambil nama driver jika belum ada
                    requests.push({
                        id: child.key,
                        driverId: deposit.driverId,
                        driverName: deposit.driverName || 'Driver',
                        driverPhone: deposit.driverPhone || '-',
                        amount: deposit.amount || 0,
                        uniqueAmount: deposit.uniqueAmount || 0,
                        uniqueDigits: deposit.uniqueDigits || '000',
                        timestamp: deposit.createdAt || 0,
                        expiresAt: deposit.expiresAt || 0,
                        ...deposit
                    });
                }
            });

            requests.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
            allDeposits = requests;
            applyDepositFilter();

            // Pasang listener real-time untuk pending_deposits
            pendingListenerRef = database.ref('pending_deposits');
            pendingListener = pendingListenerRef.on('value', async (snap) => {
                // Refresh ulang data
                await loadPendingDeposits();
            });

        } catch(err) {
            console.error(err);
            showToast('Gagal load deposit pending', true);
            tbody.innerHTML = '<tr class="empty-row"><td colspan="8">⚠️ Gagal memuat data</td></tr>';
        }
    }

    function applyDepositFilter() {
        const keyword = document.getElementById('depositSearch').value.toLowerCase();
        let filtered = allDeposits.filter(req => 
            keyword === '' || 
            (req.driverName && req.driverName.toLowerCase().includes(keyword)) || 
            (req.driverPhone && req.driverPhone.toLowerCase().includes(keyword))
        );
        filteredDeposits = filtered;
        document.getElementById('totalDepositCount').innerText = filtered.length;
        currentPage = 1;
        renderPage();
    }

    function renderPage() {
        const totalPages = Math.ceil(filteredDeposits.length / PER_PAGE) || 1;
        if (currentPage > totalPages) currentPage = totalPages;
        const start = (currentPage - 1) * PER_PAGE;
        const end = start + PER_PAGE;
        const pageData = filteredDeposits.slice(start, end);
        renderDepositTable(pageData);
        document.getElementById('pageInfo').innerText = `Halaman ${currentPage} dari ${totalPages}`;
        document.getElementById('prevPageBtn').disabled = currentPage <= 1;
        document.getElementById('nextPageBtn').disabled = currentPage >= totalPages;
    }

    function renderDepositTable(requests) {
        const tbody = document.getElementById('depositTableBody');
        if (!requests.length) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="8">Tidak ada permintaan deposit pending</td></tr>';
            return;
        }
        tbody.innerHTML = '';
        requests.forEach(req => {
            const row = tbody.insertRow();
            row.insertCell(0).textContent = req.timestamp ? new Date(req.timestamp).toLocaleString('id-ID') : '-';
            row.insertCell(1).textContent = req.driverName || '-';
            row.insertCell(2).textContent = req.driverPhone || '-';
            row.insertCell(3).innerHTML = formatRupiah(req.amount);
            row.insertCell(4).innerHTML = formatRupiah(req.uniqueAmount);
            row.insertCell(5).textContent = req.uniqueDigits || '-';

            const timeLeft = (req.expiresAt || 0) - Date.now();
            let statusHtml = '<span class="status-badge status-pending">Pending</span>';
            if (timeLeft < 3600000 && timeLeft > 0) {
                statusHtml = '<span class="status-badge status-warning" style="background:#ffecb3;color:#b76e00;">Segera Expired</span>';
            } else if (timeLeft <= 0) {
                statusHtml = '<span class="status-badge" style="background:#f1f5f9;color:#64748b;">Expired</span>';
            }
            row.insertCell(6).innerHTML = statusHtml;

            const confirmBtn = document.createElement('button');
            confirmBtn.textContent = '✅ Konfirmasi & Tambah Saldo';
            confirmBtn.className = 'confirm-deposit-btn';
            confirmBtn.onclick = async () => {
                if (Date.now() > (req.expiresAt || 0)) {
                    showToast('Deposit sudah kadaluarsa, tidak bisa dikonfirmasi', true);
                    await loadPendingDeposits();
                    return;
                }
                confirmBtn.disabled = true;
                confirmBtn.textContent = 'Memproses...';
                try {
                    // Ambil saldo driver saat ini
                    const driverSnap = await database.ref(`drivers/${req.driverId}/balance`).once('value');
                    const oldBalance = driverSnap.val() || 0;
                    const newBalance = oldBalance + req.uniqueAmount;

                    // Update balance
                    await database.ref(`drivers/${req.driverId}/balance`).set(newBalance);

                    // Simpan ke driver_balance_logs
                    const logEntry = {
                        type: 'deposit_request',
                        amount: req.amount,
                        uniqueAmount: req.uniqueAmount,
                        uniqueDigits: req.uniqueDigits,
                        paymentId: req.paymentId || 'manual',
                        status: 'confirmed',
                        old_balance: oldBalance,
                        new_balance: newBalance,
                        note: `Deposit dikonfirmasi admin`,
                        driver_name: req.driverName || 'Driver',
                        driver_phone: req.driverPhone || '-',
                        timestamp: Date.now(),
                        expires_at: req.expiresAt || Date.now() + 86400000
                    };
                    await database.ref(`driver_balance_logs/${req.driverId}`).push(logEntry);

                    // Hapus dari pending_deposits
                    await database.ref(`pending_deposits/${req.id}`).remove();

                    // Notifikasi
                    await saveDriverNotification(req.driverId, 'Deposit Dikonfirmasi', 
                        `Deposit Rp ${req.uniqueAmount.toLocaleString()} telah ditambahkan ke saldo Anda.`);
                    const playerId = await getDriverPlayerId(req.driverId);
                    if (playerId) {
                        await sendPushNotification(playerId, 'Deposit Diterima', 
                            `Saldo Anda bertambah Rp ${req.uniqueAmount.toLocaleString()}.`);
                    }

                    // Hapus dari array lokal
                    const idx = allDeposits.findIndex(d => d.id === req.id);
                    if (idx !== -1) allDeposits.splice(idx, 1);
                    applyDepositFilter();
                    showToast(`Saldo ${req.driverName} berhasil ditambah ${formatRupiah(req.uniqueAmount)}`);
                } catch(err) {
                    showToast(err.message, true);
                } finally {
                    confirmBtn.disabled = false;
                    confirmBtn.textContent = '✅ Konfirmasi & Tambah Saldo';
                }
            };
            row.insertCell(7).appendChild(confirmBtn);
        });
    }

    // ========== PENCARIAN UID ==========
    async function searchDriverDeposits(uid) {
        if (!uid.trim()) {
            showToast('Masukkan UID driver', true);
            return;
        }
        const container = document.getElementById('searchResultContainer');
        const body = document.getElementById('searchResultBody');
        container.style.display = 'block';
        document.getElementById('closeSearchBtn').style.display = 'inline-block';
        body.innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';

        try {
            const snap = await database.ref(`driver_balance_logs/${uid.trim()}`).once('value');
            const data = snap.val();
            if (!data) {
                body.innerHTML = '<p>Tidak ada riwayat deposit untuk driver ini.</p>';
                return;
            }
            let logs = [];
            Object.keys(data).forEach(key => {
                const log = data[key];
                if (log.type === 'deposit_request') {
                    logs.push({ id: key, ...log });
                }
            });
            logs.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));

            let html = `<table>
                <thead><tr><th>Waktu</th><th>Jumlah Deposit</th><th>Total Transfer</th><th>Kode Unik</th><th>Status</th><th>Catatan</th></tr></thead><tbody>`;
            if (!logs.length) {
                html += `<tr><td colspan="6">Tidak ada deposit request</td></tr>`;
            } else {
                logs.forEach(log => {
                    const status = log.status || 'unknown';
                    const statusColor = status === 'confirmed' ? '#10b981' : (status === 'expired' ? '#ef4444' : '#f59e0b');
                    html += `<tr>
                        <td>${log.timestamp ? new Date(log.timestamp).toLocaleString('id-ID') : '-'}</td>
                        <td>${formatRupiah(log.amount)}</td>
                        <td>${formatRupiah(log.uniqueAmount)}</td>
                        <td>${log.uniqueDigits || '-'}</td>
                        <td><span style="background:${statusColor}; color:white; padding:2px 8px; border-radius:12px;">${status}</span></td>
                        <td>${log.note || '-'}</td>
                    </tr>`;
                });
            }
            html += '</tbody></table>';
            body.innerHTML = html;
        } catch(err) {
            body.innerHTML = `<p style="color:red;">Error: ${err.message}</p>`;
        }
    }

    function closeSearchResult() {
        document.getElementById('searchResultContainer').style.display = 'none';
        document.getElementById('closeSearchBtn').style.display = 'none';
    }

    // ========== PAGINATION ==========
    function prevPage() { if (currentPage > 1) { currentPage--; renderPage(); } }
    function nextPage() { const totalPages = Math.ceil(filteredDeposits.length / PER_PAGE) || 1; if (currentPage < totalPages) { currentPage++; renderPage(); } }

    // ========== AUTH & INIT ==========
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = 'login_admin.html'; return; }
        const adminSnap = await database.ref(`admins/${user.uid}`).once('value');
        if (!adminSnap.exists()) { showToast('Bukan admin', true); await auth.signOut(); setTimeout(() => window.location.href = 'login_admin.html', 1500); return; }
        await getOneSignalApiKey();
        await loadPendingDeposits();

        document.getElementById('refreshDepositsBtn').onclick = loadPendingDeposits;
        document.getElementById('depositSearch').addEventListener('input', applyDepositFilter);
        document.getElementById('prevPageBtn').onclick = prevPage;
        document.getElementById('nextPageBtn').onclick = nextPage;
        document.getElementById('logoutBtn').onclick = async () => { await auth.signOut(); window.location.href = 'login_admin.html'; };

        // Pencarian UID
        document.getElementById('uidSearchBtn').onclick = () => {
            const uid = document.getElementById('uidSearchInput').value.trim();
            searchDriverDeposits(uid);
        };
        document.getElementById('uidSearchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('uidSearchBtn').click();
        });
        document.getElementById('closeSearchResult').onclick = closeSearchResult;
        document.getElementById('closeSearchBtn').onclick = closeSearchResult;

        // Cleanup expired setiap 30 menit
        setInterval(cleanupExpiredDeposits, 30 * 60 * 1000);
    });
</script>
</body>
</html>
