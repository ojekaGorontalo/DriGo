<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JeGo - Admin CS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .admin-header {
            background: linear-gradient(135deg, #FF9800, #F57C00);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-header h1 {
            font-size: 20px;
            font-weight: 600;
        }
        .admin-header .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        .admin-header .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .admin-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .room-sidebar {
            width: 300px;
            background: #fafafa;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }
        .room-sidebar .sidebar-header {
            padding: 12px 16px;
            background: #fff;
            border-bottom: 1px solid #ddd;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        .room-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .room-item {
            padding: 10px 14px;
            margin-bottom: 6px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #FF9800;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .room-item:hover {
            background: #f0f0f0;
        }
        .room-item.active {
            background: #FFF3E0;
            border-left-color: #E65100;
        }
        .room-item .room-id {
            font-weight: 500;
            font-size: 13px;
            color: #333;
        }
        .room-item .room-preview {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }
        .room-item .badge {
            background: #F57C00;
            color: white;
            border-radius: 12px;
            padding: 2px 10px;
            font-size: 12px;
        }

        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ece5dd;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23FF9800' fill-opacity='0.05' fill-rule='evenodd'/%3E%3C/svg%3E");
        }

        .chat-panel .empty-chat {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 16px;
            font-weight: 500;
            flex-direction: column;
        }
        .chat-panel .chat-header {
            background: white;
            padding: 10px 16px;
            border-bottom: 1px solid #ddd;
            display: none;
            justify-content: space-between;
            align-items: center;
        }
        .chat-panel .chat-header .room-label {
            font-weight: 600;
            font-size: 15px;
            color: #333;
        }
        .chat-panel .chat-header .btn-close {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 4px 16px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }
        .chat-panel .chat-header .btn-close:hover {
            background: #c0392b;
        }

        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: none;
        }
        .message {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }
        .message.user {
            align-items: flex-start;
        }
        .message.cs {
            align-items: flex-end;
            margin-left: auto;
        }
        .message .bubble {
            padding: 10px 14px;
            border-radius: 16px;
            word-wrap: break-word;
            line-height: 1.4;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        }
        .message.user .bubble {
            background: white;
            border-top-left-radius: 4px;
            color: #333;
        }
        .message.cs .bubble {
            background: #dcf8c6;
            border-top-right-radius: 4px;
            color: #333;
        }
        .message .time {
            font-size: 10px;
            color: #888;
            margin-top: 4px;
            padding: 0 4px;
        }

        .input-area {
            padding: 10px 12px;
            background: white;
            border-top: 1px solid #ddd;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .input-area input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 24px;
            outline: none;
            font-size: 15px;
            transition: 0.2s;
        }
        .input-area input:focus {
            border-color: #FF9800;
        }
        .input-area button {
            background: linear-gradient(135deg, #FF9800, #F57C00);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }
        .input-area button:hover {
            opacity: 0.9;
        }

        @media (max-width: 700px) {
            .admin-body {
                flex-direction: column;
            }
            .room-sidebar {
                width: 100%;
                max-height: 200px;
                border-right: none;
                border-bottom: 1px solid #ddd;
            }
        }
    </style>
</head>
<body>

    <div class="admin-container">

        <div class="admin-header">
            <h1><i class="fas fa-headset"></i> JeGo - Admin CS</h1>
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>

        <div class="admin-body">

            <!-- Sidebar -->
            <div class="room-sidebar">
                <div class="sidebar-header">💬 Percakapan Aktif</div>
                <div class="room-list" id="roomList">
                    <div style="padding:12px;color:#666;">Memuat...</div>
                </div>
            </div>

            <!-- Chat Panel -->
            <div class="chat-panel" id="chatPanel">
                <div class="empty-chat" id="emptyChat">
                    <i class="fas fa-comment-dots" style="font-size:40px;display:block;margin-bottom:10px;"></i>
                    Pilih percakapan dari daftar di samping
                </div>

                <div class="chat-header" id="chatHeader">
                    <span class="room-label" id="currentRoomLabel">Room</span>
                    <button class="btn-close" id="closeChatBtn"><i class="fas fa-times"></i> Tutup Chat</button>
                </div>

                <div class="chat-messages" id="chatMessages"></div>

                <div class="input-area" id="inputArea">
                    <input type="text" id="msgInput" placeholder="Ketik balasan..." />
                    <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // =============================================================
        // FIREBASE CONFIG
        // =============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCD0pgeZio-LdKqYDtWxcdXcZwyL4ngYQI",
            authDomain: "jego-8e531.firebaseapp.com",
            databaseURL: "https://jego-8e531-default-rtdb.firebaseio.com",
            projectId: "jego-8e531",
            storageBucket: "jego-8e531.firebasestorage.app",
            appId: "1:600037007040:web:ac3243ad9b472647ffd725"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // =============================================================
        // DOM REFS
        // =============================================================
        const roomListEl = document.getElementById('roomList');
        const emptyChat = document.getElementById('emptyChat');
        const chatHeader = document.getElementById('chatHeader');
        const chatMessages = document.getElementById('chatMessages');
        const inputArea = document.getElementById('inputArea');
        const currentRoomLabel = document.getElementById('currentRoomLabel');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const closeChatBtn = document.getElementById('closeChatBtn');
        const logoutBtn = document.getElementById('logoutBtn');

        // =============================================================
        // STATE
        // =============================================================
        let currentRoomId = null;
        let messagesQuery = null;
        let roomListener = null;

        // =============================================================
        // UTILITY
        // =============================================================
        function getTime() {
            const now = new Date();
            return now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }

        function addMessageUI(container, text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'cs'}`;
            const time = getTime();
            div.innerHTML = `
                <div class="bubble">${text}</div>
                <div class="time">${time}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // =============================================================
        // FUNGSI: LOAD ROOM LIST
        // =============================================================
        function loadRooms() {
            if (roomListener) {
                roomListener.off();
                roomListener = null;
            }
            const ref = database.ref('chat_cs');
            roomListener = ref.orderByChild('status').equalTo('open');
            roomListener.on('value', (snap) => {
                const rooms = snap.val();
                roomListEl.innerHTML = '';
                if (!rooms) {
                    roomListEl.innerHTML = '<div style="padding:12px;color:#666;">Tidak ada percakapan aktif.</div>';
                    return;
                }
                const entries = Object.entries(rooms);
                entries.sort((a, b) => (b[1].last_update || 0) - (a[1].last_update || 0));

                for (const [key, room] of entries) {
                    const div = document.createElement('div');
                    div.className = 'room-item';
                    if (key === currentRoomId) div.classList.add('active');

                    const lastMsg = room.messages ? Object.values(room.messages).pop() : null;
                    const lastText = lastMsg ? lastMsg.text : 'Tidak ada pesan';
                    const unread = room.messages ? Object.values(room.messages).filter(m => m.sender === 'user' && !m
                        .read).length : 0;

                    div.innerHTML = `
                        <div>
                            <div class="room-id">${key}</div>
                            <div class="room-preview">${lastText.substring(0, 40)}...</div>
                        </div>
                        ${unread > 0 ? `<span class="badge">${unread}</span>` : ''}
                    `;
                    div.addEventListener('click', () => {
                        openRoom(key);
                    });
                    roomListEl.appendChild(div);
                }
            });
        }

        // =============================================================
        // FUNGSI: BUKA ROOM
        // =============================================================
        function openRoom(roomId) {
            if (messagesQuery) {
                messagesQuery.off();
                messagesQuery = null;
            }

            currentRoomId = roomId;

            emptyChat.style.display = 'none';
            chatHeader.style.display = 'flex';
            chatMessages.style.display = 'block';
            inputArea.style.display = 'flex';

            currentRoomLabel.textContent = 'Room: ' + roomId;
            chatMessages.innerHTML = '';

            document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
            const activeItem = Array.from(document.querySelectorAll('.room-item')).find(el =>
                el.textContent.includes(roomId)
            );
            if (activeItem) activeItem.classList.add('active');

            const ref = database.ref(`chat_cs/${roomId}/messages`);
            const query = ref.orderByChild('timestamp');
            messagesQuery = query;

            query.on('child_added', (snap) => {
                const data = snap.val();
                const isUser = data.sender === 'user';
                addMessageUI(chatMessages, data.text, isUser);
                if (isUser && !data.read) {
                    snap.ref.update({ read: true });
                }
            });

            msgInput.disabled = false;
            sendBtn.disabled = false;
            msgInput.focus();
        }

        // =============================================================
        // FUNGSI: KIRIM PESAN (CS)
        // =============================================================
        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text || !currentRoomId) return;

            const ref = database.ref(`chat_cs/${currentRoomId}/messages`);
            ref.push({
                sender: 'cs',
                text: text,
                timestamp: Date.now(),
                read: true
            });

            database.ref(`chat_cs/${currentRoomId}`).update({
                last_update: Date.now()
            });

            addMessageUI(chatMessages, text, false);
            msgInput.value = '';
            msgInput.focus();
        }

        // =============================================================
        // FUNGSI: TUTUP CHAT (HAPUS ROOM)
        // =============================================================
        function closeRoom() {
            if (!currentRoomId) return;

            if (messagesQuery) {
                messagesQuery.off();
                messagesQuery = null;
            }

            // Hapus room dari Firebase
            database.ref(`chat_cs/${currentRoomId}`).remove()
                .then(() => {
                    console.log('Room chat dihapus:', currentRoomId);
                })
                .catch(err => console.error('Gagal hapus room:', err));

            // Reset UI
            currentRoomId = null;
            emptyChat.style.display = 'flex';
            chatHeader.style.display = 'none';
            chatMessages.style.display = 'none';
            chatMessages.innerHTML = '';
            inputArea.style.display = 'none';
            msgInput.disabled = true;
            sendBtn.disabled = true;

            // Sidebar otomatis update via listener
        }

        // =============================================================
        // LOGOUT
        // =============================================================
        function logout() {
            if (confirm('Yakin ingin logout?')) {
                window.location.href = 'index.html';
            }
        }

        // =============================================================
        // EVENT LISTENERS
        // =============================================================
        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        closeChatBtn.addEventListener('click', closeRoom);
        logoutBtn.addEventListener('click', logout);

        // =============================================================
        // INIT
        // =============================================================
        loadRooms();

        const params = new URLSearchParams(window.location.search);
        const roomParam = params.get('room');
        if (roomParam) {
            setTimeout(() => {
                openRoom(roomParam);
            }, 500);
        }

        console.log('Admin CS Panel siap.');
    </script>

</body>
</html>
