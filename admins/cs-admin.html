<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
                appId: "007d7eba-9cfc-40d1-a92e-f2299f770282",

                notifyButton: {

            console.log('✅ OneSignal initialized');

    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .admin-header {
            background: linear-gradient(135deg, #FF9800, #F57C00);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-header h1 {
            font-size: 20px;
            font-weight: 600;
        }
        .admin-header .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .admin-header .btn-notif {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
            position: relative;
        }
        .admin-header .btn-notif:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .admin-header .btn-notif.has-notif {
            background: rgba(244, 67, 54, 0.6);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }
        .admin-header .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        .admin-header .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .admin-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .room-sidebar {
            width: 300px;
            background: #fafafa;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }
        .room-sidebar .sidebar-header {
            padding: 12px 16px;
            background: #fff;
            border-bottom: 1px solid #ddd;
            font-weight: 600;
            color: #333;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
        .room-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .room-item {
            padding: 10px 14px;
            margin-bottom: 6px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #FF9800;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .room-item:hover {
            background: #f0f0f0;
        }
        .room-item.active {
            background: #FFF3E0;
            border-left-color: #E65100;
        }
        .room-item .room-id {
            font-weight: 500;
            font-size: 13px;
            color: #333;
        }
        .room-item .room-preview {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }
        .room-item .badge {
            background: #F57C00;
            color: white;
            border-radius: 12px;
            padding: 2px 10px;
            font-size: 12px;
        }

        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ece5dd;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23FF9800' fill-opacity='0.05' fill-rule='evenodd'/%3E%3C/svg%3E");
        }

        .chat-panel .empty-chat {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 16px;
            font-weight: 500;
            flex-direction: column;
        }
        .chat-panel .chat-header {
            background: white;
            padding: 10px 16px;
            border-bottom: 1px solid #ddd;
            display: none;
            justify-content: space-between;
            align-items: center;
        }
        .chat-panel .chat-header .room-label {
            font-weight: 600;
            font-size: 15px;
            color: #333;
        }
        .chat-panel .chat-header .btn-close {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 4px 16px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }
        .chat-panel .chat-header .btn-close:hover {
            background: #c0392b;
        }

        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: none;
        }
        .message {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }
        .message.user {
            align-items: flex-start;
        }
        .message.cs {
            align-items: flex-end;
            margin-left: auto;
        }
        .message .bubble {
            padding: 10px 14px;
            border-radius: 16px;
            word-wrap: break-word;
            line-height: 1.4;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        }
        .message.user .bubble {
            background: white;
            border-top-left-radius: 4px;
            color: #333;
        }
        .message.cs .bubble {
            background: #dcf8c6;
            border-top-right-radius: 4px;
            color: #333;
        }
        .message .time {
            font-size: 10px;
            color: #888;
            margin-top: 4px;
            padding: 0 4px;
        }

        .input-area {
            padding: 10px 12px;
            background: white;
            border-top: 1px solid #ddd;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .input-area input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 24px;
            outline: none;
            font-size: 15px;
            transition: 0.2s;
        }
        .input-area input:focus {
            border-color: #FF9800;
        }
        .input-area button {
            background: linear-gradient(135deg, #FF9800, #F57C00);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }
        .input-area button:hover {
            opacity: 0.9;
        }

        /* ====== CONSOLE LOG AREA ====== */
        .console-log {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 8px 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 120px;
            overflow-y: auto;
            border-top: 2px solid #FF9800;
            display: none;
        }
        .console-log .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid #333;
        }
        .console-log .log-time {
            color: #888;
        }
        .console-log .log-success {
            color: #4CAF50;
        }
        .console-log .log-info {
            color: #2196F3;
        }
        .console-log .log-warning {
            color: #FFC107;
        }
        .console-log .log-error {
            color: #f44336;
        }
        .console-log .log-notif {
            color: #FF9800;
            font-weight: bold;
        }

        @media (max-width: 700px) {
            .admin-body {
                flex-direction: column;
            }
            .room-sidebar {
                width: 100%;
                max-height: 200px;
                border-right: none;
                border-bottom: 1px solid #ddd;
            }
            .console-log {
                max-height: 80px;
            }
        }
    </style>
</head>
<body>

    <div class="admin-container">

        <!-- Header -->
        <div class="admin-header">
            <h1><i class="fas fa-headset"></i> JeGo - Admin CS</h1>
            <div class="header-actions">
                <button class="btn-notif" id="notifBtn"><i class="fas fa-bell"></i> <span id="notifText">Notifikasi</span></button>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <!-- Body -->
        <div class="admin-body">

            <!-- Sidebar -->
            <div class="room-sidebar">
                <div class="sidebar-header">
                    <span>💬 Percakapan Aktif</span>
                    <span id="totalRooms">0</span>
                </div>
                <div class="room-list" id="roomList">
                    <div style="padding:12px;color:#666;">Memuat...</div>
                </div>
            </div>

            <!-- Chat Panel -->
            <div class="chat-panel" id="chatPanel">
                <div class="empty-chat" id="emptyChat">
                    <i class="fas fa-comment-dots" style="font-size:40px;display:block;margin-bottom:10px;"></i>
                    Pilih percakapan dari daftar di samping
                </div>

                <div class="chat-header" id="chatHeader">
                    <span class="room-label" id="currentRoomLabel">Room</span>
                    <button class="btn-close" id="closeChatBtn"><i class="fas fa-times"></i> Tutup Chat</button>
                </div>

                <div class="chat-messages" id="chatMessages"></div>

                <div class="input-area" id="inputArea">
                    <input type="text" id="msgInput" placeholder="Ketik balasan..." />
                    <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>

        </div>

        <!-- Console Log -->
        <div class="console-log" id="consoleLog">
            <div style="color:#888;padding:4px 0;font-weight:bold;">📋 LOG ACTIVITY</div>
        </div>
    </div>

    <script>
        // =============================================================
        // 1. FIREBASE CONFIG
        // =============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCD0pgeZio-LdKqYDtWxcdXcZwyL4ngYQI",
            authDomain: "jego-8e531.firebaseapp.com",
            databaseURL: "https://jego-8e531-default-rtdb.firebaseio.com",
            projectId: "jego-8e531",
            storageBucket: "jego-8e531.firebasestorage.app",
            appId: "1:600037007040:web:ac3243ad9b472647ffd725"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        console.log('🔥 Firebase initialized');

        // =============================================================
        // 2. CONSOLE LOG FUNCTION
        // =============================================================
        const consoleLog = document.getElementById('consoleLog');
        let logCount = 0;

        function addLog(message, type = 'info') {
            logCount++;
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            const typeClass = `log-${type}`;
            entry.innerHTML = `
                <span class="log-time">[${time}]</span>
                <span class="${typeClass}">${message}</span>
            `;
            consoleLog.appendChild(entry);
            consoleLog.scrollTop = consoleLog.scrollHeight;

            // Tampilkan console log jika ada log
            consoleLog.style.display = 'block';

            // Batasi jumlah log
            if (logCount > 100) {
                const first = consoleLog.querySelector('.log-entry');
                if (first) first.remove();
                logCount--;
            }
        }

        // =============================================================
        // 3. DOM REFS
        // =============================================================
        const roomListEl = document.getElementById('roomList');
        const emptyChat = document.getElementById('emptyChat');
        const chatHeader = document.getElementById('chatHeader');
        const chatMessages = document.getElementById('chatMessages');
        const inputArea = document.getElementById('inputArea');
        const currentRoomLabel = document.getElementById('currentRoomLabel');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const closeChatBtn = document.getElementById('closeChatBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const notifBtn = document.getElementById('notifBtn');
        const notifText = document.getElementById('notifText');
        const totalRooms = document.getElementById('totalRooms');

        // =============================================================
        // 4. STATE
        // =============================================================
        let currentRoomId = null;
        let messagesQuery = null;
        let roomListener = null;
        let notificationPermission = false;
        let unreadCount = 0;
        let isNotificationSoundEnabled = true;
        let totalMessageCount = 0;

        // =============================================================
        // 5. UTILITY
        // =============================================================
        function getTime() {
            const now = new Date();
            return now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }

        function addMessageUI(container, text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'cs'}`;
            const time = getTime();
            div.innerHTML = `
                <div class="bubble">${text}</div>
                <div class="time">${time}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            totalMessageCount++;
            addLog(`📝 Pesan ${isUser ? 'USER' : 'CS'}: "${text.substring(0, 40)}${text.length > 40 ? '...' : ''}"`, isUser ?
                'warning' : 'info');
        }

        // =============================================================
        // 6. NOTIFICATION FUNCTIONS
        // =============================================================

        async function requestNotificationPermission() {
            addLog('🔔 Meminta izin notifikasi...', 'info');
            try {
                if (!('Notification' in window)) {
                    alert('Browser ini tidak mendukung notifikasi.');
                    addLog('❌ Browser tidak mendukung notifikasi', 'error');
                    return;
                }

                if (Notification.permission === 'granted') {
                    alert('Notifikasi sudah diizinkan.');
                    notificationPermission = true;
                    addLog('✅ Notifikasi sudah diizinkan sebelumnya', 'success');
                    updateNotifButton();
                    return;
                }

                if (Notification.permission === 'denied') {
                    alert('Notifikasi diblokir. Silakan izinkan di pengaturan browser.');
                    addLog('❌ Notifikasi diblokir oleh user', 'error');
                    return;
                }

                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    notificationPermission = true;
                    alert('Notifikasi diizinkan! Anda akan menerima pemberitahuan pesan baru.');
                    addLog('✅ Notifikasi diizinkan oleh user', 'success');
                } else {
                    notificationPermission = false;
                    alert('Notifikasi tidak diizinkan.');
                    addLog('❌ Notifikasi ditolak oleh user', 'error');
                }
                updateNotifButton();
            } catch (err) {
                console.error('Gagal minta izin notifikasi:', err);
                addLog(`❌ Gagal minta izin: ${err.message}`, 'error');
                alert('Gagal meminta izin notifikasi.');
            }
        }

        function sendBrowserNotification(title, body, roomId) {
            try {
                if (!('Notification' in window) || Notification.permission !== 'granted') {
                    addLog('⚠️ Browser notification tidak diizinkan, lewati', 'warning');
                    return;
                }

                addLog(`🔔 Mengirim notifikasi browser: "${title}"`, 'notif');

                const options = {
                    body: body,
                    icon: 'https://cdn-icons-png.flaticon.com/128/7890/7890227.png',
                    badge: 'https://cdn-icons-png.flaticon.com/128/7890/7890227.png',
                    tag: roomId,
                    requireInteraction: true,
                    silent: false,
                };

                const notification = new Notification(title, options);
                addLog('✅ Notifikasi browser terkirim', 'success');

                notification.onclick = function() {
                    window.focus();
                    addLog(`👆 Admin klik notifikasi → buka room ${roomId}`, 'info');
                    if (roomId) {
                        openRoom(roomId);
                    }
                    this.close();
                };

                playNotificationSound();

            } catch (err) {
                console.error('Gagal kirim notifikasi browser:', err);
                addLog(`❌ Gagal kirim notifikasi: ${err.message}`, 'error');
            }
        }

        async function sendOneSignalNotification(title, message, roomId) {
            try {
                const OneSignal = window.OneSignal;
                if (!OneSignal) {
                    addLog('⚠️ OneSignal belum siap', 'warning');
                    return;
                }
                const isSubscribed = await OneSignal.Notifications.isSubscribed();
                if (!isSubscribed) {
                    addLog('⚠️ OneSignal notifikasi tidak diizinkan', 'warning');
                    return;
                }
                await OneSignal.Notifications.addNotification({
                    title: title,
                    message: message,
                    url: window.location.href + '?room=' + roomId,
                    icon: 'https://cdn-icons-png.flaticon.com/128/7890/7890227.png',
                });
                addLog('✅ OneSignal notifikasi terkirim', 'success');
            } catch (err) {
                console.error('Gagal kirim OneSignal:', err);
                addLog(`❌ Gagal kirim OneSignal: ${err.message}`, 'error');
            }
        }

        function sendCombinedNotification(title, body, roomId) {
            addLog(`🔔 PROSES NOTIFIKASI: ${title}`, 'notif');

            // Browser notification
            sendBrowserNotification(title, body, roomId);

            // OneSignal notification
            sendOneSignalNotification(title, body, roomId);

            // Update badge
            unreadCount++;
            updateNotifButton();
            document.title = `(${unreadCount}) JeGo - Admin CS`;
            addLog(`📛 Unread count: ${unreadCount}`, 'info');

            // Suara
            playNotificationSound();
        }

        function playNotificationSound() {
            try {
                const audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.frequency.value = 800;
                oscillator.type = 'sine';
                gainNode.gain.value = 0.3;

                oscillator.start();
                setTimeout(() => {
                    oscillator.stop();
                    addLog('🔊 Suara notifikasi dimainkan', 'info');
                }, 300);
            } catch (err) {
                // Silakan jika audio tidak didukung
                addLog('⚠️ Suara notifikasi tidak didukung', 'warning');
            }
        }

        function updateNotifButton() {
            if (Notification.permission === 'granted') {
                notificationPermission = true;
                notifBtn.style.background = 'rgba(76, 175, 80, 0.4)';
                notifBtn.style.borderColor = '#4CAF50';
                if (unreadCount === 0) {
                    notifText.textContent = '✅ Aktif';
                }
            } else {
                notificationPermission = false;
                notifBtn.style.background = '';
                notifBtn.style.borderColor = '';
                if (unreadCount === 0) {
                    notifText.textContent = '🔔 Izinkan';
                }
            }

            if (unreadCount > 0) {
                notifBtn.classList.add('has-notif');
                notifText.textContent = `🔔 ${unreadCount} baru`;
            } else {
                notifBtn.classList.remove('has-notif');
                if (Notification.permission === 'granted') {
                    notifText.textContent = '✅ Aktif';
                } else {
                    notifText.textContent = '🔔 Izinkan';
                }
            }
            addLog(`🔄 Update notif button: unread=${unreadCount}, permission=${Notification.permission}`, 'info');
        }

        // =============================================================
        // 7. FUNGSI: LOAD ROOM LIST
        // =============================================================
        function loadRooms() {
            addLog('📋 Memuat daftar room...', 'info');
            if (roomListener) {
                roomListener.off();
                roomListener = null;
            }
            const ref = database.ref('chat_cs');
            roomListener = ref.orderByChild('status').equalTo('open');
            roomListener.on('value', (snap) => {
                const rooms = snap.val();
                roomListEl.innerHTML = '';
                if (!rooms) {
                    roomListEl.innerHTML = '<div style="padding:12px;color:#666;">Tidak ada percakapan aktif.</div>';
                    totalRooms.textContent = '0';
                    addLog('📋 Tidak ada room aktif', 'info');
                    return;
                }
                const entries = Object.entries(rooms);
                entries.sort((a, b) => (b[1].last_update || 0) - (a[1].last_update || 0));
                totalRooms.textContent = entries.length;
                addLog(`📋 Ditemukan ${entries.length} room aktif`, 'success');

                for (const [key, room] of entries) {
                    const div = document.createElement('div');
                    div.className = 'room-item';
                    if (key === currentRoomId) div.classList.add('active');

                    const lastMsg = room.messages ? Object.values(room.messages).pop() : null;
                    const lastText = lastMsg ? lastMsg.text : 'Tidak ada pesan';
                    const unread = room.messages ? Object.values(room.messages).filter(m => m.sender === 'user' && !m
                        .read).length : 0;

                    div.innerHTML = `
                        <div>
                            <div class="room-id">${key}</div>
                            <div class="room-preview">${lastText.substring(0, 40)}...</div>
                        </div>
                        ${unread > 0 ? `<span class="badge">${unread}</span>` : ''}
                    `;
                    div.addEventListener('click', () => {
                        addLog(`👆 Admin klik room: ${key}`, 'info');
                        openRoom(key);
                    });
                    roomListEl.appendChild(div);
                }
            });
        }

        // =============================================================
        // 8. FUNGSI: BUKA ROOM
        // =============================================================
        function openRoom(roomId) {
            addLog(`📂 Membuka room: ${roomId}`, 'info');

            if (messagesQuery) {
                messagesQuery.off();
                messagesQuery = null;
                addLog('🛑 Listener pesan sebelumnya dimatikan', 'info');
            }

            currentRoomId = roomId;

            emptyChat.style.display = 'none';
            chatHeader.style.display = 'flex';
            chatMessages.style.display = 'block';
            inputArea.style.display = 'flex';

            currentRoomLabel.textContent = 'Room: ' + roomId;
            chatMessages.innerHTML = '';

            document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
            const activeItem = Array.from(document.querySelectorAll('.room-item')).find(el =>
                el.textContent.includes(roomId)
            );
            if (activeItem) activeItem.classList.add('active');

            const ref = database.ref(`chat_cs/${roomId}/messages`);
            const query = ref.orderByChild('timestamp');
            messagesQuery = query;

            addLog(`👂 Mendengarkan pesan di room ${roomId}...`, 'info');

            query.on('child_added', (snap) => {
                const data = snap.val();
                const isUser = data.sender === 'user';
                addLog(`📩 Pesan ${isUser ? 'USER' : 'CS'} di room ${roomId}: "${data.text.substring(0, 30)}${data.text.length > 30 ? '...' : ''}"`,
                    isUser ? 'warning' : 'info');

                addMessageUI(chatMessages, data.text, isUser);

                // Tandai pesan user sebagai sudah dibaca
                if (isUser && !data.read) {
                    snap.ref.update({ read: true });
                    addLog(`✅ Pesan user ditandai read`, 'success');
                }

                // Kirim notifikasi jika pesan dari user dan room tidak sedang dibuka
                if (isUser && currentRoomId !== roomId) {
                    addLog(`🔔 DETEKSI: Pesan USER di room ${roomId} saat admin tidak di room itu → KIRIM NOTIFIKASI!`, 'notif');
                    const title = `📩 Pesan baru dari ${roomId}`;
                    const message = data.text.substring(0, 60);
                    sendCombinedNotification(title, message, roomId);
                } else if (isUser && currentRoomId === roomId) {
                    addLog(`ℹ️ Pesan USER di room yang SEDANG DIBUKA → tidak kirim notifikasi`, 'info');
                    // Tandai semua pesan user di room ini sebagai read
                    const userMsgs = ref.orderByChild('sender').equalTo('user');
                    userMsgs.once('value', (snap) => {
                        snap.forEach(child => {
                            if (!child.val().read) {
                                child.ref.update({ read: true });
                            }
                        });
                    });
                    unreadCount = 0;
                    updateNotifButton();
                    document.title = 'JeGo - Admin CS';
                }
            });

            // Reset unread count
            unreadCount = 0;
            updateNotifButton();
            document.title = 'JeGo - Admin CS';

            msgInput.disabled = false;
            sendBtn.disabled = false;
            msgInput.focus();

            addLog(`✅ Room ${roomId} siap digunakan`, 'success');
        }

        // =============================================================
        // 9. FUNGSI: KIRIM PESAN (CS)
        // =============================================================
        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text || !currentRoomId) {
                if (!text) addLog('⚠️ Pesan kosong, tidak dikirim', 'warning');
                return;
            }

            addLog(`📤 CS mengirim pesan ke ${currentRoomId}: "${text.substring(0, 30)}${text.length > 30 ? '...' : ''}"`,
                'info');

            const ref = database.ref(`chat_cs/${currentRoomId}/messages`);
            ref.push({
                sender: 'cs',
                text: text,
                timestamp: Date.now(),
                read: true
            });

            database.ref(`chat_cs/${currentRoomId}`).update({
                last_update: Date.now()
            });

            addMessageUI(chatMessages, text, false);
            msgInput.value = '';
            msgInput.focus();
            addLog('✅ Pesan CS terkirim', 'success');
        }

        // =============================================================
        // 10. FUNGSI: TUTUP CHAT (HAPUS ROOM)
        // =============================================================
        function closeRoom() {
            if (!currentRoomId) {
                addLog('⚠️ Tidak ada room yang dibuka', 'warning');
                return;
            }

            addLog(`🗑️ Menutup dan menghapus room: ${currentRoomId}`, 'error');

            if (messagesQuery) {
                messagesQuery.off();
                messagesQuery = null;
                addLog('🛑 Listener pesan dimatikan', 'info');
            }

            database.ref(`chat_cs/${currentRoomId}`).remove()
                .then(() => {
                    addLog(`✅ Room ${currentRoomId} berhasil dihapus dari Firebase`, 'success');
                })
                .catch(err => {
                    console.error('Gagal hapus room:', err);
                    addLog(`❌ Gagal hapus room: ${err.message}`, 'error');
                });

            currentRoomId = null;
            emptyChat.style.display = 'flex';
            chatHeader.style.display = 'none';
            chatMessages.style.display = 'none';
            chatMessages.innerHTML = '';
            inputArea.style.display = 'none';
            msgInput.disabled = true;
            sendBtn.disabled = true;

            // Reset notifikasi
            unreadCount = 0;
            updateNotifButton();
            document.title = 'JeGo - Admin CS';
            addLog('🔄 UI direset ke keadaan awal', 'info');
        }

        // =============================================================
        // 11. LOGOUT
        // =============================================================
        function logout() {
            if (confirm('Yakin ingin logout?')) {
                addLog('🚪 Admin logout', 'info');
                window.location.href = 'index.html';
            }
        }

        // =============================================================
        // 12. EVENT LISTENERS
        // =============================================================
        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        closeChatBtn.addEventListener('click', closeRoom);
        logoutBtn.addEventListener('click', logout);
        notifBtn.addEventListener('click', requestNotificationPermission);

        // =============================================================
        // 13. INIT
        // =============================================================
        addLog('🚀 Admin CS Panel starting...', 'info');

        loadRooms();

        const params = new URLSearchParams(window.location.search);
        const roomParam = params.get('room');
        if (roomParam) {
            addLog(`🔗 Parameter room ditemukan: ${roomParam}`, 'info');
            setTimeout(() => {
                openRoom(roomParam);
            }, 500);
        }

        // Cek status notifikasi saat load
        setTimeout(() => {
            if ('Notification' in window) {
                if (Notification.permission === 'granted') {
                    notificationPermission = true;
                    addLog('✅ Notifikasi sudah diizinkan sebelumnya', 'success');
                } else if (Notification.permission === 'denied') {
                    notificationPermission = false;
                    addLog('❌ Notifikasi diblokir oleh browser', 'error');
                } else {
                    addLog('ℹ️ Notifikasi belum diizinkan (default)', 'info');
                }
                updateNotifButton();
            }
            addLog('✅ Admin CS Panel siap!', 'success');
        }, 1500);

        // Hapus notifikasi di judul saat halaman difokuskan
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                addLog('👀 Halaman difokuskan, reset notifikasi', 'info');
                unreadCount = 0;
                updateNotifButton();
                document.title = 'JeGo - Admin CS';
            }
        });

        // =============================================================
        // 14. DEBUG: Tampilkan status di console browser
        // =============================================================
        console.log('🔍 ===== DEBUG INFO =====');
        console.log('📌 Firebase:', firebase.apps.length > 0 ? '✅ Connected' : '❌ Not connected');
        console.log('📌 Notification Permission:', Notification.permission);
        console.log('📌 Current Room:', currentRoomId);
        console.log('📌 Unread Count:', unreadCount);
        console.log('📌 OneSignal:', window.OneSignal ? '✅ Available' : '❌ Not available');
        console.log('🔍 ===== END DEBUG =====');
    </script>

</body>
</html>
