<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Debug OneSignal</title>
</head>
<body>

<h2>Debug Notifikasi</h2>

<button onclick="aktifkan()">Aktifkan Notifikasi</button>

<h3>Player ID:</h3>
<div id="playerId">-</div>

<h3>Log:</h3>
<div id="log" style="background:#000;color:#0f0;padding:10px;height:200px;overflow:auto;font-size:12px;"></div>

<script>
function log(msg){
  const el = document.getElementById('log');
  const time = new Date().toLocaleTimeString();
  el.innerHTML += "["+time+"] "+msg+"<br>";
  el.scrollTop = el.scrollHeight;
  console.log(msg);
}

async function aktifkan(){
  log("Tombol ditekan");

  try {
    if(typeof median === "undefined"){
      log("❌ median tidak ditemukan");
      return;
    }

    if(!median.onesignal){
      log("❌ onesignal tidak ada");
      return;
    }

    log("✅ median.onesignal tersedia");

    // 🔥 WAJIB (biar player id muncul)
    log("🔐 set consent...");
    await median.onesignal.setConsentGiven(true);

    log("📢 register...");
    await median.onesignal.register();

    // tunggu
    await new Promise(r => setTimeout(r, 4000));

    log("📦 ambil data...");
    const info = await median.onesignal.onesignalInfo();

    log("DATA: "+JSON.stringify(info));

    let id = null;

    if(info?.userId) id = info.userId;
    else if(info?.oneSignalUserId) id = info.oneSignalUserId;
    else if(info?.subscription?.id) id = info.subscription.id;

    if(id){
      log("✅ Player ID: "+id);
      document.getElementById("playerId").innerText = id;
    }else{
      log("❌ Player ID tidak ditemukan");
    }

  } catch(e){
    log("❌ ERROR: "+e.message);
  }
}

// bridge ready
window.median_library_ready = function(){
  log("✅ median ready");
};

if(window.median){
  window.median_library_ready();
}
</script>

</body>
</html>
