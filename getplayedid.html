<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aktifkan Notifikasi - JeGo Driver</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FF9800, #FF5722);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 28px;
            max-width: 400px;
            width: 100%;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            width: 80px;
            height: 80px;
            background: #FFF3E0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .icon span {
            font-size: 48px;
        }

        h1 {
            font-size: 24px;
            color: #FF9800;
            margin-bottom: 12px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .benefits {
            background: #F8F9FA;
            border-radius: 16px;
            padding: 16px;
            text-align: left;
            margin-bottom: 28px;
        }

        .benefit-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 14px;
            color: #333;
        }

        .benefit-item:last-child {
            margin-bottom: 0;
        }

        .benefit-item .check {
            width: 22px;
            height: 22px;
            background: #4CAF50;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            flex-shrink: 0;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: linear-gradient(90deg, #FF9800, #FF5722);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 87, 34, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 87, 34, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: #FF9800;
            border: 1px solid #FF9800;
        }

        .btn-secondary:hover {
            background: rgba(255, 152, 0, 0.05);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status-box {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            background: #F5F5F5;
            color: #666;
            display: none;
        }

        .status-box.show {
            display: block;
        }

        .status-box.success {
            background: #E8F5E9;
            color: #2E7D32;
        }

        .status-box.error {
            background: #FFEBEE;
            color: #C62828;
        }

        .status-box.info {
            background: #E3F2FD;
            color: #1565C0;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 20px;
            font-size: 11px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <span>🔔</span>
        </div>
        <h1>Aktifkan Notifikasi</h1>
        <div class="subtitle">
            Dapatkan informasi order baru secara instan langsung di ponsel Anda
        </div>

        <div class="benefits">
            <div class="benefit-item">
                <div class="check">✓</div>
                <span>Notifikasi order baru dalam radius 3 km</span>
            </div>
            <div class="benefit-item">
                <div class="check">✓</div>
                <span>Informasi status order secara real-time</span>
            </div>
            <div class="benefit-item">
                <div class="check">✓</div>
                <span>Tidak akan ketinggalan order penting</span>
            </div>
        </div>

        <button class="btn btn-primary" id="enableNotificationBtn">
            Aktifkan Notifikasi
        </button>
        <button class="btn btn-secondary" id="skipBtn">
            Nanti Saja
        </button>

        <div id="statusBox" class="status-box"></div>
        <div class="footer">
            Notifikasi akan dikirimkan meskipun aplikasi sedang tertutup
        </div>
    </div>

    <script>
        // Ambil data driver dari localStorage (dikirim dari halaman login)
        let driverData = null;
        const statusBox = document.getElementById('statusBox');
        const enableBtn = document.getElementById('enableNotificationBtn');
        const skipBtn = document.getElementById('skipBtn');

        // Fungsi untuk menampilkan status
        function showStatus(message, type = 'info') {
            statusBox.textContent = message;
            statusBox.className = `status-box show ${type}`;
        }

        // Fungsi untuk menyembunyikan status
        function hideStatus() {
            statusBox.classList.remove('show');
        }

        // Fungsi utama untuk request izin dan subscribe OneSignal
        async function requestNotificationPermission() {
            // Nonaktifkan tombol selama proses
            enableBtn.disabled = true;
            enableBtn.innerHTML = '<span class="loading"></span> Memproses...';

            try {
                // Cek apakah Median JavaScript Bridge tersedia
                if (typeof median === 'undefined' || !median.onesignal) {
                    throw new Error('Median OneSignal bridge tidak tersedia. Pastikan aplikasi dibangun dengan Median.co dan plugin OneSignal aktif.');
                }

                // Langkah 1: Minta izin notifikasi
                showStatus('Meminta izin notifikasi...', 'info');
                await median.onesignal.register();
                
                // Tunggu sebentar agar proses registrasi selesai
                await new Promise(resolve => setTimeout(resolve, 1000));

                // Langkah 2: Jika ada data driver, daftarkan external ID
                if (driverData && driverData.email) {
                    showStatus('Mendaftarkan akun driver...', 'info');
                    await median.onesignal.login(driverData.email);
                    
                    // Optional: Tambahkan tag untuk identifikasi
                    if (median.onesignal.addTag) {
                        if (driverData.name) {
                            await median.onesignal.addTag('driver_name', driverData.name);
                        }
                        if (driverData.phone) {
                            await median.onesignal.addTag('driver_phone', driverData.phone);
                        }
                        if (driverData.vehicleType) {
                            await median.onesignal.addTag('vehicle_type', driverData.vehicleType);
                        }
                    }
                }

                // Langkah 3: Cek status akhir
                showStatus('Memeriksa status langganan...', 'info');
                
                // Gunakan promise-based method untuk mendapatkan info
                let oneSignalInfo = null;
                if (median.onesignal.onesignalInfo) {
                    oneSignalInfo = await median.onesignal.onesignalInfo();
                } else if (median.onesignal.info) {
                    oneSignalInfo = await new Promise((resolve) => {
                        median.onesignal.info({ "callback": "median_onesignal_info" });
                        // Karena median_onesignal_info akan dipanggil oleh native, kita perlu mendefinisikan callback-nya
                        window.median_onesignal_info = (info) => {
                            resolve(info);
                        };
                    });
                }

                const isSubscribed = oneSignalInfo?.subscription?.optedIn || oneSignalInfo?.oneSignalSubscribed;
                
                if (isSubscribed) {
                    showStatus('✅ Berhasil! Notifikasi telah diaktifkan. Anda akan menerima order baru secara instan.', 'success');
                    
                    // Simpan status bahwa notifikasi sudah diaktifkan
                    localStorage.setItem('jego_notification_enabled', 'true');
                    
                    // Kirim notifikasi ke Kodular bahwa proses selesai
                    sendToKodular('notification_enabled', { status: 'success' });
                    
                    // Redirect ke halaman utama setelah 2 detik
                    setTimeout(() => {
                        window.location.href = 'list1.html';
                    }, 2000);
                } else {
                    // Pengguna mungkin menolak izin
                    showStatus('⚠️ Izin notifikasi belum diberikan. Anda dapat mengaktifkannya nanti melalui pengaturan aplikasi di ponsel Anda.', 'error');
                    enableBtn.disabled = false;
                    enableBtn.innerHTML = 'Coba Lagi';
                }

            } catch (error) {
                console.error('Error:', error);
                showStatus(`❌ Gagal mengaktifkan notifikasi: ${error.message}`, 'error');
                enableBtn.disabled = false;
                enableBtn.innerHTML = 'Coba Lagi';
                
                // Kirim notifikasi error ke Kodular
                sendToKodular('notification_error', { error: error.message });
            }
        }

        // Fungsi komunikasi dengan Kodular
        function sendToKodular(action, data = {}) {
            const payload = JSON.stringify({ 
                action: action, 
                ...data, 
                timestamp: new Date().toISOString() 
            });
            console.log('📤 Mengirim ke Kodular:', payload);
            
            if (window.AppInventor?.setWebViewString) {
                window.AppInventor.setWebViewString(payload);
            } else if (window.android?.receiveData) {
                window.android.receiveData(payload);
            }
        }

        // Fungsi untuk mengambil data driver dari localStorage
        function loadDriverData() {
            try {
                const stored = localStorage.getItem('jego_logged_in_driver');
                if (stored) {
                    driverData = JSON.parse(stored);
                    console.log('Data driver loaded:', driverData.name);
                }
            } catch (e) {
                console.error('Gagal load driver data:', e);
            }
        }

        // Fungsi untuk mengecek apakah notifikasi sudah diaktifkan sebelumnya
        function isNotificationAlreadyEnabled() {
            return localStorage.getItem('jego_notification_enabled') === 'true';
        }

        // Event listener untuk tombol Aktifkan
        enableBtn.addEventListener('click', requestNotificationPermission);

        // Event listener untuk tombol Skip
        skipBtn.addEventListener('click', () => {
            sendToKodular('notification_skipped', {});
            window.location.href = 'list1.html';
        });

        // Inisialisasi halaman
        document.addEventListener('DOMContentLoaded', () => {
            loadDriverData();
            
            // Jika sudah pernah mengaktifkan notifikasi sebelumnya, langsung redirect
            if (isNotificationAlreadyEnabled()) {
                window.location.href = 'list1.html';
                return;
            }
            
            // Tampilkan halaman
            console.log('Halaman request notifikasi siap');
            sendToKodular('notification_page_loaded', {});
        });
    </script>
</body>
</html>
