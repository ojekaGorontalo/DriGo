    function updateAutobidButton() { const btn = document.getElementById('autobidBtn'); if(autobidEnabled) { btn.innerHTML='Autobid: ON'; btn.classList.add('active'); } else { btn.innerHTML='Autobid: OFF'; btn.classList.remove('active'); } }
    function toggleAcceptKurir() { acceptKurirEnabled = !acceptKurirEnabled; localStorage.setItem(STORAGE_ACCEPT_KURIR, acceptKurirEnabled); updateKurirButton(); loadOrders(); }
    function updateKurirButton() { const btn = document.getElementById('acceptKurirHeaderBtn'); if(acceptKurirEnabled) { btn.innerHTML='📦 Kurir: ON'; btn.classList.add('active'); } else { btn.innerHTML='📦 Kurir: OFF'; btn.classList.remove('active'); } }
    function refreshData() { loadOrders(); }

    // ================= CHECK DRIVER DATA =================
    function checkDriverData() { const raw = localStorage.getItem('jego_logged_in_driver'); if(!raw) return false; const d = JSON.parse(raw); if(d.uid && d.name) { currentDriverData = { driverId: d.uid, fullName: d.name, phoneNumber: d.phone, email: d.email, profilePhotoUrl: d.fotoProfilURL || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png', vehicleType: d.vehicleType, plateNumber: d.plateNumber, rating: d.rating||5, perjalanan: d.perjalanan||0, balance: d.Balance||0 }; document.getElementById('driverPhoto').src = currentDriverData.profilePhotoUrl; return true; } return false; }

    // ================= SPA NAVIGATION (SOFT LOAD) =================
    async function loadContent(url) {
      try {
        showLoading('Memuat...');
        const response = await fetch(url);
        const html = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const newContent = doc.querySelector('#app-content');
        if (newContent) {
          document.getElementById('app-content').innerHTML = newContent.innerHTML;
          // Re-attach event listeners untuk orders, dll (panggil ulang inisialisasi halaman)
          if (url.includes('riwayat') || url.includes('akun')) {
            // Halaman riwayat atau akun, tidak perlu loadOrders
          } else {
            // Halaman utama (index) -> load orders
            loadOrders();
            startGPSMonitoring();
          }
        }
        document.title = doc.title;
        hideLoading();
      } catch (err) {
        console.error('Gagal soft load:', err);
        window.location.href = url; // fallback
      }
    }

    // Pasang listener untuk navigasi dari bottom tab bar Median
    if (typeof Median !== 'undefined' && Median.jsNavigation) {
      Median.jsNavigation.url.addListener((url) => {
        console.log('Navigasi soft ke:', url);
        loadContent(url);
        window.history.pushState({ url: url }, '', url);
      });
    }

    // Tangani tombol back browser
    window.addEventListener('popstate', (event) => {
      if (event.state && event.state.url) {
        loadContent(event.state.url);
      } else {
        loadContent(window.location.pathname);
      }
    });

    // ================= INISIALISASI =================
    document.addEventListener('DOMContentLoaded', async () => {
      addDebugLog('Halaman dimuat (SPA mode)');
      if (!checkDriverData()) { window.location.href = 'loginDriver.html'; return; }
      await fetchMapboxToken().catch(e=>addDebugLog(e.message));
      loadStoredSettings();
      startGPSMonitoring();
      loadOrders();
      // Event listeners
      document.getElementById('locationToggleBtn').addEventListener('click', toggleLocationTracking);
      document.getElementById('autobidBtn').addEventListener('click', toggleAutobid);
      document.getElementById('acceptKurirHeaderBtn').addEventListener('click', toggleAcceptKurir);
      document.getElementById('refreshBtn').addEventListener('click', refreshData);
      document.getElementById('menuBtn').addEventListener('click', () => { if(Median && Median.sidebar) Median.sidebar.open(); });
      // Set initial button states
      updateTrackingButton(); updateAutobidButton(); updateKurirButton();
    });

    function loadStoredSettings() {
      locationTrackingEnabled = localStorage.getItem(STORAGE_TRACKING) === 'true';
      autobidEnabled = localStorage.getItem(STORAGE_AUTOBID) === 'true';
      acceptKurirEnabled = localStorage.getItem(STORAGE_ACCEPT_KURIR) === 'true';
    }
  </script>
</body>
</html>
