<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Demo Salin Teks + Alert</title>
  <style>
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 30px 25px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }
    h2 {
      color: #FF9800;
      margin-bottom: 20px;
    }
    .text-box {
      background: #f0f0f0;
      padding: 16px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 500;
      margin: 20px 0;
      word-break: break-all;
      border: 1px solid #ddd;
      color: #333;
    }
    button {
      background: #FF9800;
      color: white;
      border: none;
      font-size: 18px;
      font-weight: 600;
      padding: 14px 24px;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 8px rgba(255,152,0,0.3);
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    button:hover {
      background: #F57C00;
      transform: translateY(-2px);
      box-shadow: 0 8px 12px rgba(255,152,0,0.4);
    }
    button:active {
      transform: translateY(0);
    }
    .note {
      margin-top: 20px;
      color: #888;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>📋 Salin Teks</h2>
    <p style="color: #555; margin-bottom: 8px;">Klik tombol untuk menyalin teks di bawah:</p>
    
    <!-- Teks yang akan disalin -->
    <div class="text-box" id="textToCopy">JeGo Driver - Kode Promo: BENTOR10</div>
    
    <button id="copyButton">
      <span>📄</span> Salin Teks
    </button>
    
    <div class="note">
      <p>Notifikasi menggunakan <code>alert()</code> standar.<br>
      Tidak ada popup kustom.</p>
    </div>
  </div>

  <script>
    (function() {
      const copyBtn = document.getElementById('copyButton');
      const textElement = document.getElementById('textToCopy');

      async function copyText() {
        const text = textElement.textContent; // Ambil teks dari div
        
        try {
          // Gunakan Clipboard API modern
          await navigator.clipboard.writeText(text);
          
          // Tampilkan alert sukses
          alert('✅ Teks berhasil disalin!\n\n"' + text + '"');
          
        } catch (err) {
          console.error('Clipboard error:', err);
          
          // Fallback: metode lama dengan textarea
          const textarea = document.createElement('textarea');
          textarea.value = text;
          textarea.style.position = 'fixed';
          textarea.style.opacity = '0';
          document.body.appendChild(textarea);
          textarea.select();
          
          try {
            document.execCommand('copy');
            alert('✅ Teks berhasil disalin! (fallback)');
          } catch (fallbackErr) {
            alert('❌ Gagal menyalin teks. Silakan salin manual.');
          } finally {
            document.body.removeChild(textarea);
          }
        }
      }

      copyBtn.addEventListener('click', copyText);
      
      // Opsional: klik pada teks juga langsung salin
      textElement.addEventListener('click', copyText);
      textElement.style.cursor = 'pointer';
      textElement.title = 'Klik untuk menyalin';
    })();
  </script>
</body>
</html>
