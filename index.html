    let countdownInterval = null, countdownOrderId = null, orderStatusListener = null;
    let mapboxAccessToken = null;
    const STORAGE_TRACKING = 'jego_location_tracking', STORAGE_AUTOBID = 'jego_autobid_enabled', STORAGE_ACCEPT_KURIR = 'jego_accept_kurir';

    // ================= FUNGSI UTILITY =================
    function addDebugLog(msg, type='info') { console.log(`[${type}] ${msg}`); }
    function showPopup(title, message, type='info', options={}) {
      document.getElementById('popupTitle').textContent = title;
      document.getElementById('popupMessage').innerHTML = message;
      const icons = { success:'✅', error:'❌', warning:'⚠️', info:'ℹ️' };
      document.getElementById('popupIcon').textContent = icons[type] || 'ℹ️';
      document.getElementById('popupOverlay').classList.add('active');
      const confirmBtn = document.getElementById('popupButton');
      confirmBtn.onclick = () => { document.getElementById('popupOverlay').classList.remove('active'); if(options.onConfirm) options.onConfirm(); };
    }
    function hidePopup() { document.getElementById('popupOverlay').classList.remove('active'); }
    function showLoading(msg) { document.getElementById('loadingOverlay').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }
    function calculateDistance(lat1,lng1,lat2,lng2) { if(!lat1||!lng1||!lat2||!lng2) return null; const R=6371; const dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180; const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2; const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); return R*c; }

    // ================= LOAD ORDERS (LENGKAP) =================
    function loadOrders() {
      const ordersList = document.getElementById('ordersList');
      if(!ordersList) return;
      ordersList.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      if(!currentDriverData || !database) return;
      if(ordersListener && ordersRef) ordersRef.off('value', ordersListener);
      ordersRef = database.ref('orders');
      ordersListener = ordersRef.on('value', (snapshot) => {
        const orders = snapshot.val();
        ordersList.innerHTML = '';
        if(!orders || Object.keys(orders).length===0) {
          ordersList.innerHTML = '<div class="empty-state"><div>📭</div><p>Tidak ada permintaan order saat ini</p></div>';
          return;
        }
        const driverVehicleType = currentDriverData?.vehicleType;
        if(!driverVehicleType) { ordersList.innerHTML = '<div class="empty-state"><div>⚠️</div><p>Data kendaraan tidak ditemukan</p></div>'; return; }
        const allOrders = Object.entries(orders).map(([id,order])=> ({id,...order})).filter(order=>order.status==='searching');
        const filteredOrders = allOrders.filter(order => {
          if(acceptKurirEnabled) {
            if(driverVehicleType==='motor') return order.vehicle==='motor' || order.vehicle==='kurir_motor';
            if(driverVehicleType==='bentor') return order.vehicle==='bentor' || order.vehicle==='kurir_bentor';
            return order.vehicle===driverVehicleType;
          } else return order.vehicle===driverVehicleType;
        });
        const newOrderIds = new Set(filteredOrders.map(o=>o.id));
        const addedOrders = filteredOrders.filter(o=>!previousOrderIds.has(o.id));
        previousOrderIds = newOrderIds;
        let shownPopupOrderIds = new Set(JSON.parse(sessionStorage.getItem('shownPopupOrderIds')||'[]'));
        addedOrders.forEach(order=>{
          if(locationTrackingEnabled && driverLocation.latitude && driverLocation.longitude && order.from_lat && order.from_lng) {
            const dist = calculateDistance(driverLocation.latitude, driverLocation.longitude, order.from_lat, order.from_lng);
            if(dist!==null && dist<3 && !shownPopupOrderIds.has(order.id)) {
              const sound = document.getElementById('newOrderSound'); if(sound) sound.play();
              showOrderDetail(order, true);
              shownPopupOrderIds.add(order.id);
              sessionStorage.setItem('shownPopupOrderIds', JSON.stringify(Array.from(shownPopupOrderIds)));
            }
          }
        });
        if(filteredOrders.length===0) {
          ordersList.innerHTML = `<div class="empty-state"><div>🛵</div><p>Tidak ada order untuk kendaraan ${driverVehicleType}${acceptKurirEnabled?' (termasuk kurir)':''}</p></div>`;
          return;
        }
        const sortedOrders = filteredOrders.sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0));
        renderOrdersList(sortedOrders, ordersList);
      }, (error)=> { ordersList.innerHTML = '<div class="empty-state"><div>⚠️</div><p>Gagal terhubung ke server</p></div>'; });
    }

    function renderOrdersList(orders, ordersList) {
      orders.forEach(order=>{
        const orderItem = document.createElement('div'); orderItem.className='order-item';
        const user = order.user_data||{};
        const customerName = user.name||'Tidak diketahui';
        const customerPhoto = user.fotoProfilURL||'https://cdn-icons-png.flaticon.com/512/3135/3135715.png';
        const alamatA = order.alamat_a||'-', alamatB = order.alamat_b||'-';
        const durasi = order.durasi||'-', jarak = order.jarak||'-', harga = order.harga_total||0;
        const isKurir = order.vehicle && order.vehicle.includes('kurir');
        const promoBadge = (order.diskon_persen||order.promo_data)?'<span class="promo-badge">🎁 PROMO</span>':'';
        let jarakDriver = '-';
        if(driverLocation.latitude && driverLocation.longitude && order.from_lat && order.from_lng) {
          const dist = calculateDistance(driverLocation.latitude, driverLocation.longitude, order.from_lat, order.from_lng);
          if(dist!==null) jarakDriver = dist.toFixed(1)+' km';
        }
        let kurirDescHtml = '';
        if(isKurir && order.delivery_data && order.delivery_data.description) kurirDescHtml = `<div class="delivery-desc-card"><span>📦 ${order.delivery_data.description}</span></div>`;
        orderItem.innerHTML = `
          <div class="order-header"><div class="order-badges">${isKurir?'<span class="kurir-badge">📦 KURIR</span>':''}${promoBadge}</div></div>
          <div class="route-info-with-photo">
            <div class="customer-info-left"><img src="${customerPhoto}" class="customer-photo-left" onclick="showPhotoModal('${customerPhoto}','${customerName}')"><div class="customer-name-left">${customerName}</div><div class="customer-rating"><span class="rating-stars">★</span><span class="rating-value" data-customer-id="${user.uid||user.userId||''}" data-order-id="${order.id}">...</span></div><div class="order-time">${new Date(order.created_at).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}</div></div>
            <div class="route-addresses-right"><div class="route-point"><div class="point-marker point-marker-a">A</div><div class="point-address point-address-a">${alamatA}</div></div><div class="route-point"><div class="point-marker point-marker-b">B</div><div class="point-address">${alamatB}</div></div>${kurirDescHtml}</div>
          </div>
          <div class="order-details"><div class="detail-item"><span class="detail-value">${durasi}</span><span class="detail-label">Durasi</span></div><div class="detail-item"><span class="detail-value">${jarak}</span><span class="detail-label">Jarak</span></div><div class="detail-item"><span class="detail-value price-highlight">Rp ${harga.toLocaleString('id-ID')}</span><span class="detail-label">Harga</span></div><div class="detail-item"><span class="detail-value">${jarakDriver}</span><span class="detail-label">Jarak Driver</span></div></div>
        `;
        orderItem.addEventListener('click', ()=>showOrderDetail(order, false));
        ordersList.appendChild(orderItem);
        const customerId = user.uid||user.userId;
        if(customerId) database.ref('users/'+customerId).once('value').then(snap=>{ const cd=snap.val(); if(cd){ const rs=orderItem.querySelector(`.rating-value[data-order-id="${order.id}"]`); if(rs) rs.textContent=`${(cd.avgRating||0).toFixed(1)} (${cd.ratingCount||0})`; } });
      });
    }

    // ================= SHOW ORDER DETAIL & MAP =================
    function showOrderDetail(order, fromAuto=false) {
      if(!currentDriverData) return;
      const orderKey = order.order_id||order.id;
      database.ref('orders/'+orderKey).once('value').then(snap=>{
        const currentOrder = snap.val();
        if(!currentOrder || currentOrder.status!=='searching') { showPopup('Info','Order sudah diambil driver lain.','warning'); loadOrders(); return; }
        currentSelectedOrder = currentOrder;
        currentDriverId = currentDriverData.driverId;
        document.getElementById('modalAddressA').textContent = currentOrder.alamat_a||'-';
        document.getElementById('modalAddressB').textContent = currentOrder.alamat_b||'-';
        document.getElementById('modalDuration').textContent = currentOrder.durasi||'-';
        document.getElementById('modalDistance').textContent = currentOrder.jarak||'-';
        document.getElementById('modalPrice').textContent = currentOrder.harga_total?`Rp ${currentOrder.harga_total.toLocaleString('id-ID')}`:'-';
        const user = currentOrder.user_data||{};
        document.getElementById('modalCustomerName').textContent = user.name||'Customer';
        const modalPhoto = document.getElementById('modalCustomerPhoto');
        if(user.fotoProfilURL) { modalPhoto.src=user.fotoProfilURL; modalPhoto.style.display='block'; } else modalPhoto.style.display='none';
        const deliveryDiv = document.getElementById('modalDeliveryInfo');
        if(currentOrder.delivery_data) { const d=currentOrder.delivery_data; deliveryDiv.innerHTML=`<div class="modal-delivery-item"><span class="modal-delivery-label">Jenis Barang:</span><span class="modal-delivery-value">${d.itemCategory||'-'}</span></div><div class="modal-delivery-item"><span class="modal-delivery-label">Deskripsi:</span><span class="modal-delivery-value">${d.description||'-'}</span></div>`; deliveryDiv.style.display='block'; } else deliveryDiv.style.display='none';
        document.getElementById('countdownContainer').style.display='none';
        document.getElementById('ambilBtn').disabled=false;
        document.getElementById('ambilBtn').textContent='Kirim Penawaran';
        document.getElementById('orderModal').style.display='flex';
        if(autobidEnabled && fromAuto && currentSelectedOrder && !currentSelectedOrder.vehicle.includes('kurir')) setTimeout(()=>sendDriverOffer(),500);
        if(mapboxAccessToken) { if(!modalMap) initModalMapbox(); showRouteOnMapbox(currentOrder); }
        else fetchMapboxToken().then(()=>{ if(!modalMap) initModalMapbox(); showRouteOnMapbox(currentOrder); }).catch(e=>addDebugLog(e.message));
      }).catch(e=>addDebugLog(e.message));
    }

    async function fetchMapboxToken() { const snap = await database.ref('Secret/Key').once('value'); mapboxAccessToken = snap.val(); return mapboxAccessToken; }
    function initModalMapbox() { mapboxgl.accessToken=mapboxAccessToken; modalMap=new mapboxgl.Map({ container:'modalMap', style:'mapbox://styles/mapbox/streets-v11', center:[123.0595,0.5441], zoom:12 }); modalMap.addControl(new mapboxgl.NavigationControl(),'bottom-right'); }
    let mapMarkers=[];
    function showRouteOnMapbox(order) {
      if(!order.from_lat||!order.from_lng||!order.to_lat||!order.to_lng) return;
      if(mapMarkers.length) { mapMarkers.forEach(m=>m.remove()); mapMarkers=[]; }
      if(modalMap.getLayer('route')) modalMap.removeLayer('route');
      if(modalMap.getSource('route')) modalMap.removeSource('route');
      const vehicle = order.vehicle||'motor';
      let iconUrl='https://cdn-icons-png.flaticon.com/128/5811/5811823.png';
      if(vehicle==='bentor') iconUrl='https://cdn-icons-png.flaticon.com/128/7890/7890227.png';
      else if(vehicle==='kurir_motor') iconUrl='https://cdn-icons-png.flaticon.com/128/9561/9561688.png';
      else if(vehicle==='kurir_bentor') iconUrl='https://cdn-icons-png.flaticon.com/128/7890/7890227.png';
      const pickupEl = document.createElement('div'); pickupEl.innerHTML=`<img src="${iconUrl}" style="width:40px;height:40px;">`;
      const pickupMarker = new mapboxgl.Marker({element:pickupEl}).setLngLat([order.from_lng,order.from_lat]).setPopup(new mapboxgl.Popup().setHTML('Penjemputan')).addTo(modalMap);
      mapMarkers.push(pickupMarker);
      const destEl = document.createElement('div'); destEl.innerHTML=`<img src="https://cdn-icons-png.flaticon.com/128/684/684908.png" style="width:40px;height:40px;">`;
      const destMarker = new mapboxgl.Marker({element:destEl}).setLngLat([order.to_lng,order.to_lat]).setPopup(new mapboxgl.Popup().setHTML('Tujuan')).addTo(modalMap);
      mapMarkers.push(destMarker);
      const bounds = new mapboxgl.LngLatBounds().extend([order.from_lng,order.from_lat]).extend([order.to_lng,order.to_lat]);
      modalMap.fitBounds(bounds,{padding:40});
      const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${order.from_lng},${order.from_lat};${order.to_lng},${order.to_lat}?geometries=geojson&access_token=${mapboxAccessToken}`;
      fetch(url).then(res=>res.json()).then(data=>{ if(data.routes?.length) { modalMap.addSource('route',{type:'geojson',data:data.routes[0].geometry}); modalMap.addLayer({id:'route',type:'line',source:'route',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':'#289672','line-width':4}}); } else fallbackLine(); }).catch(fallbackLine);
      function fallbackLine() { modalMap.addSource('route',{type:'geojson',data:{type:'Feature',geometry:{type:'LineString',coordinates:[[order.from_lng,order.from_lat],[order.to_lng,order.to_lat]]}}}); modalMap.addLayer({id:'route',type:'line',source:'route',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':'#289672','line-width':4,'line-dasharray':[2,1]}}); }
    }

    // ================= SEND OFFER & COUNTDOWN =================
    function sendDriverOffer() {
      if(!currentSelectedOrder||!currentDriverId||!currentDriverData) return;
      const hargaTotal = currentSelectedOrder.harga_total||0;
      const requiredBalance = hargaTotal*0.1;
      const driverBalance = currentDriverData.balance||0;
      if(driverBalance<requiredBalance) { showPopup('Saldo Tidak Cukup',`Saldo Rp ${driverBalance.toLocaleString('id-ID')} < Rp ${requiredBalance.toLocaleString('id-ID')}`,'warning'); return; }
      const orderId = currentSelectedOrder.order_id||currentSelectedOrder.id;
      const driverId = currentDriverId;
      const ambilBtn = document.getElementById('ambilBtn');
      ambilBtn.disabled=true; ambilBtn.textContent='Mengirim...';
      database.ref('orders/'+orderId).once('value').then(snap=>{
        const currentOrder = snap.val();
        if(!currentOrder || currentOrder.status!=='searching') { showPopup('Info','Order sudah diambil driver lain.','warning'); closeModal(); return; }
        const driverData = { id:driverId, name:currentDriverData.fullName, plate_number:currentDriverData.plateNumber, vehicle_type:currentDriverData.vehicleType, rating:currentDriverData.rating, profile_photo_url:currentDriverData.profilePhotoUrl||'', avg_rating:currentDriverData.rating, offered_at:new Date().toISOString(), status:'offered' };
        database.ref('orders/'+orderId+'/driver_offers/'+driverId).set(driverData).then(()=>{ ambilBtn.textContent='Menunggu Konfirmasi'; startCountdown(orderId,driverId); }).catch(()=>{ showPopup('Error','Gagal mengirim penawaran.','error'); ambilBtn.disabled=false; ambilBtn.textContent='Kirim Penawaran'; });
      }).catch(()=>{ showPopup('Error','Gagal memeriksa order.','error'); ambilBtn.disabled=false; ambilBtn.textContent='Kirim Penawaran'; });
    }

    function stopCountdown() { if(countdownInterval) clearInterval(countdownInterval); if(orderStatusListener && countdownOrderId) database.ref('orders/'+countdownOrderId).off('value',orderStatusListener); document.getElementById('countdownContainer').style.display='none'; document.getElementById('ambilBtn').disabled=false; document.getElementById('ambilBtn').textContent='Kirim Penawaran'; document.getElementById('closeModal').classList.remove('disabled'); countdownOrderId=null; countdownDriverId=null; }
    function startCountdown(orderId,driverId) { stopCountdown(); countdownOrderId=orderId; countdownDriverId=driverId; const container=document.getElementById('countdownContainer'); const progress=document.getElementById('countdownProgress'); const secondsSpan=document.getElementById('countdownSeconds'); const ambilBtn=document.getElementById('ambilBtn'); let timeLeft=30; container.style.display='block'; ambilBtn.disabled=true; ambilBtn.textContent='Menunggu...'; const closeBtn=document.getElementById('closeModal'); if(closeBtn) closeBtn.classList.add('disabled'); countdownInterval=setInterval(()=>{ timeLeft--; progress.style.width=(timeLeft/30)*100+'%'; secondsSpan.textContent=timeLeft+' detik'; if(timeLeft<=0) { clearInterval(countdownInterval); database.ref('orders/'+orderId+'/driver_offers/'+driverId).remove().then(()=>{ showPopup('Info','Waktu penawaran habis.','info'); closeModal(); }); } },1000); orderStatusListener=database.ref('orders/'+orderId).on('value',snap=>{ const order=snap.val(); if(!order) { stopCountdown(); showPopup('Info','Order tidak ditemukan.','warning'); closeModal(); return; } if(order.status==='accepted') { if(order.accepted_driver_id===driverId) { stopCountdown(); showPopup('Sukses','Penawaran diterima!','success'); localStorage.setItem('jego_driver_active_order',orderId); setTimeout(()=>window.location.href='orderAccepted.html?id='+orderId,1500); } else if(order.selected_driver?.id===driverId||order.driver?.id===driverId) { stopCountdown(); showPopup('Sukses','Penawaran diterima!','success'); localStorage.setItem('jego_driver_active_order',orderId); setTimeout(()=>window.location.href='orderAccepted.html?id='+orderId,1500); } else { stopCountdown(); showPopup('Info','Order diambil driver lain.','warning'); closeModal(); } } else if(order.status!=='searching') { stopCountdown(); showPopup('Info','Status order berubah.','info'); closeModal(); } }); }
    function closeModal() { document.getElementById('orderModal').style.display='none'; stopCountdown(); currentSelectedOrder=null; currentDriverId=null; loadOrders(); }

    // ================= GPS & TRACKING =================
    function startGPSMonitoring() { if(navigator.geolocation) { navigator.geolocation.getCurrentPosition(updateDriverLocation,err=>addDebugLog(err.message)); locationWatchId = navigator.geolocation.watchPosition(updateDriverLocation,err=>addDebugLog(err.message)); } }
    function updateDriverLocation(position) { driverLocation = { latitude: position.coords.latitude, longitude: position.coords.longitude }; document.getElementById('gpsDot').className='gps-dot gps-active'; if(locationTrackingEnabled && currentDriverData) database.ref('drivers/'+currentDriverData.driverId).update({ latitude:driverLocation.latitude, longitude:driverLocation.longitude, trackingEnabled:true, last_update:new Date().toISOString() }); }
    function toggleLocationTracking() { locationTrackingEnabled=!locationTrackingEnabled; localStorage.setItem(STORAGE_TRACKING,locationTrackingEnabled); updateTrackingButton(); if(locationTrackingEnabled && currentDriverData) database.ref('drivers/'+currentDriverData.driverId).update({ trackingEnabled:true }); }
    function updateTrackingButton() { const btn=document.getElementById('locationToggleBtn'); if(locationTrackingEnabled) { btn.innerHTML='📍 ON'; btn.classList.add('active'); } else { btn.innerHTML='📍 OFF'; btn.classList.remove('active'); } }
    function toggleAutobid() { if(!locationTrackingEnabled) { showPopup('Info','Aktifkan tracking dulu','warning'); return; } autobidEnabled=!autobidEnabled; localStorage.setItem(STORAGE_AUTOBID,autobidEnabled); updateAutobidButton(); }
    function updateAutobidButton() { const btn=document.getElementById('autobidBtn'); if(autobidEnabled) { btn.innerHTML='Autobid: ON'; btn.classList.add('active'); } else { btn.innerHTML='Autobid: OFF'; btn.classList.remove('active'); } }
    function toggleAcceptKurir() { acceptKurirEnabled=!acceptKurirEnabled; localStorage.setItem(STORAGE_ACCEPT_KURIR,acceptKurirEnabled); updateKurirButton(); loadOrders(); }
    function updateKurirButton() { const btn=document.getElementById('acceptKurirHeaderBtn'); if(acceptKurirEnabled) { btn.innerHTML='📦 Kurir: ON'; btn.classList.add('active'); } else { btn.innerHTML='📦 Kurir: OFF'; btn.classList.remove('active'); } }
    function refreshData() { loadOrders(); }

    // ================= CHECK DRIVER DATA =================
    function checkDriverData() { const raw = localStorage.getItem('jego_logged_in_driver'); if(!raw) return false; const d = JSON.parse(raw); if(d.uid && d.name) { currentDriverData = { driverId: d.uid, fullName: d.name, phoneNumber: d.phone, email: d.email, profilePhotoUrl: d.fotoProfilURL || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png', vehicleType: d.vehicleType, plateNumber: d.plateNumber, rating: d.rating||5, perjalanan: d.perjalanan||0, balance: d.Balance||0 }; document.getElementById('driverPhoto').src = currentDriverData.profilePhotoUrl; return true; } return false; }

    // ================= SPA NAVIGATION (SOFT LOAD) =================
    async function loadContent(url) {
      try {
        showLoading('Memuat...');
        const response = await fetch(url);
        const html = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const newContent = doc.querySelector('#app-content');
        if (newContent) {
          document.getElementById('app-content').innerHTML = newContent.innerHTML;
          // Re-inisialisasi halaman jika konten berubah (untuk halaman utama)
          if (!url.includes('riwayat') && !url.includes('akun')) {
            loadOrders();
            startGPSMonitoring();
          }
        }
        document.title = doc.title;
        hideLoading();
      } catch (err) { console.error(err); window.location.href = url; }
    }

    if (typeof Median !== 'undefined' && Median.jsNavigation) {
      Median.jsNavigation.url.addListener((url) => {
        console.log('Navigasi soft ke:', url);
        loadContent(url);
        window.history.pushState({ url: url }, '', url);
      });
    }
    window.addEventListener('popstate', (event) => {
      if (event.state && event.state.url) loadContent(event.state.url);
      else loadContent(window.location.pathname);
    });

    // ================= INISIALISASI =================
    document.addEventListener('DOMContentLoaded', async () => {
      addDebugLog('Halaman dimuat (SPA mode)');
      if (!checkDriverData()) { window.location.href = 'loginDriver.html'; return; }
      await fetchMapboxToken().catch(e=>addDebugLog(e.message));
      const savedTracking = localStorage.getItem(STORAGE_TRACKING);
      locationTrackingEnabled = savedTracking === 'true';
      autobidEnabled = localStorage.getItem(STORAGE_AUTOBID) === 'true';
      acceptKurirEnabled = localStorage.getItem(STORAGE_ACCEPT_KURIR) === 'true';
      updateTrackingButton(); updateAutobidButton(); updateKurirButton();
      startGPSMonitoring();
      loadOrders();
      document.getElementById('locationToggleBtn').addEventListener('click', toggleLocationTracking);
      document.getElementById('autobidBtn').addEventListener('click', toggleAutobid);
      document.getElementById('acceptKurirHeaderBtn').addEventListener('click', toggleAcceptKurir);
      document.getElementById('refreshBtn').addEventListener('click', refreshData);
      document.getElementById('menuBtn').addEventListener('click', () => { if(window.Median && Median.sidebar) Median.sidebar.open(); });
      document.getElementById('closeModal').addEventListener('click', closeModal);
      document.getElementById('ambilBtn').addEventListener('click', sendDriverOffer);
      document.getElementById('orderModal').addEventListener('click', e => { if(e.target===document.getElementById('orderModal') && !countdownInterval) closeModal(); });
      document.getElementById('popupButton').addEventListener('click', hidePopup);
    });
    window.showPhotoModal = (photoUrl, name) => {
      const modalHtml = `<div id="photoModal" class="modal photo-modal" style="display:flex;"><div class="modal-content"><button class="close-btn" onclick="document.getElementById('photoModal').remove()">&times;</button><div class="modal-body"><img src="${photoUrl}" class="large-customer-photo" style="max-width:300px;border-radius:15px;"><div class="large-customer-name">${name}</div></div></div></div>`;
      document.body.insertAdjacentHTML('beforeend', modalHtml);
      document.getElementById('photoModal').addEventListener('click', e => { if(e.target===document.getElementById('photoModal')) document.getElementById('photoModal').remove(); });
    };
  </script>
</body>
</html>
